<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2.2 PHYSICS EXAM UT </title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #2563eb; color: white; transition: 0.2s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* Modal Animation */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 200ms, transform 200ms; }
        .modal-exit { opacity: 1; transform: scale(1); }
        .modal-exit-active { opacity: 0; transform: scale(0.95); transition: opacity 200ms, transform 200ms; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Helper Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons && window.lucide.icons[name] && containerRef.current) {
                    if (typeof window.lucide.createElement === 'function') {
                        const svg = window.lucide.createElement(window.lucide.icons[name]);
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', `lucide lucide-${name.toLowerCase()} ${className}`);
                        containerRef.current.innerHTML = '';
                        containerRef.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <span ref={containerRef} style={{ display: 'inline-flex', alignItems: 'center', verticalAlign: 'middle' }} />;
        };

        // --- Custom Modal Component ---
        const Modal = ({ isOpen, title, message, type = 'info', onConfirm, onCancel, content }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4">
                    <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl p-6 transform transition-all flex flex-col max-h-[90vh]">
                        <div className="flex items-center gap-3 mb-4 flex-shrink-0">
                            {type === 'danger' && <Icon name="AlertTriangle" className="text-red-500" size={24}/>}
                            {type === 'success' && <Icon name="CheckCircle" className="text-green-500" size={24}/>}
                            {type === 'info' && <Icon name="Info" className="text-blue-500" size={24}/>}
                            <h3 className="text-lg font-bold text-gray-800">{title}</h3>
                        </div>
                        
                        {message && <p className="text-gray-600 mb-4 text-sm whitespace-pre-line flex-shrink-0">{message}</p>}
                        
                        {content && <div className="flex-1 overflow-hidden flex flex-col mb-4">{content}</div>}

                        <div className="flex justify-end gap-3 flex-shrink-0 pt-2 border-t mt-auto">
                            {onCancel && (
                                <button onClick={onCancel} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded">
                                    取消
                                </button>
                            )}
                            <button 
                                onClick={onConfirm} 
                                className={`px-4 py-2 text-sm text-white rounded shadow ${
                                    type === 'danger' ? 'bg-red-600 hover:bg-red-700' : 
                                    type === 'success' ? 'bg-green-600 hover:bg-green-700' : 
                                    'bg-blue-600 hover:bg-blue-700'
                                }`}
                            >
                                確定 / 複製
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Optimized Score Input Component ---
        const ScoreInput = ({ value, max, onSave }) => {
            const [localVal, setLocalVal] = useState(value);
            useEffect(() => setLocalVal(value), [value]);

            const handleBlur = () => {
                if (localVal !== value) onSave(localVal);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') e.target.blur();
            };

            return (
                <div className="flex items-center gap-1">
                    <input 
                        type="text" 
                        value={localVal} 
                        onChange={(e) => setLocalVal(e.target.value)}
                        onBlur={handleBlur}
                        onKeyDown={handleKeyDown}
                        placeholder="-"
                        className="w-12 text-center border-b border-gray-300 focus:border-blue-500 outline-none bg-transparent hover:bg-white focus:bg-white transition-colors rounded-sm"
                    />
                    <span className="text-gray-400 text-xs">/ {max}</span>
                </div>
            );
        };

        const FileUpload = ({ label, onUpload, accept = ".csv", id }) => (
            <div className="mb-4">
                <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
                <input 
                    id={id}
                    type="file" 
                    accept={accept}
                    onChange={(e) => onUpload(e.target.files[0])}
                    className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                />
            </div>
        );
// 【升級記憶版】GenerateView - 加入 HKDSE 難度對應、預設最新試卷、學生記憶功能
const GenerateView = ({ students = [], exams = [], history = [], setHistory }) => {
    // 【修改 2】選擇試卷範圍，預設為最新的一份 (陣列的最後一個)
    const [selectedExamId, setSelectedExamId] = React.useState(() => {
        return exams && exams.length > 0 ? exams[exams.length - 1].id : 'all';
    });
    
    // 【修改 3】選擇目標學生有記憶性 (使用 localStorage)
    const [selectedStudentIds, setSelectedStudentIds] = React.useState(() => {
        const saved = localStorage.getItem('generateView_selectedStudents');
        return saved ? JSON.parse(saved) : [];
    });

    // 當 selectedStudentIds 改變時，自動存檔到瀏覽器記憶中
    React.useEffect(() => {
        localStorage.setItem('generateView_selectedStudents', JSON.stringify(selectedStudentIds));
    }, [selectedStudentIds]);

    const [showSettings, setShowSettings] = React.useState(true);
    
    // Prompt 設定
    const [defaultCount, setDefaultCount] = React.useState(10);
    const [defaultDifficulty, setDefaultDifficulty] = React.useState('Medium'); // 預設 Medium
    const [language, setLanguage] = React.useState('繁體中文');
    const [questionType, setQuestionType] = React.useState('MC (Multiple Choice)');

    const studentsAnalysis = React.useMemo(() => {
        try {
            if (!students || !Array.isArray(students)) return [];

            return students.map(student => {
                const targetExams = selectedExamId === 'all' ? exams : exams.filter(e => e.id === selectedExamId);
                
                let totalScoreSum = 0;
                let totalMaxSum = 0;
                const topicMap = {};

                targetExams.forEach(exam => {
                    if (!exam) return;
                    const examData = exam.data || exam.markSheetData || [];
                    const mapData = exam.mapData || [];

                    const studentRow = examData.find(row => {
                        if (!row) return false;
                        if (row.Class && row.ClassNumber) {
                            const combinedId = `${String(row.Class).trim()}-${String(row.ClassNumber).trim()}`;
                            if (combinedId === String(student.id).trim()) return true;
                        }
                        const sLabel = student.label || student.name || "";
                        if (row.Name && sLabel.includes(String(row.Name).trim())) return true;
                        if (row.ID === student.id || row.Student_ID === student.id) return true;
                        return false;
                    });

                    if (studentRow) {
                        mapData.forEach(q => {
                            const qId = q.Question_ID || q.questionId || q.id;
                            const topicName = q.Topic_Name || q.topic || '未分類課題';
                            const topicId = q.Topic_ID || '';
                            const conceptDetail = q.Concept_Detail || ''; 
                            
                            if (!qId) return;

                            const rawScore = studentRow[qId];
                            if (rawScore !== undefined && rawScore !== null && rawScore !== '') {
                                const score = Number(rawScore) || 0;
                                const max = Number(q.Full_Mark || q.FullMark || q.Max || 1) || 0;

                                totalScoreSum += score;
                                totalMaxSum += max;

                                if (!topicMap[topicName]) {
                                    topicMap[topicName] = { name: topicName, id: topicId, score: 0, total: 0, wrongDetails: new Set() };
                                }
                                topicMap[topicName].score += score;
                                topicMap[topicName].total += max;

                                if (score < max && conceptDetail) {
                                    topicMap[topicName].wrongDetails.add(conceptDetail);
                                }
                            }
                        });
                    }
                });

                const weaknesses = Object.values(topicMap)
                    .map(t => ({
                        ...t,
                        percentage: t.total > 0 ? Math.round((t.score / t.total) * 100) : 0,
                        wrongDetails: Array.from(t.wrongDetails) 
                    }))
                    .filter(t => t.percentage < 40)
                    .sort((a, b) => a.percentage - b.percentage);

                const avgScore = totalMaxSum > 0 ? Math.round((totalScoreSum / totalMaxSum) * 100) : 0;

                return { ...student, weaknesses, avgScore };
            });
        } catch (err) {
            console.error("Analysis Error:", err);
            return [];
        }
    }, [selectedExamId, students, exams]);

    const toggleAllStudents = () => {
        if (selectedStudentIds.length === students.length) setSelectedStudentIds([]);
        else setSelectedStudentIds(students.map(s => s.id));
    };

    const handleQuickGenerate = (student, topic) => {
        // 【修改 1】難度對應 HKDSE 等級
        const difficultyMap = {
            'Easy': 'HKDSE 等級 2 (基礎)',
            'Medium': 'HKDSE 等級 3 (中等)',
            'Hard': 'HKDSE 等級 4 或以上 (進階)'
        };
        const mappedDifficulty = difficultyMap[defaultDifficulty] || defaultDifficulty;

        const conceptStr = topic.wrongDetails && topic.wrongDetails.length > 0
            ? `\n\n【學生具體失分盲點】\n這名學生在以下概念中失分較多，請務必針對這些盲點設計題目：\n- ${topic.wrongDetails.join('\n- ')}`
            : '';

        const promptText = `你現在是一位專業的 HKDSE Physics 導師。
請為學生「${student.label}」生成一份針對性練習。
課題：${topic.id} ${topic.name}
難度要求：${mappedDifficulty}
題目類型：${questionType}
題目數量：${defaultCount} 題${conceptStr}

要求：
1. 題目必須符合 HKDSE Physics 課程標準及問法。
2. 提供詳細的答案解釋 (Explanation) 及評分標準 (Marking Scheme)。
3. 請以${language}輸出。`;

        navigator.clipboard.writeText(promptText);
        
        const newHistory = {
            id: Date.now(),
            date: new Date().toISOString().split('T')[0],
            studentId: student.id,
            studentName: student.label,
            topics: topic.name,
            difficulty: mappedDifficulty, // 紀錄中也顯示 HKDSE 等級
            count: defaultCount,
            status: 'pending',
            score: '-',
            maxScore: defaultCount
        };
        setHistory([newHistory, ...history]);
        alert(`Prompt 已複製！\n難度設定為：${mappedDifficulty}\n已為 ${student.label} 建立跟進紀錄。`);
    };

    const updateTopicStatus = (studentId, topicName, status) => {
        const record = history.find(h => h.studentId === studentId && h.topics === topicName);
        if (record) setHistory(history.map(h => h.id === record.id ? { ...h, status } : h));
        else {
            const student = students.find(s => s.id === studentId);
            setHistory([{ id: Date.now(), date: new Date().toISOString().split('T')[0], studentId, studentName: student?.label || studentId, topics: topicName, difficulty: defaultDifficulty, count: defaultCount, status, score: '-', maxScore: defaultCount }, ...history]);
        }
    };

    const sortedStudents = React.useMemo(() => [...studentsAnalysis].sort((a, b) => a.avgScore - b.avgScore), [studentsAnalysis]);

    return (
        <div className="p-6 max-w-7xl mx-auto">
            <div className="flex justify-between items-center mb-6">
                <h1 className="text-2xl font-bold flex items-center gap-2">
                   <i data-lucide="clipboard-check"></i> 練習管理與跟進
                </h1>
                <button onClick={() => setShowSettings(!showSettings)} className="px-3 py-2 bg-gray-200 rounded hover:bg-gray-300 text-sm">
                    {showSettings ? '隱藏設定' : '展開設定'}
                </button>
            </div>

            {showSettings && (
                <div className="mb-6 p-5 bg-white rounded-lg shadow-sm border border-blue-100 flex flex-wrap gap-6 items-end">
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">語言</label>
                        <select value={language} onChange={e => setLanguage(e.target.value)} className="border rounded-md px-3 py-2 w-32">
                            <option value="繁體中文">繁體中文</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">題目類型</label>
                        <select value={questionType} onChange={e => setQuestionType(e.target.value)} className="border rounded-md px-3 py-2 w-40">
                            <option value="MC (Multiple Choice)">MC</option>
                            <option value="LQ (Long Question)">LQ</option>
                            <option value="Mix (MC + LQ)">Mix (MC + LQ)</option>
                        </select>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">難度</label>
                        <select value={defaultDifficulty} onChange={e => setDefaultDifficulty(e.target.value)} className="border rounded-md px-3 py-2 w-48">
                            <option value="Easy">Easy (HKDSE 等級 2)</option>
                            <option value="Medium">Medium (HKDSE 等級 3)</option>
                            <option value="Hard">Hard (HKDSE 等級 4+)</option>
                        </select>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">預設題目數</label>
                        <input type="number" value={defaultCount} onChange={e => setDefaultCount(e.target.value)} className="border rounded-md px-3 py-2 w-24" />
                    </div>
                </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div className="bg-white p-4 rounded-lg shadow-sm border">
                    <label className="block font-bold mb-2">1. 選擇試卷範圍</label>
                    <select className="w-full p-2 border rounded" value={selectedExamId} onChange={e => setSelectedExamId(e.target.value)}>
                        <option value="all">所有試卷 (綜合分析)</option>
                        {exams.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                    </select>
                </div>

                <div className="bg-white p-4 rounded-lg shadow-sm border md:col-span-2">
                    <div className="flex justify-between items-center mb-2">
                        <label className="block font-bold">2. 選擇目標學生</label>
                        <button onClick={toggleAllStudents} className="text-sm text-blue-600 hover:underline">
                            {selectedStudentIds.length === (students?.length || 0) ? '取消全選' : '全選所有學生'}
                        </button>
                    </div>
                    <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-2 border rounded bg-gray-50">
                        {sortedStudents.map(s => (
                            <label key={s.id} className={`flex items-center gap-1 px-2 py-1 rounded border cursor-pointer transition-colors ${selectedStudentIds.includes(s.id) ? 'bg-blue-100 border-blue-300' : 'bg-white hover:bg-gray-100'}`}>
                                <input type="checkbox" checked={selectedStudentIds.includes(s.id)} onChange={() => setSelectedStudentIds(prev => prev.includes(s.id) ? prev.filter(id => id !== s.id) : [...prev, s.id])} className="hidden" />
                                <span className="text-sm">{s.label}</span>
                                <span className={`text-[10px] px-1.5 py-0.5 rounded ${s.avgScore < 50 ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-700'}`}>{s.avgScore}%</span>
                            </label>
                        ))}
                    </div>
                </div>
            </div>

            <div className="bg-white rounded-lg shadow-sm border overflow-hidden">
                <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse min-w-max">
                        <thead>
                            <tr className="bg-gray-800 text-white text-sm">
                                <th className="px-4 py-3 sticky left-0 bg-gray-800 z-10 w-40 shadow-sm">學生 (總分百分比)</th>
                                <th className="px-4 py-3 border-l border-gray-700">弱點課題 (得分 &lt; 40%)</th>
                            </tr>
                        </thead>
                        <tbody>
                            {selectedStudentIds.length === 0 ? (
                                <tr><td colSpan="2" className="px-4 py-10 text-center text-gray-400">請從上方選擇學生以生成分析報告</td></tr>
                            ) : (
                                sortedStudents.filter(s => selectedStudentIds.includes(s.id)).map(student => (
                                    <tr key={student.id} className="border-b hover:bg-gray-50/50 transition-colors">
                                        <td className="px-4 py-4 sticky left-0 bg-white border-r shadow-sm align-top">
                                            <div className="font-bold text-gray-800">{student.label}</div>
                                            <div className="text-xs mt-1 text-gray-500">總分: <span className={`font-bold ${student.avgScore < 50 ? 'text-red-500' : 'text-green-600'}`}>{student.avgScore}%</span></div>
                                        </td>
                                        <td className="px-4 py-4 align-top">
                                            <div className="flex flex-wrap gap-3">
                                                {student.weaknesses && student.weaknesses.length > 0 ? student.weaknesses.map(topic => {
                                                    const historyRecord = history.find(h => h.studentId === student.id && h.topics === topic.name);
                                                    const currentStatus = historyRecord ? historyRecord.status : 'pending';

                                                    return (
                                                        <div key={topic.id} className="w-48 bg-white border border-red-200 rounded-lg p-3 shadow-sm hover:shadow-md transition-shadow">
                                                            <div onClick={() => handleQuickGenerate(student, topic)} className="cursor-pointer group mb-2">
                                                                <div className="text-[10px] text-blue-600 font-mono group-hover:underline">#{topic.id}</div>
                                                                <div className="text-sm font-bold leading-snug mb-2 group-hover:text-blue-700 h-10 overflow-hidden" title={topic.name}>{topic.name}</div>
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <div className="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                                                        <div className="h-full bg-red-500" style={{ width: `${topic.percentage}%` }}></div>
                                                                    </div>
                                                                    <span className="text-[11px] font-bold text-red-600">{topic.percentage}%</span>
                                                                </div>
                                                            </div>
                                                            <select value={currentStatus} onChange={(e) => updateTopicStatus(student.id, topic.name, e.target.value)} className={`text-xs w-full p-1.5 rounded border outline-none cursor-pointer ${currentStatus === 'graded' ? 'bg-green-50 text-green-700 border-green-200' : currentStatus === 'submitted' ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 'bg-gray-50 text-gray-600 border-gray-200'}`}>
                                                                <option value="pending">未完成</option><option value="submitted">已提交</option><option value="graded">已評分</option>
                                                            </select>
                                                        </div>
                                                    );
                                                }) : <div className="text-sm text-gray-400 py-2">🎉 該範圍內表現良好，無低於 40% 的課題</div>}
                                            </div>
                                        </td>
                                    </tr>
                                ))
                            )}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
};
        // --- Main App ---
        const App = () => {
            const [view, setView] = useState('upload'); 
            const [exams, setExams] = useState([]); 
            const [students, setStudents] = useState([]);
            const [selectedStudentId, setSelectedStudentId] = useState('');
            const [history, setHistory] = useState([]);
            const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', type: 'info', onConfirm: null, onCancel: null, content: null });

            const showModal = (config) => setModalConfig({ ...config, isOpen: true });
            const closeModal = () => setModalConfig({ ...modalConfig, isOpen: false });

            // Persistence
            useEffect(() => {
                try {
                    const savedHistory = localStorage.getItem('hkdse_ex_history_v2');
                    if (savedHistory) setHistory(JSON.parse(savedHistory));
                    const savedExams = localStorage.getItem('hkdse_ex_exams_v2');
                    if (savedExams) setExams(JSON.parse(savedExams));
                } catch (e) { console.error(e); }
            }, []);

            useEffect(() => { localStorage.setItem('hkdse_ex_history_v2', JSON.stringify(history)); }, [history]);
            useEffect(() => { 
                try { localStorage.setItem('hkdse_ex_exams_v2', JSON.stringify(exams)); } 
                catch (e) { if (e.name === 'QuotaExceededError') alert('儲存空間不足，請備份並清除舊資料'); }
            }, [exams]);

            useEffect(() => {
                if (exams.length > 0) {
                    const allStudents = {};
                    exams.forEach(exam => {
                        exam.markSheetData.forEach(row => {
                            if (row.Class && row.Name) {
                                const sid = `${row.Class}-${row.ClassNumber}`;
                                if (!allStudents[sid]) {
                                    allStudents[sid] = {
                                        id: sid,
                                        label: `${row.Class} (${row.ClassNumber}) ${row.Name}`,
                                        class: row.Class,
                                        number: row.ClassNumber,
                                        name: row.Name
                                    };
                                }
                            }
                        });
                    });
                    const studList = Object.values(allStudents).sort((a,b) => a.id.localeCompare(b.id));
                    setStudents(studList);
                    if (studList.length > 0 && !selectedStudentId) setSelectedStudentId(studList[0].id);
                }
            }, [exams]);

            // Analysis
            const analyzeExam = (exam, studentId) => {
                const studentRow = exam.markSheetData.find(s => `${s.Class}-${s.ClassNumber}` === studentId);
                if (!studentRow) return null;
                const analysis = {};
                const conceptWeaknesses = [];
                let totalScore = 0, totalMax = 0;
                exam.mapData.forEach(q => {
                    const qId = q.Question_ID;
                    const topicId = q.Topic_ID || 'Unknown';
                    const topicName = q.Topic_Name || 'General';
                    const maxMark = parseFloat(q.Full_Mark) || 1;
                    const studentScore = parseFloat(studentRow[qId]) || 0;
                    if (!analysis[topicId]) analysis[topicId] = { name: topicName, score: 0, max: 0 };
                    analysis[topicId].score += studentScore;
                    analysis[topicId].max += maxMark;
                    totalScore += studentScore;
                    totalMax += maxMark;
                    if ((studentScore / maxMark) < 0.5) {
                        conceptWeaknesses.push({ topic: topicName, concept: q.Concept_Detail, difficulty: q.Difficulty, qId: qId });
                    }
                });
                Object.values(analysis).forEach(t => t.percentage = t.max > 0 ? (t.score / t.max) * 100 : 0);
                return { examName: exam.name, examId: exam.id, overallPercentage: totalMax > 0 ? (totalScore / totalMax) * 100 : 0, topics: analysis, weaknesses: conceptWeaknesses };
            };

            const studentTrend = useMemo(() => {
                if (!selectedStudentId || exams.length === 0) return null;
                return exams.map(exam => analyzeExam(exam, selectedStudentId)).filter(Boolean);
            }, [selectedStudentId, exams]);

            // Backup
            const exportData = () => {
                const data = { exams, history, exportedAt: new Date().toISOString(), version: "1.5" };
                const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `HKDSE_Tracker_Backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            const importData = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.exams && data.history) {
                            showModal({
                                title: '警告：覆蓋數據',
                                message: `確定要還原嗎？這將會清除現有數據。`,
                                type: 'danger',
                                onConfirm: () => { setExams(data.exams); setHistory(data.history); closeModal(); },
                                onCancel: closeModal
                            });
                        }
                    } catch (err) { alert('無效的備份檔案'); }
                };
                reader.readAsText(file);
            };

            const Sidebar = () => (
                <div className="w-64 bg-white h-screen fixed left-0 top-0 border-r flex flex-col z-10 shadow-lg">
                    <div className="p-6 border-b bg-blue-600 text-white">
                        <h1 className="text-xl font-bold flex items-center gap-2"><Icon name="Activity"/> 物理科追蹤系統</h1>
                    </div>
                    <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                        <button onClick={() => setView('upload')} className={`w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg transition ${view === 'upload' ? 'bg-blue-50 text-blue-700 font-bold shadow-sm' : 'text-gray-600 hover:bg-gray-50'}`}><Icon name="Database" size={18} /> 數據庫</button>
                        <button onClick={() => setView('dashboard')} disabled={exams.length === 0} className={`w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg transition ${view === 'dashboard' ? 'bg-blue-50 text-blue-700 font-bold shadow-sm' : 'text-gray-600 hover:bg-gray-50 disabled:opacity-50'}`}><Icon name="LineChart" size={18} /> 成績追蹤</button>
                        <button onClick={() => setView('generate')} disabled={exams.length === 0} className={`w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg transition ${view === 'generate' ? 'bg-blue-50 text-blue-700 font-bold shadow-sm' : 'text-gray-600 hover:bg-gray-50 disabled:opacity-50'}`}><Icon name="Zap" size={18} /> 練習生成</button>
                        <button onClick={() => setView('history')} className={`w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg transition ${view === 'history' ? 'bg-blue-50 text-blue-700 font-bold shadow-sm' : 'text-gray-600 hover:bg-gray-50'}`}><Icon name="ClipboardList" size={18} /> 練習管理</button>
                    </nav>
                </div>
            );

            const UploadView = () => {
                const [tempMap, setTempMap] = useState(null);
                const [tempMarks, setTempMarks] = useState(null);
                const [tempMc, setTempMc] = useState(null);
                const [examName, setExamName] = useState('');

                const handleParse = (file, setter) => {
                    Papa.parse(file, { header: true, skipEmptyLines: true, complete: (results) => setter(results.data) });
                };
                const addExam = () => {
                    if (!tempMap || !tempMarks || !examName) return;
                    setExams([...exams, { id: Date.now().toString(), name: examName, mapData: tempMap, markSheetData: tempMarks, mcData: tempMc || [] }]);
                    setTempMap(null); setTempMarks(null); setTempMc(null); setExamName('');
                    showModal({ title: '成功', message: `已成功加入考試: ${examName}`, type: 'success', onConfirm: closeModal });
                };

                return (
                    <div className="max-w-4xl mx-auto mt-6 p-6 space-y-8">
                        <div className="card p-6 bg-slate-50 border border-slate-200">
                            <h2 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="Save" size={20} /> 數據管理</h2>
                            <div className="flex gap-4">
                                <button onClick={exportData} className="flex-1 bg-white border border-slate-300 py-3 rounded-lg flex justify-center gap-2 shadow-sm"><Icon name="Download" size={18} /> 匯出備份</button>
                                <div className="flex-1 relative">
                                    <input type="file" accept=".json" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => importData(e.target.files[0])} />
                                    <button className="w-full bg-white border border-slate-300 py-3 rounded-lg flex justify-center gap-2 shadow-sm pointer-events-none"><Icon name="Upload" size={18} /> 匯入還原</button>
                                </div>
                            </div>
                        </div>
                        <div className="card p-8 border-l-4 border-blue-500 shadow-md">
                            <h2 className="text-2xl font-bold mb-6 text-gray-800 flex items-center gap-2"><Icon name="PlusCircle" /> 新增考試數據</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div className="col-span-2"><input type="text" value={examName} onChange={e => setExamName(e.target.value)} className="w-full p-2 border rounded" placeholder="考試名稱 (如: S5 Mid-Term)" /></div>
                                <div><FileUpload id="map-upload" label="1. 題目對照表 (MAP)" onUpload={f => handleParse(f, setTempMap)} />{tempMap && <div className="text-xs text-green-600">已讀取</div>}</div>
                                <div><FileUpload id="mark-upload" label="2. 成績表 (Marksheet)" onUpload={f => handleParse(f, setTempMarks)} />{tempMarks && <div className="text-xs text-green-600">已讀取 {tempMarks.length} 學生</div>}</div>
                                <div className="col-span-2"><FileUpload id="mc-upload" label="3. MC 紀錄 (選填)" onUpload={f => handleParse(f, setTempMc)} /></div>
                            </div>
                            <button onClick={addExam} disabled={!tempMap || !tempMarks || !examName} className="w-full btn-primary py-3 rounded-lg font-bold shadow disabled:opacity-50">確認加入此考試</button>
                        </div>
                        {exams.length > 0 && (
                            <div className="card p-6">
                                <h3 className="font-bold text-gray-700 mb-4">現有考試</h3>
                                <table className="w-full text-sm"><tbody>{exams.map(e => (
                                    <tr key={e.id} className="border-t"><td className="p-3 font-medium">{e.name}</td><td className="p-3">{e.markSheetData.length} 人</td><td className="p-3 text-right"><button onClick={() => setExams(exams.filter(x => x.id !== e.id))} className="text-red-500 underline">移除</button></td></tr>
                                ))}</tbody></table>
                            </div>
                        )}
                    </div>
                );
            };
            // 【全新版塊】進步與退步排行榜
const ProgressBoard = ({ students = [], exams = [] }) => {
    const progressData = React.useMemo(() => {
        if (!students || exams.length < 2) return [];

        // 確保試卷按時間順序排列 (如果上傳順序是時間順序)
        const sortedExams = [...exams];

        return students.map(student => {
            const examScores = sortedExams.map(exam => {
                const examData = exam.data || exam.markSheetData || [];
                const mapData = exam.mapData || [];
                
                const studentRow = examData.find(row => {
                    if (!row) return false;
                    if (row.Class && row.ClassNumber) {
                        const combinedId = `${String(row.Class).trim()}-${String(row.ClassNumber).trim()}`;
                        if (combinedId === String(student.id).trim()) return true;
                    }
                    const sLabel = student.label || student.name || "";
                    if (row.Name && sLabel.includes(String(row.Name).trim())) return true;
                    if (row.ID === student.id || row.Student_ID === student.id) return true;
                    return false;
                });

                if (!studentRow) return null;

                let totalScore = 0;
                let totalMax = 0;
                mapData.forEach(q => {
                    const qId = q.Question_ID || q.questionId || q.id;
                    if (!qId) return;
                    const rawScore = studentRow[qId];
                    if (rawScore !== undefined && rawScore !== null && rawScore !== '') {
                        totalScore += Number(rawScore) || 0;
                        totalMax += Number(q.Full_Mark || q.FullMark || q.Max || 1) || 0;
                    }
                });

                return totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : null;
            }).filter(score => score !== null);

            // 必須至少參加過兩次考試才能對比
            if (examScores.length < 2) return null;

            // 比較最後兩次考試 (最近一次 vs 上一次)
            const latestScore = examScores[examScores.length - 1];
            const previousScore = examScores[examScores.length - 2];
            const diff = latestScore - previousScore;

            let category = '';
            if (diff >= 10) category = 'significant_up';
            else if (diff > 0) category = 'slight_up';
            else if (diff === 0) category = 'stable';
            else if (diff <= -10) category = 'severe_down';
            else category = 'slight_down';

            return { ...student, latestScore, previousScore, diff, category };
        }).filter(Boolean);
    }, [students, exams]);

    if (exams.length < 2) {
        return <div className="p-4 mb-6 bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-lg text-sm">💡 溫馨提示：系統需要至少輸入兩次考試數據，才能生成「進步與退步分析」喔！</div>;
    }

    const groups = {
        significant_up: progressData.filter(s => s.category === 'significant_up').sort((a,b)=>b.diff - a.diff),
        slight_up: progressData.filter(s => s.category === 'slight_up').sort((a,b)=>b.diff - a.diff),
        severe_down: progressData.filter(s => s.category === 'severe_down').sort((a,b)=>a.diff - b.diff),
        slight_down: progressData.filter(s => s.category === 'slight_down').sort((a,b)=>a.diff - b.diff),
    };

    return (
        <div className="bg-white p-6 rounded-lg shadow-sm border mb-8">
            <h2 className="text-xl font-bold mb-6 flex items-center gap-2">
                📈 學生表現趨勢追蹤 <span className="text-sm font-normal text-gray-500">(比較最近兩次測驗)</span>
            </h2>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* 左側：進步區 */}
                <div className="space-y-4">
                    <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                        <h3 className="font-bold text-green-800 mb-3 flex items-center gap-2">🌟 顯著進步 (+10% 或以上)</h3>
                        <div className="space-y-2">
                            {groups.significant_up.length > 0 ? groups.significant_up.map(s => (
                                <div key={s.id} className="flex justify-between items-center bg-white p-2.5 rounded border border-green-100 shadow-sm">
                                    <span className="font-medium text-gray-800">{s.label}</span>
                                    <div className="text-right">
                                        <span className="text-green-600 font-bold text-lg">+{s.diff}%</span>
                                        <div className="text-[10px] text-gray-400">{s.previousScore}% ➔ {s.latestScore}%</div>
                                    </div>
                                </div>
                            )) : <div className="text-sm text-gray-500 py-2">目前沒有學生在此區間</div>}
                        </div>
                    </div>

                    <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-4">
                        <h3 className="font-bold text-emerald-800 mb-3 flex items-center gap-2">📈 輕微進步</h3>
                        <div className="space-y-2 flex flex-wrap gap-2">
                            {groups.slight_up.length > 0 ? groups.slight_up.map(s => (
                                <span key={s.id} className="inline-flex items-center gap-1 bg-white px-2 py-1 rounded border border-emerald-100 text-sm">
                                    {s.label} <span className="text-emerald-600 font-bold">+{s.diff}%</span>
                                </span>
                            )) : <span className="text-sm text-gray-500">無</span>}
                        </div>
                    </div>
                </div>

                {/* 右側：退步區 (需要跟進) */}
                <div className="space-y-4">
                    <div className="bg-red-50 border border-red-200 rounded-lg p-4">
                        <h3 className="font-bold text-red-800 mb-3 flex items-center gap-2">🚨 嚴重退步 (-10% 或以上)</h3>
                        <div className="space-y-2">
                            {groups.severe_down.length > 0 ? groups.severe_down.map(s => (
                                <div key={s.id} className="flex justify-between items-center bg-white p-2.5 rounded border border-red-100 shadow-sm">
                                    <span className="font-medium text-gray-800">{s.label}</span>
                                    <div className="text-right">
                                        <span className="text-red-600 font-bold text-lg">{s.diff}%</span>
                                        <div className="text-[10px] text-gray-400">{s.previousScore}% ➔ {s.latestScore}%</div>
                                    </div>
                                </div>
                            )) : <div className="text-sm text-gray-500 py-2">太好了！目前沒有學生嚴重退步</div>}
                        </div>
                    </div>

                    <div className="bg-orange-50 border border-orange-200 rounded-lg p-4">
                        <h3 className="font-bold text-orange-800 mb-3 flex items-center gap-2">📉 輕微退步</h3>
                        <div className="space-y-2 flex flex-wrap gap-2">
                            {groups.slight_down.length > 0 ? groups.slight_down.map(s => (
                                <span key={s.id} className="inline-flex items-center gap-1 bg-white px-2 py-1 rounded border border-orange-100 text-sm">
                                    {s.label} <span className="text-orange-600 font-bold">{s.diff}%</span>
                                </span>
                            )) : <span className="text-sm text-gray-500">無</span>}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
};
            const DashboardView = () => {
                const lineChartRef = useRef(null);
                const barChartRef = useRef(null);
                const [selectedExamIndex, setSelectedExamIndex] = useState(exams.length - 1); 
                const activeReport = studentTrend ? studentTrend[selectedExamIndex] : null;

                useEffect(() => {
                    if (studentTrend && lineChartRef.current) {
                        if (lineChartRef.current.chartInstance) lineChartRef.current.chartInstance.destroy();
                        const ctx = lineChartRef.current.getContext('2d');
                        lineChartRef.current.chartInstance = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: studentTrend.map(r => r.examName),
                                datasets: [{ label: '整體得分率 (%)', data: studentTrend.map(r => r.overallPercentage), borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true }]
                            },
                            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
                        });
                    }
                }, [studentTrend]);

                useEffect(() => {
                    if (activeReport && barChartRef.current) {
                        if (barChartRef.current.chartInstance) barChartRef.current.chartInstance.destroy();
                        const topics = Object.entries(activeReport.topics).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true, sensitivity: 'base' })).map(([_, t]) => t);
                        const ctx = barChartRef.current.getContext('2d');
                        barChartRef.current.chartInstance = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: topics.map(t => t.name.substring(0, 10)),
                                datasets: [{ label: '課題得分率 (%)', data: topics.map(t => t.percentage), backgroundColor: topics.map(t => t.percentage < 50 ? '#ef4444' : '#22c55e') }]
                            },
                            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
                        });
                    }
                }, [activeReport]);

                if (!studentTrend || studentTrend.length === 0) return <div className="p-8 text-center text-gray-500">請先在數據庫上傳資料。</div>;

                return (
                    <div className="p-6 space-y-6">
                        <div className="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm">
                            
                            <h2 className="text-2xl font-bold text-gray-800">學生成績追蹤</h2>
                            <div className="flex gap-2"><Icon name="User" className="text-gray-500" /><select className="p-2 border rounded-md" value={selectedStudentId} onChange={(e) => setSelectedStudentId(e.target.value)}>{students.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
                        </div>
                        
                        <ProgressBoard students={students} exams={exams} />
                        
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="card p-6"><canvas ref={lineChartRef} height="150"></canvas></div>
                            <div className="card p-6 flex flex-col">
                                <div className="flex justify-between mb-4"><h3 className="font-bold">弱項分析</h3><select className="text-sm border rounded" value={selectedExamIndex} onChange={e => setSelectedExamIndex(Number(e.target.value))}>{studentTrend.map((r, i) => <option key={i} value={i}>{r.examName}</option>)}</select></div>
                                {activeReport && <div className="flex-1 overflow-y-auto space-y-2 custom-scrollbar" style={{maxHeight: '250px'}}>{activeReport.weaknesses.map((w, idx) => <div key={idx} className="p-3 bg-red-50 border-l-4 border-red-500 rounded text-sm"><div className="font-bold text-red-800">{w.topic}</div><div>{w.concept}</div></div>)}</div>}
                            </div>
                        </div>
                        <div className="card p-6"><div className="h-64 w-full"><canvas ref={barChartRef}></canvas></div></div>
                    </div>
                );
            };



            const HistoryView = () => {
                const [filter, setFilter] = useState('all'); 
                const [searchTerm, setSearchTerm] = useState('');
                const filteredHistory = history.filter(h => {
                    if (filter !== 'all' && h.status !== filter) return false;
                    if (searchTerm && !h.studentName.includes(searchTerm) && !h.topics.includes(searchTerm)) return false;
                    return true;
                });
                const updateStatus = (id, s) => setHistory(history.map(h => h.id === id ? { ...h, status: s } : h));
                const updateScore = (id, s) => setHistory(history.map(h => h.id === id ? { ...h, score: s } : h));
                
                return (
                    <div className="p-6 h-screen flex flex-col">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-gray-800">練習管理</h2>
                            <div className="flex gap-2"><input type="text" placeholder="搜尋..." className="p-2 border rounded-lg text-sm w-48" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /><select className="p-2 border rounded-lg text-sm" value={filter} onChange={e => setFilter(e.target.value)}><option value="all">全部</option><option value="pending">未完成</option><option value="submitted">已提交</option><option value="graded">已評分</option></select></div>
                        </div>
                        <div className="card flex-1 overflow-hidden flex flex-col shadow-md">
                            <div className="overflow-auto flex-1 custom-scrollbar">
                                <table className="w-full text-sm text-left"><thead className="bg-gray-100 text-gray-600 uppercase sticky top-0"><tr><th className="px-4 py-3">日期</th><th className="px-4 py-3">學生</th><th className="px-4 py-3">課題</th><th className="px-4 py-3">狀態</th><th className="px-4 py-3">分數</th><th className="px-4 py-3"></th></tr></thead><tbody>{filteredHistory.map(h => (
                                    <tr key={h.id} className="hover:bg-blue-50 border-b"><td className="px-4 py-3">{h.date}</td><td className="px-4 py-3 font-medium">{h.studentName}</td><td className="px-4 py-3"><div className="truncate max-w-xs">{h.topics}</div></td>
                                    <td className="px-4 py-3"><select value={h.status} onChange={e => updateStatus(h.id, e.target.value)} className={`text-xs px-2 py-1 rounded-full ${h.status==='pending'?'bg-gray-200':h.status==='submitted'?'bg-yellow-100':'bg-green-100'}`}><option value="pending">未完成</option><option value="submitted">已提交</option><option value="graded">已評分</option></select></td>
                                    <td className="px-4 py-3"><ScoreInput value={h.score} max={h.maxScore} onSave={s => updateScore(h.id, s)} /></td>
                                    <td className="px-4 py-3 text-right"><button onClick={() => { if(confirm('刪除?')) setHistory(history.filter(x => x.id !== h.id)) }} className="text-gray-400 hover:text-red-500"><Icon name="Trash2" size={16}/></button></td></tr>
                                ))}</tbody></table>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex min-h-screen bg-gray-100 text-gray-800 relative">
                    <Sidebar />
                    <div className="flex-1 ml-64 overflow-hidden">{view === 'upload' && <UploadView />}{view === 'dashboard' && <DashboardView />}{view === 'generate' && <GenerateView students={students} exams={exams} history={history} setHistory={setHistory} analyzeExam={analyzeExam} />}{view === 'history' && <HistoryView />}</div>
                    <Modal {...modalConfig} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
