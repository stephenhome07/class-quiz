<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> V2.41 Physics Quiz Analyzer</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        Babel.registerPreset("my-preset", {
            presets: [
                [Babel.availablePresets["react"], { "runtime": "classic" }]
            ],
        });
    </script>

    <style>
        body { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .score-input { width: 50px; text-align: center; border: 1px solid #cbd5e1; border-radius: 4px; padding: 4px; }
        .score-input:focus { outline: none; border-color: #3b82f6; ring: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-presets="my-preset,env">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name] && containerRef.current) {
                    const svg = window.lucide.createElement(window.lucide.icons[name]);
                    svg.setAttribute('width', size); svg.setAttribute('height', size);
                    if (className) svg.setAttribute('class', `lucide lucide-${name.toLowerCase()} ${className}`);
                    containerRef.current.innerHTML = ''; containerRef.current.appendChild(svg);
                }
            }, [name, size, className]);
            return <span ref={containerRef} style={{ display: 'inline-flex', alignItems: 'center', verticalAlign: 'middle' }} />;
        };


        // 直接宣告為全域變數，等待從 Google 雲端載入資料
        let SYLLABUS_TOPICS = {};
        let QUIZ_MAPS = {};
        let EXAM_MAPS = {};
        let HOMEWORK_MAPS = {};  // ★ 加入這一行！
            
            // --- Views Components ---
            
            const StudentView = ({ students, setStudents, setScores }) => {
                // 1. 群組狀態與貼上資料狀態
                const [newCohort, setNewCohort] = React.useState('2025-2028'); // 預設可以寫他常用的群組
                const [pasteData, setPasteData] = React.useState('');

                // 2. 升級版：處理匯入學生的函數 (修復了覆蓋舊名單的 Bug)
                const handleImportStudents = () => {
                    const lines = pasteData.trim().split('\n');
                    const newStudents = [];
                    lines.forEach(line => {
                        const parts = line.split('\t');
                        if (parts.length >= 3) {
                            const id = `${parts[0].trim()}-${parts[1].trim()}`;
                            // 👇 系統自動幫每一位貼上的學生，加上老師設定的「群組 (cohort)」
                            newStudents.push({ 
                                id: id, 
                                class: parts[0].trim(), 
                                num: parts[1].trim(), 
                                name: parts[2].trim(),
                                cohort: newCohort // 關鍵：寫入群組
                            });
                        }
                    });
                    
                    if (newStudents.length > 0) {
                        // 👇 修復 Bug：將新學生「附加」到現有學生名單後面，而不是覆蓋
                        setStudents(prev => [...prev, ...newStudents]);
                        setPasteData('');
                        alert(`✅ 成功匯入 ${newStudents.length} 名學生至群組「${newCohort}」！\n請記得點擊左側「儲存並同步至雲端」。`);
                    } else {
                        alert('無法匯入，請檢查 Excel 格式是否為「班別 (Tab) 學號 (Tab) 姓名」');
                    }
                };

                // 3. 刪除學生的函數 (維持不變)
                const handleDeleteStudent = (id, name) => {
                    if (window.confirm(`確定要移除學生「${name}」嗎？\n注意：這將會同時刪除該學生的所有小測成績紀錄，且無法復原。`)) {
                        setStudents(prev => prev.filter(s => s.id !== id));
                        setScores(prev => {
                            const newScores = { ...prev };
                            delete newScores[id];
                            return newScores;
                        });
                    }
                };

                return (
                    <div className="p-6">
                        <h2 className="text-2xl font-bold mb-4 flex items-center gap-2"><Icon name="Users" /> 學生管理 (Excel 匯入)</h2>
                        
                        {/* --- 匯入學生區塊 --- */}
                        <div className="card p-5 mb-6 bg-blue-50/50 border-blue-100">
                            <p className="text-sm text-gray-600 mb-3">請先設定群組，再從 Excel 複製資料並貼上至下方文字方塊。格式為 3 欄：<b>班別 (Tab) 學號 (Tab) 姓名</b>。</p>
                            
                            {/* 👇 新增：群組設定輸入框 👇 */}
                            <div className="mb-3 flex items-center gap-3 bg-white p-3 rounded-lg shadow-sm border border-blue-100 w-fit">
                                <label className="font-bold text-blue-800 text-sm">📌 準備匯入至群組：</label>
                                <input 
                                    type="text" 
                                    className="p-1.5 border-b-2 border-blue-300 font-bold text-blue-700 outline-none focus:border-blue-600 bg-transparent" 
                                    value={newCohort} 
                                    onChange={e => setNewCohort(e.target.value)} 
                                    placeholder="例: 2025-2028"
                                />
                            </div>

                            <textarea 
                                className="w-full h-32 p-3 border rounded text-sm mb-3 outline-none focus:ring-2 focus:ring-blue-400 shadow-inner" 
                                value={pasteData} 
                                onChange={e => setPasteData(e.target.value)} 
                                placeholder="例如：&#10;5A&#9;01&#9;陳大文&#10;5A&#9;02&#9;李小明"
                            />
                            <button onClick={handleImportStudents} className="bg-blue-600 text-white px-5 py-2.5 rounded-lg shadow-md hover:bg-blue-700 font-bold flex items-center gap-2 transition">
                                <Icon name="PlusCircle" size={18} /> 執行匯入
                            </button>
                        </div>

                        {/* --- 現有學生列表 --- */}
                        <div className="card overflow-hidden">
                            <div className="bg-slate-800 text-white p-4 flex justify-between items-center">
                                <h3 className="font-bold flex items-center gap-2"><Icon name="List" size={18}/> 系統現有名單</h3>
                                <span className="text-sm bg-slate-700 px-3 py-1 rounded-full">共 {students.length} 人</span>
                            </div>
                            <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 border-b sticky top-0 shadow-sm">
                                        <tr>
                                            {/* 👇 表格加入群組欄位，方便辨識 👇 */}
                                            <th className="p-3 font-semibold text-gray-600">群組 (Cohort)</th>
                                            <th className="p-3 font-semibold text-gray-600">班別</th>
                                            <th className="p-3 font-semibold text-gray-600">學號</th>
                                            <th className="p-3 font-semibold text-gray-600">姓名</th>
                                            <th className="p-3 font-semibold text-gray-600 text-center">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {students.length > 0 ? students.map(s => (
                                            <tr key={s.id} className="border-b hover:bg-slate-50 transition">
                                                <td className="p-3 text-blue-600 font-bold">{s.cohort || '2024-2027'}</td>
                                                <td className="p-3">{s.class}</td>
                                                <td className="p-3">{s.num}</td>
                                                <td className="p-3 font-bold text-gray-800">{s.name}</td>
                                                <td className="p-3 text-center">
                                                    <button onClick={() => handleDeleteStudent(s.id, s.name)} className="text-gray-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition">
                                                        <Icon name="Trash2" size={18} />
                                                    </button>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="5" className="text-center p-8 text-gray-400">尚未匯入任何學生</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

    
                const ScoreInputView = ({ activeStudents, scores, setScores }) => {
                const [selectedQuiz, setSelectedQuiz] = React.useState(Object.keys(QUIZ_MAPS)[0]);
                const [selectedStudentId, setSelectedStudentId] = React.useState('');
                const map = QUIZ_MAPS[selectedQuiz];

                const handleScoreChange = (studentId, quizId, qId, val) => {
                const numVal = val === '' ? '' : parseFloat(val);
                setScores(prev => ({
                    ...prev, [studentId]: { ...(prev[studentId] || {}), [quizId]: { ...((prev[studentId] && prev[studentId][quizId]) || {}), [qId]: numVal } }
                }));
                };


                // 新增：清除單一學生特定小測的所有成績紀錄
                const deleteRecord = () => {
                    if (!selectedStudentId || !selectedQuiz) return;
                    
                    // 檢查該學生是否有這份小測的成績
                    const studentScores = scores[selectedStudentId];
                    if (!studentScores || !studentScores[selectedQuiz] || Object.keys(studentScores[selectedQuiz]).length === 0) {
                        alert('此同學尚未有這份小測的成績紀錄。');
                        return;
                    }

                    if (window.confirm('確定要完全清除這位同學在此小測的分數紀錄嗎？這會將他從這份小測的數據分析中移除。')) {
                        // 使用 setScores 更新狀態，useEffect 會自動幫忙儲存到 LocalStorage
                        setScores(prev => {
                            const newScores = { ...prev };
                            if (newScores[selectedStudentId]) {
                                delete newScores[selectedStudentId][selectedQuiz];
                            }
                            return newScores;
                        });
                        alert('紀錄已成功清除！');
                    }
                };

                return (
                    <div className="p-6 flex flex-col md:flex-row gap-6">
                        {/* 左側：學生選擇區 */}
                        <div className="w-full md:w-1/4 card p-4 max-h-[80vh] overflow-y-auto">
                            <h3 className="font-bold mb-4">選擇學生</h3>
                            {activeStudents.map(s => {
                                const ana = getStudentAnalysis(s.id, selectedQuiz, scores);
                                const isFail = ana && (ana.totalScore / ana.totalMax < 0.5);
                                return (
                                    <div key={s.id} onClick={() => setSelectedStudentId(s.id)}
                                        className={`p-2 mb-1 rounded cursor-pointer border ${selectedStudentId === s.id ? 'bg-blue-100 border-blue-400' : 'hover:bg-gray-50 border-transparent'} flex justify-between`}>
                                        <span>{s.class}({s.num}) {s.name}</span>
                                        {ana && <span className={`text-xs font-bold ${isFail ? 'text-red-500' : 'text-green-600'}`}>{ana.totalScore} / {ana.totalMax}</span>}
                                    </div>
                                )
                            })}
                        </div>
                        
                        {/* 右側：成績輸入區 */}
                        <div className="flex-1 card p-6">
                            <div className="flex justify-between items-center border-b pb-4 mb-4">
                                <h2 className="text-xl font-bold">成績輸入</h2>
                                
                                {/* 小測選擇下拉表單 */}
                                <select 
                                    className="p-2 border rounded-md shadow-sm outline-none font-bold text-blue-700 bg-blue-50"
                                    value={selectedQuiz} 
                                    onChange={(e) => setSelectedQuiz(e.target.value)}
                                >
                                    {Object.keys(QUIZ_MAPS).map(key => (
                                        <option key={key} value={key}>{QUIZ_MAPS[key].title}</option>
                                    ))}
                                </select>
                            </div>

                            {selectedStudentId ? (
                                <div>
                                    <h3 className="font-bold text-blue-700 mb-2">MC 選擇題</h3>
                                    <div className="grid grid-cols-6 gap-2 mb-6">
                                        {map.questions.filter(q => q.type === 'MC').map(q => (
                                            <div key={q.id} className="flex flex-col items-center p-2 bg-gray-50 border rounded">
                                                <label className="text-xs font-bold mb-1">{q.id}</label>
                                                <input type="number" min="0" max={q.max} className="score-input"
                                                    value={((scores[selectedStudentId] || {})[selectedQuiz] || {})[q.id] ?? ''}
                                                    onChange={(e) => handleScoreChange(selectedStudentId, selectedQuiz, q.id, e.target.value)} />
                                            </div>
                                        ))}
                                    </div>
                                    <h3 className="font-bold text-green-700 mb-2">LQ 長題目</h3>
                                    <div className="grid grid-cols-4 gap-2">
                                        {map.questions.filter(q => q.type === 'LQ').map(q => (
                                            <div key={q.id} className="flex flex-col items-center p-2 bg-gray-50 border rounded">
                                                <label className="text-sm font-bold mb-1">{q.id} <span className="text-gray-400 font-normal">/{q.max}</span></label>
                                                <input type="number" min="0" max={q.max} className="score-input w-16"
                                                    value={((scores[selectedStudentId] || {})[selectedQuiz] || {})[q.id] ?? ''}
                                                    onChange={(e) => handleScoreChange(selectedStudentId, selectedQuiz, q.id, e.target.value)} />
                                            </div>
                                        ))}
                                    </div>

                                    {/* 新增：刪除按鈕區塊 */}
                                    <div className="mt-8 pt-4 border-t border-gray-100 flex justify-end">
                                        <button 
                                            onClick={deleteRecord} 
                                            disabled={!(scores[selectedStudentId] && scores[selectedStudentId][selectedQuiz] && Object.keys(scores[selectedStudentId][selectedQuiz]).length > 0)}
                                            className="px-4 py-2 bg-red-50 text-red-600 rounded-lg shadow-sm hover:bg-red-100 font-bold transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            <Icon name="Trash2" size={18} /> 清除此卷紀錄
                                        </button>
                                    </div>
                                </div>
                            ) : (<div className="text-center text-gray-500 py-10">請從左側選擇學生</div>)}
                        </div>
                    </div>
                );
            };

             // 弱點分析與 AI 補底卷生成視圖
            const AnalysisView = ({ activeStudents, scores }) => {

                // ==========================================
                // 1. 新增：計算當前群組有輸入成績的測驗
                // ==========================================
                const activeQuizzes = React.useMemo(() => {
                    return Object.keys(QUIZ_MAPS).filter(quizId => {
                        // 檢查這個群組裡，有沒有任何一個學生在這個小測有成績
                        return activeStudents.some(s => scores[s.id]?.[quizId] && Object.keys(scores[s.id][quizId]).length > 0);
                    });
                }, [activeStudents, scores]);
                
                const [selectedStudent, setSelectedStudent] = React.useState('');
                // ==========================================
                // 2. 修改：預設選擇第一個「有成績」的測驗
                // ==========================================
                const [selectedQuiz, setSelectedQuiz] = React.useState(activeQuizzes[0] || Object.keys(QUIZ_MAPS)[0]);
            
                // 新增：如果切換群組後，原本選的測驗沒成績了，就自動跳到有成績的測驗
                React.useEffect(() => {
                    if (activeQuizzes.length > 0 && !activeQuizzes.includes(selectedQuiz)) {
                        setSelectedQuiz(activeQuizzes[0]);
                    }
                }, [activeQuizzes, selectedQuiz]);
                
                // AI 設定狀態
                const [aiLang, setAiLang] = React.useState('zh');
                const [aiType, setAiType] = React.useState('Both');
                const [aiLevel, setAiLevel] = React.useState('LV3-4');
                const [aiMcCount, setAiMcCount] = React.useState(10);
                const [aiLqCount, setAiLqCount] = React.useState(2);

                const map = QUIZ_MAPS[selectedQuiz];
                
                // 取得該學生此小測的成績分析
                const ana = getStudentAnalysis(selectedStudent, selectedQuiz, scores);

                const generatePrompt = () => {
                    if (!ana || ana.weakTopics.length === 0) return aiLang === 'en' ? "This student is performing well. No remedial worksheet is needed." : "此學生表現良好，暫不需要補底練習。";
                    
                    const weakList = ana.weakTopics.map(topic => {
                        const info = ana.analysis[topic];
                        return `- ${topic} ${info.topicName} (${aiLang === 'en' ? 'Specific Weaknesses' : '具體錯題概念'}: ${[...new Set(info.weakPoints)].join(', ')})`;
                    }).join('\n');

                    const isEng = aiLang === 'en';
                    let prompt = isEng 
                        ? `You are an HKDSE Physics teacher. My student failed some sub-topics in "${map.title}". Based on the system analysis, their weak points are:\n\n${weakList}\n\nPlease generate a remedial worksheet based on these weaknesses with the following requirements:\n`
                        : `你是一位香港 DSE 物理科老師。我的學生在小測「${map.title}」中表現不合格。以下是系統分析出他的弱點課題 (Sub-topics)：\n\n${weakList}\n\n請根據以上弱點，為他生成一份「互動練習卷」，要求：\n`;

                    let qIdx = 1;
                    if (aiType === 'MC' || aiType === 'Both') {
                        prompt += isEng ? `${qIdx++}. Generate ${aiMcCount} Multiple Choice (MC) questions directly targeting these specific weaknesses.\n` : `${qIdx++}. 針對上述弱點，生成 ${aiMcCount} 題選擇題 (MC)，必須直擊這些常犯錯誤。\n`;
                    }
                    if (aiType === 'LQ' || aiType === 'Both') {
                        prompt += isEng ? `${qIdx++}. Generate ${aiLqCount} Structured/Long Questions (LQ) mimicking standard DSE formats.\n` : `${qIdx++}. 生成 ${aiLqCount} 題結構式長題目 (LQ)，模擬 DSE 常見題型。\n`;
                    }

                    const levelDesc = { 'LV2': isEng?'Level 2 (Basic)':'基本 (Level 2)', 'LV3-4': isEng?'Level 3-4 (Standard)':'標準 (Level 3-4)', 'LV5': isEng?'Level 5/5* (Advanced)':'高階 (Level 5, 5*, 5**)' };
                    
                    prompt += isEng 
                        ? `${qIdx++}. Difficulty: ${levelDesc[aiLevel]} standard of HKDSE Physics.\n${qIdx}. Provide detailed explanations, highlight common traps, and show step-by-step calculations in English.`
                        : `${qIdx++}. 難度必須符合 HKDSE 物理科 ${levelDesc[aiLevel]} 程度。\n${qIdx}. 提供詳細的繁體中文解釋、點出學生常犯的思考陷阱 (Common traps) 及計算步驟。`;

                    return prompt;
                };

                return (
                    <div className="p-6 flex flex-col md:flex-row gap-6 h-full">
                        {/* 左側：學生選擇 */}
                        <div className="w-full md:w-1/4 card p-4 overflow-y-auto max-h-[85vh]">
                            <h3 className="font-bold mb-4 flex items-center gap-2"><Icon name="Users" size={18}/> 選擇學生</h3>
                            {activeStudents.map(s => {
                                const studentAna = getStudentAnalysis(s.id, selectedQuiz, scores);
                                const isFail = studentAna && (studentAna.totalScore / studentAna.totalMax < 0.5);
                                return (
                                    <div key={s.id} onClick={() => setSelectedStudent(s.id)}
                                        className={`p-3 mb-2 rounded-lg cursor-pointer border transition-all ${selectedStudent === s.id ? 'bg-blue-50 border-blue-400 shadow-sm' : 'hover:bg-gray-50 border-transparent'}`}>
                                        <div className="flex justify-between items-center">
                                            <span className="font-medium text-gray-700">{s.class}({s.num}) {s.name}</span>
                                            {studentAna && <span className={`text-sm font-bold ${isFail ? 'text-red-500' : 'text-green-600'}`}>{studentAna.totalScore} / {studentAna.totalMax}</span>}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>

                        {/* 右側：分析內容 */}
                        <div className="flex-1 flex flex-col gap-4 max-h-[85vh] overflow-y-auto pr-2">
                            <div className="card p-6 border-b-4 border-blue-500">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2"><Icon name="Activity" className="text-blue-600" /> 弱點分析及補底生成</h2>
                                    <select 
                                        className="p-2 border border-gray-300 rounded-lg shadow-sm outline-none font-bold text-blue-700 bg-blue-50"
                                        value={selectedQuiz} 
                                        onChange={(e) => setSelectedQuiz(e.target.value)}
                                    >
                                        {activeQuizzes.length > 0 
                                            ? activeQuizzes.map(key => (
                                                <option key={key} value={key}>{QUIZ_MAPS[key].title}</option>
                                              ))
                                            : <option value={selectedQuiz}>-- 此群組尚未輸入任何測驗成績 --</option>
                                        }
                                    </select>
                                </div>

                                {/* 修正重點：使用 ana 變數直接判斷是否有成績紀錄 */}
                                {!selectedStudent ? (
                                    <div className="text-center p-12 text-gray-400 flex flex-col items-center">
                                        <Icon name="UserCheck" size={48} className="mb-3 opacity-50" />
                                        <p>請從左側名單選擇一位學生</p>
                                    </div>
                                ) : !ana ? (
                                    <div className="text-center p-12 text-gray-400 flex flex-col items-center">
                                        <Icon name="Inbox" size={48} className="mb-3 opacity-50" />
                                        <p>此同學尚未有 {map.title} 的成績紀錄。</p>
                                    </div>
                                ) : (
                                    <div className="space-y-6 mt-4">
                                        {/* 成績概覽 */}
                                        <div className="flex items-center gap-6 p-4 bg-gray-50 rounded-xl border border-gray-100">
                                            <div className="w-24 h-24 rounded-full flex items-center justify-center border-4 relative" style={{ borderColor: (ana.totalScore/ana.totalMax)<0.5 ? '#ef4444' : '#22c55e' }}>
                                                <div className="text-center">
                                                    <div className="text-2xl font-black text-gray-800">{ana.totalScore}</div>
                                                    <div className="text-xs text-gray-500 border-t border-gray-300 pt-1 mx-2 mt-1">{ana.totalMax}</div>
                                                </div>
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="text-lg font-bold mb-2">課題掌握度</h3>
                                                <div className="space-y-2">
                                                    {Object.keys(ana.analysis).map(topicId => {
                                                        const t = ana.analysis[topicId];
                                                        const pct = (t.score / t.max) * 100;
                                                        let color = pct >= 70 ? 'bg-green-500' : pct >= 50 ? 'bg-yellow-500' : 'bg-red-500';
                                                        return (
                                                            <div key={topicId} className="text-sm">
                                                                <div className="flex justify-between mb-1">
                                                                    <span className="font-semibold text-gray-700">{topicId} {t.topicName}</span>

                                                                </div>
                                                                <div className="w-full bg-gray-200 rounded-full h-1.5">
                                                                    <div className={`h-1.5 rounded-full ${color}`} style={{width: `${pct}%`}}></div>
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        </div>

                                        {/* AI 補底卷生成 */}
                                        <div className="bg-blue-50 p-5 rounded-xl border border-blue-100">
                                            <h3 className="font-bold text-lg mb-3 text-blue-800 flex items-center gap-2"><Icon name="Bot" /> AI 補底練習生成</h3>
                                            
                                            {/* AI 設定面板 */}
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 text-sm bg-white p-3 rounded-lg border border-blue-100 shadow-sm">
                                                <div>
                                                    <label className="block text-gray-600 mb-1 text-xs font-bold">語言</label>
                                                    <select className="w-full p-1.5 border rounded outline-none" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                                                        <option value="zh">繁體中文</option><option value="en">English</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-gray-600 mb-1 text-xs font-bold">難度</label>
                                                    <select className="w-full p-1.5 border rounded outline-none" value={aiLevel} onChange={e=>setAiLevel(e.target.value)}>
                                                        <option value="LV2">基本 (LV2)</option><option value="LV3-4">標準 (LV3-4)</option><option value="LV5">高階 (LV5/+)</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-gray-600 mb-1 text-xs font-bold">題型</label>
                                                    <select className="w-full p-1.5 border rounded outline-none" value={aiType} onChange={e=>setAiType(e.target.value)}>
                                                        <option value="Both">MC + LQ</option><option value="MC">只限 MC</option><option value="LQ">只限 LQ</option>
                                                    </select>
                                                </div>
                                                <div className="flex gap-2">
                                                    <div className="flex-1">
                                                        <label className="block text-gray-600 mb-1 text-xs font-bold">MC 數</label>
                                                        <input type="number" className="w-full p-1.5 border rounded outline-none" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} disabled={aiType==='LQ'}/>
                                                    </div>
                                                    <div className="flex-1">
                                                        <label className="block text-gray-600 mb-1 text-xs font-bold">LQ 數</label>
                                                        <input type="number" className="w-full p-1.5 border rounded outline-none" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} disabled={aiType==='MC'}/>
                                                    </div>
                                                </div>
                                            </div>

                                            <textarea 
                                                readOnly 
                                                className="w-full h-40 p-3 rounded-lg border border-blue-200 text-sm bg-white outline-none resize-none focus:ring-2 focus:ring-blue-400" 
                                                value={generatePrompt()} 
                                            />
                                            <button 
                                                onClick={() => navigator.clipboard.writeText(generatePrompt())} 
                                                className="mt-3 bg-blue-600 text-white w-full py-2.5 rounded-lg shadow-sm hover:bg-blue-700 font-bold transition flex justify-center items-center gap-2"
                                            >
                                                <Icon name="Copy" size={18} /> 複製指令給 ChatGPT
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            
            const StudentReportView = ({ students, activeStudents, scores }) => {
                const [selectedStudentId, setSelectedStudentId] = React.useState('');
                const s = students.find(x => x.id === selectedStudentId);
                
                // 計算跨小測的綜合分析數據
                const getCombinedAnalysis = () => {
                    if (!s) return null;
                    const combined = {};
                    let grandTotal = 0;
                    let grandMax = 0;
                    
                    Object.keys(QUIZ_MAPS).forEach(quizId => {
                        const ana = getStudentAnalysis(s.id, quizId, scores);
                        if (ana) {
                            grandTotal += ana.totalScore;
                            grandMax += ana.totalMax;
                            Object.keys(ana.analysis).forEach(topicId => {
                                if (!combined[topicId]) {
                                    combined[topicId] = { ...ana.analysis[topicId] };
                                } else {
                                    combined[topicId].score += ana.analysis[topicId].score;
                                    combined[topicId].max += ana.analysis[topicId].max;
                                    combined[topicId].weakPoints = [...new Set([...combined[topicId].weakPoints, ...ana.analysis[topicId].weakPoints])];
                                }
                            });
                        }
                    });
                    
                    const weakTopics = Object.keys(combined).filter(k => (combined[k].score / combined[k].max) < 0.5);
                    return { combined, grandTotal, grandMax, weakTopics };
                };

                const data = getCombinedAnalysis();

                const generateExamPrompt = () => {
                    if (!data || data.weakTopics.length === 0) return aiLang === 'en' ? "This student is performing well. Regular revision is sufficient." : "此學生表現良好，只需作常規溫習。";
                    
                    // 修正：將 info.desc 換成 info.topicName，並更新括號內的文字
                    const weakList = data.weakTopics.map(topic => {
                        const info = data.combined[topic];
                        return `- ${topic} ${info.topicName} (${aiLang === 'en' ? 'Specific Weaknesses' : '具體錯題概念'}: ${info.weakPoints.join(', ')})`;
                    }).join('\n');
                    
                    const isEng = aiLang === 'en';
                    let prompt = isEng 
                        ? `You are an HKDSE Physics teacher. My student is preparing for a major exam covering multiple topics. Here are their weakest cross-topic areas based on past quizzes:\n\n${weakList}\n\nPlease generate a "Comprehensive Exam Revision Paper" tailored to these weaknesses, with the following requirements:\n`
                        : `你是一位香港 DSE 物理科老師。我的學生即將應付統測／大考（涵蓋多個課題）。以下是他目前最薄弱的跨課題知識點：\n\n${weakList}\n\n請為他度身訂造一份「大考前綜合特訓卷」，要求：\n`;

                    let qIdx = 1;
                    if (aiType === 'MC' || aiType === 'Both') {
                        prompt += isEng ? `${qIdx++}. Generate ${aiMcCount} cross-topic Multiple Choice (MC) questions targeting these weaknesses.\n` : `${qIdx++}. 針對上述弱點，生成 ${aiMcCount} 題跨課題的選擇題 (MC)，訓練他的綜合分析能力。\n`;
                    }
                    if (aiType === 'LQ' || aiType === 'Both') {
                        prompt += isEng ? `${qIdx++}. Generate ${aiLqCount} cross-topic Structured/Long Questions (LQ) mimicking standard DSE formats.\n` : `${qIdx++}. 生成 ${aiLqCount} 題結構式長題目 (LQ)，模擬 DSE 常見的跨課題題型。\n`;
                    }

                    const levelDesc = { 'LV2': isEng?'Level 2 (Basic)':'基本 (Level 2)', 'LV3-4': isEng?'Level 3-4 (Standard)':'標準 (Level 3-4)', 'LV5': isEng?'Level 5/5* (Advanced)':'高階 (Level 5, 5*, 5**)' };
                    
                    prompt += isEng 
                        ? `${qIdx++}. Difficulty: ${levelDesc[aiLevel]} standard of HKDSE Physics.\n${qIdx}. Provide detailed explanations, highlight common traps, and show step-by-step calculations in English.`
                        : `${qIdx++}. 難度必須符合 HKDSE 物理科 ${levelDesc[aiLevel]} 程度。\n${qIdx}. 提供詳細的繁體中文解釋、點出學生常犯的思考陷阱 (Common traps) 及計算步驟。`;

                    return prompt;
                };

                return (
                    <div className="p-6">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold flex items-center gap-2"><Icon name="FileText" /> 統測 / 大考總覽 (跨課題)</h2>
                            <select className="p-2 border rounded-md shadow-sm outline-none font-bold text-blue-700 bg-blue-50" 
                                value={selectedStudentId} onChange={(e) => setSelectedStudentId(e.target.value)}>
                                <option value="">-- 請選擇學生 --</option>
                                {activeStudents.map(st => <option key={st.id} value={st.id}>{st.class}({st.num}) {st.name}</option>)}
                            </select>
                        </div>

                        {s && data && Object.keys(data.combined).length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                {/* 左側：知識點紅綠燈 */}
                                <div className="card p-6">
                                    <h3 className="font-bold text-xl mb-4">{s.name} 的知識點紅綠燈 (全課題)</h3>
                                    <div className="text-sm text-gray-500 mb-4 flex gap-4">
                                        <span className="flex items-center gap-1"><span className="w-3 h-3 bg-green-500 rounded-full"></span> 良好 (&gt;70%)</span>
                                        <span className="flex items-center gap-1"><span className="w-3 h-3 bg-yellow-500 rounded-full"></span> 尚可 (50-70%)</span>
                                        <span className="flex items-center gap-1"><span className="w-3 h-3 bg-red-500 rounded-full"></span> 需急救 (&lt;50%)</span>
                                    </div>
                                    <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
                                        {Object.keys(data.combined).map(topic => {
                                            const t = data.combined[topic];
                                            const pct = (t.score / t.max) * 100;
                                            let colorClass = 'bg-green-500';
                                            let textClass = 'text-green-600';
                                            if (pct < 50) { colorClass = 'bg-red-500'; textClass = 'text-red-600'; }
                                            else if (pct < 70) { colorClass = 'bg-yellow-500'; textClass = 'text-yellow-600'; }

                                            return (
                                                <div key={topic} className={`p-3 border-l-4 rounded bg-gray-50 ${colorClass.replace('bg-', 'border-')}`}>
                                                    <div className="flex justify-between mb-2">
                                                        <span className="font-semibold text-gray-800">{topic} {t.topicName}</span>
                                                        <span className={`font-bold ${textClass}`}>{Math.round(pct)}% ({t.score}/{t.max})</span>
                                                    </div>
                                                    <div className="w-full bg-gray-200 rounded-full h-2">
                                                        <div className={`h-2 rounded-full ${colorClass}`} style={{width: `${pct}%`}}></div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                                
                                {/* 右側：大考綜合特訓 AI 指令 */}
                                <div className="card p-6 bg-purple-50 border-purple-200">
                                    <h3 className="font-bold text-xl mb-3 text-purple-800">大考綜合溫習 AI 指令</h3>
                                    <p className="text-sm text-gray-600 mb-4">系統已自動掃描該學生在所有小測中的**紅燈課題**，一鍵生成跨課題溫習卷。</p>
                                    
                                    {/* AI 設定面板 */}
                                    <div className="grid grid-cols-2 gap-2 mb-4 text-sm bg-white p-3 rounded border border-purple-100 shadow-sm">
                                        <div>
                                            <label className="block text-gray-600 mb-1">語言 (Language)</label>
                                            <select className="w-full p-1 border rounded" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                                                <option value="zh">繁體中文</option><option value="en">English</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-gray-600 mb-1">難度 (Level)</label>
                                            <select className="w-full p-1 border rounded" value={aiLevel} onChange={e=>setAiLevel(e.target.value)}>
                                                <option value="LV2">基本 (Level 2)</option><option value="LV3-4">標準 (Level 3-4)</option><option value="LV5">高階 (Level 5/5*)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-gray-600 mb-1">題型</label>
                                            <select className="w-full p-1 border rounded" value={aiType} onChange={e=>setAiType(e.target.value)}>
                                                <option value="Both">MC + LQ</option><option value="MC">只限 MC</option><option value="LQ">只限 LQ</option>
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="flex-1">
                                                <label className="block text-gray-600 mb-1">MC 數</label>
                                                <input type="number" className="w-full p-1 border rounded" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} disabled={aiType==='LQ'}/>
                                            </div>
                                            <div className="flex-1">
                                                <label className="block text-gray-600 mb-1">LQ 數</label>
                                                <input type="number" className="w-full p-1 border rounded" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} disabled={aiType==='MC'}/>
                                            </div>
                                        </div>
                                    </div>

                                    <textarea readOnly className="w-full h-48 p-3 rounded border border-purple-300 text-sm bg-white outline-none" value={generateExamPrompt()} />
                                    <button onClick={() => navigator.clipboard.writeText(generateExamPrompt())} className="mt-3 bg-purple-600 text-white w-full py-2 rounded shadow hover:bg-purple-700 font-bold">
                                        複製指令 (生成大考特訓卷)
                                    </button>
                                </div>
                            </div>
                        ) : (<div className="card p-10 text-center text-gray-500">請從上方選單選擇一位學生，或確保該學生已有成績紀錄。</div>)}
                    </div>
                );
            };

            
            const StudentChartView = ({ activeStudents, scores }) => {
                const [selectedStudentId, setSelectedStudentId] = React.useState('');
                const [chartQuiz, setChartQuiz] = React.useState(Object.keys(QUIZ_MAPS)[0]);
                const chartRef = React.useRef(null);
                const chartInstance = React.useRef(null);

                // 計算圖表所需的數據
                const getChartData = () => {
                    if (!selectedStudentId) return null;
                    
                    const topicStats = {}; 

                    // 收集並計算所有小測中的知識點總分與該學生得分
                    Object.keys(QUIZ_MAPS).forEach(quizId => {
                        const map = QUIZ_MAPS[quizId];
                        activeStudents.forEach(st => {
                            const stScores = (scores[st.id] || {})[quizId] || {};
                            map.questions.forEach(q => {
                                const val = parseFloat(stScores[q.id]);
                                if (!isNaN(val)) {
                                    if (!topicStats[q.topicId]) {
                                        // 修正：圖表的標籤應該使用大課題名稱 (SYLLABUS_TOPICS)，而不是單一題目的描述 (q.topicDesc)
                                        topicStats[q.topicId] = { desc: SYLLABUS_TOPICS[q.topicId] || '未知課題', studentScore: 0, studentMax: 0, classScore: 0, classMax: 0 };
                                    }
                                    // 累加全級總分
                                    topicStats[q.topicId].classScore += val;
                                    topicStats[q.topicId].classMax += q.max;
                                    
                                    // 累加選定學生總分
                                    if (st.id === selectedStudentId) {
                                        topicStats[q.topicId].studentScore += val;
                                        topicStats[q.topicId].studentMax += q.max;
                                    }
                                }
                            });
                        });
                    });

                    const labels = [];
                    const studentData = [];
                    const averageData = [];

                    Object.keys(topicStats).forEach(topicId => {
                        const stat = topicStats[topicId];
                        if (stat.classMax > 0 && stat.studentMax > 0) {
                            // 限制標籤長度以免圖表變形
                            const labelText = `${topicId} ${stat.desc}`;
                            labels.push(labelText.length > 20 ? labelText.substring(0, 20) + '...' : labelText);
                            studentData.push(((stat.studentScore / stat.studentMax) * 100).toFixed(1));
                            averageData.push(((stat.classScore / stat.classMax) * 100).toFixed(1));
                        }
                    });

                    return { labels, studentData, averageData };
                };

                React.useEffect(() => {
                    const data = getChartData();
                    if (!data || data.labels.length === 0 || !chartRef.current) return;

                    // 確保銷毀舊圖表，避免重疊
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.labels,
                            datasets: [
                                {
                                    label: '該學生表現 (%)',
                                    data: data.studentData,
                                    backgroundColor: 'rgba(59, 130, 246, 0.7)', // 藍色
                                    borderColor: 'rgba(59, 130, 246, 1)',
                                    borderWidth: 1
                                },
                                {
                                    label: '全級平均 (%)',
                                    data: data.averageData,
                                    backgroundColor: 'rgba(156, 163, 175, 0.5)', // 灰色
                                    borderColor: 'rgba(156, 163, 175, 1)',
                                    borderWidth: 1
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            indexAxis: 'y', // 設為橫向長條圖，較易閱讀長文字標籤
                            scales: {
                                x: { 
                                    beginAtZero: true, 
                                    max: 100,
                                    title: { display: true, text: '得分百分比 (%)' }
                                }
                            },
                            plugins: {
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return context.dataset.label + ': ' + context.parsed.x + '%';
                                        }
                                    }
                                }
                            }
                        }
                    });

                    return () => {
                        if (chartInstance.current) chartInstance.current.destroy();
                    };
                }, [selectedStudentId, scores]); // 當學生或成績改變時重新繪製

                return (
                    <div className="p-6 h-full flex flex-col">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold flex items-center gap-2"><Icon name="BarChart2" /> 課題圖表分析</h2>
                            <select className="p-2 border rounded-md shadow-sm outline-none font-bold text-blue-700 bg-blue-50" 
                                value={selectedStudentId} onChange={(e) => setSelectedStudentId(e.target.value)}>
                                <option value="">-- 請選擇學生 --</option>
                                {activeStudents.map(st => <option key={st.id} value={st.id}>{st.class}({st.num}) {st.name}</option>)}
                            </select>
                        </div>

                        {selectedStudentId ? (
                            <div className="card p-6 flex-1 min-h-[600px] flex flex-col">
                                <h3 className="font-bold text-xl mb-4 text-center">各知識點掌握度比較 (學生 vs 全級平均)</h3>
                                <div className="flex-1 relative w-full">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>
                        ) : (<div className="card p-10 text-center text-gray-500">請從上方選單選擇一位學生以檢視圖表。</div>)}
                    </div>
                );
            };

            // 全班課題綜合分析版面 (加入 P-Value 難度診斷)
            // 全班課題綜合分析版面 (加入 P-Value 難度診斷)
            const TopicAnalysisView = ({ activeStudents, scores }) => {
                // 1. 新增：動態計算當前群組有輸入成績的測驗
                const activeQuizzes = React.useMemo(() => {
                    return Object.keys(QUIZ_MAPS).filter(quizId => {
                        return activeStudents.some(s => scores[s.id]?.[quizId] && Object.keys(scores[s.id][quizId]).length > 0);
                    });
                }, [activeStudents, scores]);

                // 2. 修改：預設選擇 activeQuizzes 的第一個，而不是 Object.keys(QUIZ_MAPS)
                const [localQuiz, setLocalQuiz] = React.useState(activeQuizzes[0] || Object.keys(QUIZ_MAPS)[0]);

                // 3. 新增：防呆機制，當群組切換導致目前測驗沒成績時，自動跳轉
                React.useEffect(() => {
                    if (activeQuizzes.length > 0 && !activeQuizzes.includes(localQuiz)) {
                        setLocalQuiz(activeQuizzes[0]);
                    }
                }, [activeQuizzes, localQuiz]);

                const map = QUIZ_MAPS[localQuiz];

                const getClassStats = () => {
                    if (!map || activeStudents.length === 0) return null;

                    let classTotalScore = 0;
                    let classTotalMax = 0;
                    let studentsAttempted = 0;

                    const qStats = {}; 
                    const conceptStats = {}; 

                    map.questions.forEach(q => {
                        // 新增：讀取題目的預設難度 q.level
                        qStats[q.id] = { id: q.id, type: q.type, max: q.max, total: 0, attempts: 0, desc: q.topicDesc, topicId: q.topicId, originalLevel: q.level };
                    });

                    activeStudents.forEach(st => {
                        const stScores = (scores[st.id] || {})[localQuiz];
                        if (stScores && Object.keys(stScores).length > 0) {
                            studentsAttempted++;
                            map.questions.forEach(q => {
                                const val = parseFloat(stScores[q.id]);
                                if (!isNaN(val)) {
                                    classTotalScore += val;
                                    classTotalMax += q.max;
                                    qStats[q.id].total += val;
                                    qStats[q.id].attempts++;

                                    if (!conceptStats[q.topicId]) {
                                        conceptStats[q.topicId] = { 
                                            topicId: q.topicId, 
                                            topicName: SYLLABUS_TOPICS[q.topicId] || '未知課題', 
                                            total: 0, max: 0, specificDesc: new Set() 
                                        };
                                    }
                                    conceptStats[q.topicId].total += val;
                                    conceptStats[q.topicId].max += q.max;
                                    conceptStats[q.topicId].specificDesc.add(q.topicDesc);
                                }
                            });
                        }
                    });

                    if (studentsAttempted === 0) return null;

                    const processedQStats = Object.values(qStats).map(q => ({
                        ...q,
                        pct: q.attempts > 0 ? (q.total / (q.max * q.attempts)) * 100 : 0
                    })).sort((a, b) => a.pct - b.pct);

                    const processedConceptStats = Object.values(conceptStats).map(c => ({
                        ...c,
                        pct: c.max > 0 ? (c.total / c.max) * 100 : 0,
                        specificDescArray: Array.from(c.specificDesc)
                    })).sort((a, b) => a.pct - b.pct);

                    return { classTotalScore, classTotalMax, studentsAttempted, processedQStats, processedConceptStats };
                };

                const stats = getClassStats();

                // 計算難度分佈 (P-Value)
                const difficultyStats = { easy: [], medium: [], hard: [] };
                if (stats) {
                    stats.processedQStats.forEach(q => {
                        if (q.pct >= 70) difficultyStats.easy.push(q);
                        else if (q.pct >= 40) difficultyStats.medium.push(q);
                        else difficultyStats.hard.push(q);
                    });
                }

                const generateClassReviewPrompt = () => {
                    if (!stats) return "目前沒有足夠數據生成教案。";
                    
                    const weakestConcepts = stats.processedConceptStats.slice(0, 3).map(c => 
                        `- ${c.topicId} ${c.topicName} (全班平均得分率: ${Math.round(c.pct)}%)\n  具體難點: ${c.specificDescArray.join(', ')}`

             const BackupView = ({ students, setStudents, scores, setScores }) => {

                    const exportFileDefaultName = `PhysicsQuiz_DB_Backup_${new Date().toISOString().split('T')[0]}.json`;

                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', exportFileDefaultName);

                // 2. 舊版還原 (覆蓋式)

                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.students && data.scores) {
                                if(window.confirm('⚠️ 警告：這將會【完全覆蓋】目前系統內的所有資料！確定要還原嗎？')) {

                                }
                            }
                        } catch (error) {
                            alert('檔案格式錯誤！');
                        }
                        e.target.value = null; // 清空選擇
                    };
                    reader.readAsText(file);
                };

                // 3. 🌟全新功能：無痛合併其他老師資料🌟
                const handleMerge = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.students && data.scores) {
                                // A. 幫對方匯入的學生全部打上你設定的 Cohort (2025-2028)
                                const importedStudents = data.students.map(s => ({
                                    ...s,
                                    cohort: mergeCohort
                                }));

                                // B. 找出不重複的學生 (過濾掉雲端已經有的人，防止重複匯入)
                                const existingIds = new Set(students.map(s => s.id));
                                const newStudentsOnly = importedStudents.filter(s => !existingIds.has(s.id));
                                
                                // C. 完美合併雙方的成績物件
                                const mergedScores = { ...scores, ...data.scores };

                                if(window.confirm(`準備將 ${newStudentsOnly.length} 位新學生加入至群組「${mergeCohort}」。\n這不會影響您現有 2024-2027 的資料！確定要合併嗎？`)) {

                                    setStudents(prev => [...prev, ...newStudentsOnly]);

        const getStudentAnalysis = (studentId, quizId, scores) => {
                // 加上這行防呆：如果 scores 不存在，就直接回傳 null，避免畫面崩潰
                if (!scores) return null;
                // 新增：檢查該學生是否真的有這份小測的成績紀錄，若無則直接跳過
                const studentScores = (scores[studentId] || {})[quizId];
                if (!studentScores || Object.keys(studentScores).length === 0) return null;

                const map = QUIZ_MAPS[quizId];
                if (!map) return null;

                const analysis = {};
                let totalScore = 0; let totalMax = 0;

                map.questions.forEach(q => {
                    const s = studentScores[q.id] || 0;
                    totalScore += s; totalMax += q.max;
                    
                    if (!analysis[q.topicId]) {
                        analysis[q.topicId] = { 
                            max: 0, 
                            score: 0, 
                            topicName: SYLLABUS_TOPICS[q.topicId] || '未知課題', 
                            weakPoints: [] 
                        };
                    }
                    analysis[q.topicId].max += q.max; 
                    analysis[q.topicId].score += s;
                    
                    // 如果這題得分低於一半，就把「具體的題目描述」加進弱點清單
                    if (s < q.max * 0.5) analysis[q.topicId].weakPoints.push(q.topicDesc);
                });

                const weakTopics = Object.keys(analysis).filter(k => (analysis[k].score / analysis[k].max) < 0.5);
                return { totalScore, totalMax, analysis, weakTopics };
            };

// ==================== 新增：班級成績總表組件 (加入顏色標示與滿分顯示) ====================
const ClassSummaryView = ({ activeStudents, scores }) => {
    // 1. 讀取系統定義的所有 Quiz ID
    const allQuizzes = React.useMemo(() => {
        return Object.keys(QUIZ_MAPS || {});
    }, []);

    // 2. 計算每個小測的「滿分」總和
    const quizMaxScores = React.useMemo(() => {
        const maxScores = {};
        allQuizzes.forEach(quiz => {
            let max = 0;
            const map = QUIZ_MAPS[quiz];
            if (map && map.questions) {
                map.questions.forEach(q => {
                    max += (q.max || 0);
                });
            }
            maxScores[quiz] = max;
        });
        return maxScores;
    }, [allQuizzes]);

    // 3. 狀態：記錄哪些 Quiz 要納入平均分計算（預設全部勾選）
    const [includedQuizzes, setIncludedQuizzes] = React.useState({});

    React.useEffect(() => {
        const initial = {};
        allQuizzes.forEach(q => {
            initial[q] = true;
        });
        setIncludedQuizzes(initial);
    }, [allQuizzes]);

    const toggleQuiz = (quizName) => {
        setIncludedQuizzes(prev => ({ ...prev, [quizName]: !prev[quizName] }));
    };

    // 4. 處理學生資料、動態加總各題分數與計算平均分 (按100滿分計算)
    const computedData = React.useMemo(() => {
        return activeStudents.map(student => {
            let totalForAvg = 0;  
            let countForAvg = 0;  
            const quizScores = {};

            allQuizzes.forEach(quiz => {
                const studentScores = scores[student.id]?.[quiz];
                let quizTotalScore = null;  
                let quizPercentage = null;  

                // 檢查該學生是否有這份小測的成績紀錄
                if (studentScores && Object.keys(studentScores).length > 0) {
                    const map = QUIZ_MAPS[quiz];
                    if (map) {
                        let sum = 0;
                        map.questions.forEach(q => {
                            sum += (studentScores[q.id] || 0);
                        });
                        
                        const maxScore = quizMaxScores[quiz];
                        quizTotalScore = sum; 
                        
                        // 計算該小測的百分制分數 (滿分100)
                        if (maxScore > 0) {
                            quizPercentage = (sum / maxScore) * 100;
                        }
                    }
                }

                quizScores[quiz] = quizTotalScore;

                // 納入平均分計算
                if (includedQuizzes[quiz] && quizPercentage !== null) {
                    totalForAvg += quizPercentage;
                    countForAvg++;
                }
            });

            const average = countForAvg > 0 ? (totalForAvg / countForAvg).toFixed(1) : '-';
            
            return {
                ...student,
                quizScores,
                average
            };
        });
    }, [activeStudents, scores, allQuizzes, includedQuizzes, quizMaxScores]);

    // 5. 一鍵複製到 Excel 格式
    const handleCopyToExcel = () => {
        if (computedData.length === 0) {
            alert("沒有學生資料可複製");
            return;
        }

        // 表頭
        let tsv = ["班別", "學號", "姓名", ...allQuizzes, "平均分"].join("\t") + "\n";
        // 滿分行 (方便 Excel 參考)
        tsv += ["", "", "滿分:", ...allQuizzes.map(quiz => quizMaxScores[quiz] || 0), "100"].join("\t") + "\n";

        // 內容行
        computedData.forEach(student => {
            const row = [
                student.class || student.className || '',
                student.number || student.classNumber || '',
                student.name || '',
                ...allQuizzes.map(quiz => student.quizScores[quiz] !== null ? student.quizScores[quiz] : ''),
                student.average
            ];
            tsv += row.join("\t") + "\n";
        });

        navigator.clipboard.writeText(tsv)
            .then(() => alert("📋 已成功複製表格資料！\n請直接到 Excel 按 Ctrl+V 貼上即可。"))
            .catch(err => alert("複製失敗，錯誤: " + err));
    };

    return (
        <div className="p-6 max-w-7xl mx-auto animate-fadeIn">
            <div className="flex justify-between items-center mb-6">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Table" /> 班級成績總表 (Excel 匯出)
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">
                        黃底表示得分 40%~60%；<span className="text-red-500 font-semibold">紅底表示低於 40%</span>。
                    </p>
                </div>
                <button 
                    onClick={handleCopyToExcel}
                    className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg shadow transition"
                >
                    <Icon name="Copy" size={18} /> 複製到 Excel 格式
                </button>
            </div>

            {/* Quiz 篩選控制面板 */}
            <div className="card p-4 mb-6 bg-white rounded-xl border border-slate-200 shadow-sm">
                <h3 className="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-1">
                    <Icon name="Settings" size={16} /> 選擇納入【平均分】計算的 Quiz：
                </h3>
                <div className="flex flex-wrap gap-4">
                    {allQuizzes.map(quiz => (
                        <label key={quiz} className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200 cursor-pointer hover:bg-slate-100 transition text-sm">
                            <input 
                                type="checkbox" 
                                className="w-4 h-4 text-blue-600 rounded"
                                checked={!!includedQuizzes[quiz]} 
                                onChange={() => toggleQuiz(quiz)} 
                            />
                            <span className="text-slate-700 font-medium">{quiz}</span>
                        </label>
                    ))}
                </div>
            </div>

            {/* 數據預覽表格 */}
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto max-h-[600px] overflow-y-auto">
                <table className="w-full text-left border-collapse min-w-[800px]">
                    <thead className="bg-slate-100 sticky top-0 z-10 shadow-[0_1px_0_0_rgba(226,232,240,1)]">
                        <tr>
                            <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">班別</th>
                            <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">學號</th>
                            <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">姓名</th>
                            {allQuizzes.map(quiz => (
                                <th key={quiz} className={`p-3 text-sm font-semibold border-b border-slate-200 ${includedQuizzes[quiz] ? 'text-slate-800 bg-blue-50/50' : 'text-slate-400 line-through'}`}>
                                    <div className="flex flex-col gap-1">
                                        <span>{quiz}</span>
                                        <span className={`text-xs ${includedQuizzes[quiz] ? 'text-blue-500' : 'text-slate-400'}`}>
                                            滿分: {quizMaxScores[quiz] || 0}
                                        </span>
                                    </div>
                                </th>
                            ))}
                            <th className="p-3 text-sm font-bold text-blue-600 bg-blue-50 border-b border-slate-200">
                                <div className="flex flex-col gap-1">
                                    <span>平均分</span>
                                    <span className="text-xs text-blue-400 font-normal">滿分: 100</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        {computedData.length === 0 ? (
                            <tr>
                                <td colSpan={4 + allQuizzes.length} className="text-center p-8 text-slate-400">暫無學生數據</td>
                            </tr>
                        ) : (
                            computedData.map((student, idx) => (
                                <tr key={student.id || idx} className="hover:bg-slate-50 transition border-b border-slate-100">
                                    <td className="p-3 text-sm text-slate-700 font-medium">{student.class || student.className || '-'}</td>
                                    <td className="p-3 text-sm text-slate-600">{student.number || student.classNumber || '-'}</td>
                                    <td className="p-3 text-sm text-slate-800 font-medium">{student.name || '-'}</td>
                                    
                                    {/* 每個 Quiz 的成績顯示與顏色判定 */}
                                    {allQuizzes.map(quiz => {
                                        const score = student.quizScores[quiz];
                                        const max = quizMaxScores[quiz];
                                        
                                        // 預設樣式
                                        let bgColor = '';
                                        let textColor = includedQuizzes[quiz] ? 'text-slate-700' : 'text-slate-300';
                                        let fontWeight = '';

                                        // 判斷是否需要加上警示顏色
                                        if (includedQuizzes[quiz] && score !== null && max > 0) {
                                            const percentage = (score / max) * 100;
                                            if (percentage < 40) {
                                                bgColor = 'bg-red-100';
                                                textColor = 'text-red-700';
                                                fontWeight = 'font-bold';
                                            } else if (percentage <= 60) {
                                                bgColor = 'bg-yellow-100';
                                                textColor = 'text-yellow-800';
                                                fontWeight = 'font-bold';
                                            }
                                        }

                                        return (
                                            <td key={quiz} className={`p-3 text-sm ${bgColor} ${textColor} ${fontWeight}`}>
                                                {score !== null ? score : <span className="text-slate-300">-</span>}
                                            </td>
                                        );
                                    })}

                                    {/* 平均分的成績顯示與顏色判定 */}
                                    {(() => {
                                        let avgBgColor = 'bg-blue-50/30';
                                        let avgTextColor = 'text-blue-600';
                                        let avgFontWeight = 'font-bold';

                                        if (student.average !== '-') {
                                            const avgNum = parseFloat(student.average);
                                            if (avgNum < 40) {
                                                avgBgColor = 'bg-red-100';
                                                avgTextColor = 'text-red-700';
                                            } else if (avgNum <= 60) {
                                                avgBgColor = 'bg-yellow-100';
                                                avgTextColor = 'text-yellow-800';
                                            }
                                        }

                                        return (
                                            <td className={`p-3 text-sm ${avgBgColor} ${avgTextColor} ${avgFontWeight}`}>
                                                {student.average}
                                            </td>
                                        );
                                    })()}
                                </tr>
                            ))
                        )}
                    </tbody>
                </table>
            </div>
        </div>
    );
};

const QuizSettingsView = ({ syncToCloud }) => {

                });
            }
        });
        setQuizText(qText);
    }, []);

    const handleSave = () => {
        try {
            const newQuizMaps = {};
            const qLines = quizText.trim().split('\n');
            for (let i = 1; i < qLines.length; i++) {
                if (!qLines[i].trim()) continue;
                const cols = qLines[i].split('\t');
                if (cols.length < 8) continue; 
                
                // 讀取包含第 9 欄的資料
                const [quizId, title, qId, type, max, level, topicId, desc, ans] = cols.map(c => c ? c.trim() : '');

                }
                newQuizMaps[quizId].questions.push({
                    id: qId, type: type, max: Number(max), level: level, topicId: topicId, topicDesc: desc, ans: ans || ''
                });
            }
            QUIZ_MAPS = newQuizMaps;
            syncToCloud();
            alert('✅ 小測內容（含正確答案）已同步到 Google Sheet！');
        } catch (err) { alert('❌ 儲存失敗！' + err); }

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            <div className="flex justify-between items-center mb-6">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icon name="FileEdit" /> 小測內容設定 (新增正確答案)</h1>
                    <p className="text-sm text-slate-500 mt-1">可包含九欄，最後一欄為正確答案 (MC填 A/B/C/D，LQ可留空)。</p>

        </div>
    );
};
