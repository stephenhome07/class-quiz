    const [selectedTopics, setSelectedTopics] = React.useState([]);
    const [generatedPrompt, setGeneratedPrompt] = React.useState('');
    
    // ★ 新增：選取的試卷 (Checkbox)
    const [selectedPapers, setSelectedPapers] = React.useState([]);

    const chartRef = React.useRef(null);
    const chartInstance = React.useRef(null);

    // 處理雙重答案的計分邏輯
    const getStudentQScore = React.useCallback((studentId, paperId, q) => {
        const record = pastpaperScores[studentId]?.[paperId];
        if (!record) return 0;
        const val = record[q.id];
        
        if (q.type === 'MC') {
            if (!val || !q.ans) return 0;
            const studentAns = val.toString().toUpperCase().trim();
            const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
            const cleanStudent = studentAns.replace(/[^A-D]/g, '');
            if (cleanStudent.length === 1 && correctAnswers.includes(cleanStudent)) {
                return q.max;
            }
            return 0;
        }
        return val === '' || val === undefined ? 0 : parseFloat(val);
    }, [pastpaperScores]);

    // ★ 取得該學生考過的所有試卷 (不論是否被勾選)，用於生成 Checkbox
    const allPapersTaken = React.useMemo(() => {
        if (!selectedStudentId) return [];
        const sScores = pastpaperScores[selectedStudentId] || {};
        return Object.keys(sScores).filter(pid => Object.keys(sScores[pid]).length > 0).sort();
    }, [selectedStudentId, pastpaperScores]);

    // 當切換學生時，預設「全選」他考過的所有試卷
    React.useEffect(() => {
        setSelectedPapers(allPapersTaken);
        setSelectedTopics([]);
        setGeneratedPrompt('');
    }, [selectedStudentId, allPapersTaken]);

    // Checkbox 狀態切換邏輯
    const togglePaper = (paperId) => {
        setSelectedPapers(prev => prev.includes(paperId) ? prev.filter(p => p !== paperId) : [...prev, paperId]);
    };
    const toggleAllPapers = () => {
        if (selectedPapers.length === allPapersTaken.length) setSelectedPapers([]);
        else setSelectedPapers([...allPapersTaken]);
    };

    // ★ 核心運算：匯總已勾選試卷 (selectedPapers) 的數據
    const studentAnalysis = React.useMemo(() => {
        if (!selectedStudentId || selectedPapers.length === 0) return { papersTaken: [], topics: [], domainStats: {} };

        const maps = window.PASTPAPER_MAPS || {};
        const topicStats = {};
        
        // 用於雷達圖的 7 大領域統計
        const domainStats = {
            '1': { name: '熱學 (Heat)', max: 0, earned: 0 },
            '2': { name: '力學 (Mechanics)', max: 0, earned: 0 },
            '3': { name: '波動 (Waves)', max: 0, earned: 0 },
            '4': { name: '電磁學 (E&M)', max: 0, earned: 0 },
            '5': { name: '放射學 (Radioactivity)', max: 0, earned: 0 },
            'E3': { name: '能量 (Energy)', max: 0, earned: 0 },
            'E4': { name: '醫學 (Medical)', max: 0, earned: 0 }
        };

        // 只遍歷「有被打勾」的試卷
        selectedPapers.forEach(paperId => {
            const map = maps[paperId];
            if (!map || !map.questions) return;

            map.questions.forEach(q => {
                const score = getStudentQScore(selectedStudentId, paperId, q);
                
                // 1. 處理課題統計 (Topic Stats)
                if (!topicStats[q.topicId]) {
                    const syllabusInfo = window.SYLLABUS_TOPICS?.[q.topicId];
                    topicStats[q.topicId] = {
                        topicId: q.topicId,
                        topicName: (syllabusInfo && syllabusInfo.topic) ? syllabusInfo.topic : '未定義',
                        syllabusDesc: (syllabusInfo && syllabusInfo.desc) ? syllabusInfo.desc : '無',
                        totalMax: 0, totalEarned: 0, yearlyStats: {}, errorDescList: new Set()
                    };
                }

                if (!topicStats[q.topicId].yearlyStats[paperId]) {
                    topicStats[q.topicId].yearlyStats[paperId] = { max: 0, earned: 0 };
                }

                topicStats[q.topicId].totalMax += q.max;
                topicStats[q.topicId].totalEarned += score;
                topicStats[q.topicId].yearlyStats[paperId].max += q.max;
                topicStats[q.topicId].yearlyStats[paperId].earned += score;

                if (score < q.max && q.topicDesc) {
                    const safeDesc = typeof q.topicDesc === 'object' ? (q.topicDesc.topic || q.topicDesc.desc) : q.topicDesc;
                    topicStats[q.topicId].errorDescList.add(safeDesc);
                }

                // 2. 處理 7 大領域統計 (Domain Stats for Radar Chart)
                let domainKey = '';
                if (q.topicId.startsWith('E3')) domainKey = 'E3';
                else if (q.topicId.startsWith('E4')) domainKey = 'E4';
                else domainKey = q.topicId.charAt(0); // 取第 1 個字元 (1, 2, 3, 4, 5)

                if (domainStats[domainKey]) {
                    domainStats[domainKey].max += q.max;
                    domainStats[domainKey].earned += score;
                }
            });
        });

        const processedTopics = Object.values(topicStats)
            .map(t => ({
                ...t,
                overallPct: t.totalMax > 0 ? (t.totalEarned / t.totalMax) : 0,
                errorDescArray: Array.from(t.errorDescList)
            }))
            .filter(t => t.totalMax > 0 && t.overallPct <= 0.6) // 只顯示 <= 60% 的重災區
            .sort((a, b) => a.overallPct - b.overallPct);

        return { papersTaken: selectedPapers, topics: processedTopics, domainStats };
    }, [selectedStudentId, selectedPapers, pastpaperScores, getStudentQScore]);

    // ★ 繪製或更新雷達圖
    React.useEffect(() => {
        if (!selectedStudentId || !studentAnalysis || selectedPapers.length === 0 || !chartRef.current) return;

        const ctx = chartRef.current.getContext('2d');
        const ds = studentAnalysis.domainStats;
        
        const labels = [];
        const dataPoints = [];

        Object.keys(ds).forEach(key => {
            if (ds[key].max > 0) { // 只畫有考過的領域
                labels.push(ds[key].name);
                dataPoints.push(Math.round((ds[key].earned / ds[key].max) * 100));
            }
        });

        if (chartInstance.current) {
            chartInstance.current.destroy();
        }

        chartInstance.current = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    label: '綜合掌握度 (%)',
                    data: dataPoints,
                    backgroundColor: 'rgba(79, 70, 229, 0.2)', // Indigo
                    borderColor: 'rgba(79, 70, 229, 0.8)',
                    pointBackgroundColor: 'rgba(79, 70, 229, 1)',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: 'rgba(79, 70, 229, 1)',
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        angleLines: { color: 'rgba(0, 0, 0, 0.1)' },
                        grid: { color: 'rgba(0, 0, 0, 0.1)' },
                        pointLabels: { font: { size: 10, weight: 'bold' }, color: '#475569' },
                        ticks: { stepSize: 20, min: 0, max: 100, display: false } // 隱藏數值圈
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) { return ` 掌握度: ${context.raw}%`; }
                        }
                    }
                }
            }
        });

        return () => {
            if (chartInstance.current) chartInstance.current.destroy();
        };
    }, [studentAnalysis, selectedStudentId, selectedPapers]);

    const handleTopicToggle = (topicId) => {
        setSelectedTopics(prev => prev.includes(topicId) ? prev.filter(id => id !== topicId) : [...prev, topicId]);
    };

    // 動態產生 Prompt
    React.useEffect(() => {
        if (!selectedStudentId || selectedTopics.length === 0 || !studentAnalysis || studentAnalysis.topics.length === 0) {
            setGeneratedPrompt('👈 請先從下方勾選至少一個弱點課題。');
            return;
        }

        const studentName = activeStudents.find(s => s.id === selectedStudentId)?.name || '該學生';
        const targetTopics = studentAnalysis.topics.filter(t => selectedTopics.includes(t.topicId));

        const weakTopicsText = targetTopics.map(t => {
            return `- 課題 [${t.topicId} ${t.topicName}]:\n  已選卷平均得分率: ${(t.overallPct*100).toFixed(0)}%\n  官方學習要求: ${t.syllabusDesc}\n  具體錯因: ${t.errorDescArray.join('; ') || '綜合概念薄弱'}`;
        }).join('\n\n');

        const newPrompt = `你是一位香港 DSE 物理科權威專家。我的學生【${studentName}】在近幾年的 Pastpaper 操練中，於下列課題表現較弱（得分率低於 60%）。請針對他做錯的具體概念，度身訂造一份強效補底卷。\n\n[基本設定]\n- 語言: ${aiLang}\n- 預期題型與數量:\n  * DSE 級別 多項選擇題 (MC)：${aiMcCount} 題\n  * DSE 級別 長題目 (LQ)：${aiLqCount} 題\n\n[學生重災區課題與具體錯因]\n${weakTopicsText}\n\n[生成要求]\n1. 針對上述「具體錯因」，設計極具針對性的陷阱題，幫他釐清最常混淆的物理觀念。\n2. MC 必須附帶 4 個選項，並為錯誤選項提供【陷阱破解分析】；LQ 必須包含【DSE 評分標準 (Marking Scheme)】與【解題思路】。\n3. 請在開頭以導師口吻給予【${studentName}】一段簡短而有力的鼓勵。`;
        
        setGeneratedPrompt(newPrompt);
    }, [aiLang, aiMcCount, aiLqCount, selectedTopics, selectedStudentId, studentAnalysis, activeStudents]);

    return (
        <div className="p-6 max-w-7xl mx-auto animate-fadeIn">
            {/* 標頭 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="LineChart" className="text-indigo-600" /> Pastpaper 跨年弱點追蹤與補底
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">自動分析七大領域，並提供可篩選年份的錯題補底卷生成功能。</p>
                </div>
                <select 
                    className="p-2 border border-slate-300 rounded-lg bg-white font-bold outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm min-w-[200px]"
                    value={selectedStudentId}
                    onChange={e => setSelectedStudentId(e.target.value)}
                >
                    <option value="">-- 請選擇分析對象 --</option>
                    {activeStudents.map(s => <option key={s.id} value={s.id}>{s.class}({s.num}) {s.name}</option>)}
                </select>
            </div>

            {!selectedStudentId ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed rounded-xl mt-6">
                    <Icon name="UserSearch" size={48} className="mx-auto mb-3 opacity-40 text-indigo-300" />
                    <p className="text-sm font-medium">請從右上角選擇一位學生，展開他的歷年 DSE 物理數據圖譜</p>
                </div>
            ) : allPapersTaken.length === 0 ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed rounded-xl mt-6">
                    <Icon name="Inbox" size={48} className="mx-auto mb-3 opacity-40 text-amber-300" />
                    <p className="text-sm font-medium">該學生目前尚未有任何 Pastpaper 成績紀錄</p>
                </div>
            ) : (
                <div className="flex flex-col gap-6">
                    
                    {/* ★ 頂部：試卷篩選器與雷達圖 */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* 左：試卷過濾器 */}
                        <div className="lg:col-span-2 card p-5 border border-slate-200 shadow-sm rounded-xl bg-white">
                            <div className="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                                <h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm">
                                    <Icon name="Filter" size={16} className="text-indigo-600" /> 分析範圍篩選 (年份/卷目)
                                </h3>
                                <button 
                                    onClick={toggleAllPapers}
                                    className="text-xs text-indigo-600 hover:text-indigo-800 font-bold underline"
                                >
                                    {selectedPapers.length === allPapersTaken.length ? '取消全選' : '全選所有試卷'}
                                </button>
                            </div>
                            
                            <div className="flex flex-wrap gap-2 max-h-[160px] overflow-y-auto custom-scrollbar pr-2">
                                {allPapersTaken.map(pid => {
                                    const isSelected = selectedPapers.includes(pid);
                                    return (
                                        <button 
                                            key={pid}
                                            onClick={() => togglePaper(pid)}
                                            className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition flex items-center gap-1.5 ${
                                                isSelected ? 'bg-indigo-50 border-indigo-300 text-indigo-700 shadow-inner' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'
                                            }`}
                                        >
                                            <Icon name={isSelected ? "CheckSquare" : "Square"} size={14} />
                                            {window.PASTPAPER_MAPS[pid]?.title || pid}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* 右：DSE 七大領域雷達圖 */}
                        <div className="card p-4 border border-slate-200 shadow-sm rounded-xl bg-white flex flex-col h-[220px]">
                            <h3 className="font-bold text-slate-800 text-sm text-center mb-1">🎯 DSE 七大領域綜合能力圖</h3>
                            {selectedPapers.length === 0 ? (
                                <div className="flex-1 flex items-center justify-center text-xs text-slate-400">請至少選擇一份試卷以生成圖表</div>
                            ) : (
                                <div className="flex-1 relative w-full h-full">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ★ 底部：重災區列表與 AI 生成 */}
                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
                        {/* 左：重災區列表 */}
                        <div className="lg:col-span-3 card p-5 border border-slate-200 shadow-sm flex flex-col h-[600px] rounded-xl bg-white">
                            <div className="flex justify-between items-end mb-4 border-b border-slate-100 pb-2">
                                <h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm">
                                    <span className="p-1 bg-red-100 text-red-700 rounded"><Icon name="AlertTriangle" size={15} /></span>
                                    重災區課題 (得分率 &le; 60%)
                                </h3>
                                <div className="text-xs font-mono text-slate-500 bg-slate-100 px-2 py-1 rounded">
                                    共找到 {studentAnalysis.topics.length} 個弱點
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2">
                                {selectedPapers.length === 0 ? (
                                    <div className="text-center py-10 text-slate-400 border border-dashed rounded-lg">請從上方勾選要分析的試卷</div>
                                ) : studentAnalysis.topics.length === 0 ? (
                                    <div className="text-center py-10 text-emerald-600 bg-emerald-50 rounded-lg font-bold">
                                        🎉 太棒了！該生在所選範圍內，各課題得分率均高於 60%！
                                    </div>
                                ) : (
                                    studentAnalysis.topics.map(t => {
                                        const isSelected = selectedTopics.includes(t.topicId);
                                        const isCritical = t.overallPct <= 0.4;
                                        
                                        return (
                                            <div 
                                                key={t.topicId} 
                                                onClick={() => handleTopicToggle(t.topicId)}
                                                className={`p-3 border rounded-xl cursor-pointer transition-all ${
                                                    isSelected ? 'border-indigo-500 bg-indigo-50/50 shadow-md ring-1 ring-indigo-500' : 'border-slate-200 bg-white hover:border-indigo-300 hover:bg-slate-50 shadow-sm'
                                                }`}
                                            >
                                                <div className="flex justify-between items-start mb-2">
                                                    <div className="flex items-start gap-2">
                                                        <div className={`mt-0.5 ${isSelected ? 'text-indigo-600' : 'text-slate-300'}`}>
                                                            <Icon name={isSelected ? "CheckSquare" : "Square"} size={16} />
                                                        </div>
                                                        <div>
                                                            <div className="font-bold text-slate-800 text-sm flex items-center gap-1.5">
                                                                <span className="font-mono bg-slate-100 text-slate-600 px-1.5 rounded text-xs">{t.topicId}</span>
                                                                {t.topicName}
                                                            </div>
                                                            {isCritical && <span className="text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold uppercase mt-1 inline-block">極度薄弱</span>}
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-[10px] text-slate-500 font-bold mb-0.5">平均得分率</div>
                                                        <div className={`text-lg font-black font-mono ${isCritical ? 'text-red-600' : 'text-amber-600'}`}>
                                                            {(t.overallPct * 100).toFixed(0)}%
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="flex flex-wrap gap-2 mt-2 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                                    {studentAnalysis.papersTaken.map(pid => {
                                                        const stat = t.yearlyStats[pid];
                                                        if (!stat || stat.max === 0) return null;
                                                        const pct = stat.earned / stat.max;
                                                        return (
                                                            <div key={pid} className="flex items-center text-[10px] bg-white border border-slate-200 rounded overflow-hidden shadow-inner">
                                                                <span className="bg-slate-200 text-slate-600 px-1.5 py-0.5 border-r border-slate-200 font-mono text-[9px]">{pid}</span>
                                                                <span className={`px-1.5 py-0.5 font-bold ${pct < 0.5 ? 'text-red-500' : (pct < 0.7 ? 'text-amber-500' : 'text-emerald-600')}`}>
                                                                    {stat.earned}/{stat.max}
                                                                </span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>

                                                <div className="text-[10px] text-slate-500 mt-2 line-clamp-2 border-t border-slate-100 pt-2 leading-relaxed">
                                                    <span className="font-bold text-slate-700">具體錯因：</span>{t.errorDescArray.join('； ') || '無具體描述'}
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>

                        {/* 右：AI 生成器 */}
                        <div className="lg:col-span-2 card p-5 border-2 border-indigo-100 bg-gradient-to-br from-indigo-50/50 to-white shadow-sm flex flex-col h-[600px] rounded-xl">
                            <div className="flex items-center gap-2 text-indigo-800 font-bold text-base mb-2">
                                <Icon name="Cpu" className="text-indigo-600" />
                                <span>DSE 專屬補底卷生成器</span>
                            </div>
                            <p className="text-[11px] text-slate-500 mb-4 leading-relaxed">
                                請從左側勾選該生需優先克服的重災區。系統將結合官方考核要求與他的錯題，生成超強提示詞。
                            </p>
                            
                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                    <label className="text-[10px] font-bold text-slate-500">輸出語言</label>
                                    <select className="text-xs p-1 outline-none font-bold text-slate-700 bg-transparent" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                                        <option>繁體中文</option>
                                        <option>English</option>
                                    </select>
                                </div>
                                <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                    <label className="text-[10px] font-bold text-slate-500">題數分配</label>
                                    <div className="flex items-center gap-1 text-xs px-1">
                                        MC:<input type="number" className="w-10 outline-none font-bold text-purple-700 border-b text-center mx-1 bg-transparent" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} min="0" max="20" />
                                        LQ:<input type="number" className="w-10 outline-none font-bold text-blue-700 border-b text-center mx-1 bg-transparent" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} min="0" max="20" />
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col mb-4">
                                <label className="text-xs font-bold text-slate-700 mb-1">📝 AI Prompt 預覽</label>
                                <textarea 
                                    className="flex-1 w-full p-3 text-[11px] font-mono bg-white border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none shadow-inner resize-none leading-relaxed"
                                    value={generatedPrompt}
                                    readOnly
                                />
                            </div>

                            <button 
                                onClick={() => { navigator.clipboard.writeText(generatedPrompt); alert('📋 提示詞已複製！請前往 ChatGPT 貼上。'); }}
                                className={`w-full font-bold py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition text-sm ${selectedTopics.length > 0 ? 'bg-indigo-600 hover:bg-indigo-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                disabled={selectedTopics.length === 0}
                            >
                                <Icon name="Copy" size={16} /> 複製專屬補底 Prompt
                            </button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

// ==================== 第四步：全班跨年份數據與排行榜 (PastpaperSummaryView) - 支援真實月份篩選與子課題分析 ====================
const PastpaperSummaryView = ({ currentCohort, activeStudents, pastpaperScores }) => {
    const [activeTab, setActiveTab] = React.useState('heatmap'); // 'heatmap' 或是 'leaderboard'
    
    // 試卷選擇 (供熱力圖使用)
    const availablePapers = Object.keys(window.PASTPAPER_MAPS || {}).sort();
    const [selectedPaper, setSelectedPaper] = React.useState(availablePapers[0] || '');

    // 熱力圖多選題目狀態
    const [selectedHeatmapQs, setSelectedHeatmapQs] = React.useState([]);

    // 排行榜真實時間篩選狀態
    const [leaderboardMonth, setLeaderboardMonth] = React.useState('all');

    // ★ 兩個圖表的 Refs
    const domainChartRef = React.useRef(null);
    const domainChartInstance = React.useRef(null);
    const subtopicChartRef = React.useRef(null);
    const subtopicChartInstance = React.useRef(null);

    // 處理雙重答案的計分邏輯
    const getStudentQScore = React.useCallback((studentId, paperId, q) => {
        const record = pastpaperScores[studentId]?.[paperId];
        if (!record) return 0;
        const val = record[q.id];
        
        if (q.type === 'MC') {
            if (!val || !q.ans) return 0;
            const studentAns = val.toString().toUpperCase().trim();
            const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
            const cleanStudent = studentAns.replace(/[^A-D]/g, '');
            if (cleanStudent.length === 1 && correctAnswers.includes(cleanStudent)) {
                return q.max;
            }
            return 0;
        }
        return val === '' || val === undefined ? 0 : parseFloat(val);
    }, [pastpaperScores]);

    // DSE 等級估算轉換函數
    const getEstimatedGrade = (percentage) => {
        if (percentage >= 0.85) return { grade: '5**', color: 'text-yellow-600 bg-yellow-50 border-yellow-200' };
        if (percentage >= 0.75) return { grade: '5*', color: 'text-amber-600 bg-amber-50 border-amber-200' };
        if (percentage >= 0.65) return { grade: '5', color: 'text-orange-600 bg-orange-50 border-orange-200' };
        if (percentage >= 0.50) return { grade: '4', color: 'text-emerald-600 bg-emerald-50 border-emerald-200' };
        if (percentage >= 0.40) return { grade: '3', color: 'text-blue-600 bg-blue-50 border-blue-200' };
        if (percentage >= 0.30) return { grade: '2', color: 'text-indigo-600 bg-indigo-50 border-indigo-200' };
        if (percentage >= 0.20) return { grade: '1', color: 'text-slate-600 bg-slate-50 border-slate-200' };
        return { grade: 'U', color: 'text-red-600 bg-red-50 border-red-200' };
    };

    // ================== 資料運算區 ==================
    
    // 1. 全班整體七大領域統計 (用於大領域長條圖)
    const classDomainStats = React.useMemo(() => {
        const ds = {
            '1': { name: '熱學', max: 0, earned: 0 },
            '2': { name: '力學', max: 0, earned: 0 },
            '3': { name: '波動', max: 0, earned: 0 },
            '4': { name: '電磁學', max: 0, earned: 0 },
            '5': { name: '放射學', max: 0, earned: 0 },
            'E3': { name: '能量', max: 0, earned: 0 },
            'E4': { name: '醫學', max: 0, earned: 0 }
        };

        activeStudents.forEach(s => {
            const sScores = pastpaperScores[s.id] || {};
            if (selectedPaper && sScores[selectedPaper]) {
                const map = window.PASTPAPER_MAPS[selectedPaper];
                if (!map || !map.questions) return;
                map.questions.forEach(q => {
                    const val = sScores[selectedPaper][q.id];
                    if (val !== undefined && val !== '') {
                        let domainKey = q.topicId.startsWith('E3') ? 'E3' : q.topicId.startsWith('E4') ? 'E4' : q.topicId.charAt(0);
                        if (ds[domainKey]) {
                            ds[domainKey].max += q.max;
                            ds[domainKey].earned += getStudentQScore(s.id, selectedPaper, q);
                        }
                    }
                });
            }
        });
        return ds;
    }, [activeStudents, pastpaperScores, getStudentQScore, selectedPaper]);

    // ★ 1.5 全班詳細子課題統計 (用於新的子課題分析圖)
    const classSubtopicStats = React.useMemo(() => {
        const stats = {};
        activeStudents.forEach(s => {
            const sScores = pastpaperScores[s.id] || {};
            if (selectedPaper && sScores[selectedPaper]) {
                const map = window.PASTPAPER_MAPS[selectedPaper];
                if (!map || !map.questions) return;
                map.questions.forEach(q => {
                    const val = sScores[selectedPaper][q.id];
                    if (val !== undefined && val !== '') {
                        const subId = q.topicId || '未知';
                        if (!stats[subId]) {
                            stats[subId] = { 
                                id: subId, 
                                desc: q.topicDesc || '', 
                                max: 0, 
                                earned: 0 
                            };
                        }
                        stats[subId].max += q.max;
                        stats[subId].earned += getStudentQScore(s.id, selectedPaper, q);
                    }
                });
            }
        });
        return stats;
    }, [activeStudents, pastpaperScores, getStudentQScore, selectedPaper]);

    // 繪製大領域長條圖 (取代雷達圖，解決 Paper 2 只有兩個領域會破圖的問題)
    React.useEffect(() => {
        if (activeTab !== 'heatmap' || !domainChartRef.current || !selectedPaper) return;
        const ctx = domainChartRef.current.getContext('2d');
        const labels = [];
        const dataPoints = [];

        Object.keys(classDomainStats).forEach(key => {
            if (classDomainStats[key].max > 0) {
                labels.push(classDomainStats[key].name);
                dataPoints.push(Math.round((classDomainStats[key].earned / classDomainStats[key].max) * 100));
            }
        });

        if (domainChartInstance.current) domainChartInstance.current.destroy();

        domainChartInstance.current = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '領域掌握度 (%)',
                    data: dataPoints,
                    backgroundColor: 'rgba(56, 189, 248, 0.7)', // Sky blue
                    borderColor: 'rgba(2, 132, 199, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } }
                },
                plugins: { legend: { display: false } }
            }
        });
        return () => { if (domainChartInstance.current) domainChartInstance.current.destroy(); };
    }, [classDomainStats, activeTab, selectedPaper]);

    // ★ 繪製精細子課題長條圖 (具有紅綠燈評估功能)
    React.useEffect(() => {
        if (activeTab !== 'heatmap' || !subtopicChartRef.current || !selectedPaper) return;
        const ctx = subtopicChartRef.current.getContext('2d');
        
        // 將子課題自動排序 (如 2.1, 2.2, 2.3)
        const sortedKeys = Object.keys(classSubtopicStats).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
        
        const labels = [];
        const dataPoints = [];
        const bgColors = [];

        sortedKeys.forEach(key => {
            const item = classSubtopicStats[key];
            if (item.max > 0) {
                const pct = item.earned / item.max;
                labels.push(item.id); 
                dataPoints.push(Math.round(pct * 100));
                
                // 自動顏色標記：紅燈(危險) <40%, 橘燈 <60%, 淺綠 <80%, 深綠 >80%
                if (pct < 0.4) bgColors.push('rgba(239, 68, 68, 0.7)');
                else if (pct < 0.6) bgColors.push('rgba(251, 146, 60, 0.7)');
                else if (pct < 0.8) bgColors.push('rgba(52, 211, 153, 0.7)');
                else bgColors.push('rgba(16, 185, 129, 0.7)');
            }
        });

        if (subtopicChartInstance.current) subtopicChartInstance.current.destroy();

        subtopicChartInstance.current = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '全班答對率 (%)',
                    data: dataPoints,
                    backgroundColor: bgColors,
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            // Hover 時顯示完整的子課題描述
                            title: function(context) {
                                const idx = context[0].dataIndex;
                                const key = sortedKeys[idx];
                                return classSubtopicStats[key].desc ? `${key} - ${classSubtopicStats[key].desc}` : key;
                            }
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } },
                    x: { ticks: { autoSkip: false, maxRotation: 45, minRotation: 0 } }
                }
            }
        });
        return () => { if (subtopicChartInstance.current) subtopicChartInstance.current.destroy(); };
    }, [classSubtopicStats, activeTab, selectedPaper]);

    // 2. 熱力圖與該卷成績估算
    const heatmapData = React.useMemo(() => {
        if (!selectedPaper || !window.PASTPAPER_MAPS[selectedPaper]) return { qStats: [], studentGrades: [] };
        const map = window.PASTPAPER_MAPS[selectedPaper];

        const qStats = map.questions.map(q => {
            let totalEarned = 0;
            let answeredCount = 0;

            activeStudents.forEach(s => {
                const record = pastpaperScores[s.id]?.[selectedPaper];
                if (record && record[q.id] !== undefined && record[q.id] !== '') {
                    answeredCount++;
                    totalEarned += getStudentQScore(s.id, selectedPaper, q);
                }
            });

            const passRate = answeredCount > 0 ? (totalEarned / (answeredCount * q.max)) : 0;
            let heatColor = 'bg-slate-50 text-slate-400 border-slate-200';
            if (answeredCount > 0) {
                if (passRate < 0.4) heatColor = 'bg-red-500 text-white border-red-600 shadow-sm';
                else if (passRate < 0.6) heatColor = 'bg-orange-300 text-orange-900 border-orange-400 shadow-sm';
                else if (passRate < 0.8) heatColor = 'bg-emerald-300 text-emerald-900 border-emerald-400 shadow-sm';
                else heatColor = 'bg-emerald-500 text-white border-emerald-600 shadow-sm';
            }

            return { ...q, shortId: q.id.split('-').pop(), passRate, answeredCount, heatColor };
        });

        const studentGrades = activeStudents.map(s => {
            let totalEarned = 0, totalMax = 0, hasRecord = false;
            map.questions.forEach(q => {
                totalMax += q.max;
                const record = pastpaperScores[s.id]?.[selectedPaper];
                if (record && record[q.id] !== undefined && record[q.id] !== '') {
                    hasRecord = true;
                    totalEarned += getStudentQScore(s.id, selectedPaper, q);
                }
            });
            const pct = totalMax > 0 ? totalEarned / totalMax : 0;
            return { student: s, totalEarned, totalMax, pct, gradeInfo: getEstimatedGrade(pct), hasRecord };
        }).filter(s => s.hasRecord).sort((a, b) => b.pct - a.pct);

        return { qStats, studentGrades };
    }, [selectedPaper, activeStudents, pastpaperScores, getStudentQScore]);

    // 切換試卷時清空熱力圖多選
    React.useEffect(() => {
        setSelectedHeatmapQs([]);
    }, [selectedPaper]);


    // 3. 全期操卷排行榜 (Leaderboard) 及稱號系統
    const TITLE_POOL = {
        '1': ["熱力學宗師", "烈焰操卷王", "絕對零度行者", "熵增破壞者"],
        '2': ["力學戰神", "牛頓傳人", "動量支配者", "萬有引力尊者"],
        '3': ["波動幻影", "光學大師", "頻率共振者", "波粒二象使者"],
        '4': ["電磁霸主", "閃電領主", "庫侖之手", "法拉第先鋒"],
        '5': ["輻射剋星", "核能巨頭", "半衰期刺客", "量子漫步者"],
        'E3': ["能量守恆者", "再生能源巨頭", "焦耳提煉師", "綠能先鋒"],
        'E4': ["醫學神醫", "透視眼行者", "超聲波獵人", "放射診斷師"]
    };

    const getStudentTitle = (studentId, bestDomain, totalQ, accuracy) => {
        if (totalQ === 0) return "潛水觀望者";
        if (totalQ > 100 && accuracy < 0.4) return "不屈狂戰士";
        if (totalQ > 150 && accuracy > 0.8) return "無情刷題機器";
        
        const charSum = studentId.split('').reduce((sum, char) => sum + char.charCodeAt(0), 0);
        const pool = TITLE_POOL[bestDomain] || ["物理界泰斗", "薛丁格的學霸"];
        return pool[charSum % pool.length];
    };

    const availableMonths = React.useMemo(() => {
        const months = new Set();
        activeStudents.forEach(s => {
            const sScores = pastpaperScores[s.id] || {};
            Object.values(sScores).forEach(record => {
                if (record['_submitMonth']) {
                    months.add(record['_submitMonth']);
                }
            });
        });
        return Array.from(months).sort().reverse();
    }, [activeStudents, pastpaperScores]);

    const leaderboardData = React.useMemo(() => {
        const maps = window.PASTPAPER_MAPS || {};
        
        const lb = activeStudents.map(s => {
            const sScores = pastpaperScores[s.id] || {};
            let papersDoneCount = 0;
            let mcAttempted = 0, lqAttempted = 0;
            let totalEarned = 0, totalMax = 0;

            const dStats = { '1':{e:0,m:0}, '2':{e:0,m:0}, '3':{e:0,m:0}, '4':{e:0,m:0}, '5':{e:0,m:0}, 'E3':{e:0,m:0}, 'E4':{e:0,m:0} };

            Object.keys(sScores).forEach(paperId => {
                const record = sScores[paperId];
                if (leaderboardMonth !== 'all' && record['_submitMonth'] !== leaderboardMonth) return;

                const map = maps[paperId];
                if (!map || !map.questions || Object.keys(record).length === 0) return;
                
                papersDoneCount++;

                map.questions.forEach(q => {
                    const val = record[q.id];
                    if (val !== undefined && val !== '') {
                        if (q.type === 'MC') mcAttempted++;
                        else lqAttempted++;
                        
                        const score = getStudentQScore(s.id, paperId, q);
                        totalMax += q.max;
                        totalEarned += score;

                        let dKey = q.topicId.startsWith('E3') ? 'E3' : q.topicId.startsWith('E4') ? 'E4' : q.topicId.charAt(0);
                        if (dStats[dKey]) {
                            dStats[dKey].e += score;
                            dStats[dKey].m += q.max;
                        }
                    }
                });
            });

            let bestDomain = '1', worstDomain = '1';
            let highestPct = -1, lowestPct = 2;
            const DOMAIN_NAMES = {'1':'熱學','2':'力學','3':'波動','4':'電磁','5':'放射','E3':'能量','E4':'醫學'};

            Object.keys(dStats).forEach(k => {
                if (dStats[k].m >= 5) { 
                    const pct = dStats[k].e / dStats[k].m;
                    if (pct > highestPct) { highestPct = pct; bestDomain = k; }
                    if (pct < lowestPct) { lowestPct = pct; worstDomain = k; }
                }
            });

            const accuracy = totalMax > 0 ? (totalEarned / totalMax) : 0;
            const totalQuestions = mcAttempted + lqAttempted;
            const title = getStudentTitle(s.id, bestDomain, totalQuestions, accuracy);

            return { 
                student: s, papersDoneCount, totalQuestions, accuracy, title,
                best: highestPct >= 0 ? `${DOMAIN_NAMES[bestDomain]}` : '-',
                worst: lowestPct <= 1 ? `${DOMAIN_NAMES[worstDomain]}` : '-'
            };
        });

        return lb.sort((a, b) => b.totalQuestions - a.totalQuestions || b.accuracy - a.accuracy);
    }, [activeStudents, pastpaperScores, getStudentQScore, leaderboardMonth]);


    // ===============================================

    const toggleHeatmapQ = (qId) => {
        setSelectedHeatmapQs(prev => prev.includes(qId) ? prev.filter(id => id !== qId) : [...prev, qId]);
    };

    const handleCopyHeatmapPrompt = () => {
        if (selectedHeatmapQs.length === 0) return;
        const targetQs = heatmapData.qStats.filter(q => selectedHeatmapQs.includes(q.id));
        
        let promptList = targetQs.map(q => {
            return `- 題號: ${q.shortId}\n  課題: ${q.topicId}\n  官方考點: ${q.topicDesc || '無'}\n  全班答對率: ${(q.passRate*100).toFixed(0)}%`;
        }).join('\n\n');

        const prompt = `你是一位香港 DSE 物理科導師。在最近一次測驗（試卷：${selectedPaper}）中，全班在以下幾道題目的表現極度不理想，成為「全班共同盲點」。\n\n[全班共同盲點清單]\n${promptList}\n\n[生成要求]\n1. 請為上述每一道盲點題目，提供【深度觀念釐清】與【常見陷阱分析】。\n2. 針對每一個考點，額外生成一條難度相若的【DSE 變式多項選擇題 (MC)】，並附上 4 個選項及詳細解釋，以供我在課堂上派發給全班進行即時鞏固練習。`;

        navigator.clipboard.writeText(prompt);
        alert('📋 全班盲點 AI 提示詞已複製！');
        setSelectedHeatmapQs([]);
    };

    return (
        <div className="p-6 max-w-7xl mx-auto animate-fadeIn">
            {/* 標頭 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Activity" className="text-pink-600" /> Pastpaper 錯題熱力圖與排行榜
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">透視單卷全班盲點，並透過排行榜激發學生的操卷動力。</p>
                </div>
                
                {/* 雙切頁按鈕 */}
                <div className="flex bg-slate-100 p-1 rounded-xl shadow-inner">
                    <button onClick={() => setActiveTab('heatmap')} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'heatmap' ? 'bg-white text-pink-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                        <Icon name="Flame" size={16} /> 考卷精細剖析
                    </button>
                    <button onClick={() => setActiveTab('leaderboard')} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'leaderboard' ? 'bg-white text-yellow-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                        <Icon name="Trophy" size={16} /> 操卷狂人榜
                    </button>
                </div>
            </div>

            {/* 分頁一：單卷熱力圖與圖表分析 */}
            {activeTab === 'heatmap' && (
                <div className="animate-fadeIn">
                    
                    {/* 頂部控制：試卷選擇 */}
                    <div className="card p-5 border border-slate-200 shadow-sm rounded-xl bg-white mb-6">
                        <label className="text-sm font-bold text-slate-700 mb-2 block">選擇要分析的試卷：</label>
                        <select 
                            className="w-full max-w-md p-3 border border-slate-300 rounded-lg bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-pink-500 shadow-sm"
                            value={selectedPaper}
                            onChange={e => setSelectedPaper(e.target.value)}
                        >
                            {availablePapers.length === 0 ? <option value="">無試卷資料</option> : availablePapers.map(k => <option key={k} value={k}>{k} - {window.PASTPAPER_MAPS[k].title}</option>)}
                        </select>
                        <p className="text-xs text-slate-500 mt-3">💡 提示：點選下方熱力圖中紅色的方塊，可以打包弱點題目，一鍵生成課堂溫習講義。</p>
                    </div>

                    {!selectedPaper ? (
                        <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed rounded-xl">
                            <Icon name="Inbox" size={48} className="mx-auto mb-3 opacity-40 text-pink-300" />
                            <p className="text-sm font-medium">系統中尚無 Pastpaper 藍圖資料</p>
                        </div>
                    ) : (
                        <>
                            {/* ★ 新增的圖表分析區 (取代舊版雷達圖) */}
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                {/* 左：大領域長條圖 */}
                                <div className="card p-4 border border-slate-200 shadow-sm rounded-xl bg-white flex flex-col h-[280px]">
                                    <h3 className="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2">
                                        <Icon name="BarChart2" className="text-sky-500" size={18}/> 該卷涵蓋大領域表現 (Macro)
                                    </h3>
                                    <div className="flex-1 relative w-full h-full">
                                        <canvas ref={domainChartRef}></canvas>
                                    </div>
                                </div>
                                
                                {/* 右：細項子課題剖析圖 */}
                                <div className="card p-4 border border-slate-200 shadow-sm rounded-xl bg-white flex flex-col h-[280px]">
                                    <div className="flex justify-between items-start mb-3">
                                        <h3 className="font-bold text-slate-800 text-sm flex items-center gap-2">
                                            <Icon name="Target" className="text-pink-500" size={18}/> 各子課題表現剖析 (Micro)
                                        </h3>
                                        <span className="text-[10px] text-slate-400 bg-slate-100 px-2 py-1 rounded">可將滑鼠移至圖表上方查看課題名稱</span>
                                    </div>
                                    <div className="flex-1 relative w-full h-full">
                                        <canvas ref={subtopicChartRef}></canvas>
                                    </div>
                                </div>
                            </div>

                            {/* 原有的熱力圖與排行榜區塊 */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* 左：熱力圖矩陣 */}
                                <div className="lg:col-span-2 card p-5 border border-slate-200 shadow-sm rounded-xl bg-white flex flex-col h-[650px]">
                                    <div className="flex justify-between items-end mb-4 border-b border-slate-100 pb-2">
                                        <h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm">
                                            <Icon name="Flame" className="text-pink-500" size={18} /> 全班錯題熱力分佈 (Error Heatmap)
                                        </h3>
                                        <div className="flex gap-2 text-[10px] font-bold">
                                            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-500"></span>&lt; 40% (重災區)</span>
                                            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-orange-300"></span>&lt; 60%</span>
                                            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-300"></span>&lt; 80%</span>
                                            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-500"></span>優秀</span>
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 mb-4">
                                        {heatmapData.qStats.length === 0 ? (
                                            <div className="text-center py-10 text-slate-400">這份試卷目前無題目資料</div>
                                        ) : (
                                            <div className="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2">
                                                {heatmapData.qStats.map(q => {
                                                    const isSelected = selectedHeatmapQs.includes(q.id);
                                                    return (
                                                        <div 
                                                            key={q.id} 
                                                            onClick={() => toggleHeatmapQ(q.id)}

// ==================== 學生專屬遊戲化儀表板 (StudentPortalView) ====================
const StudentPortalView = ({ studentId, students, scores, examScores, homeworkScores, pastpaperScores, homeworkMaps, pastpaperMaps, setPastpaperScores}) => {
    const [activeTab, setActiveTab] = React.useState('overview'); // overview, school, pastpaper, ai, leaderboard
    const [aiSubTab, setAiSubTab] = React.useState('school'); // 'school' 或 'pastpaper'
    
    // AI 補底相關狀態
    const [selectedPPPapers, setSelectedPPPapers] = React.useState([]);
    const [leaderboardMonth, setLeaderboardMonth] = React.useState('all');
   
    /// ==================== 學生專屬：歷屆試題 (Pastpaper) 狀態 ====================
  const [ppMode, setPpMode] = React.useState('view'); // 'view' 檢視模式 | 'input' 輸入模式
  const [ppSelectedYear, setPpSelectedYear] = React.useState('');
  const [ppSelectedPaper, setPpSelectedPaper] = React.useState('');
  const [ppInputValues, setPpInputValues] = React.useState({});

  // 1. 動態解析 availableYears (例如 2014, 2015)
  const availableYears = React.useMemo(() => {
    if (!pastpaperMaps) return [];
    const years = Object.keys(pastpaperMaps).map(key => key.split('-')[0]);
    return [...new Set(years)].sort((a, b) => b - a); // 新年份排前面
  }, [pastpaperMaps]);

  // 2. 當選擇年份後，動態篩選出該年的卷目 (例如 P1A, P1B)
  const availablePapers = React.useMemo(() => {
    if (!pastpaperMaps || !ppSelectedYear) return [];
    return Object.keys(pastpaperMaps)
      .filter(key => key.startsWith(ppSelectedYear))
      .map(key => ({
        id: key,
        type: key.replace(`${ppSelectedYear}-`, ""),
        title: pastpaperMaps[key].title
      }));
  }, [pastpaperMaps, ppSelectedYear]);

  // 當年份改變時，自動清空卷目
  React.useEffect(() => {
    setPpSelectedPaper('');
    setPpInputValues({});
  }, [ppSelectedYear]);

  // 3. 學生 DSE 等級估算工具
  const estimateDSEGrade = (percent) => {
    if (percent >= 0.85) return { grade: '5**', color: 'text-yellow-500', bg: 'bg-yellow-50' };
    if (percent >= 0.75) return { grade: '5*', color: 'text-yellow-400', bg: 'bg-yellow-50' };
    if (percent >= 0.65) return { grade: '5', color: 'text-emerald-500', bg: 'bg-emerald-50' };
    if (percent >= 0.50) return { grade: '4', color: 'text-blue-500', bg: 'bg-blue-50' };
    if (percent >= 0.40) return { grade: '3', color: 'text-indigo-500', bg: 'bg-indigo-50' };
    if (percent >= 0.28) return { grade: '2', color: 'text-amber-500', bg: 'bg-amber-50' };
    if (percent >= 0.15) return { grade: '1', color: 'text-orange-500', bg: 'bg-orange-50' };
    return { grade: 'U', color: 'text-red-500', bg: 'bg-red-50' };
  };

  // 4. 計算學生個人的試卷統計
  const ppStats = React.useMemo(() => {
    const studentPastpaper = pastpaperScores?.[studentId] || {};
    const stats = {};
    let totalCompleted = 0;
    
    Object.keys(studentPastpaper).forEach(paperId => {
      const yearMatch = paperId.match(/^(\d{4})/);
      if (!yearMatch) return;
      const year = yearMatch[1];
      
      if (!stats[year]) stats[year] = { papers: {}, totalEarned: 0, totalMax: 0 };
      
      const mapInfo = pastpaperMaps?.[paperId];
      if (!mapInfo || !mapInfo.questions) return;
      
      let paperEarned = 0;
      let paperMax = 0;
      let hasAnswer = false;
      
      mapInfo.questions.forEach(q => {
        const studentAns = studentPastpaper[paperId][q.id];
        const qMax = Number(q.max) || 1;
        paperMax += qMax;
        
        if (studentAns !== undefined && studentAns !== '') {
          hasAnswer = true;
          if (q.type === 'MC') {
            if (studentAns === q.ans) paperEarned += qMax;
          } else {
            paperEarned += Number(studentAns) || 0;
          }
        }
      });
      
      if (hasAnswer && paperMax > 0) {
        stats[year].papers[paperId] = { earned: paperEarned, max: paperMax, title: mapInfo.title || paperId };
        stats[year].totalEarned += paperEarned;
        stats[year].totalMax += paperMax;
        totalCompleted++;
      }
    });
    
    return { byYear: stats, totalCompleted };
  }, [studentId, pastpaperScores, pastpaperMaps]);

// ==================== 升級版：通用評估數據萃取函式 (小測與考試用) ====================
  const getAssessmentData = (record, mapInfo) => {
    if (!record || !mapInfo || !mapInfo.questions) {
      return { scoreStr: '-', earned: 0, max: 0, pct: 0, weaknesses: [] };
    }
    
    let totalEarned = 0;
    let totalMax = 0;
    const weaknesses = [];
    
    mapInfo.questions.forEach(q => {
      const qScore = Number(record[q.id]) || 0;
      const qMax = Number(q.max) || 1;
      totalEarned += qScore;
      totalMax += qMax;
      
      // 得分率 <= 50% 納入弱點
      if (qScore / qMax <= 0.5) {
        const weaknessText = q.topicDesc || q.topicId || q.desc || q.topic || q.id;
        if (!weaknesses.includes(weaknessText)) {
          weaknesses.push(weaknessText);
        }
      }
    });
    
    const pct = totalMax > 0 ? (totalEarned / totalMax) : 0;
    
    return {
      scoreStr: `${totalEarned}/${totalMax}`,
      earned: totalEarned,
      max: totalMax,
      pct: pct,
      weaknesses: weaknesses
    };
  };

  // ==================== 升級版：AI 互動小測驗 Prompt 產生器 ====================
  const handleAskGemini = (title, category, weaknesses = []) => {
    // 將弱點清單格式化為文字
    const weaknessText = weaknesses.length > 0
      ? `特別是以下幾個我得分不到一半的弱點概念：\n${weaknesses.map(w => `- ${w}`).join('\n')}\n\n`
      : `有部分概念不太清晰。\n\n`;

    // 升級版 Prompt：強制要求「先給題目，不給答案」
    const prompt = `我是一名修讀高中物理科的學生，我在最近的「${category}：${title}」中表現不太理想。\n\n${weaknessText}請用繁體中文、深入淺出地為我重新講解這些核心概念。講解完畢後，請以「互動小測驗」的形式，給我 1 到 2 條簡單的 MC（選擇題），讓我測試一下自己是否真的明白了。\n\n⚠️ 注意：請先只給我題目，絕對不要直接提供答案！等我回答後，你再給出正確答案與詳細解釋。`;
    
    navigator.clipboard.writeText(prompt).then(() => {
      alert('✅ 已複製專屬 AI 提問詞！\n\n即將為您開啟 Gemini。\n請直接貼上 (Ctrl+V) 發問，AI 將會為您針對弱點進行互動測驗！');
      window.open('https://gemini.google.com/', '_blank');
    }).catch(err => {
      console.error('複製失敗', err);
      window.open('https://gemini.google.com/', '_blank');
    });
  };
    
    // 輔助函式：取得 Pastpaper 分數
    const getPastpaperQScore = React.useCallback((sId, paperId, q) => {
        const record = pastpaperScores[sId]?.[paperId];
        if (!record) return 0;
        const val = record[q.id];
        if (q.type === 'MC') {
            if (!val || !q.ans) return 0;
            const studentAns = val.toString().toUpperCase().trim();
            const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
            const cleanStudent = studentAns.replace(/[^A-D]/g, '');
            return (cleanStudent.length === 1 && correctAnswers.includes(cleanStudent)) ? q.max : 0;
        }
        return val === '' || val === undefined ? 0 : parseFloat(val);
    }, [pastpaperScores]);

    // ================== 個人數據運算區 ==================

    // 1. 個人雷達圖數據 (基於 Pastpaper)
    const personalDomainStats = React.useMemo(() => {
        const ds = { '1': { name: '熱學', e: 0, m: 0 }, '2': { name: '力學', e: 0, m: 0 }, '3': { name: '波動', e: 0, m: 0 }, '4': { name: '電磁學', e: 0, m: 0 }, '5': { name: '放射學', e: 0, m: 0 }, 'E3': { name: '能量', e: 0, m: 0 }, 'E4': { name: '醫學', e: 0, m: 0 } };
        const sScores = pastpaperScores[studentId] || {};
        Object.keys(sScores).forEach(paperId => {
            const map = window.PASTPAPER_MAPS[paperId];
            if (!map || !map.questions) return;
            map.questions.forEach(q => {
                const val = sScores[paperId][q.id];
                if (val !== undefined && val !== '') {
                    let dKey = q.topicId.startsWith('E3') ? 'E3' : q.topicId.startsWith('E4') ? 'E4' : q.topicId.charAt(0);
                    if (ds[dKey]) {
                        ds[dKey].m += q.max;
                        ds[dKey].e += getPastpaperQScore(studentId, paperId, q);
                    }
                }
            });
        });
        return ds;
    }, [studentId, pastpaperScores, getPastpaperQScore]);

    // 繪製雷達圖
    React.useEffect(() => {
        if (activeTab !== 'overview' || !chartRef.current) return;
        const ctx = chartRef.current.getContext('2d');
        const labels = [];
        const dataPoints = [];
        Object.keys(personalDomainStats).forEach(key => {
            if (personalDomainStats[key].m > 0) {
                labels.push(personalDomainStats[key].name);
                dataPoints.push(Math.round((personalDomainStats[key].e / personalDomainStats[key].m) * 100));
            }
        });

        if (chartInstance.current) chartInstance.current.destroy();
        chartInstance.current = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    label: '我的能力值 (%)',
                    data: dataPoints,
                    backgroundColor: 'rgba(56, 189, 248, 0.4)', // Sky blue
                    borderColor: 'rgba(2, 132, 199, 1)',
                    pointBackgroundColor: 'rgba(2, 132, 199, 1)',
                    pointBorderColor: '#fff',
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { r: { angleLines: { color: 'rgba(0, 0, 0, 0.1)' }, grid: { color: 'rgba(0, 0, 0, 0.1)' }, pointLabels: { font: { size: 10, weight: 'bold' } }, ticks: { stepSize: 20, min: 0, max: 100, display: false } } },
                plugins: { legend: { display: false } }
            }
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
    }, [personalDomainStats, activeTab]);

    // 1.5 新增：日常功課數據統計
    const homeworkStats = React.useMemo(() => {
        const sHW = homeworkScores[studentId] || {};
        const allHWIds = Object.keys(homeworkMaps || {});
        //const allHWIds = Object.keys(window.HOMEWORK_MAPS || {});
        
        let totalAssigned = allHWIds.length;
        let submittedCount = 0;
        let totalScore = 0;
        let totalMax = 0;
        const details = [];

        allHWIds.forEach(hwId => {
            const map = window.HOMEWORK_MAPS[hwId];
            if (!map) return;
            
            const record = sHW[hwId];
            const isSubmitted = record !== undefined && record !== '';
            if (isSubmitted) submittedCount++;

            // 假設功課可以是單一分數或題組，這裡做泛用相加
            let hwEarned = 0;
            let hwMax = map.max || 0;
            
            if (isSubmitted) {
                if (typeof record === 'object') {
                    // 如果功課結構跟小測一樣是題組
                    Object.keys(record).forEach(qId => {
                        hwEarned += parseFloat(record[qId]) || 0;
                    });
                } else {
                    // 如果功課只是單一總分
                    hwEarned = parseFloat(record) || 0;
                }
            }

            totalScore += hwEarned;
            totalMax += hwMax;

            details.push({
                id: hwId,
                title: map.title || `功課 ${hwId}`,
                isSubmitted,
                score: hwEarned,
                max: hwMax,
                topicName: map.topicDesc || '綜合'
            });
        });

        const missingCount = totalAssigned - submittedCount;
        const avgAccuracy = totalMax > 0 ? (totalScore / totalMax) : 0;

        return { totalAssigned, submittedCount, missingCount, avgAccuracy, details };
    }, [studentId, homeworkScores]);

    // ================== AI 補底運算區 ==================
    
    // A. 抓取校內成績 (Quiz + Exam) 的弱點 (<60%)
    const schoolWeaknesses = React.useMemo(() => {
        const topicStats = {};
        
        // 掃描小測
        const sQuiz = scores[studentId] || {};
        Object.keys(sQuiz).forEach(quizId => {
            const map = window.QUIZ_MAPS[quizId];
            if (!map) return;
            map.questions.forEach(q => {
                const val = sQuiz[quizId][q.id];
                if (val !== undefined && val !== '' && q.topicId) {
                    if (!topicStats[q.topicId]) topicStats[q.topicId] = { id: q.topicId, name: q.topicDesc || '綜合', m: 0, e: 0, errorDesc: new Set() };
                    topicStats[q.topicId].m += q.max;
                    topicStats[q.topicId].e += parseFloat(val) || 0;
                    if (parseFloat(val) < q.max && q.topicDesc) topicStats[q.topicId].errorDesc.add(q.topicDesc);
                }
            });
        });

        // 掃描大考
        const sExam = examScores[studentId] || {};
        Object.keys(sExam).forEach(examId => {
            const map = window.EXAM_MAPS[examId];
            if (!map) return;
            map.questions.forEach(q => {
                const val = sExam[examId][q.id];
                if (val !== undefined && val !== '' && q.topicId) {
                    if (!topicStats[q.topicId]) topicStats[q.topicId] = { id: q.topicId, name: q.topicDesc || '綜合', m: 0, e: 0, errorDesc: new Set() };
                    topicStats[q.topicId].m += q.max;
                    topicStats[q.topicId].e += parseFloat(val) || 0;
                    if (parseFloat(val) < q.max && q.topicDesc) topicStats[q.topicId].errorDesc.add(q.topicDesc);
                }
            });
        });

        return Object.values(topicStats)
            .map(t => ({ ...t, pct: t.e / t.m, descList: Array.from(t.errorDesc) }))
            .filter(t => t.m >= 5 && t.pct <= 0.6) // 最少做過 5 分且小於 60% 才當作弱點
            .sort((a, b) => a.pct - b.pct);
    }, [scores, examScores, studentId]);

    // B. 抓取 Pastpaper 弱點 (根據選定的年份/卷目)
    const ppWeaknesses = React.useMemo(() => {
        if (selectedPPPapers.length === 0) return [];
        const topicStats = {};
        const sScores = pastpaperScores[studentId] || {};

        selectedPPPapers.forEach(paperId => {
            const record = sScores[paperId] || {};
            const map = window.PASTPAPER_MAPS[paperId];
            if (!map) return;
            map.questions.forEach(q => {
                const val = record[q.id];
                if (val !== undefined && val !== '') {
                    if (!topicStats[q.topicId]) topicStats[q.topicId] = { id: q.topicId, name: q.topicDesc || '綜合', m: 0, e: 0, errorDesc: new Set() };
                    topicStats[q.topicId].m += q.max;
                    const eScore = getPastpaperQScore(studentId, paperId, q);
                    topicStats[q.topicId].e += eScore;
                    if (eScore < q.max && q.topicDesc) topicStats[q.topicId].errorDesc.add(q.topicDesc);
                }
            });
        });

        return Object.values(topicStats)
            .map(t => ({ ...t, pct: t.e / t.m, descList: Array.from(t.errorDesc) }))
            .filter(t => t.m > 0 && t.pct <= 0.6)
            .sort((a, b) => a.pct - b.pct);
    }, [selectedPPPapers, pastpaperScores, studentId, getPastpaperQScore]);


    // ================== 英雄榜運算區 ==================
    const TITLE_POOL = { '1': ["熱力學宗師", "絕對零度行者"], '2': ["力學戰神", "牛頓傳人"], '3': ["波動幻影", "光學大師"], '4': ["電磁霸主", "雷電行者"], '5': ["輻射剋星", "量子漫步者"], 'E3': ["能量守恆者", "綠能先鋒"], 'E4': ["醫學神醫", "透視眼行者"] };

    const availableMonths = React.useMemo(() => {
        const months = new Set();
        peerStudents.forEach(s => {
            const sScores = pastpaperScores[s.id] || {};
            Object.values(sScores).forEach(r => { if (r['_submitMonth']) months.add(r['_submitMonth']); });
        });
        return Array.from(months).sort().reverse();
    }, [peerStudents, pastpaperScores]);

    const leaderboardData = React.useMemo(() => {
        const lb = peerStudents.map(s => {
            const sScores = pastpaperScores[s.id] || {};
            let mcAttempted = 0, lqAttempted = 0, totalEarned = 0, totalMax = 0;
            const dStats = { '1':{e:0,m:0}, '2':{e:0,m:0}, '3':{e:0,m:0}, '4':{e:0,m:0}, '5':{e:0,m:0}, 'E3':{e:0,m:0}, 'E4':{e:0,m:0} };

            Object.keys(sScores).forEach(paperId => {
                const record = sScores[paperId];
                if (leaderboardMonth !== 'all' && record['_submitMonth'] !== leaderboardMonth) return;
                const map = window.PASTPAPER_MAPS[paperId];
                if (!map) return;
                
                map.questions.forEach(q => {
                    const val = record[q.id];
                    if (val !== undefined && val !== '') {
                        if (q.type === 'MC') mcAttempted++; else lqAttempted++;
                        const score = getPastpaperQScore(s.id, paperId, q);
                        totalMax += q.max; totalEarned += score;
                        let dKey = q.topicId.startsWith('E3') ? 'E3' : q.topicId.startsWith('E4') ? 'E4' : q.topicId.charAt(0);
                        if (dStats[dKey]) { dStats[dKey].e += score; dStats[dKey].m += q.max; }
                    }
                });
            });

            let bestDomain = '1'; let highestPct = -1;
            Object.keys(dStats).forEach(k => {
                if (dStats[k].m >= 5) {
                    const pct = dStats[k].e / dStats[k].m;
                    if (pct > highestPct) { highestPct = pct; bestDomain = k; }
                }
            });

            const totalQuestions = mcAttempted + lqAttempted;
            const accuracy = totalMax > 0 ? (totalEarned / totalMax) : 0;
            
            let title = "潛水觀望者";
            if (totalQuestions > 0) {
                const charSum = s.id.split('').reduce((sum, char) => sum + char.charCodeAt(0), 0);
                const pool = TITLE_POOL[bestDomain] || ["努力操卷者"];
                title = pool[charSum % pool.length];
            }

            return { student: s, totalQuestions, accuracy, title, bestDomain };
        });
        return lb.sort((a, b) => b.totalQuestions - a.totalQuestions || b.accuracy - a.accuracy);
    }, [peerStudents, pastpaperScores, getPastpaperQScore, leaderboardMonth]);

    const myRankData = leaderboardData.find(d => d.student.id === studentId) || { totalQuestions: 0, title: '尚未起步', accuracy: 0 };
    const myRankIndex = leaderboardData.findIndex(d => d.student.id === studentId);

    // ================== 生成 AI Prompt ==================
    const generatePrompt = () => {
        const targetWeaknesses = aiSubTab === 'school' ? schoolWeaknesses : ppWeaknesses;
        if (targetWeaknesses.length === 0) return '';

        const weakText = targetWeaknesses.map(t => `- 課題 [${t.id}]: 得分率 ${(t.pct*100).toFixed(0)}%。經常錯在：${t.descList.join('; ') || '基礎觀念'}`).join('\n');

        return `我是一名香港 DSE 物理科學生，目前就讀中五/中六。在最近的操練中，我發現自己在以下課題特別弱（得分率低於 60%）：\n\n${weakText}\n\n請你扮演一位幽默且有耐心的名師，幫我度身訂造一份「針對性補底特訓卷」。\n要求：\n1. 先用一句話鼓勵我。\n2. 出 3 題 DSE 程度的多項選擇題 (MC) 和 1 題長題目 (LQ)，全都是針對我上面的錯因設計的陷阱題。\n3. 先不要給我答案。等我回答後，你再給我詳細的 Marking Scheme 和解題思路！`;
    };

    const handleCopyAndGo = (platformUrl) => {
        const p = generatePrompt();
        if(!p) { alert('你目前沒有低於 60% 的弱點！去挑戰更多卷子吧！'); return; }
        navigator.clipboard.writeText(p);
        alert('📋 專屬特訓指令已複製！\n\n即將跳轉到 AI 平台，請直接「貼上 (Ctrl+V)」並發送給 AI 導師！');
        window.open(platformUrl, '_blank');
    };

    if (!currentStudent) return <div className="p-10 text-center font-bold text-red-500">找不到學生資料！</div>;

    return (
        <div className="min-h-screen bg-slate-50 text-slate-800">
            {/* 頂部導航 */}
            <div className="bg-indigo-900 text-white shadow-md sticky top-0 z-50">
                <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-gradient-to-tr from-sky-400 to-indigo-500 rounded-full flex items-center justify-center font-black text-lg border-2 border-indigo-300 shadow-sm">
                            {currentStudent.name.charAt(0)}
                        </div>
                        <div>
                            <div className="font-bold">{currentStudent.name}</div>
                            <div className="text-[10px] text-indigo-300 font-mono">{currentStudent.cohort} | {myRankData.title}</div>
                        </div>
                    </div>
                    {/* 隱藏版：退出按鈕 (若需要) */}
                    <a href="?" className="text-xs text-indigo-300 hover:text-white flex items-center gap-1"><Icon name="LogOut" size={14}/> 登出</a>
                </div>
                
                {/* 橫向捲動的分頁按鈕 */}
                <div className="max-w-5xl mx-auto flex overflow-x-auto custom-scrollbar">
                    {[
                        { id: 'overview', icon: 'LayoutDashboard', label: '總覽' },
                        { id: 'school', icon: 'PenTool', label: '校內進度' },
                        { id: 'pastpaper', icon: 'BookOpen', label: '歷屆試題' },
                        { id: 'ai', icon: 'Bot', label: 'AI 補底' },
                        { id: 'leaderboard', icon: 'Trophy', label: '英雄榜' }
                    ].map(tab => (
                        <button 
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`flex items-center gap-2 px-5 py-3 text-sm font-bold whitespace-nowrap transition border-b-4 ${activeTab === tab.id ? 'border-sky-400 text-sky-300 bg-white/5' : 'border-transparent text-indigo-200 hover:text-white hover:bg-white/5'}`}
                        >
                            <Icon name={tab.icon} size={16} /> {tab.label}
                        </button>
                    ))}
                </div>
            </div>

            <div className="max-w-5xl mx-auto p-4 sm:p-6 space-y-6">
                
               {/* ==================== 分頁：總覽 (Overview) ==================== */}
                {activeTab === 'overview' && (
                    <>
                    <div className="animate-fadeIn space-y-6">
                        {/* Hero 歡迎區 */}
                        <div className="bg-gradient-to-r from-sky-500 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                            <Icon name="Target" size={120} className="absolute -right-10 -bottom-10 opacity-10" />
                            <h2 className="text-2xl font-black mb-1">準備好超越自己了嗎，{currentStudent.name}？</h2>
                            <p className="text-sky-100 text-sm mb-6">保持紀律，今天的練習就是明天的 5**。你目前的稱號是 <strong className="text-yellow-300">「{myRankData.title}」</strong>。</p>
                            
                            <div className="grid grid-cols-3 gap-4">
                                <div className="bg-black/20 rounded-xl p-3 text-center border border-white/10 backdrop-blur-sm">
                                    <div className="text-[10px] text-sky-200 uppercase font-bold tracking-wider mb-1">班級戰力排名</div>
                                    <div className="text-2xl font-black text-white">#{myRankIndex >= 0 ? myRankIndex + 1 : '-'}</div>
                                </div>
                                <div className="bg-black/20 rounded-xl p-3 text-center border border-white/10 backdrop-blur-sm">
                                    <div className="text-[10px] text-sky-200 uppercase font-bold tracking-wider mb-1">已擊敗題數</div>
                                    <div className="text-2xl font-black text-white">{myRankData.totalQuestions}</div>
                                </div>
                                <div className="bg-black/20 rounded-xl p-3 text-center border border-white/10 backdrop-blur-sm">
                                    <div className="text-[10px] text-sky-200 uppercase font-bold tracking-wider mb-1">綜合命中率</div>
                                    <div className="text-2xl font-black text-white">{(myRankData.accuracy * 100).toFixed(0)}%</div>
                                </div>
                            </div>
                        </div>
                        
                        {/* 雷達圖 */}
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-4">
                                <Icon name="Activity" className="text-sky-500" /> 我的七大領域能力值 (基於歷屆試題)
                            </h3>
                            <div className="h-[250px] relative w-full flex items-center justify-center">
                                {myRankData.totalQuestions === 0 ? (
                                    <span className="text-slate-400 text-sm">快去做點 Pastpaper 喚醒你的雷達圖吧！</span>
                                ) : (
                                    <canvas ref={chartRef}></canvas>
                                )}
                            </div>
                        </div>
                        
                        {/* 新增：四大戰區狀態卡 */}
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                            
                            {/* ★ 升級版：日常功課卡片 */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="p-2 bg-indigo-100 text-indigo-600 rounded-lg">
                                        <Icon name="BookOpen" size={20} />
                                    </div>
                                    <h3 className="font-bold text-slate-800">日常功課狀態</h3>
                                </div>
                                
                                <div className="mb-4">
                                    <div className="text-3xl font-black text-indigo-600">
                                        {hwStats.completed} <span className="text-sm text-slate-400 font-medium">/ {hwStats.total} 份已改正</span>
                                    </div>
                                </div>
                    
                                {/* 詳細狀態標籤 */}
                                <div className="flex flex-col gap-2">
                                    {hwStats.needsCorrection > 0 && (
                                        <div className="flex justify-between items-center bg-amber-50 text-amber-700 px-3 py-2 rounded-md text-sm font-bold border border-amber-200">
                                            <span>⚠️ 待改正 (已交)</span>
                                            <span>{hwStats.needsCorrection} 份</span>
                                        </div>
                                    )}
                                    {hwStats.missing > 0 && (
                                        <div className="flex justify-between items-center bg-red-50 text-red-600 px-3 py-2 rounded-md text-sm font-bold border border-red-100">
                                            <span>❌ 欠交 (未有成績)</span>
                                            <span>{hwStats.missing} 份</span>
                                        </div>
                                    )}
                                    {hwStats.total === 0 && (
                                        <div className="text-sm text-slate-400 font-medium">目前尚無功課安排</div>
                                    )}
                                </div>
                                
                                {/* 功課明細列表 */}
                                {hwStats.details.length > 0 && (
                                    <div className="mt-4 space-y-2 border-t pt-3">
                                        {hwStats.details.map(hw => (
                                            <div key={hw.id} className="flex justify-between items-center text-xs">
                                                <span className="truncate w-32 text-slate-600">{hw.title || hw.id}</span>
                                                {hw.status === 'completed' && <span className="text-emerald-600 font-bold">已改正 ({hw.score})</span>}
                                                {hw.status === 'needsCorrection' && <span className="text-amber-600 font-bold">未改正 ({hw.score})</span>}
                                                {hw.status === 'missing' && <span className="text-red-500 font-bold">欠交</span>}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                          {/* ★ 升級版：課堂小測卡 (加入點擊跳轉與詳細弱點) */}
                            <div 
                                onClick={() => setActiveTab('school')}
