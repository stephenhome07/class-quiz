                    </div>
                );
            };
        const getStudentAnalysis = (studentId, quizId, scores) => {
                // 加上這行防呆：如果 scores 不存在，就直接回傳 null，避免畫面崩潰
                if (!scores) return null;
                // 新增：檢查該學生是否真的有這份小測的成績紀錄，若無則直接跳過
                const studentScores = (scores[studentId] || {})[quizId];
                if (!studentScores || Object.keys(studentScores).length === 0) return null;

                const map = QUIZ_MAPS[quizId];
                if (!map) return null;

                const analysis = {};
                let totalScore = 0; let totalMax = 0;

                map.questions.forEach(q => {
                    const s = studentScores[q.id] || 0;
                    totalScore += s; totalMax += q.max;
                    
                    if (!analysis[q.topicId]) {
                        analysis[q.topicId] = { 
                            max: 0, 
                            score: 0, 
                            topicName: SYLLABUS_TOPICS[q.topicId] || '未知課題', 
                            weakPoints: [] 
                        };
                    }
                    analysis[q.topicId].max += q.max; 
                    analysis[q.topicId].score += s;
                    
                    // 如果這題得分低於一半，就把「具體的題目描述」加進弱點清單
                    if (s < q.max * 0.5) analysis[q.topicId].weakPoints.push(q.topicDesc);
                });

                const weakTopics = Object.keys(analysis).filter(k => (analysis[k].score / analysis[k].max) < 0.5);
                return { totalScore, totalMax, analysis, weakTopics };
            };

// ==================== 新增：班級成績總表組件 (加入顏色標示與滿分顯示 & 自動過濾無成績小測) ====================
const ClassSummaryView = ({ activeStudents, scores }) => {
    // 1. ★ 修改：只讀取「有入過分」的小測 Quiz ID
    const allQuizzes = React.useMemo(() => {
        const quizzesWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = scores[student.id] || {};
            Object.keys(studentScores).forEach(quizId => {
                // 只要該學生在該小測有任何一題有分，即視為有入分，並確保該 Quiz 存在於系統設定中
                if (QUIZ_MAPS[quizId] && Object.keys(studentScores[quizId]).length > 0) {
                    quizzesWithScores.add(quizId);
                }
            });
        });
        // 轉為陣列並排序，確保每次顯示的順序一致
        return Array.from(quizzesWithScores).sort();
    }, [activeStudents, scores]);

    // 2. 計算每個小測的「滿分」總和
    const quizMaxScores = React.useMemo(() => {
        const maxScores = {};
        allQuizzes.forEach(quiz => {
            let max = 0;
            const map = QUIZ_MAPS[quiz];
            if (map && map.questions) {
                map.questions.forEach(q => {
                    max += (q.max || 0);
                });
            }
            maxScores[quiz] = max;
        });
        return maxScores;
    }, [allQuizzes]);

    // 3. 狀態：記錄哪些 Quiz 要納入平均分計算（預設全部勾選）
    const [includedQuizzes, setIncludedQuizzes] = React.useState({});

    React.useEffect(() => {
        const initial = {};
        allQuizzes.forEach(q => {
            initial[q] = true;
        });
        setIncludedQuizzes(initial);
    }, [allQuizzes]);

    const toggleQuiz = (quizName) => {
        setIncludedQuizzes(prev => ({ ...prev, [quizName]: !prev[quizName] }));
    };

    // 4. 處理學生資料、動態加總各題分數與計算平均分 (按100滿分計算)
    const computedData = React.useMemo(() => {
        return activeStudents.map(student => {
            let totalForAvg = 0;  
            let countForAvg = 0;  
            const quizScores = {};

            allQuizzes.forEach(quiz => {
                const studentScores = scores[student.id]?.[quiz];
                let quizTotalScore = null;  
                let quizPercentage = null;  

                // 檢查該學生是否有這份小測的成績紀錄
                if (studentScores && Object.keys(studentScores).length > 0) {
                    const map = QUIZ_MAPS[quiz];
                    if (map) {
                        let sum = 0;
                        map.questions.forEach(q => {
                            sum += (studentScores[q.id] || 0);
                        });
                        
                        const maxScore = quizMaxScores[quiz];
                        quizTotalScore = sum; 
                        
                        // 計算該小測的百分制分數 (滿分100)
                        if (maxScore > 0) {
                            quizPercentage = (sum / maxScore) * 100;
                        }
                    }
                }

                quizScores[quiz] = quizTotalScore;

                // 納入平均分計算
                if (includedQuizzes[quiz] && quizPercentage !== null) {
                    totalForAvg += quizPercentage;
                    countForAvg++;
                }
            });

            const average = countForAvg > 0 ? (totalForAvg / countForAvg).toFixed(1) : '-';
            
            return {
                ...student,
                quizScores,
                average
            };
        });
    }, [activeStudents, scores, allQuizzes, includedQuizzes, quizMaxScores]);

    // 5. 一鍵複製到 Excel 格式
    const handleCopyToExcel = () => {
        if (computedData.length === 0) {
            alert("沒有學生資料可複製");
            return;
        }

        // 表頭
        let tsv = ["班別", "學號", "姓名", ...allQuizzes, "平均分"].join("\t") + "\n";
        // 滿分行 (方便 Excel 參考)
        tsv += ["", "", "滿分:", ...allQuizzes.map(quiz => quizMaxScores[quiz] || 0), "100"].join("\t") + "\n";

        // 內容行
        computedData.forEach(student => {
            const row = [
                student.class || student.className || '',
                student.number || student.classNumber || '',
                student.name || '',
                ...allQuizzes.map(quiz => student.quizScores[quiz] !== null ? student.quizScores[quiz] : ''),
                student.average
            ];
            tsv += row.join("\t") + "\n";
        });

        navigator.clipboard.writeText(tsv)
            .then(() => alert("📋 已成功複製表格資料！\n請直接到 Excel 按 Ctrl+V 貼上即可。"))
            .catch(err => alert("複製失敗，錯誤: " + err));
    };

    return (
        <div className="p-6 max-w-7xl mx-auto animate-fadeIn">
            <div className="flex justify-between items-center mb-6">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Table" /> 班級成績總表 (Excel 匯出)
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">
                        系統僅顯示有成績記錄的小測。黃底表示得分 40%~60%；<span className="text-red-500 font-semibold">紅底表示低於 40%</span>。
                    </p>
                </div>
                <button 
                    onClick={handleCopyToExcel}
                    className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg shadow transition"
                >
                    <Icon name="Copy" size={18} /> 複製到 Excel 格式
                </button>
            </div>

            {/* Quiz 篩選控制面板 */}
            <div className="card p-4 mb-6 bg-white rounded-xl border border-slate-200 shadow-sm">
                <h3 className="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-1">
                    <Icon name="Settings" size={16} /> 選擇納入【平均分】計算的小測：
                </h3>
                <div className="flex flex-wrap gap-4">
                    {allQuizzes.length === 0 ? (
                         <span className="text-sm text-slate-400">目前沒有任何小測有成績紀錄。</span>
                    ) : (
                        allQuizzes.map(quiz => (
                            <label key={quiz} className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200 cursor-pointer hover:bg-slate-100 transition text-sm">
                                <input 
                                    type="checkbox" 
                                    className="w-4 h-4 text-blue-600 rounded"
                                    checked={!!includedQuizzes[quiz]} 
                                    onChange={() => toggleQuiz(quiz)} 
                                />
                                <span className="text-slate-700 font-medium">{quiz}</span>
                            </label>
                        ))
                    )}
                </div>
            </div>

            {/* 數據預覽表格 */}
            {allQuizzes.length > 0 && (
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto max-h-[600px] overflow-y-auto">
                    <table className="w-full text-left border-collapse min-w-[800px]">
                        <thead className="bg-slate-100 sticky top-0 z-10 shadow-[0_1px_0_0_rgba(226,232,240,1)]">
                            <tr>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">班別</th>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">學號</th>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">姓名</th>
                                {allQuizzes.map(quiz => (
                                    <th key={quiz} className={`p-3 text-sm font-semibold border-b border-slate-200 ${includedQuizzes[quiz] ? 'text-slate-800 bg-blue-50/50' : 'text-slate-400 line-through'}`}>
                                        <div className="flex flex-col gap-1">
                                            <span>{quiz}</span>
                                            <span className={`text-xs ${includedQuizzes[quiz] ? 'text-blue-500' : 'text-slate-400'}`}>
                                                滿分: {quizMaxScores[quiz] || 0}
                                            </span>
                                        </div>
                                    </th>
                                ))}
                                <th className="p-3 text-sm font-bold text-blue-600 bg-blue-50 border-b border-slate-200">
                                    <div className="flex flex-col gap-1">
                                        <span>平均分</span>
                                        <span className="text-xs text-blue-400 font-normal">滿分: 100</span>
                                    </div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            {computedData.length === 0 ? (
                                <tr>
                                    <td colSpan={4 + allQuizzes.length} className="text-center p-8 text-slate-400">暫無學生數據</td>
                                </tr>
                            ) : (
                                computedData.map((student, idx) => (
                                    <tr key={student.id || idx} className="hover:bg-slate-50 transition border-b border-slate-100">
                                        <td className="p-3 text-sm text-slate-700 font-medium">{student.class || student.className || '-'}</td>
                                        <td className="p-3 text-sm text-slate-600">{student.number || student.classNumber || '-'}</td>
                                        <td className="p-3 text-sm text-slate-800 font-medium">{student.name || '-'}</td>
                                        
                                        {/* 每個 Quiz 的成績顯示與顏色判定 */}
                                        {allQuizzes.map(quiz => {
                                            const score = student.quizScores[quiz];
                                            const max = quizMaxScores[quiz];
                                            
                                            // 預設樣式
                                            let bgColor = '';
                                            let textColor = includedQuizzes[quiz] ? 'text-slate-700' : 'text-slate-300';
                                            let fontWeight = '';

                                            // 判斷是否需要加上警示顏色
                                            if (includedQuizzes[quiz] && score !== null && max > 0) {
                                                const percentage = (score / max) * 100;
                                                if (percentage < 40) {
                                                    bgColor = 'bg-red-100';
                                                    textColor = 'text-red-700';
                                                    fontWeight = 'font-bold';
                                                } else if (percentage <= 60) {
                                                    bgColor = 'bg-yellow-100';
                                                    textColor = 'text-yellow-800';
                                                    fontWeight = 'font-bold';
                                                }
                                            }

                                            return (
                                                <td key={quiz} className={`p-3 text-sm ${bgColor} ${textColor} ${fontWeight}`}>
                                                    {score !== null ? score : <span className="text-slate-300">-</span>}
                                                </td>
                                            );
                                        })}

                                        {/* 平均分的成績顯示與顏色判定 */}
                                        {(() => {
                                            let avgBgColor = 'bg-blue-50/30';
                                            let avgTextColor = 'text-blue-600';
                                            let avgFontWeight = 'font-bold';

                                            if (student.average !== '-') {
                                                const avgNum = parseFloat(student.average);
                                                if (avgNum < 40) {
                                                    avgBgColor = 'bg-red-100';
                                                    avgTextColor = 'text-red-700';
                                                } else if (avgNum <= 60) {
                                                    avgBgColor = 'bg-yellow-100';
                                                    avgTextColor = 'text-yellow-800';
                                                }
                                            }

                                            return (
                                                <td className={`p-3 text-sm ${avgBgColor} ${avgTextColor} ${avgFontWeight}`}>
                                                    {student.average}
                                                </td>
                                            );
                                        })()}
                                    </tr>
                                ))
                            )}
                        </tbody>
                    </table>
                </div>
            )}
        </div>
    );
};

// ==================== 新增：考試成績輸入組件 ====================
const ExamScoresInputView = ({ activeStudents, examScores, setExamScores, syncToCloud }) => {
    // 預設選擇第一個考試
    const [selectedExam, setSelectedExam] = React.useState(Object.keys(EXAM_MAPS || {})[0] || '');
    const [selectedStudentId, setSelectedStudentId] = React.useState('');
    const map = EXAM_MAPS[selectedExam];

    // 處理分數/答案變更
    const handleScoreChange = (studentId, examId, qId, qType, val) => {
        let processedVal = val;
        
        if (qType === 'MC') {
            // MC 題型：轉大寫，並限制只能輸入 A, B, C, D (或清空)
            processedVal = val.toUpperCase().trim();
            if (processedVal !== '' && !['A', 'B', 'C', 'D'].includes(processedVal)) {
                return; // 如果輸入其他亂碼，直接忽略
            }
        } else {
            // LQ 題型：處理數字
            processedVal = val === '' ? '' : parseFloat(val);
        }

        setExamScores(prev => ({
            ...prev, 
            [studentId]: { 
                ...(prev[studentId] || {}), 
                [examId]: { 
                    ...((prev[studentId] && prev[studentId][examId]) || {}), 
                    [qId]: processedVal 
                } 
            }
        }));
    };

    // 清除單一學生成績
    const deleteRecord = () => {
        if (!selectedStudentId || !selectedExam) return;
        const studentScores = examScores[selectedStudentId];
        if (!studentScores || !studentScores[selectedExam] || Object.keys(studentScores[selectedExam]).length === 0) {
            alert('此同學尚未有這份考試的成績紀錄。');
            return;
        }
        if (window.confirm(`確定要清除該學生【${selectedExam}】的所有成績嗎？`)) {
            setExamScores(prev => {
                const newScores = { ...prev };
                delete newScores[selectedStudentId][selectedExam];
                return newScores;
            });
        }
    };

    if (!map) return (
        <div className="p-6 max-w-4xl mx-auto text-center mt-20">
            <Icon name="AlertCircle" className="mx-auto mb-4 text-slate-400" size={48} />
            <h2 className="text-xl font-bold text-slate-600 mb-2">尚未設定任何考試內容</h2>
            <p className="text-slate-500">請先至左側「考試內容設定」貼上您的考試大綱後，再來輸入成績。</p>
        </div>
    );

    return (
        <div className="p-6 max-w-5xl mx-auto animate-fadeIn">
            <div className="flex justify-between items-center mb-6">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="GraduationCap" /> 考試成績輸入 (MC & LQ)
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">MC 請直接輸入字母 (A/B/C/D)，LQ 請輸入得分數字。</p>
                </div>
                <button 
                    onClick={() => syncToCloud()}
                    className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg shadow-sm transition"
                >
                    <Icon name="CloudUpload" size={18} /> 儲存至雲端
                </button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div className="card p-4 flex flex-col gap-2 border border-slate-200">
                    <label className="text-sm font-semibold text-slate-700">1. 選擇考試</label>
                    <select 
                        className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none"
                        value={selectedExam} 
                        onChange={(e) => setSelectedExam(e.target.value)}
                    >
                        {Object.keys(EXAM_MAPS).map(k => (
                            <option key={k} value={k}>{k} - {EXAM_MAPS[k].title}</option>
                        ))}
                    </select>
                </div>
                
                <div className="card p-4 flex flex-col gap-2 border border-slate-200">
                    <div className="flex justify-between items-center">
                        <label className="text-sm font-semibold text-slate-700">2. 選擇學生</label>
                        <span className="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded-full">
                            共 {activeStudents.length} 人
                        </span>
                    </div>
                    <select 
                        className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50"
                        value={selectedStudentId} 
                        onChange={(e) => setSelectedStudentId(e.target.value)}
                    >
                        <option value="">-- 請選擇學生 --</option>
                        {activeStudents.map(s => (
                            <option key={s.id} value={s.id}>{s.class} ({s.num}) {s.name}</option>
                        ))}
                    </select>
                </div>
            </div>

            {selectedStudentId ? (
                <div className="card p-6 bg-white border border-slate-200 shadow-sm relative">
                    <div className="absolute top-4 right-4">
                        <button onClick={deleteRecord} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition text-sm flex items-center gap-1">
                            <Icon name="Trash2" size={16} /> 清除該生成績
                        </button>
                    </div>

                    <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">
                        輸入成績：{activeStudents.find(s => s.id === selectedStudentId)?.name}
                    </h3>
                    
                    <div className="space-y-6">
                        {/* 渲染 MC 題目 */}
                        {map.questions.filter(q => q.type === 'MC').length > 0 && (
                            <div>
                                <h4 className="font-semibold text-purple-700 mb-3 bg-purple-50 p-2 rounded">Part A: 多項選擇題 (MC)</h4>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                    {map.questions.filter(q => q.type === 'MC').map(q => {
                                        const currentVal = (examScores[selectedStudentId]?.[selectedExam] || {})[q.id] || '';
                                        return (
                                            <div key={q.id} className="flex flex-col gap-1 p-2 border border-slate-100 rounded-lg bg-slate-50 hover:bg-slate-100 transition">
                                                <div className="flex justify-between items-center text-sm">
                                                    <span className="font-bold text-slate-700">{q.id}</span>
                                                    {q.ans && <span className="text-xs text-green-600 font-medium">正確: {q.ans}</span>}
                                                </div>
                                                <input 
                                                    type="text" 
                                                    maxLength="1"
                                                    className="w-full p-2 border border-slate-300 rounded text-center font-bold text-lg focus:ring-2 focus:ring-purple-400 outline-none uppercase"
                                                    value={currentVal}
                                                    placeholder="A/B/C/D"
                                                    onChange={e => handleScoreChange(selectedStudentId, selectedExam, q.id, q.type, e.target.value)}
                                                />
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* 渲染 LQ 題目 */}
                        {map.questions.filter(q => q.type !== 'MC').length > 0 && (
                            <div>
                                <h4 className="font-semibold text-blue-700 mb-3 bg-blue-50 p-2 rounded mt-6">Part B: 長題目 (LQ)</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {map.questions.filter(q => q.type !== 'MC').map(q => {
                                        const currentVal = (examScores[selectedStudentId]?.[selectedExam] || {})[q.id] || '';
                                        return (
                                            <div key={q.id} className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg bg-white shadow-sm hover:shadow transition">
                                                <div className="w-16 font-bold text-slate-700 text-sm">{q.id}</div>
                                                <input 
                                                    type="number" 
                                                    min="0" 
                                                    max={q.max}
                                                    step="0.5"
                                                    className="flex-1 p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-400 outline-none"
                                                    value={currentVal}
                                                    placeholder={`滿分: ${q.max}`}
                                                    onChange={e => handleScoreChange(selectedStudentId, selectedExam, q.id, q.type, e.target.value)}
                                                />
                                                <div className="text-xs text-slate-400 w-10">/ {q.max}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            ) : (
                <div className="card p-12 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed">
                    <Icon name="UserCheck" size={48} className="mx-auto mb-4 opacity-50" />
                    <p className="text-lg font-medium">請先從上方選擇學生以輸入成績</p>
                </div>
            )}
        </div>
    );
};

// ==================== 更新版：大考全班數據診斷與 AI 教案生成組件 (修復 React 310 Error) ====================
const ExamAnalysisView = ({ activeStudents, examScores, currentCohort, getRelevantExamMaps }) => {
    
    // 1. 取得過濾後的試卷藍圖
    const relevantMaps = getRelevantExamMaps(currentCohort, examScores, EXAM_MAPS || {});
    
    // 2. 所有的 useState 必須放在最上面
    const [selectedExam, setSelectedExam] = React.useState(Object.keys(relevantMaps)[0] || '');
    const [analysisTab, setAnalysisTab] = React.useState('MC'); 
    const [aiLang, setAiLang] = React.useState('雙語 (Bilingual)');
    const [aiType, setAiType] = React.useState('MC+LQ');
    const [aiMcCount, setAiMcCount] = React.useState('5'); 
    const [aiLqCount, setAiLqCount] = React.useState('5'); 
    const [generatedPrompt, setGeneratedPrompt] = React.useState('');

    // 3. 第一個 useEffect：自動跳轉可用試卷
    React.useEffect(() => {
        if (Object.keys(relevantMaps).length > 0 && !relevantMaps[selectedExam]) {
            setSelectedExam(Object.keys(relevantMaps)[0]);
        } else if (Object.keys(relevantMaps).length === 0) {
            setSelectedExam('');
        }
    }, [currentCohort, relevantMaps, selectedExam]);

    // 4. 準備安全運算的變數 (防呆機制)
    const map = relevantMaps[selectedExam];
    const questions = map ? map.questions : [];

    // 5. 試卷難度診斷與選項統計 (安全地使用 questions 陣列，即使是空的也不會當機)
    const qStats = questions.map(q => {
        let totalScore = 0;
        let counts = { A: 0, B: 0, C: 0, D: 0, Other: 0 }; 

        activeStudents.forEach(s => {
            const record = examScores[s.id]?.[selectedExam];
            if (!record) return;
            const val = record[q.id];
            
            if (q.type === 'MC') {
                const ans = val ? val.toString().trim().toUpperCase() : '';
                if (['A', 'B', 'C', 'D'].includes(ans)) {
                    counts[ans]++;
                } else if (ans) {
                    counts.Other++;
                }
                
                if (q.ans && ans === q.ans.toUpperCase()) {
                    totalScore += q.max;
                }
            } else {
                totalScore += (val === '' || val === undefined ? 0 : parseFloat(val));
            }
        });
        
        const count = activeStudents.length || 1;
        const mean = totalScore / count;
        const pValue = q.max > 0 ? mean / q.max : 0; 
        
        let diag = '中等';
        let badgeColor = 'text-amber-600 bg-amber-50 border-amber-200';
        if (pValue < 0.40) { diag = '艱深'; badgeColor = 'text-red-600 bg-red-50 border-red-200'; }
        else if (pValue > 0.75) { diag = '容易'; badgeColor = 'text-green-600 bg-green-50 border-green-200'; }

        return { ...q, mean: mean.toFixed(2), pValue, diag, badgeColor, counts, studentCount: count };
    });

    // 6. 各知識點全班掌握度
    const topicSummary = {};
    questions.forEach(q => {
        if (!topicSummary[q.topicId]) {
            topicSummary[q.topicId] = { 
                topicId: q.topicId, 
                topicName: SYLLABUS_TOPICS[q.topicId] || '未定義課題', 
                maxPossible: 0, 
                actualEarned: 0 
            };
        }
        topicSummary[q.topicId].maxPossible += q.max * activeStudents.length;
        activeStudents.forEach(s => {
            const record = examScores[s.id]?.[selectedExam];
            if (!record) return;
            const val = record[q.id];
            
            if (q.type === 'MC') {
                const ans = val ? val.toString().trim().toUpperCase() : '';
                if (q.ans && ans === q.ans.toUpperCase()) {
                    topicSummary[q.topicId].actualEarned += q.max;
                }
            } else {
                topicSummary[q.topicId].actualEarned += (val === '' || val === undefined ? 0 : parseFloat(val));
            }
        });
    });

    const sortedTopics = Object.values(topicSummary).sort((a, b) => 
        a.topicId.localeCompare(b.topicId, undefined, { numeric: true, sensitivity: 'base' })
    );

    // 7. 第二個 useEffect：AI Prompt 生成邏輯 (★ 移到 Early Return 之前！)
    React.useEffect(() => {
        if (!map) return; // 如果沒有試卷資料，就在 Hook 內部提早結束，這樣才不會破壞 Hook 規則
        
        const hardMC = qStats.filter(q => q.type === 'MC' && q.pValue < 0.5).map(q => `- 題號 ${q.id}: 正確答案 [${q.ans}], P-Value: ${q.pValue.toFixed(2)}。題目敘述: ${q.topicDesc}`).join('\n');
        const hardLQ = qStats.filter(q => q.type !== 'MC' && q.pValue < 0.5).map(q => `- 題號 ${q.id} (滿分 ${q.max}分): P-Value: ${q.pValue.toFixed(2)}。題目敘述: ${q.topicDesc}`).join('\n');
        const weakTopics = sortedTopics.filter(t => t.maxPossible > 0 && (t.actualEarned/t.maxPossible) < 0.55).map(t => `- 課題 [${t.topicId} ${t.topicName}]: 全班得分率僅 ${(t.actualEarned/t.maxPossible*100).toFixed(1)}%`).join('\n');

        const newPrompt = `你是一位香港 DSE 物理科中學名師。請根據以下這份大考的【全班真實應考數據】，為我編寫一份高質素的【試後檢討與重難點澄清教案】。\n\n[基本設定]\n- 語言: ${aiLang}\n- 預期針對我指定的題型與題數，各編寫全新的衍生鞏固練習題：\n  * 衍生多項選擇題 (MC)：${aiMcCount} 題\n  * 衍生長題目 (LQ)：${aiLqCount} 題\n\n[數據診斷：全班答錯率極高的 MC 難點題目]\n${hardMC || '- 無明顯 MC 難點'}\n\n[數據診斷：全班失分嚴重的 LQ 難點題目]\n${hardLQ || '- 無明顯 LQ 難點'}\n\n[數據診斷：全班掌握度最差的知識點課題]\n${weakTopics || '- 全班各課題發揮均衡'}\n\n[教案與題目編寫要求]:\n1. 錯因深度剖析：針對上述答對率低的 MC 及 LQ 題目，從物理概念角度切入，指出學生最容易混淆的觀念陷阱。\n2. 變式題目擴充：根據我設定的 MC 題數 (${aiMcCount} 題) 和 LQ 題數 (${aiLqCount} 題)，分別編寫全新的【同類概念變式衍生題】。題目必須嚴格符合 DSE 考核風格，並為 MC 提供 4 個具備強干擾項的選項，為 LQ 提供詳細的【分步評分標準 (Marking Scheme)】。\n3. 提供下階段課堂複習的補救教學具體策略。`;
        
        setGeneratedPrompt(newPrompt);
    }, [aiLang, aiType, aiMcCount, aiLqCount, selectedExam, map, activeStudents]); 

    // 8. ★ 所有的 Hooks 都宣告完畢後，才可以進行 Early Return！
    if (!map) return (
        <div className="p-12 text-center text-slate-500 mt-10 animate-fadeIn">
            <Icon name="AlertCircle" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">此群組尚未有任何考試成績紀錄</h2>
            <p className="mt-2 text-sm">請先前往「考試成績輸入」為此群組的學生登錄成績。</p>
        </div>
    );

    const copyPrompt = () => {
        navigator.clipboard.writeText(generatedPrompt);
        alert('📋 AI 提示詞已複製！請直接貼到 ChatGPT 或 Claude 獲取完整教案。');
    };

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            {/* 標頭 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="PieChart" className="text-purple-600" /> 大考班級數據診斷報告
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">獨立分析 MC 誘答選項分佈與 LQ 長題目難點。</p>
                </div>
                <select 
                    className="p-2 border border-slate-300 rounded-lg font-bold bg-white focus:ring-2 focus:ring-purple-500 outline-none shadow-sm cursor-pointer"
                    value={selectedExam} 
                    onChange={(e) => setSelectedExam(e.target.value)}
                >
                    {/* ★ 改用 relevantMaps 渲染選項 */}
                    {Object.keys(relevantMaps).map(k => (
                        <option key={k} value={k}>{k} - {relevantMaps[k].title}</option>
                    ))}
                </select>
            </div>

            {/* 分頁籤切換器 */}
            <div className="flex gap-2 mb-6 bg-slate-100 p-1 rounded-lg w-fit">
                <button 
                    onClick={() => setAnalysisTab('MC')}
                    className={`px-6 py-2 rounded-md font-bold text-sm transition flex items-center gap-2 ${analysisTab === 'MC' ? 'bg-white text-purple-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                >
                    <Icon name="List" size={16} /> 多項選擇題 (MC) 深入分析
                </button>
                <button 
                    onClick={() => setAnalysisTab('LQ')}
                    className={`px-6 py-2 rounded-md font-bold text-sm transition flex items-center gap-2 ${analysisTab === 'LQ' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                >
                    <Icon name="Edit3" size={16} /> 長題目 (LQ) 難度排序
                </button>
            </div>

            {/* 數據看板核心區 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                
                {/* 1. 左側：題目難度與細部診斷 (根據 Tab 切換顯示) */}
                <div className="card p-5 border border-slate-200 shadow-sm flex flex-col h-[650px] bg-slate-50/50">
                    <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 border-b border-slate-200 pb-2 text-sm">
                        {analysisTab === 'MC' ? (
                            <><span className="p-1 bg-purple-100 text-purple-700 rounded"><Icon name="Target" size={15} /></span> 🎯 MC 所有題目難度與「選項分佈圖」</>
                        ) : (
                            <><span className="p-1 bg-blue-100 text-blue-700 rounded"><Icon name="AlertTriangle" size={15} /></span> 🚨 LQ 長題目失分難度排序</>
                        )}
                    </h3>
                    
                    <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                        {/* 顯示 MC 視圖 */}
                        {analysisTab === 'MC' && qStats.filter(q => q.type === 'MC').sort((a,b) => a.pValue - b.pValue).map(q => (
                            <div key={q.id} className="p-3 border border-slate-200 bg-white rounded-xl shadow-sm flex flex-col gap-2">
                                <div className="flex justify-between items-start">
                                    <div className="space-y-0.5">
                                        <div className="font-bold text-slate-800 text-sm">題號 {q.id} <span className="text-slate-400 font-normal text-xs ml-2">正確答案: {q.ans}</span></div>
                                        <p className="text-slate-500 text-xs line-clamp-2">知識點: {q.topicDesc}</p>
                                    </div>
                                    <span className={`px-2 py-0.5 font-bold rounded-full border shrink-0 text-[10px] ${q.badgeColor}`}>P: {q.pValue.toFixed(2)}</span>
                                </div>
                                
                                {/* MC 選項分佈橫條圖 */}
                                <div className="mt-1 pt-2 border-t border-slate-100 space-y-1.5">
                                    {['A', 'B', 'C', 'D'].map(opt => {
                                        const c = q.counts[opt] || 0;
                                        const total = q.studentCount;
                                        const pct = total > 0 ? Math.round((c / total) * 100) : 0;
                                        const isCorrect = opt === q.ans;
                                        const barColor = isCorrect ? 'bg-emerald-400' : 'bg-rose-300';
                                        const textColor = isCorrect ? 'text-emerald-700 font-bold' : 'text-slate-500';
                                        
                                        return (
                                            <div key={opt} className="flex items-center text-xs">
                                                <span className={`w-5 font-bold ${isCorrect ? 'text-emerald-600' : 'text-slate-400'}`}>{opt}</span>
                                                <div className="flex-1 h-3.5 bg-slate-100 rounded overflow-hidden flex shadow-inner">
                                                    <div className={`h-full ${barColor} transition-all duration-700`} style={{ width: `${pct}%` }}></div>
                                                </div>
                                                <span className={`w-14 text-right ${textColor}`}>{pct}% <span className="text-[10px] text-slate-400 opacity-60">({c})</span></span>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        ))}

                        {/* 顯示 LQ 視圖 */}
                        {analysisTab === 'LQ' && qStats.filter(q => q.type !== 'MC').sort((a,b) => a.pValue - b.pValue).map(q => (
                            <div key={q.id} className="p-3 border border-slate-200 bg-white rounded-xl shadow-sm flex justify-between items-start gap-4">
                                <div className="space-y-1">
                                    <div className="font-bold text-slate-800 text-sm">題號 {q.id} <span className="text-slate-400 font-normal text-xs ml-2">滿分: {q.max}分</span></div>
                                    <p className="text-slate-600 text-xs">知識點: {q.topicDesc}</p>
                                    <div className="text-[11px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded w-fit mt-1 font-medium">
                                        全班平均得分: {q.mean} / {q.max}
                                    </div>
                                </div>
                                <span className={`px-2 py-0.5 font-bold rounded-full border shrink-0 text-[10px] mt-1 ${q.badgeColor}`}>P: {q.pValue.toFixed(2)}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* 2. 右側：各知識點全班掌握度 (固定顯示，方便對照) */}
                <div className="card p-5 border border-slate-200 shadow-sm flex flex-col h-[650px]">
                    <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 border-b border-slate-200 pb-2 text-sm">
                        <span className="p-1 bg-emerald-100 text-emerald-700 rounded"><Icon name="BarChart3" size={15} /></span>
                        📚 各知識點物理課題掌握度 (全卷綜合)
                    </h3>
                    <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                        {sortedTopics.map(t => {
                            const pct = t.maxPossible > 0 ? (t.actualEarned / t.maxPossible) : 0;
                            const isWeak = pct < 0.50; 
                            return (
                                <div key={t.topicId} className="space-y-1.5">
                                    <div className="flex justify-between text-xs font-medium">
                                        <span className="text-slate-700 font-mono font-semibold">課題 {t.topicId} <span className="text-slate-400 font-sans font-normal ml-1">({t.topicName})</span></span>
                                        <span className={isWeak ? 'text-red-600 font-bold bg-red-50 px-1.5 rounded' : 'text-emerald-700 font-bold bg-emerald-50 px-1.5 rounded'}>{(pct*100).toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden shadow-inner">
                                        <div 
                                            className={`h-full transition-all duration-700 ${isWeak ? 'bg-gradient-to-r from-red-400 to-rose-500' : 'bg-gradient-to-r from-emerald-400 to-teal-500'}`}
                                            style={{ width: `${pct * 100}%` }}
                                        ></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

            </div>

            {/* 3. 全班試後檢討 AI 教案生成控制台 */}
            <div className="card p-5 border-2 border-purple-100 bg-gradient-to-r from-purple-50/40 to-white shadow-sm">
                <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2 text-purple-800 font-bold text-base">
                        <Icon name="Sparkles" className="text-purple-600 animate-pulse" />
                        <span>大考過卷檢討 AI 教案生成控制台</span>
                    </div>
                </div>
                
                <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-4">
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">輸出語言</label>
                        <select className="text-xs p-1 outline-none font-medium text-slate-700 bg-transparent" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                            <option>繁體中文</option>
                            <option>English</option>
                            <option>雙語 (Bilingual)</option>
                        </select>
                    </div>
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">教案題型</label>
                        <select className="text-xs p-1 outline-none font-medium text-slate-700 bg-transparent" value={aiType} onChange={e=>setAiType(e.target.value)}>
                            <option>MC+LQ</option>
                            <option>只限 多項選擇題 (MC)</option>
                            <option>只限 長題目 (LQ)</option>
                        </select>
                    </div>
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">衍生新 MC 數量</label>
                        <input type="number" className="text-xs p-1 outline-none font-bold text-purple-700 bg-transparent" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} min="0" max="20" />
                    </div>
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">衍生新 LQ 數量</label>
                        <input type="number" className="text-xs p-1 outline-none font-bold text-blue-700 bg-transparent" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} min="0" max="20" />
                    </div>
                </div>

                <div className="mb-4">
                    <label className="text-xs font-bold text-slate-700 mb-1 block flex justify-between">
                        <span>📝 AI Prompt 預覽與編輯框</span>
                        <span className="text-slate-400 font-normal">您可在此直接手動增減文字後再複製</span>
                    </label>
                    <textarea 
                        className="w-full h-64 p-3 text-xs font-mono bg-white border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none shadow-inner"
                        value={generatedPrompt}
                        onChange={(e) => setGeneratedPrompt(e.target.value)}
                    />
                </div>

                <button 
                    onClick={copyPrompt}
                    className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2.5 px-4 rounded-lg shadow flex items-center justify-center gap-2 transition text-sm"
                >
                    <Icon name="Copy" size={16} /> 複製以上 AI 提示詞
                </button>
            </div>
        </div>
    );
};
        
// ==================== 更新版：個人大考分析、跨卷進度（自動過濾有分試卷、移除多餘學群） ====================
const StudentExamAnalysisView = ({ activeStudents = [], examScores = {} }) => {
    // 狀態設定
    const [selectedExams, setSelectedExams] = React.useState([]);
    const [selectedStudentId, setSelectedStudentId] = React.useState('');

    // 左側課題追蹤的趨勢版塊切換狀態 ('down': 退步, 'up': 進步, 'stable': 平穩)
    const [trendTab, setTrendTab] = React.useState('down');

    // AI 參數設定狀態
    const [aiLang, setAiLang] = React.useState('雙語 (Bilingual)');
    const [aiMcCount, setAiMcCount] = React.useState('5'); 
    const [aiLqCount, setAiLqCount] = React.useState('3'); 
    const [generatedPrompt, setGeneratedPrompt] = React.useState('');

    // 🔥 智慧過濾 A：找出目前 Sidebar 傳進來的學生中，到底「哪些考卷」真正有成績
    const availableExams = React.useMemo(() => {
        const examsWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = examScores[student.id];
            if (studentScores) {
                // 檢查該學生的每一份試卷，確認裡面真的有分數記錄
                Object.keys(studentScores).forEach(examId => {
                    if (Object.keys(studentScores[examId]).length > 0) {
                        examsWithScores.add(examId);
                    }
                });
            }
        });
        
        // 確保考卷依照 EXAM_MAPS 定義的順序（時間先後）排列
        const allExamKeys = Object.keys(EXAM_MAPS || {});
        return Array.from(examsWithScores).sort((a, b) => allExamKeys.indexOf(a) - allExamKeys.indexOf(b));
    }, [activeStudents, examScores]);

    // 當可用考卷變更時（例如從 Sidebar 切換了群組），預設全選所有「有分數的考卷」
    const availableExamsStr = availableExams.join(',');
    React.useEffect(() => {
        setSelectedExams(availableExamsStr ? availableExamsStr.split(',') : []);
    }, [availableExamsStr]);

    const toggleExam = (examId) => {
        setSelectedExams(prev => 
            prev.includes(examId) ? prev.filter(id => id !== examId) : [...prev, examId]
        );
    };

    // 🔥 智慧過濾 B：根據已選的「試卷」，過濾出確實有這些試卷分數的「學生」
    const availableStudents = React.useMemo(() => {
        if (selectedExams.length === 0) return [];
        return (activeStudents || []).filter(s => {
            return selectedExams.some(examId => {
                return (examScores || {})[s.id] && (examScores || {})[s.id][examId] !== undefined;
            });
        });
    }, [selectedExams, activeStudents, examScores]);

    // 當學生名單改變時，自動鎖定名單內第一位同學
    React.useEffect(() => {
        if (availableStudents.length > 0) {
            if (!availableStudents.some(s => s.id === selectedStudentId)) {
                setSelectedStudentId(availableStudents[0].id);
            }
        } else {
            setSelectedStudentId('');
        }
    }, [availableStudents, selectedStudentId]);

    const getStudentQScore = (studentId, examId, q) => {
        const record = examScores[studentId]?.[examId];
        if (!record) return 0;
        const val = record[q.id];
        if (q.type === 'MC') {
            return (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) ? q.max : 0;
        }
        return val === '' || val === undefined ? 0 : parseFloat(val);
    };

    // 核心數據運算
    const topicStats = {};
    if (selectedStudentId && selectedExams.length > 0) {
        selectedExams.forEach(examId => {
            const map = EXAM_MAPS[examId];
            if (!map) return;
            
            map.questions.forEach(q => {
                if (!topicStats[q.topicId]) {
                    topicStats[q.topicId] = { 
                        topicId: q.topicId, 
                        topicName: SYLLABUS_TOPICS[q.topicId] || '未定義課題', 
                        totalMax: 0, 
                        totalEarned: 0,
                        examDetails: {},
                        descList: new Set()
                    };
                }
                
                if (!topicStats[q.topicId].examDetails[examId]) {
                    topicStats[q.topicId].examDetails[examId] = { max: 0, earned: 0 };
                }

                const score = getStudentQScore(selectedStudentId, examId, q);
                topicStats[q.topicId].totalMax += q.max;
                topicStats[q.topicId].totalEarned += score;
                topicStats[q.topicId].examDetails[examId].max += q.max;
                topicStats[q.topicId].examDetails[examId].earned += score;
                if (q.topicDesc) topicStats[q.topicId].descList.add(q.topicDesc);
            });
        });
    }

    // 將資料預先計算並分類趨勢
    const processedTopics = Object.values(topicStats).sort((a, b) => 
        a.topicId.localeCompare(b.topicId, undefined, { numeric: true, sensitivity: 'base' })
    ).map(t => {
        const descArray = Array.from(t.descList);
        const overallPct = t.totalMax > 0 ? (t.totalEarned / t.totalMax) : 0;
        
        // ★ 自動將使用者選擇的考卷，按時間順序 (EXAM_MAPS 的定義順序) 排序，確保進退步計算準確！
        const allExamKeys = Object.keys(EXAM_MAPS || {});
        const sortedSelectedExams = [...selectedExams].sort((a, b) => allExamKeys.indexOf(a) - allExamKeys.indexOf(b));

        // 取出該課題在各份卷的表現
        const examPcts = sortedSelectedExams.map(examId => {
            const details = t.examDetails[examId];
            if (!details || details.max === 0) return null;
            return { examId, pct: details.earned / details.max };
        }).filter(Boolean);

        // ★ 計算趨勢：永遠只取「有考該課題的最後兩次」做對比
        let trend = 'stable'; 
        if (examPcts.length >= 2) {
            const last = examPcts[examPcts.length - 1].pct;
            const prev = examPcts[examPcts.length - 2].pct;
            if (last - prev > 0.1) trend = 'up';
            else if (prev - last > 0.1) trend = 'down';
        }

        return { ...t, descArray, overallPct, examPcts, trend };
    });

    // 分流三個版塊的陣列
    const downTopics = processedTopics.filter(t => t.trend === 'down');
    const upTopics = processedTopics.filter(t => t.trend === 'up');
    const stableTopics = processedTopics.filter(t => t.trend === 'stable');

    // 依據目前點選的版塊決定要顯示的陣列
    const currentDisplayedTopics = 
        trendTab === 'down' ? downTopics : 
        trendTab === 'up' ? upTopics : stableTopics;

    // AI Prompt 生成邏輯
    React.useEffect(() => {
        if (!selectedStudentId) return;
        const studentName = (activeStudents || []).find(s => s.id === selectedStudentId)?.name || '該學生';
        
        const weakTopics = processedTopics.filter(t => t.overallPct < 0.5);
        const weakTopicsText = weakTopics.map(t => 
            `- 課題 [${t.topicId} ${t.topicName}]: 綜合得分率 ${(t.overallPct*100).toFixed(0)}%。曾考過的題型盲點包括: ${t.descArray.join('; ')}`
        ).join('\n');

        const newPrompt = `你是一位香港 DSE 物理科專屬導師。我的學生【${studentName}】在近期的物理考試中表現需要提升。以下是他在所選考試範圍內【掌握度低於 50%】的物理課題及對應的題型盲點，請為他度身訂造一份專屬補底練習。\n\n[基本設定]\n- 語言: ${aiLang}\n- 預期題型與數量:\n  * 多項選擇題 (MC)：${aiMcCount} 題\n  * 長題目 (LQ)：${aiLqCount} 題\n\n[學生薄弱課題與盲點描述]\n${weakTopicsText || '- 該學生目前無明顯弱項課題，請生成進階挑戰題。'}\n\n[生成要求]\n1. 針對上述薄弱課題，設計難度由淺入深、著重釐清核心觀念的練習題。\n2. MC 必須包含 4 個選項，並為錯誤選項附帶【陷阱分析】（指出為何學生容易選錯）；LQ 必須附帶詳細的【分步評分標準 (Marking Scheme)】。\n3. 請在開頭給予【${studentName}】一段鼓勵性的評語，並指出他在這些課題中最需要優先克服的思維盲區。`;
        
        setGeneratedPrompt(newPrompt);
    }, [aiLang, aiMcCount, aiLqCount, selectedStudentId, selectedExams, activeStudents, examScores]);

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            {/* 標頭與過濾器 */}
            <div className="flex flex-col gap-4 mb-6 border-b border-slate-200 pb-5">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="UserCheck" className="text-purple-600" /> 個人大考進度追蹤與專屬補底
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">追蹤學生在多份試卷中的進退步情況，並一鍵產出弱點補強練習。</p>
                </div>
                
                {/* 重新整理的頂部篩選器（移除群組，保留試卷與學生，自動橫排對齊） */}
                <div className="flex flex-col lg:flex-row gap-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div className="flex-[2]">
                        <label className="text-xs font-bold text-slate-700 mb-1.5 block flex justify-between">
                            <span>1. 選擇要納入分析的試卷 (僅顯示有成績記錄)</span>
                            <span className="text-purple-600 font-bold">{selectedExams.length} 份已選</span>
                        </label>
                        {availableExams.length === 0 ? (
                            <div className="text-xs text-red-500 font-medium py-2 px-1">目前所選群組尚無任何考試成績記錄。</div>
                        ) : (
                            <div className="flex flex-wrap gap-2">
                                {availableExams.map(examId => {
                                    const isSelected = selectedExams.includes(examId);
                                    return (
                                        <button 
                                            key={examId}
                                            onClick={() => toggleExam(examId)}
                                            className={`px-3 py-1.5 rounded-full text-xs font-bold border transition ${
                                                isSelected ? 'bg-purple-100 border-purple-400 text-purple-700 shadow-inner' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'
                                            }`}
                                        >
                                            {isSelected && <Icon name="Check" size={12} className="inline mr-1" />}
                                            {examId}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    
                    <div className="flex-1">
                        <label className="text-xs font-bold text-slate-700 mb-1.5 block">2. 選擇學生</label>
                        <select 
                            value={selectedStudentId}
                            onChange={(e) => { setSelectedStudentId(e.target.value); }}
                            disabled={availableStudents.length === 0}
                            className="w-full p-2.5 border border-slate-300 rounded-lg bg-white font-semibold outline-none focus:ring-2 focus:ring-purple-400 disabled:opacity-50"
                        >
                            {availableStudents.length === 0 ? (
                                <option value="">無符合條件的學生</option>
                            ) : (
                                availableStudents.map(s => (
                                    <option key={s.id} value={s.id}>{s.class} ({s.num}) {s.name}</option>
                                ))
                            )}
                        </select>
                    </div>
                </div>
            </div>

            {/* 下方內容 */}
            {!selectedStudentId ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed rounded-xl">
                    <Icon name="User" size={48} className="mx-auto mb-3 opacity-40 text-purple-300" />
                    <p className="text-sm font-medium text-slate-500">請先從上方選擇一位學生以檢視其個人分析報告</p>
                </div>
            ) : selectedExams.length === 0 ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed rounded-xl">
                    <Icon name="Layers" size={48} className="mx-auto mb-3 opacity-40 text-amber-300" />
                    <p className="text-sm font-medium text-slate-500">請至少勾選一份試卷來進行分析</p>
                </div>
            ) : (
                <div className="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-6">
                    
                    {/* 左側：綜合課題掌握度（分為 3 個切換版塊） */}
                    <div className="lg:col-span-3 card p-5 border border-slate-200 shadow-sm flex flex-col h-[700px] rounded-xl bg-white">
                        <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2 border-b border-slate-100 pb-2 text-sm">
                            <span className="p-1 bg-blue-100 text-blue-700 rounded"><Icon name="TrendingUp" size={15} /></span>
                            課題表現與跨卷趨勢分類
                        </h3>

                        {/* 內部 3 大趨勢切換版塊按鈕 */}
                        <div className="grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-lg mb-4 text-xs font-bold">
                            <button 
                                onClick={() => setTrendTab('down')}
                                className={`py-2 rounded-md transition flex items-center justify-center gap-1.5 ${trendTab === 'down' ? 'bg-red-500 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                <span>🚨 退步關注</span>
                                <span className={`px-1.5 py-0.2 text-[10px] rounded-full ${trendTab === 'down' ? 'bg-white text-red-600' : 'bg-red-100 text-red-700'}`}>{downTopics.length}</span>
                            </button>
                            <button 
                                onClick={() => setTrendTab('up')}
                                className={`py-2 rounded-md transition flex items-center justify-center gap-1.5 ${trendTab === 'up' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                <span>🎉 看到進步</span>
                                <span className={`px-1.5 py-0.2 text-[10px] rounded-full ${trendTab === 'up' ? 'bg-white text-emerald-600' : 'bg-emerald-100 text-emerald-700'}`}>{upTopics.length}</span>
                            </button>
                            <button 
                                onClick={() => setTrendTab('stable')}
                                className={`py-2 rounded-md transition flex items-center justify-center gap-1.5 ${trendTab === 'stable' ? 'bg-slate-600 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                <span>➖ 表現平穩</span>
                                <span className={`px-1.5 py-0.2 text-[10px] rounded-full ${trendTab === 'stable' ? 'bg-white text-slate-700' : 'bg-slate-200 text-slate-700'}`}>{stableTopics.length}</span>
                            </button>
                        </div>
                        
                        {/* 課題動態列表 */}
                        <div className="flex-1 overflow-y-auto space-y-3.5 pr-2">
                            {currentDisplayedTopics.length === 0 ? (
                                <div className="text-center py-20 text-slate-400 text-xs border border-dashed rounded-xl bg-slate-50/50">
                                    <Icon name="Inbox" size={32} className="mx-auto mb-2 opacity-30" />
                                    目前版塊下無對應課題
                                </div>
                            ) : (
                                currentDisplayedTopics.map(t => {
                                    const isWeak = t.overallPct < 0.50; 
                                    let trendBadge = null;
                                    if (t.trend === 'up') trendBadge = <span className="text-emerald-600 font-bold text-[10px] bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">⬆️ 進步</span>;
                                    if (t.trend === 'down') trendBadge = <span className="text-red-600 font-bold text-[10px] bg-red-50 border border-red-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">🚨 退步</span>;
                                    if (t.trend === 'stable') trendBadge = <span className="text-slate-500 font-bold text-[10px] bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">➖ 平穩</span>;

                                    return (
                                        <div key={t.topicId} className={`p-3 border rounded-xl transition ${isWeak ? 'bg-red-50/20 border-red-100' : 'bg-white border-slate-200 shadow-sm'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <span className="text-slate-800 font-mono font-bold text-xs bg-slate-100 px-1.5 py-0.5 rounded mr-1.5">課題 {t.topicId}</span>
                                                    <span className="text-slate-700 text-xs font-semibold">{t.topicName}</span>
                                                </div>
                                                <div className="flex items-center gap-2 shrink-0">
                                                    {trendBadge}
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${isWeak ? 'bg-red-100 border-red-200 text-red-700' : 'bg-emerald-100 border-emerald-200 text-emerald-700'}`}>
                                                        綜合: {(t.overallPct*100).toFixed(0)}%
                                                    </span>
                                                </div>
                                            </div>
                                            
                                            {/* 跨卷歷程 */}
                                            <div className="flex flex-wrap gap-1.5 mt-2">
                                                {t.examPcts.map((ep) => (
                                                    <div key={ep.examId} className="flex items-center text-[10px] bg-white border border-slate-200 rounded overflow-hidden shadow-inner">
                                                        <span className="bg-slate-50 text-slate-500 px-1.5 py-0.5 border-r border-slate-100 font-mono text-[9px]">{ep.examId}</span>
                                                        <span className={`px-1.5 py-0.5 font-bold ${ep.pct < 0.5 ? 'text-red-500' : 'text-emerald-600'}`}>{(ep.pct*100).toFixed(0)}%</span>
                                                    </div>
                                                ))}
                                            </div>
                                            
                                            <p className="text-[10px] text-slate-400 mt-2 line-clamp-1 border-t border-slate-100 pt-1.5">
                                                🔍 歷史考點盲區：{t.descArray.join(' ; ')}
                                            </p>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

                    {/* 右側：專屬 AI 補底練習工廠 */}
                    <div className="lg:col-span-2 card p-5 border-2 border-purple-100 bg-gradient-to-br from-purple-50/50 to-white shadow-sm flex flex-col h-[700px] rounded-xl">
                        <div className="flex items-center gap-2 text-purple-800 font-bold text-base mb-2">
                            <Icon name="Cpu" className="text-purple-600" />
                            <span>針對性弱點補強 Prompt 生成</span>
                        </div>
                        <p className="text-xs text-slate-500 mb-4 leading-relaxed">
                            系統已自動整合該學生在所選試卷中，所有<strong className="text-red-500">掌握度低於 50%</strong>的課題與歷史盲點（不受左側版塊切換影響）。
                        </p>
                        
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">輸出語言</label>
                                <select className="text-xs p-1 outline-none font-bold text-slate-700 bg-transparent" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                                    <option>繁體中文</option>
                                    <option>English</option>
                                </select>
                            </div>
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">MC / LQ 題數</label>
                                <div className="flex items-center gap-1 text-xs px-1">
                                    MC:<input type="number" className="w-10 outline-none font-bold text-purple-700 border-b text-center mx-1 bg-transparent" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} min="0" max="20" />
                                    LQ:<input type="number" className="w-10 outline-none font-bold text-blue-700 border-b text-center mx-1 bg-transparent" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} min="0" max="20" />
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col mb-4">
                            <label className="text-xs font-bold text-slate-700 mb-1 flex justify-between">
                                <span>📝 專屬 Prompt 預覽</span>
                            </label>
                            <textarea 
                                className="flex-1 w-full p-3 text-[11px] font-mono bg-white border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none shadow-inner resize-none leading-relaxed"
                                value={generatedPrompt}
                                onChange={(e) => setGeneratedPrompt(e.target.value)}
                            />
                        </div>

                        <button 
                            onClick={() => { navigator.clipboard.writeText(generatedPrompt); alert('📋 學生專屬 AI 提示詞已複製！'); }}
                            className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition text-sm"
                        >
                            <Icon name="Copy" size={16} /> 複製專屬補底 Prompt
                        </button>
                    </div>

                </div>
            )}
        </div>
    );
};
// ==================== 更新版：以「學生為主體」的專屬補底練習 (含進度條與排序) ====================
const RemedialPracticeView = ({ activeStudents, examScores, remediationProgress, setRemediationProgress, syncToCloud }) => {
    // 狀態管理
    const [selectedExam, setSelectedExam] = React.useState('');
    const [aiLang, setAiLang] = React.useState('雙語 (Bilingual)');
    const [aiMcCount, setAiMcCount] = React.useState('10'); 
    const [aiLqCount, setAiLqCount] = React.useState('0'); 
    const [generatedPrompt, setGeneratedPrompt] = React.useState('');

    // ★ 學生記憶功能
    const [selectedStudentIds, setSelectedStudentIds] = React.useState(() => {
        try {
            const saved = localStorage.getItem('dse_physics_remedial_students');
            return saved ? JSON.parse(saved) : [];
        } catch (e) {
            return [];
        }
    });

    React.useEffect(() => {
        localStorage.setItem('dse_physics_remedial_students', JSON.stringify(selectedStudentIds));
    }, [selectedStudentIds]);

    // ★ 新增：學生排序模式 ('score' 依分數由低至高 | 'class' 依班級學號)
    const [sortMode, setSortMode] = React.useState('score');

    // ★ 新增：目前正在為哪一位學生出題 (保證一次只能為一位學生勾選課題)
    const [activePromptStudent, setActivePromptStudent] = React.useState(null);
    const [selectedTopicsForPrompt, setSelectedTopicsForPrompt] = React.useState([]);

    // 過濾可用試卷
    const availableExams = React.useMemo(() => {
        const examsWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = examScores[student.id];
            if (studentScores) {
                Object.keys(studentScores).forEach(examId => {
                    if (Object.keys(studentScores[examId]).length > 0) examsWithScores.add(examId);
                });
            }
        });
        const allExamKeys = Object.keys(EXAM_MAPS || {});
        return Array.from(examsWithScores).sort((a, b) => allExamKeys.indexOf(a) - allExamKeys.indexOf(b));
    }, [activeStudents, examScores]);

    React.useEffect(() => {
        if (availableExams.length > 0 && !availableExams.includes(selectedExam)) {
            setSelectedExam(availableExams[0]);
        }
    }, [availableExams, selectedExam]);

    // 切換試卷時清空出題狀態
    React.useEffect(() => {
        setActivePromptStudent(null);
        setSelectedTopicsForPrompt([]);
    }, [selectedExam]);

    const map = EXAM_MAPS[selectedExam];

    // 取得該生在本卷的單題得分
    const getStudentQScore = React.useCallback((studentId, q) => {
        const record = examScores[studentId]?.[selectedExam];
        if (!record) return 0;
        const val = record[q.id];
        if (q.type === 'MC') return (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) ? q.max : 0;
        return val === '' || val === undefined ? 0 : parseFloat(val);
    }, [examScores, selectedExam]);

    // 取得該生總分
    const getStudentTotalScore = React.useCallback((studentId) => {
        if (!map) return 0;
        let total = 0;
        map.questions.forEach(q => total += getStudentQScore(studentId, q));
        return total;
    }, [map, getStudentQScore]);

    // ★ 排序全體學生 (用於選擇器)
    const sortedActiveStudents = React.useMemo(() => {
        return [...activeStudents].sort((a, b) => {
            if (sortMode === 'score') {
                return getStudentTotalScore(a.id) - getStudentTotalScore(b.id); // 分數由低到高
            } else {
                const classCompare = a.class.localeCompare(b.class);
                if (classCompare !== 0) return classCompare;
                return parseInt(a.num) - parseInt(b.num);
            }
        });
    }, [activeStudents, sortMode, getStudentTotalScore]);

    // 切換學生點名
    const toggleStudentSelection = (studentId) => {
        setSelectedStudentIds(prev => {
            const newSel = prev.includes(studentId) ? prev.filter(id => id !== studentId) : [...prev, studentId];
            if (activePromptStudent === studentId) {
                setActivePromptStudent(null);
                setSelectedTopicsForPrompt([]);
            }
            return newSel;
        });
    };

    // ★ 處理課題勾選：確保一次只能選一位學生的課題
    const handleTopicToggle = (studentId, topicId) => {
        if (activePromptStudent !== studentId) {
            // 如果點擊了另一位學生的課題，自動切換目標學生，並重新開始勾選
            setActivePromptStudent(studentId);
            setSelectedTopicsForPrompt([topicId]);
        } else {
            // 同一位學生，進行多選/取消
            setSelectedTopicsForPrompt(prev => 
                prev.includes(topicId) ? prev.filter(id => id !== topicId) : [...prev, topicId]
            );
        }
    };

    // 點擊複製並記錄
    const handleCopyAndRecord = () => {
        if (!activePromptStudent || selectedTopicsForPrompt.length === 0) {
            alert('⚠️ 請先點擊至少一位學生的課題！');
            return;
        }
        
        navigator.clipboard.writeText(generatedPrompt);
        
        setRemediationProgress(prev => {
            const updated = { ...prev };
            if (!updated[activePromptStudent]) updated[activePromptStudent] = {};
            if (!updated[activePromptStudent][selectedExam]) updated[activePromptStudent][selectedExam] = {};
            
            selectedTopicsForPrompt.forEach(tid => {
                updated[activePromptStudent][selectedExam][tid] = true;
            });
            return updated;
        });

        setTimeout(() => syncToCloud(), 300);
        setSelectedTopicsForPrompt([]); // 複製完清空勾選
        alert(`📋 Prompt 已複製！系統已將 ${selectedTopicsForPrompt.length} 個課題標記為「✅ 已記錄」並同步。`);
    };

    // ★ 預先計算被選學生的弱勢課題與進度
    const studentRemedialData = React.useMemo(() => {
        if (!map || selectedStudentIds.length === 0) return [];
        
        // 依照 sortedActiveStudents 的順序來排列已選學生
        const orderedSelectedStudents = sortedActiveStudents.filter(s => selectedStudentIds.includes(s.id));
        
        return orderedSelectedStudents.map(student => {
            const sTopicStats = {};
            let totalMax = 0;

            map.questions.forEach(q => {
                const score = getStudentQScore(student.id, q);
                totalMax += q.max;
                if (!sTopicStats[q.topicId]) {
                    sTopicStats[q.topicId] = { topicId: q.topicId, max: 0, earned: 0, descList: new Set() };
                }
                sTopicStats[q.topicId].max += q.max;
                sTopicStats[q.topicId].earned += score;
                if (q.topicDesc) sTopicStats[q.topicId].descList.add(q.topicDesc);
            });

            // 篩選出該學生的弱項 (<= 50%)
            const weakTopics = Object.values(sTopicStats)
                .filter(t => t.max > 0 && (t.earned / t.max) <= 0.5)
                .sort((a, b) => a.topicId.localeCompare(b.topicId, undefined, { numeric: true, sensitivity: 'base' }))
                .map(t => ({
                    ...t,
                    pct: t.earned / t.max,
                    descArray: Array.from(t.descList),
                    isRecorded: remediationProgress[student.id]?.[selectedExam]?.[t.topicId] || false
                }));

            const completedCount = weakTopics.filter(t => t.isRecorded).length;
            const totalWeakCount = weakTopics.length;
            const progressPct = totalWeakCount === 0 ? 100 : Math.round((completedCount / totalWeakCount) * 100);

            return {
                ...student,
                examScore: getStudentTotalScore(student.id),
                examMax: totalMax,
                weakTopics,
                completedCount,
                totalWeakCount,
                progressPct
            };
        });
    }, [map, selectedStudentIds, sortedActiveStudents, getStudentQScore, getStudentTotalScore, remediationProgress, selectedExam]);

    // 動態生成 Prompt
    React.useEffect(() => {
        if (!activePromptStudent || selectedTopicsForPrompt.length === 0) {
            setGeneratedPrompt('👈 請在左側清單點選【某一位學生】的課題，以生成專屬他的溫習 Prompt。');
            return;
        }
        
        const targetData = studentRemedialData.find(s => s.id === activePromptStudent);
        if (!targetData) return;

        const selectedWeakTopics = targetData.weakTopics.filter(t => selectedTopicsForPrompt.includes(t.topicId));
        const weakTopicsText = selectedWeakTopics.map(t => 
            `- 課題 [${t.topicId} ${SYLLABUS_TOPICS[t.topicId] || ''}]: 曾做錯的題型盲點: ${t.descArray.join('; ')}`
        ).join('\n');

        const newPrompt = `你是一位極具耐心的香港 DSE 物理科導師。我的學生【${targetData.name}】正在進行大考後的補救教學。以下是他【本次需要進行補底】的物理課題及歷史錯誤盲點，請為他度身訂造一份分段式專屬補底練習。\n\n[基本設定]\n- 語言: ${aiLang}\n- 預期題型與數量:\n  * 多項選擇題 (MC)：${aiMcCount} 題\n  * 長題目 (LQ)：${aiLqCount} 題\n\n[本次目標補底課題與盲點描述]\n${weakTopicsText}\n\n[生成要求]\n1. 針對上述列出的目標課題，設計難度由淺入深、著重釐清核心物理觀念的練習題。\n2. MC 必須包含 4 個選項，並為錯誤選項附帶【陷阱分析】；LQ (如有) 必須附帶詳細的【分步思維導引 (Scaffolding Tips)】與【評分標準】。\n3. 請在開頭給予【${targetData.name}】一段鼓勵，讓他有信心克服這些難關。`;
        
        setGeneratedPrompt(newPrompt);
    }, [aiLang, aiMcCount, aiLqCount, activePromptStudent, selectedTopicsForPrompt, studentRemedialData]);

    if (!map && availableExams.length === 0) return (
        <div className="p-12 text-center text-slate-500 mt-10">
            <Icon name="AlertCircle" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">目前群組無任何考試成績記錄</h2>
        </div>
    );

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="UserCheck" className="text-purple-600" /> 個人化補底進度與出題
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">選取學生後，獨立管理每位學生的補底進度，並橫向勾選課題進行專屬出題。</p>
                </div>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <div className="flex flex-col gap-1.5 h-56">
                    <label className="text-xs font-bold text-slate-700">1. 選擇試卷</label>
                    <select 
                        value={selectedExam}
                        onChange={(e) => setSelectedExam(e.target.value)}
                        className="p-2.5 border border-slate-300 rounded-lg bg-white font-semibold outline-none focus:ring-2 focus:ring-purple-400"
                    >
                        {availableExams.length === 0 ? <option value="">無符合條件的試卷</option> : availableExams.map(k => <option key={k} value={k}>{k} - {EXAM_MAPS[k]?.title}</option>)}
                    </select>
                </div>
                
                <div className="flex flex-col gap-1.5 h-56">
                    <div className="flex justify-between items-end pb-1 border-b border-slate-200">
                        <label className="text-xs font-bold text-slate-700 flex items-center gap-1">
                            2. 選擇出席學生
