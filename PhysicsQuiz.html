                                                    <div className="flex justify-between items-start mb-2">
                                                        <h4 className="font-bold text-slate-700 truncate max-w-[140px]">{hw.title || hw.id}</h4>
                                                        <div className="flex flex-col items-end gap-1">
                                                            {hw.status === 'completed' && <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">已改正</span>}
                                                            {hw.status === 'needsCorrection' && <span className="text-[9px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold">未改正</span>}
                                                            {hw.status === 'missing' && <span className="text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold">欠交</span>}

                                                    {/* 分數與走勢定位列 */}
                                                    <div className="flex justify-between items-center bg-white border border-slate-100 p-2 rounded-lg mb-3">
                                                        <div>
                                                            <span className="text-[10px] text-slate-400 block font-medium">實際分數</span>
                                                            <span className="text-sm font-black text-slate-700">{hw.score || '無資料'}</span>
                                                        </div>
                                                        {hw.score && hw.status !== 'missing' && (
                                                            <div className="text-right">
                                                                <span className="text-[10px] text-slate-400 block font-medium">表現定位</span>
                                                                {pct >= 0.85 && <span className="text-[10px] text-emerald-600 font-bold flex items-center gap-0.5">🌟 表現卓越</span>}
                                                                {pct >= 0.70 && pct < 0.85 && <span className="text-[10px] text-indigo-600 font-bold flex items-center gap-0.5">📈 進度平穩</span>}
                                                                {pct >= 0.50 && pct < 0.70 && <span className="text-[10px] text-amber-600 font-bold flex items-center gap-0.5">⚖️ 合格邊緣</span>}
                                                                {pct < 0.50 && <span className="text-[10px] text-red-500 font-bold flex items-center gap-0.5">🚨 需加強急救</span>}
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    {/* 功課弱點顯示 */}
                                                    {hw.weaknesses && hw.weaknesses.length > 0 && (
                                                        <div className="mb-3">
                                                            <span className="text-[10px] font-bold text-red-500 mb-1 block">⚠️ 需加強 (&le; 50%)：</span>
                                                            <ul className="text-[10px] text-slate-600 list-disc pl-4 space-y-0.5">
                                                                {hw.weaknesses.slice(0, 3).map((w, i) => <li key={i} className="truncate" title={w}>{w}</li>)}
                                                                {hw.weaknesses.length > 3 && <li>...及其他 {hw.weaknesses.length - 3} 項</li>}
                                                            </ul>
                                                        </div>
                                                    )}
                                                </div>
                                                
                                                {(hw.status === 'needsCorrection' || hw.status === 'missing') && (
                                                    <button 
                                                        onClick={() => handleAskGemini(hw.title || hw.id, '日常功課', hw.weaknesses)}
                                                        className="mt-2 flex items-center justify-center gap-1 w-full py-1.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 hover:border-indigo-300 rounded-lg text-xs font-bold transition-all shadow-sm"
                                                    >
                                                        ✨ AI 互動式小測驗
                                                    </button>
                                                )}
                                            </div>
                                        )})}
                                    </div>
                                </section>

                                {/* 2. 課堂小測區塊 */}
                                <section>
                                    <h3 className="font-bold text-lg text-slate-700 border-b pb-2 mb-4 flex items-center gap-2">
                                        <Icon name="CheckSquare" size={18} className="text-amber-500" /> 課堂小測
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {(!scores || !scores[studentId] || Object.keys(scores[studentId]).length === 0) ? (
                                            <p className="text-sm text-slate-400">尚無小測紀錄</p>
                                        ) : (
                                            Object.keys(scores[studentId]).map(quizId => {
                                                const quizMap = typeof QUIZ_MAPS !== 'undefined' ? QUIZ_MAPS[quizId] : {};
                                                const quizRecord = scores[studentId][quizId];
                                                
                                                // ★ 使用新版函式，同時獲取分數與弱點數據
                                                const quizData = getAssessmentData(quizRecord, quizMap);
                                                
                                                return (
                                                <div key={quizId} className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col justify-between hover:border-indigo-200 transition-colors shadow-sm">
                                                    <div>
                                                        <div className="flex justify-between items-start mb-2">
                                                            <h4 className="font-bold text-slate-700 truncate max-w-[150px]">{quizMap?.title || quizId}</h4>
                                                            <span className="text-[9px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">已紀錄</span>
                                                        </div>
                                                        
                                                        {/* 分數與走勢定位列 */}
                                                        <div className="flex justify-between items-center bg-white border border-slate-100 p-2 rounded-lg mb-3">
                                                            <div>
                                                                <span className="text-[10px] text-slate-400 block font-medium">小測分數</span>
                                                                <span className="text-sm font-black text-slate-700">{quizData.scoreStr}</span>
                                                            </div>
                                                            <div className="text-right">
                                                                <span className="text-[10px] text-slate-400 block font-medium">表現定位</span>
                                                                {quizData.pct >= 0.85 && <span className="text-[10px] text-emerald-600 font-bold">🌟 表現卓越</span>}
                                                                {quizData.pct >= 0.70 && quizData.pct < 0.85 && <span className="text-[10px] text-indigo-600 font-bold">📈 進度平穩</span>}
                                                                {quizData.pct >= 0.50 && quizData.pct < 0.70 && <span className="text-[10px] text-amber-600 font-bold">⚖️ 合格邊緣</span>}
                                                                {quizData.pct < 0.50 && <span className="text-[10px] text-red-500 font-bold">🚨 需加強急救</span>}
                                                            </div>
                                                        </div>
                                                        
                                                        {/* 小測弱點顯示 */}
                                                        {quizData.weaknesses.length > 0 && (
                                                            <div className="mb-3">
                                                                <span className="text-[10px] font-bold text-red-500 mb-1 block">⚠️ 需加強 (&le; 50%)：</span>
                                                                <ul className="text-[10px] text-slate-600 list-disc pl-4 space-y-0.5">
                                                                    {quizData.weaknesses.slice(0, 3).map((w, i) => <li key={i} className="truncate" title={w}>{w}</li>)}
                                                                    {quizData.weaknesses.length > 3 && <li>...及其他 {quizData.weaknesses.length - 3} 項</li>}
                                                                </ul>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <button 
                                                        onClick={() => handleAskGemini(quizMap?.title || quizId, '課堂小測', quizData.weaknesses)}
                                                        className="mt-2 flex items-center justify-center gap-1 w-full py-1.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 hover:border-indigo-300 rounded-lg text-xs font-bold transition-all shadow-sm"
                                                    >
                                                        ✨ AI 互動式小測驗
                                                    </button>
                                                </div>
                                            )
                                            })
                                        )}
                                    </div>
                                </section>

                                {/* 3. 校內考試區塊 */}
                                <section>
                                    <h3 className="font-bold text-lg text-slate-700 border-b pb-2 mb-4 flex items-center gap-2">
                                        <Icon name="Award" size={18} className="text-purple-500" /> 校內考試
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {(!examScores || !examScores[studentId] || Object.keys(examScores[studentId]).length === 0) ? (
                                            <p className="text-sm text-slate-400">尚無考試紀錄</p>
                                        ) : (
                                            Object.keys(examScores[studentId]).map(examId => {
                                                const examMap = typeof EXAM_MAPS !== 'undefined' ? EXAM_MAPS[examId] : {};
                                                const examRecord = examScores[studentId][examId];
                                                
                                                // ★ 使用新版函式，同時獲取分數與弱點數據
                                                const examData = getAssessmentData(examRecord, examMap);

                                                return (
                                                <div key={examId} className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col justify-between hover:border-indigo-200 transition-colors shadow-sm">
                                                    <div>
                                                        <div className="flex justify-between items-start mb-2">
                                                            <h4 className="font-bold text-slate-700 truncate max-w-[150px]">{examMap?.title || examId}</h4>
                                                            <span className="text-[9px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded font-bold">已紀錄</span>
                                                        </div>

                                                        {/* 分數與走勢定位列 */}
                                                        <div className="flex justify-between items-center bg-white border border-slate-100 p-2 rounded-lg mb-3">
                                                            <div>
                                                                <span className="text-[10px] text-slate-400 block font-medium">考試分數</span>
                                                                <span className="text-sm font-black text-slate-700">{examData.scoreStr}</span>
                                                            </div>
                                                            <div className="text-right">
                                                                <span className="text-[10px] text-slate-400 block font-medium">表現定位</span>
                                                                {examData.pct >= 0.85 && <span className="text-[10px] text-emerald-600 font-bold">🌟 表現卓越</span>}
                                                                {examData.pct >= 0.70 && examData.pct < 0.85 && <span className="text-[10px] text-indigo-600 font-bold">📈 進度平穩</span>}
                                                                {examData.pct >= 0.50 && examData.pct < 0.70 && <span className="text-[10px] text-amber-600 font-bold">⚖️ 合格邊緣</span>}
                                                                {examData.pct < 0.50 && <span className="text-[10px] text-red-500 font-bold">🚨 需加強急救</span>}
                                                            </div>
                                                        </div>

                                                        {/* 考試弱點顯示 */}
                                                        {examData.weaknesses.length > 0 && (
                                                            <div className="mb-3">
                                                                <span className="text-[10px] font-bold text-red-500 mb-1 block">⚠️ 需加強 (&le; 50%)：</span>
                                                                <ul className="text-[10px] text-slate-600 list-disc pl-4 space-y-0.5">
                                                                    {examData.weaknesses.slice(0, 3).map((w, i) => <li key={i} className="truncate" title={w}>{w}</li>)}
                                                                    {examData.weaknesses.length > 3 && <li>...及其他 {examData.weaknesses.length - 3} 項</li>}
                                                                </ul>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <button 
                                                        onClick={() => handleAskGemini(examMap?.title || examId, '校內考試', examData.weaknesses)}
                                                        className="mt-2 flex items-center justify-center gap-1 w-full py-1.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 hover:border-indigo-300 rounded-lg text-xs font-bold transition-all shadow-sm"
                                                    >
                                                        ✨ AI 互動式小測驗
                                                    </button>
                                                </div>
                                            )
                                            })
                                        )}
                                    </div>
                                </section>
                                
                            </div>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
};
        
const App = () => {
            // ★ 1. 偵測網址是否有帶入學生 ID (例如: ?sid=S5A-26)
            const urlParams = new URLSearchParams(window.location.search);
            const studentSid = urlParams.get('sid');
            // ★ 將這裡換成你剛剛複製的 Google Apps Script 網址 ★
            const API_URL = 'https://script.google.com/macros/s/AKfycbz1DKuoBED9iaxYRzctOqfpZhLEtJJScjPyqujHWAPoZjHHpX_3z2T0iqtqob3am9WeuQ/exec';

            const [view, setView] = React.useState('students');
            const [students, setStudents] = React.useState([]);
            const [scores, setScores] = React.useState({});
            const [examScores, setExamScores] = React.useState({});
            const [homeworkScores, setHomeworkScores] = React.useState({});
            const [homeworkMaps, setHomeworkMaps] = React.useState({});
            
            // ★ 新增：Pastpaper 成績狀態
            const [pastpaperScores, setPastpaperScores] = React.useState({});

            const [isLoading, setIsLoading] = React.useState(true);
            const [isSaving, setIsSaving] = React.useState(false);
            const [remediationProgress, setRemediationProgress] = React.useState({});

            // 自動從現有學生名單中抓取所有不重複的群組名稱 (加入防護罩)
            const allCohorts = ['所有學生', ...new Set((students || []).map(s => s.cohort || '2024-2027'))];
            
            // 從老師的瀏覽器記憶中讀取上次選的群組，預設為 '所有學生'
            const [currentCohort, setCurrentCohort] = React.useState(localStorage.getItem('saved_cohort') || '所有學生');
            
            // 當老師切換群組時，自動記在瀏覽器裡 (下次打開不用重選)
            React.useEffect(() => {
                localStorage.setItem('saved_cohort', currentCohort);
            }, [currentCohort]);

            // ⚠️ 核心過濾器：依照選擇的群組，過濾出「當前作用中」的學生名單 (加入防護罩)
            const activeStudents = currentCohort === '所有學生' 
                ? (students || [])
                : (students || []).filter(s => (s.cohort || '2024-2027') === currentCohort);
    
            // 1. 初次載入時，從 Google 雲端讀取資料
            React.useEffect(() => {
                fetch(API_URL)
                    .then(res => res.json())
                    .then(data => {
                        // ★ 安全賦值：確保大綱與測驗藍圖就算空白，也一定會建立變數，防範系統崩潰
                        window.SYLLABUS_TOPICS = data.syllabus || {};
                        window.QUIZ_MAPS = data.quizMaps || {};
                        window.EXAM_MAPS = data.examMaps || {};
                        window.PASTPAPER_MAPS = data.pastpaperMaps || {};
                        
                        // 如果原本有宣告 let 變數就覆寫，如果沒有就存入 window 安全區
                        if (typeof SYLLABUS_TOPICS !== 'undefined') SYLLABUS_TOPICS = window.SYLLABUS_TOPICS;
                        if (typeof QUIZ_MAPS !== 'undefined') QUIZ_MAPS = window.QUIZ_MAPS;
                        if (typeof EXAM_MAPS !== 'undefined') EXAM_MAPS = window.EXAM_MAPS;
                        if (typeof PASTPAPER_MAPS !== 'undefined') PASTPAPER_MAPS = window.PASTPAPER_MAPS;
                        
                        setStudents(Array.isArray(data.students) ? data.students : []);
                        setScores((typeof data.scores === 'object' && data.scores !== null) ? data.scores : {});
                        setExamScores((typeof data.examScores === 'object' && data.examScores !== null) ? data.examScores : {});
                        setRemediationProgress((typeof data.remediationProgress === 'object' && data.remediationProgress !== null) ? data.remediationProgress : {});
                        
                        setHomeworkMaps((typeof data.homeworkMaps === 'object' && data.homeworkMaps !== null) ? data.homeworkMaps : {}); 
                        setHomeworkScores((typeof data.homeworkScores === 'object' && data.homeworkScores !== null) ? data.homeworkScores : {});
                        
                        // ★ 載入 Pastpaper 儲存成績
                        setPastpaperScores((typeof data.pastpaperScores === 'object' && data.pastpaperScores !== null) ? data.pastpaperScores : {});
                        
                        setIsLoading(false);
                    })
                    .catch(err => { 
                        console.error("讀取失敗:", err); 
                        setIsLoading(false); 
                    });
            }, []);

            // ★ 終極修復：加入 Try-Catch 與絕對安全的打包機制
            const syncToCloud = (overrideData = {}) => {
                setIsSaving(true);
                
                try {
                    // 絕對安全的讀取方式，保證不會因為變數遺失而觸發當機
                    const safeSyllabus = typeof SYLLABUS_TOPICS !== 'undefined' ? SYLLABUS_TOPICS : (window.SYLLABUS_TOPICS || {});
                    const safeQuizMaps = typeof QUIZ_MAPS !== 'undefined' ? QUIZ_MAPS : (window.QUIZ_MAPS || {});
                    const safeExamMaps = typeof EXAM_MAPS !== 'undefined' ? EXAM_MAPS : (window.EXAM_MAPS || {});
                    const safePastpaperMaps = typeof PASTPAPER_MAPS !== 'undefined' ? PASTPAPER_MAPS : (window.PASTPAPER_MAPS || {});

                    const payload = { 
                        students: students, 
                        scores: scores,
                        syllabus: safeSyllabus,
                        quizMaps: safeQuizMaps,
                        examScores: examScores,
                        examMaps: safeExamMaps,
                        remediationProgress: remediationProgress,
                        homeworkMaps: homeworkMaps,      
                        homeworkScores: homeworkScores,  
                        pastpaperMaps: safePastpaperMaps, 
                        pastpaperScores: pastpaperScores, // ★ 將成績加入上傳封包
                        ...overrideData                  
                    };

                    fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    })
                    .then(res => res.json())
                    .then(data => {
                        setIsSaving(false);
                        if(data.status === 'success') {
                            console.log("✅ 雲端同步成功");
                        }
                    })
                    .catch(err => {
                        console.error("存檔網路失敗:", err);
                        alert("同步到雲端失敗！請檢查網路連線。");
                        setIsSaving(false);
                    });
                } catch (error) {
                    console.error("系統打包存檔資料時發生嚴重錯誤:", error);
                    alert("系統內部錯誤：無法打包上傳資料。\n錯誤詳情: " + error.message);
                    setIsSaving(false);
                }
            };

           
            

            const exportScoresCSV = () => {
                const data = activeStudents.map(s => {
                    const row = { Class: s.class, ClassNumber: s.num, Name: s.name };
                    Object.keys(QUIZ_MAPS).forEach(quizId => {
                        const map = QUIZ_MAPS[quizId];
                        const sScores = (scores[s.id] || {})[quizId] || {};
                        let total = 0;
                        
                        // 只計算總分，不再區分 MC 和 LQ
                        map.questions.forEach(q => {
                            total += (sScores[q.id] || 0);
                        });
                        
                        // 欄位名稱直接顯示 CH01, CH02 等
                        row[quizId] = total; 
                    });
                    return row;
                });
                const csv = Papa.unparse(data);
                const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `Physics_Quiz_Scores.csv`; a.click();
            };
            // ★ 修正版：過濾並只顯示「該群組有成績的試卷」的輔助函數
            const getRelevantExamMaps = (targetCohort, currentExamScores, currentExamMaps) => {
                if (!targetCohort || targetCohort === '所有學生') return currentExamMaps;

                const validExamIds = new Set();

                // currentExamScores 的結構是 { studentId: { examId: { q1: 1, q2: 2 } } }
                Object.keys(currentExamScores).forEach(studentId => {
                    // 檢查該學生是否屬於目前選定的群組
                    const studentInfo = (students || []).find(s => s.id === studentId);
                    if (studentInfo && studentInfo.cohort === targetCohort) {
                        const studentExams = currentExamScores[studentId] || {};
                        
                        // 檢查該生考過的每一份試卷
                        Object.keys(studentExams).forEach(examId => {
                            const scoresObj = studentExams[examId] || {};
                            // 檢查這張試卷內是否最少有一題有打分數
                            const hasScore = Object.values(scoresObj).some(score => score !== '' && score !== null && score !== undefined);
                            if (hasScore) {
                                validExamIds.add(examId);
                            }
                        });
                    }
                });

                // 只回傳有被記錄到 (至少一人有分) 的試卷藍圖
                const filteredMaps = {};
                Object.keys(currentExamMaps).forEach(key => {
                    if (validExamIds.has(key)) {
                        filteredMaps[key] = currentExamMaps[key];
                    }
                });
                return filteredMaps;
            };




                  
                if (isLoading) return <div className="flex h-screen items-center justify-center text-xl font-bold text-slate-500 animate-pulse">載入雲端資料中...</div>;
        
                        // ★ 核心分流邏輯：如果有 sid，就只渲染學生畫面，完全隱藏老師 Sidebar
                    if (studentSid) {
                        return (
                            <StudentPortalView 
                                studentId={studentSid} 
                                students={students} 
                                scores={scores} 
                                examScores={examScores} 
                                homeworkScores={homeworkScores} 
                                pastpaperScores={pastpaperScores}
                                homeworkMaps={homeworkMaps}   // ← 添加这一行
                            />
                        );
                    }
            return (
                     <div className="flex h-screen w-full overflow-hidden">
                        {/* Sidebar 不需要固定，直接由 flex 控制寬度 */}
                        <div className="w-64 flex-shrink-0">
                            {/* 1. Sidebar 獨立佔據左邊，擁有自己的捲軸 */}
                            <Sidebar 
                                view={view} 
                                setView={setView} 
                                currentCohort={currentCohort} 
                                setCurrentCohort={setCurrentCohort}
                                allCohorts={allCohorts}
                                isSaving={isSaving}
                            />
                        </div>
                            
                  
                        <div className="flex-1 h-screen overflow-y-auto bg-slate-100">
                                <div className="p-8">
                    {/* 更新：傳入 scores 和 syncToCloud，實現自動存檔 */}
                    {view === 'students' && <StudentView students={students} setStudents={setStudents} scores={scores} setScores={setScores} syncToCloud={syncToCloud} />}
                    {view === 'scores' && <ScoreInputView activeStudents={activeStudents} scores={scores} setScores={setScores} syncToCloud={syncToCloud} />}
                    {view === 'analysis' && <AnalysisView activeStudents={activeStudents} scores={scores} />}
      
                    {view === 'chart' && <StudentChartView activeStudents={activeStudents} scores={scores} />}
                    {view === 'topicAnalysis' && <TopicAnalysisView activeStudents={activeStudents} scores={scores} />}
                    {view === 'classSummary' && <ClassSummaryView activeStudents={activeStudents} scores={scores} />}
                    {view === 'backup' && <BackupView students={students} setStudents={setStudents} scores={scores} setScores={setScores} />}
                    {view === 'settings' && <SettingsView />}

                    {view === 'syllabusSettings' && <SyllabusSettingsView syncToCloud={syncToCloud} />}
                    {view === 'quizSettings' && <QuizSettingsView syncToCloud={syncToCloud} />}
                    {view === 'examSettings' && <ExamSettingsView syncToCloud={syncToCloud} />}
                    {view === 'examScoresInput' && <ExamScoresInputView activeStudents={activeStudents} examScores={examScores} setExamScores={setExamScores} syncToCloud={syncToCloud} />}
                    {view === 'examAnalysis' && <ExamAnalysisView activeStudents={activeStudents} examScores={examScores} currentCohort={currentCohort} getRelevantExamMaps={getRelevantExamMaps} />}

                    {view === 'studentExamAnalysis' && <StudentExamAnalysisView activeStudents={activeStudents} examScores={examScores} />} 
                    {view === 'remedialPractice' && <RemedialPracticeView activeStudents={activeStudents} examScores={examScores} remediationProgress={remediationProgress} setRemediationProgress={setRemediationProgress} syncToCloud={syncToCloud} currentCohort={currentCohort}/>}
                    {view === 'examExport' && <ExamExportView activeStudents={activeStudents} examScores={examScores} currentCohort={currentCohort} />}
                    {/* 新增智慧升班頁面的切換邏輯 */}
                    {view === 'studentPromotion' && (
                        <StudentPromotionView 
                            students={students} 
                            setStudents={setStudents} 
                            scores={scores} 
                            setScores={setScores} 
                            syncToCloud={syncToCloud} 
                        />
                    )}
                    {/* 新增：Pastpaper 成績輸入畫面 */}
                    {view === 'pastpaperScoresInput' && <PastpaperScoresInputView currentCohort={currentCohort} activeStudents={activeStudents} pastpaperScores={pastpaperScores} setPastpaperScores={setPastpaperScores} syncToCloud={syncToCloud} />}
                    {view === 'pastpaperAnalysis' && <PastpaperAnalysisView currentCohort={currentCohort} activeStudents={activeStudents} pastpaperScores={pastpaperScores} />}
                    {view === 'pastpaperSummary' && <PastpaperSummaryView currentCohort={currentCohort} activeStudents={activeStudents} pastpaperScores={pastpaperScores} />}
                    {view === 'pastpaperSettings' && <PastpaperSettingsView syncToCloud={syncToCloud} />}
    
                    
                    {/* 更新：功課管理頁面傳入完整的狀態與更新函數 */}
                    {view === 'homeworkSettings' && <HomeworkSettingsView students={students} currentCohort={currentCohort} homeworkMaps={homeworkMaps} setHomeworkMaps={setHomeworkMaps} syncToCloud={syncToCloud} />}
                    {view === 'homeworkScoresInput' && <HomeworkScoresInputView activeStudents={activeStudents} currentCohort={currentCohort} homeworkMaps={homeworkMaps} homeworkScores={homeworkScores} setHomeworkScores={setHomeworkScores} syncToCloud={syncToCloud} />}
                    {view === 'homeworkSummary' && <HomeworkSummaryView activeStudents={activeStudents} currentCohort={currentCohort} homeworkMaps={homeworkMaps} homeworkScores={homeworkScores} setHomeworkScores={setHomeworkScores} syncToCloud={syncToCloud} />}                
                            </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
