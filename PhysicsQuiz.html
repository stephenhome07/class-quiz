// ==================== 更新版：功課內容與藍圖設定組件 (終極防呆解析 + 修正未定義錯誤) ====================
const HomeworkSettingsView = ({ students, currentCohort, homeworkMaps, syncToCloud }) => {
    const cohorts = Array.from(new Set(students.map(s => s.cohort))).filter(Boolean).sort();
    const [selectedCohort, setSelectedCohort] = React.useState(currentCohort !== '所有學生' ? currentCohort : (cohorts[0] || ''));
    
    const [hwId, setHwId] = React.useState('');
    const [hwTitle, setHwTitle] = React.useState('');
    const [pasteData, setPasteData] = React.useState('');

    const handleSave = () => {
        if (!hwId || !hwTitle || !pasteData || !selectedCohort) return alert('請填寫完整資訊並選擇群組！');

        const lines = pasteData.trim().split('\n');
        const questions = lines.map(line => {
            const cleanLine = line.trim();
            if (!cleanLine) return null;

            let cols = cleanLine.split('\t');
            if (cols.length < 3 && cleanLine.includes(',')) cols = cleanLine.split(',');
            if (cols.length < 3) cols = cleanLine.split(/\s{2,}/);
            if (cols.length < 3) {
                const parts = cleanLine.split(/\s+/);
                if (parts.length >= 6) cols = [ parts[0], parts[1], parts[2], parts[3], parts[4], parts.slice(5).join(' ') ];
            }

            let maxScore = parseFloat(cols[2]);
            if (isNaN(maxScore) || maxScore <= 0) maxScore = 1;

            return {
                id: cols[0]?.trim() || '',
                type: cols[1]?.trim().toUpperCase() || 'LQ',
                max: maxScore, 
                level: cols[3]?.trim() || '中',
                topicId: cols[4]?.trim() || '',
                topicDesc: cols[5]?.trim() || '',
                ans: cols[6]?.trim() || ''
            };
        }).filter(q => q && q.id && !q.id.includes('題目ID')); 

        if (questions.length === 0) return alert('無法解析題目，請檢查格式是否正確。');

        // ★ 使用傳入的 homeworkMaps
        homeworkMaps[hwId] = { title: hwTitle, cohort: selectedCohort, questions: questions };
        syncToCloud();
        alert(`✅ 群組 [${selectedCohort}] 的功課 [${hwId}] 設定已儲存！`);
        setHwId(''); setHwTitle(''); setPasteData('');
    };

    const handleDelete = (id) => {
        if (confirm(`確定要刪除功課 [${id}] 的設定嗎？`)) {
            delete homeworkMaps[id];
            syncToCloud();
        }
    };

    const filteredHomeworks = Object.keys(homeworkMaps || {}).filter(id => 
        !homeworkMaps[id].cohort || homeworkMaps[id].cohort === selectedCohort
    );

    return (
        <div className="p-6 max-w-5xl mx-auto animate-fadeIn">
            <div className="border-b pb-4 mb-6">
                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <Icon name="BookType" className="text-amber-500" /> 功課內容與藍圖設定
                </h1>
                <p className="text-sm text-slate-500 mt-1">配備終極防呆解析器：支援 Excel Tab、CSV 逗號或空白分隔，不怕格式走位。</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-1 space-y-4">
                    <div className="card p-5 border border-slate-200 shadow-sm bg-slate-50">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-slate-700 text-sm">現有功課清單</h3>
                            <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold">{selectedCohort}</span>
                        </div>
                        <div className="space-y-2 max-h-[500px] overflow-y-auto pr-1">
                            {filteredHomeworks.length === 0 && <p className="text-xs text-slate-400">此群組目前沒有設定任何功課。</p>}
                            {filteredHomeworks.map(id => (
                                <div key={id} className="p-3 bg-white border border-slate-200 rounded-lg shadow-sm flex justify-between items-start">
                                    <div>
                                        <div className="font-bold text-amber-700 text-sm font-mono">{id}</div>
                                        <div className="text-xs text-slate-600 font-bold mt-0.5">{homeworkMaps[id].title}</div>
                                        <div className="text-[10px] text-slate-400 mt-1">共 {homeworkMaps[id].questions.length} 題</div>
                                    </div>
                                    <button onClick={() => handleDelete(id)} className="text-red-400 hover:text-red-600 p-1"><Icon name="Trash2" size={14} /></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

                <div className="lg:col-span-2 card p-5 border border-slate-200 shadow-sm">
                    <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center gap-2">
                        <Icon name="PlusCircle" size={16} className="text-amber-500" /> 新增 / 覆寫功課
                    </h3>
                    
                    <div className="grid grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">所屬群組 (Cohort)</label>
                            <select value={selectedCohort} onChange={e=>setSelectedCohort(e.target.value)} className="w-full p-2 border rounded font-bold text-sm bg-slate-50 outline-none">
                                {cohorts.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">功課編號</label>
                            <input type="text" className="w-full p-2 border rounded font-mono font-bold text-sm outline-none" value={hwId} onChange={e=>setHwId(e.target.value.toUpperCase())} placeholder="HW-01" />
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">功課標題</label>
                            <input type="text" className="w-full p-2 border rounded font-bold text-sm outline-none" value={hwTitle} onChange={e=>setHwTitle(e.target.value)} placeholder="第一章 磁場" />
                        </div>
                    </div>
                    
                    <div>
                        <label className="text-xs font-bold text-slate-500 mb-1 flex justify-between">
                            <span>直接貼上 Excel 或 CSV 內容：</span>
                        </label>
                        <textarea 
                            className="w-full h-64 p-3 text-xs font-mono bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400"
                            value={pasteData}
                            onChange={e=>setPasteData(e.target.value)}
                            placeholder="可直接包含首行標題列貼上..."
                        />
                    </div>
                    <button onClick={handleSave} className="w-full mt-4 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg shadow transition flex items-center justify-center gap-2">
                        <Icon name="Save" size={16} /> 儲存功課設定並同步至雲端
                    </button>
                </div>
            </div>
        </div>
    );
};

// ==================== 更新版：功課批改與狀態追蹤組件 (修正未定義錯誤) ====================
const HomeworkScoresInputView = ({ activeStudents, currentCohort, homeworkMaps, homeworkScores, setHomeworkScores, syncToCloud }) => {
    // ★ 使用傳入的 homeworkMaps
    const availableHws = Object.keys(homeworkMaps || {}).filter(id => !homeworkMaps[id].cohort || homeworkMaps[id].cohort === currentCohort);
    
    const [selectedHw, setSelectedHw] = React.useState(availableHws[0] || '');
    const [selectedStudentId, setSelectedStudentId] = React.useState('');
    const [currentEdit, setCurrentEdit] = React.useState(null);
    const [saveStatus, setSaveStatus] = React.useState('idle'); 
    const [filterStatus, setFilterStatus] = React.useState('ALL'); 

    React.useEffect(() => {
        if (availableHws.length > 0 && !availableHws.includes(selectedHw)) setSelectedHw(availableHws[0]);
        else if (availableHws.length === 0) setSelectedHw('');
    }, [currentCohort]);

    const map = homeworkMaps[selectedHw];
    if (!map) return (
        <div className="p-12 text-center text-slate-500 mt-10">
            <Icon name="AlertCircle" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">目前群組尚未設定功課</h2>
        </div>
    );

    const handleSelectStudent = (sId) => {
        setSelectedStudentId(sId);
        const record = homeworkScores[sId]?.[selectedHw] || { scores: {}, remakeStatus: 'MISSING', remarks: '', gradingDate: '', remakeDate: '' };
        setCurrentEdit(JSON.parse(JSON.stringify(record)));
        setSaveStatus('idle'); 
    };

    const handleScoreChange = (qId, val) => {
        setCurrentEdit(prev => ({ ...prev, scores: { ...prev.scores, [qId]: val } }));
    };

    const getLevelBadge = (level) => {
        if (level === '淺') return 'bg-emerald-50 text-emerald-700 border-emerald-200';
        if (level === '中') return 'bg-blue-50 text-blue-700 border-blue-200';
        if (level === '深') return 'bg-rose-50 text-rose-700 border-rose-200';
        return 'bg-slate-50 text-slate-600 border-slate-200';
    };

    // 計算即時分數與等級
    let liveTotal = 0;
    let liveMax = 0;
    if (currentEdit) {
        map.questions.forEach(q => {
            liveMax += q.max;
            const val = currentEdit.scores[q.id];
            if (q.type === 'MC') {
                if (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) liveTotal += q.max;
            } else {
                liveTotal += (val === '' || val === undefined ? 0 : parseFloat(val));
            }
        });
    }
    const pct = liveMax > 0 ? liveTotal / liveMax : 0;
    let grade = 'E'; let gradeColor = 'text-red-500 bg-red-50 border-red-200';
    if (pct >= 0.8) { grade = 'A'; gradeColor = 'text-emerald-600 bg-emerald-50 border-emerald-200'; }
    else if (pct >= 0.6) { grade = 'B'; gradeColor = 'text-blue-600 bg-blue-50 border-blue-200'; }
    else if (pct >= 0.4) { grade = 'C'; gradeColor = 'text-amber-600 bg-amber-50 border-amber-200'; }
    else if (pct >= 0.2) { grade = 'D'; gradeColor = 'text-orange-500 bg-orange-50 border-orange-200'; }

    const handleSaveRecord = () => {
        if (!selectedStudentId || !currentEdit) return;
        setSaveStatus('saving');
        
        const today = new Date().toISOString().slice(0, 10);
        let newStatus = currentEdit.remakeStatus;
        let gradingDate = currentEdit.gradingDate || today;

        if (liveTotal === liveMax) newStatus = 'PERFECT';
        else if (newStatus === 'MISSING' || !newStatus) newStatus = 'PENDING';

        const finalRecord = { ...currentEdit, remakeStatus: newStatus, gradingDate };
        setHomeworkScores(prev => ({
            ...prev, [selectedStudentId]: { ...(prev[selectedStudentId] || {}), [selectedHw]: finalRecord }
        }));

        setTimeout(() => {
            syncToCloud();
            setSaveStatus('saved');
            setTimeout(() => setSaveStatus('idle'), 1500);
        }, 300);
    };

    const handleMarkAsRemade = () => {
        const today = new Date().toISOString().slice(0, 10);
        setCurrentEdit(prev => ({ ...prev, remakeStatus: 'DONE', remakeDate: today }));
    };

    const filteredStudents = activeStudents.filter(s => {
        const record = homeworkScores[s.id]?.[selectedHw];
        const status = record?.remakeStatus || 'MISSING';
        if (filterStatus === 'ALL') return true;
        if (filterStatus === 'PENDING') return status === 'PENDING';
        if (filterStatus === 'MISSING') return status === 'MISSING';
        return true;
    });

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="BookOpenCheck" className="text-amber-500" /> 功課批改與狀態追蹤
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">目前正在檢視 <strong className="text-amber-600">{currentCohort}</strong> 群組的功課</p>
                </div>
                <select 
                    className="p-2.5 border border-slate-300 rounded-lg font-bold bg-white focus:ring-2 focus:ring-amber-400 outline-none shadow-sm min-w-[200px]"
                    value={selectedHw} 
                    onChange={(e) => { setSelectedHw(e.target.value); setSelectedStudentId(''); setCurrentEdit(null); }}
                >
                    {availableHws.map(k => (
                        <option key={k} value={k}>{k} - {homeworkMaps[k].title}</option>
                    ))}
                </select>
            </div>

            <div className="flex flex-col md:flex-row gap-6">
                <div className="w-full md:w-1/3 card p-0 border border-slate-200 shadow-sm overflow-hidden flex flex-col max-h-[650px]">
                    <div className="p-3 bg-slate-50 border-b font-bold text-sm text-slate-700 flex flex-col gap-2">
                        <div className="flex justify-between items-center">
                            <span>選擇學生</span>
                            <span className="text-[10px] font-normal text-slate-500 bg-white px-2 py-0.5 rounded border">共 {filteredStudents.length} 人</span>
                        </div>
                        <div className="flex gap-1 bg-slate-200/50 p-1 rounded-md">
                            <button onClick={()=>setFilterStatus('ALL')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='ALL' ? 'bg-white shadow-sm text-slate-700' : 'text-slate-500 hover:bg-slate-200'}`}>全部</button>
                            <button onClick={()=>setFilterStatus('PENDING')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='PENDING' ? 'bg-white shadow-sm text-red-600' : 'text-slate-500 hover:bg-slate-200'}`}>欠改正</button>
                            <button onClick={()=>setFilterStatus('MISSING')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='MISSING' ? 'bg-white shadow-sm text-slate-600' : 'text-slate-500 hover:bg-slate-200'}`}>未交/未改</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-2 space-y-1">
                        {filteredStudents.length === 0 && (
                            <div className="text-center py-8 text-slate-400 text-xs">沒有符合條件的學生 🎉</div>
                        )}
                        {filteredStudents.map(s => {
                            const record = homeworkScores[s.id]?.[selectedHw];
                            const status = record?.remakeStatus;
                            let statusIcon = <span className="text-[10px] text-slate-400 border px-1 rounded">未交/未改</span>;
                            if (status === 'PERFECT') statusIcon = <span className="text-[10px] text-emerald-600 bg-emerald-100 font-bold px-1.5 py-0.5 rounded">✅ 完美</span>;
                            if (status === 'PENDING') statusIcon = <span className="text-[10px] text-red-600 bg-red-100 font-bold px-1.5 py-0.5 rounded">❌ 欠改正</span>;
                            if (status === 'DONE') statusIcon = <span className="text-[10px] text-blue-600 bg-blue-100 font-bold px-1.5 py-0.5 rounded">🔄 已改正</span>;

                            return (
                                <div key={s.id} onClick={() => handleSelectStudent(s.id)}
                                    className={`p-2.5 rounded-lg cursor-pointer border transition flex justify-between items-center ${
                                        selectedStudentId === s.id ? 'bg-amber-50 border-amber-400 shadow-sm' : 'hover:bg-slate-50 border-transparent border-b-slate-100'
                                    }`}>
                                    <span className="text-sm font-bold text-slate-700">{s.class}({s.num}) {s.name}</span>
                                    {statusIcon}
                                </div>
                            );
                        })}
                    </div>
                </div>

                <div className="w-full md:w-2/3">
                    {!selectedStudentId || !currentEdit ? (
                        <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed h-full flex flex-col justify-center items-center">
                            <Icon name="Edit3" size={48} className="mb-4 opacity-30 text-amber-500" />
                            <p className="text-sm font-medium">請從左側名單點選學生以進行批改</p>
                        </div>
                    ) : (
                        <div className="card p-5 border border-slate-200 shadow-sm h-full flex flex-col">
                            <div className="flex justify-between items-start border-b border-slate-100 pb-4 mb-4">
                                <div>
                                    <h3 className="font-bold text-lg text-slate-800">
                                        {activeStudents.find(s=>s.id===selectedStudentId)?.name} 
                                        <span className="text-sm text-slate-500 font-normal ml-2">的功課批改區</span>
                                    </h3>
                                    {currentEdit.gradingDate && (
                                        <p className="text-[10px] font-mono text-slate-400 mt-1">批改日: {currentEdit.gradingDate} {currentEdit.remakeDate ? ` | 改正日: ${currentEdit.remakeDate}` : ''}</p>
                                    )}
                                    <div className="mt-2">
                                        {currentEdit.remakeStatus === 'PENDING' && (
                                            <button onClick={handleMarkAsRemade} className="text-xs bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1.5 rounded-full font-bold transition flex items-center gap-1 shadow-sm">
                                                <Icon name="CheckCircle" size={14} /> 標記為「已完成改正」
                                            </button>
                                        )}
                                        {currentEdit.remakeStatus === 'DONE' && (
                                            <span className="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-bold flex items-center gap-1 border border-blue-100">
                                                <Icon name="CheckCircle" size={14} /> 已於 {currentEdit.remakeDate} 完成改正
                                            </span>
                                        )}
                                    </div>
                                </div>
                                <div className="text-right flex items-end gap-3">
                                    <div className={`text-3xl font-black ${gradeColor} w-12 h-12 flex items-center justify-center rounded-xl shadow-sm border`}>
                                        {grade}
                                    </div>
                                    <div>
                                        <div className="text-3xl font-bold font-mono text-slate-800 tracking-tighter">
                                            {liveTotal}<span className="text-lg text-slate-400 font-medium">/{liveMax}</span>
                                        </div>
                                        <div className="text-[10px] text-slate-400 font-bold bg-slate-100 px-2 py-0.5 rounded uppercase tracking-wider mt-1">
                                            Live Score
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto pr-2 space-y-2 max-h-[400px]">
                                {map.questions.map((q, idx) => {
                                    const val = currentEdit.scores[q.id];
                                    const isCorrect = q.type === 'MC' ? (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) : (val !== '' && parseFloat(val) === q.max);
                                    
                                    return (
                                        <div key={q.id} className="flex items-center gap-3 p-2 hover:bg-slate-50 border border-transparent hover:border-slate-100 rounded-lg group transition">
                                            <div className="w-8 text-right text-xs font-bold text-slate-400 group-hover:text-amber-500">{idx + 1}.</div>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="font-mono font-bold text-slate-700 text-sm">{q.id}</span>
                                                    <span className={`text-[10px] px-1.5 py-0.5 rounded border ${getLevelBadge(q.level)}`}>{q.level}</span>
                                                    {q.type === 'MC' && <span className="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-200 px-1.5 py-0.5 rounded font-bold">MC</span>}
                                                </div>
                                                <div className="text-xs text-slate-500 truncate mt-0.5" title={q.topicDesc}>{q.topicId} - {q.topicDesc}</div>
                                            </div>

                                            <div className="flex items-center gap-2">
                                                {q.type === 'MC' ? (
                                                    <div className="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-200">
                                                        {['A','B','C','D'].map(opt => (
                                                            <button 
                                                                key={opt}
                                                                onClick={() => handleScoreChange(q.id, val === opt ? '' : opt)}
                                                                className={`w-7 h-7 rounded text-xs font-bold transition shadow-sm border ${
                                                                    val === opt ? 'bg-amber-500 text-white border-amber-600' : 'bg-white text-slate-600 hover:bg-slate-100 border-slate-200'
                                                                }`}
                                                            >
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-2">
                                                        <input 
                                                            type="number" 
                                                            min="0" max={q.max} step="0.5"
                                                            className="w-16 p-1.5 text-center border border-slate-300 rounded font-bold font-mono text-sm bg-white focus:ring-2 focus:ring-amber-400 outline-none shadow-sm"
                                                            value={val !== undefined ? val : ''}
                                                            onChange={(e) => handleScoreChange(q.id, e.target.value)}
                                                            placeholder="-"
                                                        />
                                                        <span className="text-xs text-slate-400 font-bold font-mono">/ {q.max}</span>
                                                    </div>
                                                )}
                                                <div className="w-6 flex justify-center">
                                                    {val !== undefined && val !== '' && (
                                                        isCorrect ? <Icon name="Check" size={16} className="text-emerald-500" /> : <Icon name="X" size={16} className="text-red-500" />
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <label className="text-xs font-bold text-slate-600 mb-1.5 flex items-center gap-1">
                                    <Icon name="MessageSquare" size={14} /> 老師批改備忘 (Remarks)
                                </label>
                                <textarea 
                                    className="w-full h-20 p-2.5 text-xs text-slate-700 bg-amber-50/30 border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 resize-none shadow-inner"
                                    placeholder="例如：計算題漏寫公式..."
                                    value={currentEdit.remarks || ''}
                                    onChange={(e) => setCurrentEdit(prev => ({ ...prev, remarks: e.target.value }))}
                                />
                            </div>

                            <button 
                                onClick={handleSaveRecord} 
                                disabled={saveStatus !== 'idle'}
                                className={`w-full mt-4 text-white font-bold py-3 rounded-xl shadow-md transition flex justify-center items-center gap-2 ${
                                    saveStatus === 'saved' ? 'bg-emerald-500 hover:bg-emerald-600' : 
                                    saveStatus === 'saving' ? 'bg-amber-400 cursor-wait' : 'bg-amber-500 hover:bg-amber-600'
                                }`}
                            >
                                {saveStatus === 'saved' ? (
                                    <><Icon name="CheckCircle" size={18} /> 已儲存！</>
                                ) : saveStatus === 'saving' ? (
                                    <><Icon name="Loader2" className="animate-spin" size={18} /> 儲存中...</>
                                ) : (
                                    <><Icon name="Save" size={18} /> 儲存批改與狀態</>
                                )}
                            </button>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
};
        
const App = () => {
            // ★ 1. 偵測網址是否有帶入學生 ID (例如: ?sid=S5A-26)
            const urlParams = new URLSearchParams(window.location.search);
            const studentSid = urlParams.get('sid');
            // ★ 將這裡換成你剛剛複製的 Google Apps Script 網址 ★
            const API_URL = 'https://script.google.com/macros/s/AKfycbz1DKuoBED9iaxYRzctOqfpZhLEtJJScjPyqujHWAPoZjHHpX_3z2T0iqtqob3am9WeuQ/exec';

            const [view, setView] = React.useState('students');
            const [students, setStudents] = React.useState([]);
            const [scores, setScores] = React.useState({});
            const [examScores, setExamScores] = React.useState({});
            const [homeworkScores, setHomeworkScores] = React.useState({});
            // 新增：雲端連線狀態
            const [isLoading, setIsLoading] = React.useState(true);
            const [isSaving, setIsSaving] = React.useState(false);
    // 在 App 內的 useState 區塊加入以下狀態：
            const [remediationProgress, setRemediationProgress] = React.useState({});

           // 自動從現有學生名單中抓取所有不重複的群組名稱 (加入防護罩)
            const allCohorts = ['所有學生', ...new Set((students || []).map(s => s.cohort || '2024-2027'))];
            
            // 從老師的瀏覽器記憶中讀取上次選的群組，預設為 '所有學生'
            const [currentCohort, setCurrentCohort] = React.useState(localStorage.getItem('saved_cohort') || '所有學生');
            
            // 當老師切換群組時，自動記在瀏覽器裡 (下次打開不用重選)
            React.useEffect(() => {
                localStorage.setItem('saved_cohort', currentCohort);
            }, [currentCohort]);

            // ⚠️ 核心過濾器：依照選擇的群組，過濾出「當前作用中」的學生名單 (加入防護罩)
            const activeStudents = currentCohort === '所有學生' 
                ? (students || [])
                : (students || []).filter(s => (s.cohort || '2024-2027') === currentCohort);
    
            // 1. 初次載入時，從 Google 雲端讀取資料
            React.useEffect(() => {
                fetch(API_URL)
                    .then(res => res.json())
                    .then(data => {
                        const validStudents = Array.isArray(data.students) ? data.students : [];
                        const validScores = (typeof data.scores === 'object' && data.scores !== null) ? data.scores : {};
                        const validExamScores = (typeof data.examScores === 'object' && data.examScores !== null) ? data.examScores : {};
                        const validRemediation = (typeof data.remediationProgress === 'object' && data.remediationProgress !== null) ? data.remediationProgress : {};
                        setRemediationProgress(validRemediation);
                        // ★ 新增：如果 Google 雲端有大綱/小測資料，就覆寫到變數中 ★
                        if (data.syllabus && Object.keys(data.syllabus).length > 0) SYLLABUS_TOPICS = data.syllabus;
                        if (data.quizMaps && Object.keys(data.quizMaps).length > 0) QUIZ_MAPS = data.quizMaps;
                        if (data.examMaps && Object.keys(data.examMaps).length > 0) EXAM_MAPS = data.examMaps;
                        // ★ 補上這行：將雲端的功課藍圖載入系統中 ★
                        if (data.homeworkMaps && Object.keys(data.homeworkMaps).length > 0) HOMEWORK_MAPS = data.homeworkMaps;
                        
                        setStudents(validStudents);
                        setScores(validScores);
                        setExamScores(validExamScores);
                        // ★ 讀取功課成績
                        const validHwScores = (typeof data.homeworkScores === 'object' && data.homeworkScores !== null) ? data.homeworkScores : {};
                        setHomeworkScores(validHwScores);                      
                        setIsLoading(false);
                    })
                    .catch(err => { console.error("讀取失敗:", err); });
            }, []);

      
    // 修正版：手動同步到雲端的函數
            const syncToCloud = () => {
                setIsSaving(true);
                fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        students: students, 
                        scores: scores,
                        syllabus: SYLLABUS_TOPICS,
                        quizMaps: QUIZ_MAPS,
                        examScores: examScores, // ★ 修正：直接讀取系統當前的 examScores 狀態
                        examMaps: EXAM_MAPS,
                        remediationProgress: remediationProgress,
                        homeworkMaps: HOMEWORK_MAPS,      // ★ 同步功課藍圖
                        homeworkScores: homeworkScores    // ★ 同步功課成績
                    })
                })
                .then(res => res.json())
                .then(data => {
                    setIsSaving(false);
                    if(data.status === 'success') {
                        // 存檔成功的靜默處理，避免每次都彈出視窗打斷操作
                    }
                })
                .catch(err => {
                    console.error("存檔失敗:", err);
                    alert("同步到雲端失敗！");
                    setIsSaving(false);
                });
            };

            // 當畫面還在載入時，顯示 Loading 畫面
            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <Icon name="Loader2" size={48} className="text-blue-500 animate-spin mb-4" />
                        <h2 className="text-xl font-bold text-gray-700">正在從 Google 雲端讀取資料...</h2>
                    </div>
                );
            };



           
            

            const exportScoresCSV = () => {
                const data = activeStudents.map(s => {
                    const row = { Class: s.class, ClassNumber: s.num, Name: s.name };
                    Object.keys(QUIZ_MAPS).forEach(quizId => {
                        const map = QUIZ_MAPS[quizId];
                        const sScores = (scores[s.id] || {})[quizId] || {};
                        let total = 0;
                        
                        // 只計算總分，不再區分 MC 和 LQ
                        map.questions.forEach(q => {
                            total += (sScores[q.id] || 0);
                        });
                        
                        // 欄位名稱直接顯示 CH01, CH02 等
                        row[quizId] = total; 
                    });
                    return row;
                });
                const csv = Papa.unparse(data);
                const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `Physics_Quiz_Scores.csv`; a.click();
            };


// ==================== 升級版：分區模塊化 Sidebar (區分小測與考試版) ====================
            const Sidebar = () => {
                // 輔助函數：用來產生統一風格的按鈕
                const navButton = (targetView, iconName, label, activeBg = 'bg-blue-600') => {
                    const isActive = view === targetView;
                    return (
                        <button 
                            onClick={() => setView(targetView)} 
                            className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${
                                isActive ? `${activeBg} text-white shadow-md font-semibold` : 'text-slate-300 hover:bg-slate-700/50 hover:text-white'
                            }`}
                        >
                            <Icon name={iconName} size={18} className={isActive ? 'opacity-100' : 'opacity-70'} />
                            {label}
                        </button>
                    );
                };

                return (
                    <div className="w-64 bg-slate-800 text-white p-4 flex flex-col h-screen fixed left-0 top-0 shadow-xl overflow-y-auto border-r border-slate-700/50">
                        {/* 系統標題 */}
                        <div className="flex items-center gap-3 px-2 py-4 border-b border-slate-700 mb-3">
                            <div className="p-2 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-lg shadow-inner">
                                <Icon name="GraduationCap" size={24} className="text-white" />
                            </div>
                            <div>
                                <h2 className="font-bold text-base bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">Physics Analyzer</h2>
                                <p className="text-xs text-slate-400 font-mono">V2.2 Cloud</p>
                            </div>
                        </div>

                        {/* 學生群組選擇器 */}
                        <div className="mb-4 bg-slate-900/60 p-3 rounded-lg border border-slate-700/50 shadow-inner">
                            <label className="text-xs text-slate-400 mb-1.5 font-bold flex items-center gap-1.5">
                                <Icon name="Users" size={14} /> 目前檢視群組
                            </label>
                            <select 
                                value={currentCohort}
                                onChange={(e) => setCurrentCohort(e.target.value)}
                                className="w-full p-2 bg-slate-800 text-slate-200 rounded-md border border-slate-600 outline-none font-semibold text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition cursor-pointer"
                            >
                                {allCohorts.map(c => (
                                    <option key={c} value={c}>{c}</option>
                                ))}
                            </select>
                        </div>

                        {/* 雲端儲存狀態小看板 */}
                        <div className="mb-4 p-2.5 bg-slate-900/50 rounded-lg border border-slate-700/30 flex items-center justify-between text-xs text-slate-400">
                            <span className="flex items-center gap-1.5">
                                <span className={`w-2 h-2 rounded-full ${isSaving ? 'bg-amber-400 animate-pulse' : 'bg-green-400'}`}></span>
                                {isSaving ? '雲端同步中...' : '已與雲端同步'}
                            </span>
                        </div>

                        {/* 導覽選單列表 */}
                        <nav className="flex-1 flex flex-col gap-4 overflow-y-auto pr-1 pb-6">

                            {/* ================= 新增：功課管理區 ================= */}
                            <div className="flex flex-col gap-1">
                                <p className="px-3 text-[11px] font-bold text-amber-500 tracking-wider uppercase mb-1">📚 日常功課管理區</p>
                                {navButton('homeworkScoresInput', 'BookOpenCheck', '功課批改與狀態跟進', 'bg-amber-600')}
                                {navButton('homeworkSettings', 'BookType', '功課內容與藍圖設定', 'bg-amber-600')}
                            </div>

                            <div className="border-t border-slate-700/50 my-1 mx-2"></div>

                                                        
                            {/* 區塊 1：小測管理與分析區 */}
                            <div className="flex flex-col gap-1">
                                <p className="px-3 text-[11px] font-bold text-blue-400 tracking-wider uppercase mb-2">📝 小測管理與分析區</p>
                                {/* 輸入與設定 */}
                                {navButton('scores', 'ClipboardList', '小測成績輸入')}
                                {navButton('quizSettings', 'FileEdit', '小測內容設定')}
                                
                                <div className="my-1 border-t border-slate-700/30 mx-3"></div> {/* 區塊內微小分隔線 */}
                                
                                {/* 分析與圖表 */}
                                {navButton('classSummary', 'Table', '小測成績表')}
                                {navButton('analysis', 'Wand2', '個人分析/補底')}
                                {navButton('chart', 'PieChart', '所有小測成績表現')}
                                {navButton('topicAnalysis', 'Target', '整班小測弱點分析')}
                            </div>

                            <div className="border-t border-slate-700/50 my-1 mx-2"></div>

                            {/* 區塊 2：考試管理區 */}
                            <div className="flex flex-col gap-1">
                                <p className="px-3 text-[11px] font-bold text-purple-400 tracking-wider uppercase mb-1">🎯 考試管理區</p>
                                {navButton('examScoresInput', 'CheckSquare', '考試成績輸入', 'bg-purple-600')}
                                {navButton('examAnalysis', 'LineChart', '考試弱點分析', 'bg-purple-600')}
                                {navButton('studentExamAnalysis', 'UserCheck', '個人大考分析', 'bg-purple-600')}
                                {navButton('remedialPractice', 'ClipboardEdit', '專屬補底練習與進度', 'bg-purple-600')}
                                {navButton('examExport', 'Download', '考試成績匯出 (Excel)', 'bg-green-600')}
                                {navButton('examSettings', 'Settings', '考試內容設定', 'bg-purple-600')}
                            </div>

                            <div className="border-t border-slate-700/50 my-1 mx-2"></div>

                            {/* 區塊 3：系統設定區 */}
                            <div className="flex flex-col gap-1 mb-4">
                                <p className="px-3 text-[11px] font-bold text-slate-500 tracking-wider uppercase mb-1">⚙️ 系統基本設定</p>
                                {navButton('students', 'Users', '學生名單管理', 'bg-slate-600')}
                                {navButton('syllabusSettings', 'BookOpen', '課程大綱設定', 'bg-slate-600')}
                                {navButton('studentPromotion', 'UserCheck', '新學年智慧升班/更新', 'bg-blue-600')}
                                {navButton('backup', 'Database', '數據備份與還原', 'bg-slate-600')}
                            </div>

                        </nav>
                    </div>
                );
            };

                  
                if (isLoading) return <div className="flex h-screen items-center justify-center text-xl font-bold text-slate-500 animate-pulse">載入雲端資料中...</div>;
        
                // ★ 核心分流邏輯：如果有 sid，就只渲染學生畫面，完全隱藏老師 Sidebar
                if (studentSid) {
                    return (
                        <StudentPortalView 
                            studentId={studentSid} 
                            students={students} 
                            examScores={examScores} 
                            homeworkScores={homeworkScores} 
                        />
                    );
                }

            return (
                <div className="flex min-h-screen relative"><Sidebar /><div className="flex-1 ml-64 overflow-hidden">
                    {view === 'students' && <StudentView students={students} setStudents={setStudents} setScores={setScores} />}
                    {view === 'scores' && <ScoreInputView activeStudents={activeStudents} scores={scores} setScores={setScores} />}
                    {view === 'analysis' && <AnalysisView activeStudents={activeStudents} scores={scores} />}
      
                    {view === 'chart' && <StudentChartView activeStudents={activeStudents} scores={scores} />}
                    {view === 'topicAnalysis' && <TopicAnalysisView activeStudents={activeStudents} scores={scores} />}
                    {view === 'classSummary' && <ClassSummaryView activeStudents={activeStudents} scores={scores} />}
                    {view === 'backup' && <BackupView students={students} setStudents={setStudents} scores={scores} setScores={setScores} />}
                    {view === 'settings' && <SettingsView />}

                    {view === 'syllabusSettings' && <SyllabusSettingsView syncToCloud={syncToCloud} />}
                    {view === 'quizSettings' && <QuizSettingsView syncToCloud={syncToCloud} />}
                    {view === 'examSettings' && <ExamSettingsView syncToCloud={syncToCloud} />}
                    {view === 'examScoresInput' && <ExamScoresInputView activeStudents={activeStudents} examScores={examScores} setExamScores={setExamScores} syncToCloud={syncToCloud} />}
                    {view === 'examAnalysis' && <ExamAnalysisView activeStudents={activeStudents} examScores={examScores} />}

                    {view === 'studentExamAnalysis' && <StudentExamAnalysisView activeStudents={activeStudents} examScores={examScores} />} 
                    {view === 'remedialPractice' && <RemedialPracticeView activeStudents={activeStudents} examScores={examScores} remediationProgress={remediationProgress} setRemediationProgress={setRemediationProgress} syncToCloud={syncToCloud} />}
                    {view === 'examExport' && <ExamExportView activeStudents={activeStudents} examScores={examScores} />}
                    {/* 新增智慧升班頁面的切換邏輯 */}
                    {view === 'studentPromotion' && (
                        <StudentPromotionView 
                            students={students} 
                            setStudents={setStudents} 
                            syncToCloud={syncToCloud} 
                        />
                    )}

                    
                    {/* 更新：功課管理頁面傳入 homeworkMaps */}
                    {view === 'homeworkSettings' && <HomeworkSettingsView students={students} currentCohort={currentCohort} homeworkMaps={HOMEWORK_MAPS} syncToCloud={syncToCloud} />}
                    {view === 'homeworkScoresInput' && <HomeworkScoresInputView activeStudents={activeStudents} currentCohort={currentCohort} homeworkMaps={HOMEWORK_MAPS} homeworkScores={homeworkScores} setHomeworkScores={setHomeworkScores} syncToCloud={syncToCloud} />}
                </div></div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
