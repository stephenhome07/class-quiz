                {!previewList ? (
                    <button onClick={handlePreview} className="bg-purple-600 text-white px-6 py-2.5 rounded-lg shadow-md hover:bg-purple-700 font-bold flex items-center gap-2 transition w-full md:w-auto justify-center">
                        <Icon name="Eye" size={18} /> 預覽升班結果
                    </button>

                    <div className="flex gap-3">

                            <Icon name="CheckCircle" size={18} /> 確認無誤，正式寫入並同步

                        <button onClick={handleCancelPreview} className="bg-slate-400 text-white px-6 py-2.5 rounded-lg shadow hover:bg-slate-500 font-bold flex items-center gap-2 transition">
                            返回修改
                        </button>

            {/* 預覽清單區塊 */}
            {previewList && (
                <div className="card p-5 mb-6 border-2 border-green-200 shadow-md bg-green-50/30 rounded-xl animate-fadeIn">
                    <h3 className="font-bold text-green-800 mb-3 flex items-center gap-2">

                    <div className="overflow-x-auto max-h-64 overflow-y-auto border border-green-100 rounded-lg bg-white mb-4">
                        <table className="w-full text-left text-sm text-slate-700">
                            <thead className="text-xs text-slate-500 bg-slate-50 sticky top-0 border-b">

                            <tbody className="divide-y divide-slate-100">
                                {previewList.preview.map((p, i) => (
                                    <tr key={i} className="hover:bg-slate-50">

                                            {p.exists ? `${p.oldClass}-${p.oldNum}` : '-'}

                    {previewList.notFound.length > 0 && (

                            <p className="text-orange-700 text-xs">這些學生將保留在系統中，但資料不會被更新（可能是退修、轉學或您分批貼上）。</p>
                            <div className="mt-2 text-xs text-orange-900 font-medium">
                                {previewList.notFound.map(s => `${s.name} (${s.class}-${s.num})`).join(', ')}

            {/* 系統現有名冊總覽與改名 */}

                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3 border-b pb-3">
                    <h3 className="font-bold text-slate-800 text-sm flex items-center gap-2">
                        <Icon name="Users" size={16} className="text-slate-500" /> 
                        物理科現有學生名冊與管理 (符合條件: {filteredStudents.length} 人)
                    </h3>
                    
                    {/* 👇 新增：學群篩選器 UI 👇 */}
                    <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-lg border border-slate-200">

                                        <td className="p-3">

                                                <span className="px-2 py-0.5 bg-slate-100 text-slate-600 text-xs rounded border font-mono">

                                                <button 
                                                    onClick={() => handleEditName(s.id, s.name)}

                                                    <Icon name="Edit2" size={14} />
                                                </button>

                                        </td>
                                        <td className="p-3 text-center">
                                            <button

                            )}

                    </table>
                </div>
            </div>
        </div>
    );
};
        
// ==================== 新增：學生專屬入口 (Student Portal) ====================

// ==================== 升級版：功課內容與藍圖設定組件 ====================
const HomeworkSettingsView = ({ students, currentCohort, homeworkMaps, setHomeworkMaps, syncToCloud }) => {
    const cohorts = Array.from(new Set(students.map(s => s.cohort))).filter(Boolean).sort();
    const [selectedCohort, setSelectedCohort] = React.useState(currentCohort !== '所有學生' ? currentCohort : (cohorts[0] || ''));
    
    const [hwId, setHwId] = React.useState('');
    const [hwTitle, setHwTitle] = React.useState('');
    const [pasteData, setPasteData] = React.useState('');

    const handleSave = () => {
        if (!hwId || !hwTitle || !pasteData || !selectedCohort) return alert('請填寫完整資訊並選擇群組！');

        const lines = pasteData.trim().split('\n');
        const questions = lines.map(line => {
            const cleanLine = line.trim();
            if (!cleanLine) return null;
            let cols = cleanLine.split('\t');
            if (cols.length < 3 && cleanLine.includes(',')) cols = cleanLine.split(',');
            if (cols.length < 3) cols = cleanLine.split(/\s{2,}/);
            if (cols.length < 3) {
                const parts = cleanLine.split(/\s+/);
                if (parts.length >= 6) cols = [ parts[0], parts[1], parts[2], parts[3], parts[4], parts.slice(5).join(' ') ];
            }
            let maxScore = parseFloat(cols[2]);
            if (isNaN(maxScore) || maxScore <= 0) maxScore = 1;
            return {
                id: cols[0]?.trim() || '', type: cols[1]?.trim().toUpperCase() || 'LQ', max: maxScore, 
                level: cols[3]?.trim() || '中', topicId: cols[4]?.trim() || '', topicDesc: cols[5]?.trim() || '', ans: cols[6]?.trim() || ''
            };
        }).filter(q => q && q.id && !q.id.includes('題目ID')); 

        if (questions.length === 0) return alert('無法解析題目，請檢查格式是否正確。');

        // ★ 核心修復：強制更新狀態並同步
        const newMaps = { ...homeworkMaps, [hwId]: { title: hwTitle, cohort: selectedCohort, questions: questions } };
        setHomeworkMaps(newMaps);
        syncToCloud({ homeworkMaps: newMaps }); 
        
        alert(`✅ 群組 [${selectedCohort}] 的功課 [${hwId}] 設定已儲存！`);
        setHwId(''); setHwTitle(''); setPasteData('');
    };

    const handleDelete = (id) => {
        if (confirm(`確定要刪除功課 [${id}] 的設定嗎？`)) {
            const newMaps = { ...homeworkMaps };
            delete newMaps[id];
            setHomeworkMaps(newMaps);
            syncToCloud({ homeworkMaps: newMaps });
        }
    };

    const filteredHomeworks = Object.keys(homeworkMaps || {}).filter(id => 
        !homeworkMaps[id].cohort || homeworkMaps[id].cohort === selectedCohort
    );

    // ---------- 快速 Prompt 內容 ----------
    const quickPromptText = `【身份】你是一位專門為香港高中物理（HKDSE）出題與分析的老師，學生程度為 Band 3。

【任務】我會上傳一份物理功課（可能是 MC、LQ，或兩者混合的 PDF / Word / 圖片）以及一個「課題 ID 對照表 Word 檔」。請你分析這份功課，為「每一小題」產生一筆記錄，輸出成「Tab 分隔」的純文字格式，方便我直接貼到學校系統。

【提取規則】

一、題目 ID（必須嚴格遵守）
- 如果是 MC 題，題號用整數，例如第1題寫成 MC1，第2題 MC2。
- 如果是 LQ 題，題號必須包含大題號和小題號：
  - 大題1的小題 a → LQ1a
  - 大題1的小題 b(i) → LQ1bi
  - 大題1的小題 b(ii) → LQ1bii
  - 大題2的小題 a → LQ2a
- 題號從 1 開始，依照功課原始順序排列。

二、題型
- MC 或 LQ（全大寫）。

三、滿分（max）
- 若功課上已標示分數，直接採用該分數。
- 若無標示，請根據題目複雜度合理估計：
  - MC 預設 1 分
  - LQ 簡短計算/解釋題 2 分
  - LQ 多步驟題 3-4 分
- 輸出請寫數字。

四、深淺度（level）
- 對象為香港 Band 3 學生，程度偏弱。
- 判斷標準：
  - 淺：直接代入公式、單一步驟、基礎概念。
  - 中：需兩步推理或結合兩個概念。
  - 深：多步驟分析、繪圖、綜合應用或解釋現象。
- 請用中文輸出：「淺」「中」「深」。

五、topicId 和 topicDesc
- topicId：請根據題目內容，與我提供的「課題 ID 對照表 Word 檔」進行比對，找出最相關的課題 ID（例如 1.1.1, 4.5.2）。若無法找到精確對應，請選擇最接近的一個。若完全無法對應，topicId 可留空。
- topicDesc：不要使用對照表中的文字。請你根據該題目實際問的內容，用中文撰寫一個 20-30 字的簡短描述，說明這題在考什麼。
  例：「計算長直載流導線在距離其 6 cm 處所產生的磁場量值。」
  維持一句話，簡潔準確。

六、答案欄
- 全部留空，只需輸出一個 Tab 符號作結。

【輸出格式】
每一行代表一題，欄位以 Tab 分隔，順序為：
題目ID [Tab] 題型 [Tab] 滿分 [Tab] 深淺度 [Tab] topicId [Tab] topicDesc [Tab] [空]

例如：
MC1	MC	1	淺	1.1.1	指出温度計所使用的物理性質。	
LQ1a	LQ	2	中	4.5.2	計算長直載流導線在距離其 6 cm 處所產生的磁場量值。	
LQ1bi	LQ	2	中	4.5.2	解釋螺線管長度和匝數加倍對磁場的影響。	

【絕對禁止】
- 不要輸出任何表格、標題、Markdown 語法或說明文字。
- 只能輸出題目行，欄位數量固定為 7 個 Tab 分隔值（最後一個答案欄空白）。
- topicDesc 必須是你自己歸納的 20-30 字描述，不可直接抄寫對照表中的長句。`;

    const copyPromptToClipboard = () => {
        navigator.clipboard.writeText(quickPromptText);
        alert('Prompt 已複製！');
    };

    return (
        <div className="p-6 max-w-5xl mx-auto animate-fadeIn">
            <div className="border-b pb-4 mb-6">
                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <Icon name="BookType" className="text-amber-500" /> 功課內容與藍圖設定
                </h1>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-1 space-y-4">
                    <div className="card p-5 border border-slate-200 shadow-sm bg-slate-50">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-slate-700 text-sm">現有功課清單</h3>
                            <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold">{selectedCohort}</span>
                        </div>
                        <div className="space-y-2 max-h-[500px] overflow-y-auto pr-1">
                            {filteredHomeworks.length === 0 && <p className="text-xs text-slate-400">此群組目前沒有設定任何功課。</p>}
                            {filteredHomeworks.map(id => (
                                <div key={id} className="p-3 bg-white border border-slate-200 rounded-lg shadow-sm flex justify-between items-start">
                                    <div>
                                        <div className="font-bold text-amber-700 text-sm font-mono">{id}</div>
                                        <div className="text-xs text-slate-600 font-bold mt-0.5">{homeworkMaps[id].title}</div>
                                        <div className="text-[10px] text-slate-400 mt-1">共 {homeworkMaps[id].questions.length} 題</div>
                                    </div>
                                    <button onClick={() => handleDelete(id)} className="text-red-400 hover:text-red-600 p-1"><Icon name="Trash2" size={14} /></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
                <div className="lg:col-span-2 card p-5 border border-slate-200 shadow-sm">
                    <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center gap-2">
                        <Icon name="PlusCircle" size={16} className="text-amber-500" /> 新增 / 覆寫功課
                    </h3>
                    <div className="grid grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">所屬群組</label>
                            <select value={selectedCohort} onChange={e=>setSelectedCohort(e.target.value)} className="w-full p-2 border rounded font-bold text-sm bg-slate-50 outline-none">
                                {cohorts.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">功課編號</label>
                            <input type="text" className="w-full p-2 border rounded font-mono font-bold text-sm outline-none" value={hwId} onChange={e=>setHwId(e.target.value.toUpperCase())} placeholder="HW-01" />
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">功課標題</label>
                            <input type="text" className="w-full p-2 border rounded font-bold text-sm outline-none" value={hwTitle} onChange={e=>setHwTitle(e.target.value)} placeholder="第一章 磁場" />
                        </div>
                    </div>

                    {/* ========== 快速 Prompt 複製區 ========== */}
                    <div className="mb-3 p-3 bg-indigo-50 border border-indigo-200 rounded-lg">
                        <div className="flex justify-between items-center mb-1">
                            <span className="text-xs font-bold text-indigo-700">🤖 AI 自動生成題目清單用 Prompt</span>
                            <button 
                                onClick={copyPromptToClipboard}
                                className="text-xs bg-indigo-500 text-white px-2 py-1 rounded hover:bg-indigo-600"
                            >
                                複製 Prompt
                            </button>
                        </div>
                        <textarea 
                            readOnly 
                            className="w-full h-24 text-xs font-mono bg-white border border-indigo-100 rounded p-2 outline-none resize-none"
                            value={quickPromptText}
                        />
                        <div className="text-[10px] text-indigo-600 mt-1 space-y-0.5">
                            <p>1. 點擊「複製 Prompt」。</p>
                            <p>2. 到 ChatGPT / Claude 貼上，並 <b>同時上傳功課檔案</b> 與 <b>課題 ID 對照表 Word 檔</b>。</p>
                            <p>3. 將 AI 回應的純文字直接貼入下方文字框，即可儲存。</p>
                        </div>
                    </div>
                    {/* ========== 快速 Prompt 複製區結束 ========== */}

                    <div>
                        <textarea className="w-full h-64 p-3 text-xs font-mono bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400" value={pasteData} onChange={e=>setPasteData(e.target.value)} placeholder="可直接包含首行標題列貼上..." />
                    </div>
                    <button onClick={handleSave} className="w-full mt-4 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg shadow transition flex items-center justify-center gap-2">
                        <Icon name="Save" size={16} /> 儲存功課設定並同步至雲端
                    </button>
                </div>
            </div>
        </div>
    );
};

// ==================== 升級版：功課批改與狀態追蹤組件 ====================
const HomeworkScoresInputView = ({ activeStudents, currentCohort, homeworkMaps, homeworkScores, setHomeworkScores, syncToCloud }) => {
    const inputRefs = React.useRef({});
    const availableHws = Object.keys(homeworkMaps || {}).filter(id => !homeworkMaps[id].cohort || homeworkMaps[id].cohort === currentCohort);
    const [selectedHw, setSelectedHw] = React.useState(availableHws[0] || '');
    const [selectedStudentId, setSelectedStudentId] = React.useState('');
    const [currentEdit, setCurrentEdit] = React.useState(null);
    const [saveStatus, setSaveStatus] = React.useState('idle'); 
    const [filterStatus, setFilterStatus] = React.useState('ALL'); 

    React.useEffect(() => {
        if (availableHws.length > 0 && !availableHws.includes(selectedHw)) setSelectedHw(availableHws[0]);
        else if (availableHws.length === 0) setSelectedHw('');
    }, [currentCohort, homeworkMaps]);

    const map = homeworkMaps[selectedHw];
    if (!map) return (
        <div className="p-12 text-center text-slate-500 mt-10">
            <Icon name="AlertCircle" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">目前群組尚未設定功課</h2>
        </div>
    );

    const handleSelectStudent = (sId) => {
        setSelectedStudentId(sId);
        const record = homeworkScores[sId]?.[selectedHw] || { scores: {}, remakeStatus: 'MISSING', remarks: '', gradingDate: '', remakeDate: '' };
        setCurrentEdit(JSON.parse(JSON.stringify(record)));
        setSaveStatus('idle'); 
    };

    const handleScoreChange = (qId, val) => setCurrentEdit(prev => ({ ...prev, scores: { ...prev.scores, [qId]: val } }));

    const getLevelBadge = (level) => {
        if (level === '淺') return 'bg-emerald-50 text-emerald-700 border-emerald-200';
        if (level === '中') return 'bg-blue-50 text-blue-700 border-blue-200';
        if (level === '深') return 'bg-rose-50 text-rose-700 border-rose-200';
        return 'bg-slate-50 text-slate-600 border-slate-200';
    };

    let liveTotal = 0; let liveMax = 0;
    if (currentEdit) {
        map.questions.forEach(q => {
            liveMax += q.max;
            const val = currentEdit.scores[q.id];
            if (q.type === 'MC') {
                if (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) liveTotal += q.max;
            } else { liveTotal += (val === '' || val === undefined ? 0 : parseFloat(val)); }
        });
    }
    const pct = liveMax > 0 ? liveTotal / liveMax : 0;
    let grade = 'E'; let gradeColor = 'text-red-500 bg-red-50 border-red-200';
    if (pct >= 0.8) { grade = 'A'; gradeColor = 'text-emerald-600 bg-emerald-50 border-emerald-200'; }
    else if (pct >= 0.6) { grade = 'B'; gradeColor = 'text-blue-600 bg-blue-50 border-blue-200'; }
    else if (pct >= 0.4) { grade = 'C'; gradeColor = 'text-amber-600 bg-amber-50 border-amber-200'; }
    else if (pct >= 0.2) { grade = 'D'; gradeColor = 'text-orange-500 bg-orange-50 border-orange-200'; }

    const handleSaveRecord = () => {
        if (!selectedStudentId || !currentEdit) return;
        setSaveStatus('saving');
        const today = new Date().toISOString().slice(0, 10);
        let newStatus = currentEdit.remakeStatus;
        if (liveTotal === liveMax) newStatus = 'PERFECT';
        else if (newStatus === 'MISSING' || !newStatus) newStatus = 'PENDING';

        const finalRecord = { ...currentEdit, remakeStatus: newStatus, gradingDate: currentEdit.gradingDate || today };
        
        // ★ 核心修復：強制更新狀態並同步
        const newScores = { ...homeworkScores, [selectedStudentId]: { ...(homeworkScores[selectedStudentId] || {}), [selectedHw]: finalRecord } };
        setHomeworkScores(newScores);

        setTimeout(() => {
            syncToCloud({ homeworkScores: newScores });
            setSaveStatus('saved');
            setTimeout(() => setSaveStatus('idle'), 1500);
        }, 300);
    };

    const handleMarkAsRemade = () => setCurrentEdit(prev => ({ ...prev, remakeStatus: 'DONE', remakeDate: new Date().toISOString().slice(0, 10) }));

    const filteredStudents = activeStudents.filter(s => {
        const status = homeworkScores[s.id]?.[selectedHw]?.remakeStatus || 'MISSING';
        if (filterStatus === 'PENDING') return status === 'PENDING';
        if (filterStatus === 'MISSING') return status === 'MISSING';
        return true;
    });

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icon name="BookOpenCheck" className="text-amber-500" /> 功課批改與狀態追蹤</h1>
                </div>
                <select className="p-2.5 border border-slate-300 rounded-lg font-bold bg-white focus:ring-2 focus:ring-amber-400 outline-none shadow-sm min-w-[200px]" value={selectedHw} onChange={(e) => { setSelectedHw(e.target.value); setSelectedStudentId(''); setCurrentEdit(null); }}>
                    {availableHws.map(k => <option key={k} value={k}>{k} - {homeworkMaps[k].title}</option>)}
                </select>
            </div>
            <div className="flex flex-col md:flex-row gap-6">
                <div className="w-full md:w-1/3 card p-0 border border-slate-200 shadow-sm overflow-hidden flex flex-col max-h-[650px]">
                    <div className="p-3 bg-slate-50 border-b font-bold text-sm text-slate-700 flex flex-col gap-2">
                        <div className="flex justify-between items-center"><span>選擇學生</span><span className="text-[10px] font-normal text-slate-500 bg-white px-2 py-0.5 rounded border">共 {filteredStudents.length} 人</span></div>
                        <div className="flex gap-1 bg-slate-200/50 p-1 rounded-md">
                            <button onClick={()=>setFilterStatus('ALL')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='ALL' ? 'bg-white shadow-sm text-slate-700' : 'text-slate-500 hover:bg-slate-200'}`}>全部</button>
                            <button onClick={()=>setFilterStatus('PENDING')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='PENDING' ? 'bg-white shadow-sm text-red-600' : 'text-slate-500 hover:bg-slate-200'}`}>欠改正</button>
                            <button onClick={()=>setFilterStatus('MISSING')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='MISSING' ? 'bg-white shadow-sm text-slate-600' : 'text-slate-500 hover:bg-slate-200'}`}>未交/未改</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-2 space-y-1">
                        {filteredStudents.map(s => {
                            const status = homeworkScores[s.id]?.[selectedHw]?.remakeStatus;
                            let statusIcon = <span className="text-[10px] text-slate-400 border px-1 rounded">未交/未改</span>;
                            if (status === 'PERFECT') statusIcon = <span className="text-[10px] text-emerald-600 bg-emerald-100 font-bold px-1.5 py-0.5 rounded">✅ 完美</span>;
                            if (status === 'PENDING') statusIcon = <span className="text-[10px] text-red-600 bg-red-100 font-bold px-1.5 py-0.5 rounded">❌ 欠改正</span>;
                            if (status === 'DONE') statusIcon = <span className="text-[10px] text-blue-600 bg-blue-100 font-bold px-1.5 py-0.5 rounded">🔄 已改正</span>;
                            return (
                                <div key={s.id} onClick={() => handleSelectStudent(s.id)} className={`p-2.5 rounded-lg cursor-pointer border transition flex justify-between items-center ${selectedStudentId === s.id ? 'bg-amber-50 border-amber-400 shadow-sm' : 'hover:bg-slate-50 border-transparent border-b-slate-100'}`}>
                                    <span className="text-sm font-bold text-slate-700">{s.class}({s.num}) {s.name}</span>{statusIcon}
                                </div>
                            );
                        })}
                    </div>
                </div>
                <div className="w-full md:w-2/3">
                    {!selectedStudentId || !currentEdit ? (
                        <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed h-full flex flex-col justify-center items-center"><Icon name="Edit3" size={48} className="mb-4 opacity-30 text-amber-500" /><p className="text-sm font-medium">請從左側名單點選學生以進行批改</p></div>
                    ) : (
                        <div className="card p-5 border border-slate-200 shadow-sm h-full flex flex-col">
                            <div className="flex justify-between items-start border-b border-slate-100 pb-4 mb-4">
                                <div>
                                    <h3 className="font-bold text-lg text-slate-800">{activeStudents.find(s=>s.id===selectedStudentId)?.name} <span className="text-sm text-slate-500 font-normal ml-2">的功課批改區</span></h3>
                                    {currentEdit.gradingDate && <p className="text-[10px] font-mono text-slate-400 mt-1">批改日: {currentEdit.gradingDate} {currentEdit.remakeDate ? ` | 改正日: ${currentEdit.remakeDate}` : ''}</p>}
                                    <div className="mt-2">
                                        {currentEdit.remakeStatus === 'PENDING' && <button onClick={handleMarkAsRemade} className="text-xs bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1.5 rounded-full font-bold transition flex items-center gap-1 shadow-sm"><Icon name="CheckCircle" size={14} /> 標記為「已完成改正」</button>}
                                        {currentEdit.remakeStatus === 'DONE' && <span className="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-bold flex items-center gap-1 border border-blue-100"><Icon name="CheckCircle" size={14} /> 已於 {currentEdit.remakeDate} 完成改正</span>}
                                    </div>
                                </div>
                                <div className="text-right flex items-end gap-3">
                                    <div className={`text-3xl font-black ${gradeColor} w-12 h-12 flex items-center justify-center rounded-xl shadow-sm border`}>{grade}</div>
                                    <div><div className="text-3xl font-bold font-mono text-slate-800 tracking-tighter">{liveTotal}<span className="text-lg text-slate-400 font-medium">/{liveMax}</span></div><div className="text-[10px] text-slate-400 font-bold bg-slate-100 px-2 py-0.5 rounded uppercase tracking-wider mt-1">Live Score</div></div>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto pr-2 space-y-2 max-h-[400px]">

                                   
                                    {map.questions.map((q, idx) => {
                                        const val = currentEdit.scores[q.id];
                                        const isCorrect = q.type === 'MC' ? (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) : (val !== '' && parseFloat(val) === q.max);
                                        
                                        return (
                                            <div key={q.id} className="flex items-center gap-3 p-2 hover:bg-slate-50 border border-transparent hover:border-slate-100 rounded-lg group transition">
                                                <div className="w-8 text-right text-xs font-bold text-slate-400 group-hover:text-amber-500">{idx + 1}.</div>
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2"><span className="font-mono font-bold text-slate-700 text-sm">{q.id}</span><span className={`text-[10px] px-1.5 py-0.5 rounded border ${getLevelBadge(q.level)}`}>{q.level}</span></div>
                                                    <div className="text-xs text-slate-500 truncate mt-0.5" title={q.topicDesc}>{q.topicId} - {q.topicDesc}</div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    {q.type === 'MC' ? (
                                                        <div className="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-200">
                                                            {['A','B','C','D'].map(opt => <button key={opt} onClick={() => handleScoreChange(q.id, val === opt ? '' : opt)} className={`w-7 h-7 rounded text-xs font-bold transition shadow-sm border ${val === opt ? 'bg-amber-500 text-white border-amber-600' : 'bg-white text-slate-600 hover:bg-slate-100 border-slate-200'}`}>{opt}</button>)}
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center gap-2">
                                                            <input 
                                                                ref={el => inputRefs.current[q.id] = el}
                                                                type="number" 
                                                                min="0" 
                                                                max={q.max} 
                                                                step="0.5" 
                                                                className="w-16 p-1.5 text-center border border-slate-300 rounded font-bold font-mono text-sm bg-white focus:ring-2 focus:ring-amber-400 outline-none shadow-sm" 
                                                                value={val !== undefined ? val : ''} 
                                                                onChange={(e) => {
                                                                    const newVal = e.target.value;
                                                                    handleScoreChange(q.id, newVal);
                                                                    
                                                                    // 自動跳轉邏輯：
                                                                    // 如果輸入了內容，且該題滿分小於 10 (單位數)，且當前輸入長度達到限制
                                                                    if (newVal.length >= 1 && q.max < 10 && map.questions[idx + 1]) {
                                                                        const nextQ = map.questions[idx + 1];
                                                                        if (inputRefs.current[nextQ.id]) {
                                                                            inputRefs.current[nextQ.id].focus();
                                                                            inputRefs.current[nextQ.id].select(); // 自動全選方便修改
                                                                        }
                                                                    }
                                                                }} 
                                                                placeholder="-" 
                                                            />
                                                            <span className="text-xs text-slate-400 font-bold font-mono">/ {q.max}</span>
                                                        </div>
                                                    )}
                                                    <div className="w-6 flex justify-center">{val !== undefined && val !== '' && (isCorrect ? <Icon name="Check" size={16} className="text-emerald-500" /> : <Icon name="X" size={16} className="text-red-500" />)}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                            </div>
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <label className="text-xs font-bold text-slate-600 mb-1.5 flex items-center gap-1"><Icon name="MessageSquare" size={14} /> 老師批改備忘 (Remarks)</label>
                                <textarea className="w-full h-20 p-2.5 text-xs text-slate-700 bg-amber-50/30 border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 resize-none shadow-inner" placeholder="例如：計算題漏寫公式..." value={currentEdit.remarks || ''} onChange={(e) => setCurrentEdit(prev => ({ ...prev, remarks: e.target.value }))} />
                            </div>
                            <button onClick={handleSaveRecord} disabled={saveStatus !== 'idle'} className={`w-full mt-4 text-white font-bold py-3 rounded-xl shadow-md transition flex justify-center items-center gap-2 ${saveStatus === 'saved' ? 'bg-emerald-500 hover:bg-emerald-600' : saveStatus === 'saving' ? 'bg-amber-400 cursor-wait' : 'bg-amber-500 hover:bg-amber-600'}`}>
                                {saveStatus === 'saved' ? <><Icon name="CheckCircle" size={18} /> 已儲存！</> : saveStatus === 'saving' ? <><Icon name="Loader2" className="animate-spin" size={18} /> 儲存中...</> : <><Icon name="Save" size={18} /> 儲存批改與狀態</>}
                            </button>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
};

// ==================== 新增：功課成績總表與快速編輯組件 ====================
const HomeworkSummaryView = ({ activeStudents, currentCohort, homeworkMaps, homeworkScores, setHomeworkScores, syncToCloud }) => {
    // 1. 取得該群組的所有功課
    const availableHws = React.useMemo(() => {
        return Object.keys(homeworkMaps || {}).filter(id => !homeworkMaps[id].cohort || homeworkMaps[id].cohort === currentCohort).sort();
    }, [currentCohort, homeworkMaps]);

    // 2. 計算每份功課的滿分
    const hwMaxScores = React.useMemo(() => {
        const maxes = {};
        availableHws.forEach(hwId => {
            let max = 0;
            if (homeworkMaps[hwId] && homeworkMaps[hwId].questions) {
                homeworkMaps[hwId].questions.forEach(q => max += (q.max || 0));
            }
            maxes[hwId] = max;
        });
        return maxes;
    }, [availableHws, homeworkMaps]);

    // 3. 狀態管理
    const [includedHws, setIncludedHws] = React.useState({});
    const [isEditMode, setIsEditMode] = React.useState(false);
    const [saveStatus, setSaveStatus] = React.useState('idle'); // idle, saving, saved
    const syncTimeout = React.useRef(null);

    React.useEffect(() => {
        const initial = {};
        availableHws.forEach(hw => initial[hw] = true);
        setIncludedHws(initial);
    }, [availableHws]);

    const toggleHw = (hwId) => setIncludedHws(prev => ({ ...prev, [hwId]: !prev[hwId] }));

    // 4. 計算學生成績與平均分
    const computedData = React.useMemo(() => {
        return activeStudents.map(student => {
            let totalForAvg = 0;
            let countForAvg = 0;
            const hwData = {};

            availableHws.forEach(hwId => {
                const record = homeworkScores[student.id]?.[hwId] || {};
                const scoresObj = record.scores || {};
                const status = record.remakeStatus || 'MISSING';
                
                let sum = 0;
                let hasScore = false;

                if (homeworkMaps[hwId] && homeworkMaps[hwId].questions) {
                    homeworkMaps[hwId].questions.forEach(q => {
                        const val = scoresObj[q.id];
                        if (q.type === 'MC') {
                            if (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) sum += q.max;
                        } else {
                            if (val !== undefined && val !== '') {
                                sum += parseFloat(val);
                                hasScore = true;
                            }
                        }
                    });
                }

                const maxScore = hwMaxScores[hwId];
                hwData[hwId] = {
                    score: hasScore || Object.keys(scoresObj).length > 0 ? sum : '',
                    status: status
                };

                // 納入平均分計算 (滿分換算為 100)
                if (includedHws[hwId] && (hasScore || Object.keys(scoresObj).length > 0) && maxScore > 0) {
                    totalForAvg += (sum / maxScore) * 100;
                    countForAvg++;
                }
            });

            return {
                ...student,
                hwData,
                average: countForAvg > 0 ? (totalForAvg / countForAvg).toFixed(1) : '-'
            };
        });
    }, [activeStudents, availableHws, homeworkMaps, homeworkScores, hwMaxScores, includedHws]);

    // 5. 處理快速編輯與自動存檔 (Auto Save with Debounce)
    const handleCellEdit = (studentId, hwId, newScoreStr, newStatus) => {
        const hwMap = homeworkMaps[hwId];
        if (!hwMap) return;

        setHomeworkScores(prev => {
            const studentData = prev[studentId] || {};
            const oldRecord = studentData[hwId] || { scores: {} };
            const updatedScores = { ...oldRecord.scores };
            
            // 計算原本的總分
            let currentTotal = 0;
            hwMap.questions.forEach(q => currentTotal += parseFloat(updatedScores[q.id] || 0));

            const newScore = newScoreStr === '' ? '' : parseFloat(newScoreStr);

            // 如果修改了總分，自動將分數分配到第一題 (快速編輯模式的預設行為)
            if (newScore !== '' && newScore !== currentTotal) {
                hwMap.questions.forEach((q, idx) => {
                    updatedScores[q.id] = idx === 0 ? newScore : 0;
                });
            } else if (newScore === '') {
                hwMap.questions.forEach(q => updatedScores[q.id] = '');
            }

            // 狀態自動判斷 (防呆)
            let finalStatus = newStatus;
            if (newScore !== '' && finalStatus === 'MISSING') finalStatus = 'PENDING';
            if (newScore === hwMaxScores[hwId]) finalStatus = 'PERFECT';

            const newScoresState = {
                ...prev,
                [studentId]: {
                    ...studentData,
                    [hwId]: {
                        ...oldRecord,
                        scores: updatedScores,
                        remakeStatus: finalStatus,
                        gradingDate: oldRecord.gradingDate || new Date().toISOString().slice(0, 10)
                    }
                }
            };

            // 觸發自動雲端儲存 (Debounce 防暴衝：1.5秒內沒有新輸入才執行上傳)
            setSaveStatus('saving');
            if (syncTimeout.current) clearTimeout(syncTimeout.current);
            syncTimeout.current = setTimeout(() => {
                syncToCloud({ homeworkScores: newScoresState });
                setSaveStatus('saved');
                setTimeout(() => setSaveStatus('idle'), 2000);
            }, 1500);

            return newScoresState;
        });
    };

    // 6. 複製到 Excel
    const handleCopyToExcel = () => {
        if (computedData.length === 0) return alert("沒有資料可複製");
        let tsv = ["班別", "學號", "姓名", ...availableHws.map(h => `${h}分數\t${h}狀態`), "平均分"].join("\t") + "\n";
        tsv += ["", "", "滿分:", ...availableHws.map(h => `${hwMaxScores[h]}\t`), "100"].join("\t") + "\n";

        computedData.forEach(s => {
            const row = [s.class, s.num, s.name];
            availableHws.forEach(hwId => {
                const statusMap = { 'PERFECT': '完美', 'DONE': '已改正', 'PENDING': '欠改正', 'MISSING': '未交' };
                row.push(s.hwData[hwId].score !== '' ? s.hwData[hwId].score : '');
                row.push(statusMap[s.hwData[hwId].status]);
            });
            row.push(s.average);
            tsv += row.join("\t") + "\n";
        });

        navigator.clipboard.writeText(tsv).then(() => alert("📋 已成功複製！請至 Excel 按 Ctrl+V 貼上。"));
    };

    const getStatusIcon = (status) => {
        if (status === 'PERFECT') return <span className="text-emerald-600 bg-emerald-50 px-1 rounded flex items-center gap-0.5"><Icon name="CheckCircle" size={12}/> 完美</span>;
        if (status === 'DONE') return <span className="text-blue-600 bg-blue-50 px-1 rounded flex items-center gap-0.5"><Icon name="RotateCw" size={12}/> 已改正</span>;
        if (status === 'PENDING') return <span className="text-red-600 bg-red-50 px-1 rounded flex items-center gap-0.5"><Icon name="XCircle" size={12}/> 欠改正</span>;
        return <span className="text-slate-400 bg-slate-100 px-1 rounded flex items-center gap-0.5"><Icon name="Circle" size={12}/> 未交</span>;
    };

    return (
        <div className="p-6 max-w-7xl mx-auto animate-fadeIn">
            {/* 頂部控制列 */}
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Table" className="text-amber-600" /> 功課成績總表與快速編輯
                    </h1>
                    <p className="text-sm text-slate-500 mt-1 flex items-center gap-3">
                        <span>開啟編輯模式可直接於表格修改，離開格子自動存檔。</span>
                        {saveStatus === 'saving' && <span className="text-amber-500 flex items-center gap-1 font-bold"><Icon name="Loader2" size={14} className="animate-spin" /> 儲存中...</span>}
                        {saveStatus === 'saved' && <span className="text-emerald-500 flex items-center gap-1 font-bold"><Icon name="Check" size={14} /> 已同步雲端</span>}
                    </p>
                </div>
                <div className="flex items-center gap-3">
                    <button 
                        onClick={() => setIsEditMode(!isEditMode)}
                        className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold shadow-sm transition ${isEditMode ? 'bg-rose-500 hover:bg-rose-600 text-white' : 'bg-amber-100 text-amber-700 hover:bg-amber-200 border border-amber-200'}`}
                    >
                        {isEditMode ? <Icon name="X" size={18} /> : <Icon name="Edit" size={18} />}
                        {isEditMode ? '關閉編輯模式' : '開啟快速編輯'}
                    </button>
                    <button onClick={handleCopyToExcel} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg shadow-sm transition font-bold">
                        <Icon name="Copy" size={18} /> 複製至 Excel
                    </button>
                </div>
            </div>

            {/* 功課篩選面板 */}
            <div className="card p-4 mb-6 bg-white rounded-xl border border-slate-200 shadow-sm">
                <h3 className="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-1">
                    <Icon name="Settings" size={16} /> 選擇要顯示及納入平均分的功課：
                </h3>
                <div className="flex flex-wrap gap-4">
                    {availableHws.length === 0 ? <span className="text-sm text-slate-400">目前沒有功課紀錄。</span> : 
                        availableHws.map(hw => (
                            <label key={hw} className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200 cursor-pointer hover:bg-slate-100 transition text-sm font-medium text-slate-700">
                                <input type="checkbox" className="w-4 h-4 text-amber-500 rounded focus:ring-amber-500" checked={!!includedHws[hw]} onChange={() => toggleHw(hw)} />
                                {hw}
                            </label>
                        ))
                    }
                </div>
            </div>

            {/* 數據表格 */}
            {availableHws.length > 0 && (
                <div className={`bg-white rounded-xl border-2 shadow-sm overflow-x-auto max-h-[600px] overflow-y-auto transition ${isEditMode ? 'border-amber-400 shadow-md ring-4 ring-amber-50' : 'border-slate-200'}`}>
                    <table className="w-full text-left border-collapse min-w-[800px]">
                        <thead className="bg-slate-100 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-r border-slate-200">班別</th>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-r border-slate-200">學號</th>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-r border-slate-200">姓名</th>
                                {availableHws.map(hw => (
                                    <th key={hw} className={`p-3 border-b border-r border-slate-200 ${includedHws[hw] ? 'bg-amber-50/50' : 'bg-slate-50 text-slate-400 opacity-50'}`}>
                                        <div className="flex flex-col gap-1 items-center">
                                            <span className="font-bold text-slate-700">{hw}</span>
                                            <span className="text-[10px] text-slate-500 bg-white px-1.5 rounded border">滿分: {hwMaxScores[hw]}</span>
                                        </div>
                                    </th>
                                ))}
                                <th className="p-3 text-sm font-bold text-amber-700 bg-amber-100 border-b border-slate-200 text-center w-24">平均分<br/><span className="text-[10px] font-normal">/100</span></th>
                            </tr>
                        </thead>
                        <tbody>
                            {computedData.map(student => (
                                <tr key={student.id} className="hover:bg-slate-50 transition border-b border-slate-100 group">
                                    <td className="p-3 text-sm text-slate-700 font-medium border-r border-slate-100 text-center">{student.class}</td>
                                    <td className="p-3 text-sm text-slate-600 border-r border-slate-100 text-center">{student.num}</td>
                                    <td className="p-3 text-sm text-slate-800 font-bold border-r border-slate-100">{student.name}</td>
                                    
                                    {availableHws.map(hw => {
                                        const hwData = student.hwData[hw];
                                        const max = hwMaxScores[hw];
                                        const isIncluded = includedHws[hw];
                                        
                                        // 顏色判定
                                        let scoreColor = 'text-slate-700';
                                        if (hwData.score !== '' && max > 0) {
                                            const pct = hwData.score / max;
                                            if (pct < 0.4) scoreColor = 'text-red-600 font-bold';
                                            else if (pct <= 0.6) scoreColor = 'text-amber-600 font-bold';
                                            else scoreColor = 'text-emerald-600 font-bold';
                                        }

                                        return (
                                            <td key={hw} className={`p-2 border-r border-slate-100 align-middle ${!isIncluded ? 'opacity-30 bg-slate-50' : ''}`}>
                                                {!isEditMode ? (
                                                    <div className="flex flex-col items-center justify-center gap-1.5">
                                                        <span className={`text-base font-mono ${scoreColor}`}>
                                                            {hwData.score !== '' ? hwData.score : '-'}
                                                        </span>
                                                        <div className="text-[10px] font-bold">{getStatusIcon(hwData.status)}</div>
                                                    </div>
                                                ) : (
                                                    <div className="flex flex-col items-center gap-1.5 bg-amber-50/50 p-1.5 rounded-lg border border-amber-100">
                                                        <div className="flex items-center gap-1">
                                                            <input 
                                                                type="number" min="0" max={max} step="0.5"
                                                                defaultValue={hwData.score}
                                                                onBlur={(e) => handleCellEdit(student.id, hw, e.target.value, hwData.status)}
                                                                className={`w-14 p-1 text-center text-sm font-bold font-mono border rounded outline-none focus:ring-2 focus:ring-amber-400 ${scoreColor}`}
                                                                placeholder="-"
                                                            />
                                                        </div>
                                                        <select 
                                                            defaultValue={hwData.status}
                                                            onChange={(e) => handleCellEdit(student.id, hw, hwData.score, e.target.value)}
                                                            className={`w-20 text-[10px] p-1 font-bold rounded border outline-none cursor-pointer
                                                                ${hwData.status === 'PERFECT' ? 'bg-emerald-50 text-emerald-700' : 
                                                                  hwData.status === 'DONE' ? 'bg-blue-50 text-blue-700' : 
                                                                  hwData.status === 'PENDING' ? 'bg-red-50 text-red-700' : 'bg-slate-50 text-slate-500'}`}
                                                        >
                                                            <option value="PERFECT">✅ 完美</option>
                                                            <option value="DONE">🔄 已改正</option>
                                                            <option value="PENDING">❌ 欠改正</option>
                                                            <option value="MISSING">⚪ 未交</option>
                                                        </select>
                                                    </div>
                                                )}
                                            </td>
                                        );
                                    })}
                                    
                                    {/* 平均分欄位 */}
                                    {(() => {
                                        let avgBgColor = 'bg-amber-50/30';
                                        let avgTextColor = 'text-amber-700';
                                        
                                        if (student.average !== '-') {
                                            const avgNum = parseFloat(student.average);
                                            if (avgNum < 40) { avgBgColor = 'bg-red-100'; avgTextColor = 'text-red-700'; }
                                            else if (avgNum <= 60) { avgBgColor = 'bg-yellow-100'; avgTextColor = 'text-yellow-800'; }
                                        }

                                        return (
                                            <td className={`p-3 text-center font-mono font-black text-base ${avgBgColor} ${avgTextColor}`}>
                                                {student.average}
                                            </td>
                                        );
                                    })()}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            )}
        </div>
    );
};
        
// ==================== 第二步：歷屆試題成績快速輸入介面 (PastpaperScoresInputView) ====================
const PastpaperScoresInputView = ({ currentCohort, activeStudents, pastpaperScores, setPastpaperScores, syncToCloud }) => {
    // 預設選擇第一份 Pastpaper
    const availablePapers = Object.keys(window.PASTPAPER_MAPS || {});
    const [selectedPaper, setSelectedPaper] = React.useState(availablePapers[0] || '');
    const [selectedStudentId, setSelectedStudentId] = React.useState(activeStudents[0]?.id || '');
    
    // 用來記錄所有輸入框的實體 DOM 位置，實現極速跳轉
    const inputRefs = React.useRef({});

    const map = window.PASTPAPER_MAPS?.[selectedPaper];

    // ★ 輔助函式：計算特定學生在該 Pastpaper 的分數
    const calculateStudentScore = (studentId, paperId) => {
        const currentMap = window.PASTPAPER_MAPS?.[paperId];
        if (!currentMap || !currentMap.questions) return { mcScore: 0, lqScore: 0, totalScore: 0, totalMax: 0, hasRecord: false };

        const studentScores = pastpaperScores[studentId]?.[paperId] || {};
        let mcScore = 0, lqScore = 0, totalMax = 0;
        let hasRecord = false;

        currentMap.questions.forEach(q => {
            const maxScore = q.max || 1;
            totalMax += maxScore;
            const savedVal = studentScores[q.id];
            
            if (savedVal !== undefined && savedVal !== null && savedVal !== '') {
                hasRecord = true;
                if (q.type === 'MC') {
                    if (q.ans) {
                        const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
                        const studentAnswer = savedVal.toString().toUpperCase().trim();
                        if (correctAnswers.includes(studentAnswer)) mcScore += maxScore;
                    }
                } else {
                    lqScore += parseFloat(savedVal) || 0;
                }
            }
        });

        return { mcScore, lqScore, totalScore: mcScore + lqScore, totalMax, hasRecord };
    };

   // ★ 神級輸入處理：支援 ABCD 也能支援 1/0，並自動記錄「完成月份」
    const handleScoreChange = (studentId, paperId, q, val) => {
        let processedVal = val.toString().toUpperCase().trim();
        
        if (q.type === 'MC') {
            if (processedVal === '1') {
                processedVal = q.ans ? q.ans.split(',')[0].trim().toUpperCase() : '1'; 
            } else if (processedVal === '0') {
                processedVal = 'X'; 
            } else if (processedVal !== '' && !['A', 'B', 'C', 'D', 'X'].includes(processedVal)) {
                return; 
            }
        } else {
            processedVal = val === '' ? '' : parseFloat(val);
            if (processedVal > q.max) processedVal = q.max; 
        }

        // 取得當前的真實月份 (例如 "2024-10")
        const currentMonth = new Date().toISOString().substring(0, 7);

        setPastpaperScores(prev => ({
            ...prev,
            [studentId]: {
                ...(prev[studentId] || {}),
                [paperId]: {
                    ...((prev[studentId] && prev[studentId][paperId]) || {}),
                    [q.id]: processedVal,
                    '_submitMonth': currentMonth // ★ 秘密加入時間戳！
                }
            }
        }));
    };

    // 極速自動跳轉邏輯
    const handleAutoAdvance = (qId, newVal, qType, qMax) => {
        if (newVal === '' || newVal === null) return;

        let shouldAdvance = false;
        if (qType === 'MC') {
            const valid = newVal.toString().toUpperCase().trim();
            if (['A', 'B', 'C', 'D', '1', '0', 'X'].includes(valid)) shouldAdvance = true;
        } else {
            if (newVal.toString().length >= 1 && (qMax || 1) < 10) shouldAdvance = true;
        }

        if (shouldAdvance) {
            const currentIndex = map.questions.findIndex(item => item.id === qId);
            if (currentIndex >= 0 && currentIndex < map.questions.length - 1) {
                const nextQ = map.questions[currentIndex + 1];
                setTimeout(() => {
                    if (inputRefs.current[nextQ.id]) {
                        inputRefs.current[nextQ.id].focus();
                        inputRefs.current[nextQ.id].select();
                    }
                }, 10);
            }
        }
    };

    if (!map) return (
        <div className="p-12 text-center text-slate-500 mt-10">
            <Icon name="Database" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">尚未設定任何歷屆試題 (Pastpaper)</h2>
            <p className="mt-2 text-sm">請先前往「Pastpaper 題庫設定」貼上您的 JSON 試卷藍圖。</p>
        </div>
    );

    const currentStudentStats = selectedStudentId ? calculateStudentScore(selectedStudentId, selectedPaper) : null;

    // ★ 核心升級：智慧分組邏輯
    // 檢查這張試卷是否為 Paper 2 (Electives)，透過檢查題目 ID 是否包含 E1, E2, E3, E4
    const isElectivePaper = map.questions.some(q => q.id.includes('-E1-') || q.id.includes('-E2-') || q.id.includes('-E3-') || q.id.includes('-E4-'));

    // 分組容器
    let groupedQuestions = {};

    if (isElectivePaper) {
        // 如果是 Paper 2，按 E1, E2, E3, E4 分組
        map.questions.forEach(q => {
            const match = q.id.match(/-E[1-4]-/);
            const electiveGroup = match ? match[0].replace(/-/g, '') : 'Other'; // 取出 E1, E2 等
            
            if (!groupedQuestions[electiveGroup]) {
                groupedQuestions[electiveGroup] = { mc: [], lq: [] };
            }
            if (q.type === 'MC') groupedQuestions[electiveGroup].mc.push(q);
            else groupedQuestions[electiveGroup].lq.push(q);
        });
    } else {
        // 如果是 Paper 1 (必修)，全部放在 'Core' 組
        groupedQuestions['Core'] = { 
            mc: map.questions.filter(q => q.type === 'MC'), 
            lq: map.questions.filter(q => q.type !== 'MC') 
        };
    }

    return (
        <div className="p-6 max-w-7xl mx-auto animate-fadeIn">
            {/* 頂部標頭與控制區 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Zap" className="text-indigo-600" /> Pastpaper 歷屆試題極速輸入
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">

                                                                        maxLength="1"

                                                                        value={currentVal}
                                                                        onChange={e => {
                                                                            const val = e.target.value;

                                                    <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                                                        {lq.map(q => {
                                                            const currentVal = (pastpaperScores[selectedStudentId]?.[selectedPaper] || {})[q.id] || '';
                                                            const shortId = q.id.split('-').pop();

                                                            return (
                                                                <div key={q.id} className={`flex items-center bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm focus-within:ring-2 focus-within:ring-${themeColor}-400 transition`}>

                                                                        ref={el => inputRefs.current[q.id] = el}
                                                                        type="number" 
                                                                        min="0" 
                                                                        max={q.max}
                                                                        step="0.5"
                                                                        className={`flex-1 w-full p-2 text-center font-bold text-${themeColor}-700 outline-none`}
                                                                        value={currentVal}
                                                                        placeholder="-"
                                                                        onChange={e => {
                                                                            const val = e.target.value;
                                                                            handleScoreChange(selectedStudentId, selectedPaper, q, val);
                                                                            handleAutoAdvance(q.id, val, q.type, q.max);
                                                                        }}
                                                                        onFocus={(e) => e.target.select()}
                                                                    />
                                                                    <div className="px-2 text-xs text-slate-400 font-mono bg-slate-50 h-full flex items-center border-l border-slate-100">
                                                                        /{q.max}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}

                            </div>
                        </>
                    )}
                </div>
            </div>
        </div>
    );
};

// ==================== 新增：歷屆試題 (Pastpaper) 藍圖設定組件 (自動即時存檔版 + AI Prompt) ====================
const PastpaperSettingsView = ({ syncToCloud }) => {
    const [pastpaperText, setPastpaperText] = React.useState('');
    const [status, setStatus] = React.useState('');

    // 載入目前的設定
    React.useEffect(() => {
        if (window.PASTPAPER_MAPS && Object.keys(window.PASTPAPER_MAPS).length > 0) {
            setPastpaperText(JSON.stringify(window.PASTPAPER_MAPS, null, 2));
        } else {
            // 提供預設的完美格式範本給同事參考
            setPastpaperText('{\n  "2023": {\n    "title": "2023 HKDSE Physics",\n    "questions": [\n      { "id": "2023-MC-01", "type": "MC", "max": 1, "level": "中", "topicId": "1.1.1", "topicDesc": "溫度計", "ans": "A" },\n      { "id": "2023-LQ-01", "type": "LQ", "max": 5, "level": "深", "topicId": "2.7.1", "topicDesc": "非彈性碰撞", "ans": "" }\n    ]\n  }\n}');
        }
    }, []);

    const handleSave = () => {
        try {
            const parsed = JSON.parse(pastpaperText);
            window.PASTPAPER_MAPS = parsed; // 更新全域變數
            
            setStatus('⏳ 更新成功，正在同步至雲端...');
            
            // ★ 解除註解，並強制將最新的 parsed 資料丟給 syncToCloud 打包上傳！
            syncToCloud({ pastpaperMaps: parsed }); 
            
            alert('✅ 歷屆試題題庫更新成功！\n\n系統已開始將您的變更同步至 Google Sheet，請留意畫面左下角的「✅ 雲端同步成功」提示。');
            setStatus('✅ 題庫已更新並觸發雲端儲存');
            
        } catch (err) {
            setStatus('❌ 儲存失敗：JSON 格式錯誤');
            alert('JSON 格式錯誤，請檢查您的輸入！\n錯誤詳情：' + err.message);
        }
    };

    // ---------- AI 快速 Prompt 內容 ----------
    const quickPromptText = `【身份】你是一位專門為香港高中物理（HKDSE）出題與分析的老師，學生程度為 Band 3。

【任務】我會上傳一份 HKDSE 物理科歷屆試卷（可能是 Paper 1A、Paper 1B、Paper 2 的 PDF / Word / 圖片），以及一個「課題 ID 對照表 Word 檔」。請你分析整份試卷，生成一個結構化的 JSON 物件，方便我直接貼到學校系統的 Pastpaper 題庫。

【輸出格式】
請輸出一個 JSON 物件（不要包含任何額外文字、註解或 Markdown 標記），格式如下：

{
  "{年份}-P1A": {
    "title": "{年份} HKDSE Physics - Paper 1A (MC)",
    "questions": [ ... ]
  },
  "{年份}-P1B": {
    "title": "{年份} HKDSE Physics - Paper 1B (LQ)",
    "questions": [ ... ]
  },
  "{年份}-P2": {
    "title": "{年份} HKDSE Physics - Paper 2 (Electives)",
    "questions": [ ... ]
  }
}

每個 question 物件包含以下欄位：
- id: 字串，題目 ID（規則見下）
- type: "MC" 或 "LQ"
- max: 數字，滿分
- level: 字串，"淺"、"中" 或 "深"
- topicId: 字串，從課題對照表比對出的編號（如 "1.1.1"、"E3.2.2"）
- topicDesc: 字串，根據題目內容撰寫的 20-30 字簡短描述
- ans: 字串，MC 題填正確選項代號 (A/B/C/D)，LQ 題填空字串 ""

【題目 ID 命名規則】
1. Paper 1A (全部 MC)
   - 格式：{年份}-MC-{題號}，題號用兩位數，如 01, 02 ... 33
   - 例：2014-MC-01

2. Paper 1B (全部 LQ)
   - 格式：{年份}-LQ-{大題號}{小題號}
   - 大題號用兩位數（01, 02 ...），小題號用 a, b, c, ... 或 bi, bii, ci, cii 等
   - 例：2014-LQ-01a, 2014-LQ-02bi, 2014-LQ-10biii

3. Paper 2 (只處理 E3 和 E4，跳過 E1、E2)
   - MC 題格式：{年份}-MC-E{3/4}-{題號}，題號用兩位數
     - 例：2014-MC-E3-01, 2014-MC-E4-08
   - LQ 題格式：{年份}-LQ-E{3/4}-{大題號}{小題號}
     - Paper 2 的 LQ 大題號通常延續整卷編號，例如 E3 的 LQ 可能標示為 "Q3"，則使用 "03"
     - 例：2014-LQ-E3-03a, 2014-LQ-E4-04bii
   - 如果試卷上沒有明確的大題號，請根據題目順序自行編號（如第一題 LQ 為 "01a"）

【滿分設定】
- MC 題：一律設為 1 分。
- LQ 題：請根據試卷標示的分數；若無標示，則依子題複雜度估計 (1-3 分，多步驟可 4 分以上)。LQ 子題的分數通常會在題目旁邊標明。

【難度判斷】
- 對象為香港 Band 3 學生。
- 淺：直接代入公式、基礎概念、單一步驟。
- 中：需兩步推理或結合兩個概念。
- 深：多步驟分析、綜合應用、繪圖、或需分辨常見誤解（可標註「殺手題」特徵）。

【課題對照 (topicId 與 topicDesc)】
- topicId：請根據題目內容，比對我上傳的「課題 ID 對照表 Word 檔」，找出最相關的課題 ID（例如 1.2.2, 2.6.1, E3.4.1）。若找不到精確對應，選擇最接近的。若仍無法判斷，可留空字串 ""。
- topicDesc：不要使用對照表中的原文，請你自己根據題目實際問的內容，用中文寫一個 20-30 字的描述。範例：
  - 「分析真空瓶減少熱增益（輻射與傳導）的物理原理」
  - 「利用 Snell's Law 計算半圓形玻璃塊對紅光的折射率」
  - 「應用風力發電功率方程計算風速變化時的平均輸出功率」

【MC 答案】
- 請從試卷提供的答案 (Answer Key) 或試卷本身標記的正確選項提取。若試卷未提供答案，可根據你的物理知識推斷並填入大寫字母，但不需解釋。

【絕對禁止】
- 不要輸出任何說明、表頭、或 Markdown 標記（例如 json）。
- 只輸出純 JSON 物件，且必須合法、可被 JSON.parse() 直接解析。
- 題目必須按照試卷順序排列，不能跳題或合併。`;

    const copyPromptToClipboard = () => {
        navigator.clipboard.writeText(quickPromptText);
        alert('Prompt 已複製！');
    };

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Database" className="text-indigo-600" /> Pastpaper 歷屆試題題庫設定
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">請在此貼上「新版整合格式」的 JSON 題庫資料。包含 MC 答案與 LQ 滿分配置。</p>
                </div>
                <div className="flex items-center gap-4">
                    {status && <span className={`text-sm font-bold ${status.includes('❌') ? 'text-red-600' : 'text-emerald-600'}`}>{status}</span>}
                    <button onClick={handleSave} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-lg shadow-md flex items-center gap-2 transition">
                        <Icon name="CloudUpload" size={18} /> 儲存並同步至雲端
                    </button>
                </div>
            </div>

            {/* ========== 快速 Prompt 複製區 ========== */}
            <div className="mb-4 p-3 bg-indigo-50 border border-indigo-200 rounded-lg">
                <div className="flex justify-between items-center mb-1">
                    <span className="text-xs font-bold text-indigo-700">🤖 AI 自動生成 Pastpaper JSON 用 Prompt</span>
                    <button 
                        onClick={copyPromptToClipboard}
                        className="text-xs bg-indigo-500 text-white px-2 py-1 rounded hover:bg-indigo-600"
                    >
                        複製 Prompt
                    </button>
                </div>
                <textarea 
                    readOnly 
                    className="w-full h-24 text-xs font-mono bg-white border border-indigo-100 rounded p-2 outline-none resize-none"
                    value={quickPromptText}
                />
                <div className="text-[10px] text-indigo-600 mt-1 space-y-0.5">
                    <p>1. 點擊「複製 Prompt」。</p>
                    <p>2. 到 ChatGPT / Claude 貼上，並 <b>同時上傳歷屆試卷檔案</b> 與 <b>課題 ID 對照表 Word 檔</b>。</p>
                    <p>3. 將 AI 回應的純 JSON 直接貼入下方文字框，即可儲存。</p>
                </div>
            </div>
            {/* ========== 快速 Prompt 複製區結束 ========== */}

            <div className="card p-5 border-2 border-indigo-100 bg-slate-50 shadow-sm flex flex-col h-[600px] rounded-xl">
                <label className="text-xs font-bold text-slate-700 mb-2 flex justify-between">
                    <span>📝 JSON 題庫編輯區 (請直接從 AI 產出的格式貼上)</span>
                    <span className="text-slate-400 font-normal">請確保 JSON 格式完全正確</span>
                </label>
                <textarea 
                    className="flex-1 w-full p-4 text-[13px] font-mono bg-slate-900 text-emerald-400 border border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none shadow-inner resize-none custom-scrollbar"
                    value={pastpaperText}
                    onChange={(e) => setPastpaperText(e.target.value)}
                    spellCheck="false"
                />
            </div>
            
            <div className="mt-6 bg-indigo-50 border border-indigo-200 p-4 rounded-xl shadow-sm">
                <h3 className="font-bold text-indigo-800 text-sm mb-2 flex items-center gap-1">
                    <Icon name="Info" size={16} /> 格式參考 (請交由 AI 協助轉換)
                </h3>
                <p className="text-xs text-indigo-600 mb-3">若您有舊版的 Pastpaper 資料，請將舊資料丟給 ChatGPT，並附上以下標準範本請它轉換：</p>
                <pre className="text-xs text-slate-600 bg-white p-4 rounded border border-indigo-100 overflow-x-auto shadow-inner font-mono">
{`{
  "2023": {
    "title": "2023 HKDSE Physics",
    "questions": [
      { "id": "2023-MC-01", "type": "MC", "max": 1, "level": "中", "topicId": "1.1.1", "topicDesc": "溫度計的使用", "ans": "A" },
      { "id": "2023-LQ-01", "type": "LQ", "max": 5, "level": "深", "topicId": "2.7.1", "topicDesc": "非彈性碰撞與動能計算", "ans": "" }
    ]
  }
}`}
                </pre>
            </div>
        </div>
    );
};
