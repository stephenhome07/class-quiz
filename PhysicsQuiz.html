                            <span className="bg-purple-100 text-purple-700 text-[10px] px-1.5 py-0.5 rounded">已選 {selectedStudentIds.length} 人</span>
                        </label>
                        <div className="flex items-center gap-2">
                            <select 
                                value={sortMode} 
                                onChange={(e)=>setSortMode(e.target.value)}
                                className="text-[10px] bg-white border border-slate-300 rounded outline-none p-0.5 text-slate-600 cursor-pointer"
                            >
                                <option value="score">依最低分排序</option>
                                <option value="class">依班級學號排序</option>
                            </select>
                            <button 
                                onClick={() => setSelectedStudentIds(selectedStudentIds.length === activeStudents.length ? [] : activeStudents.map(s => s.id))}
                                className="text-[10px] text-slate-500 hover:text-purple-600 underline font-semibold"
                            >
                                {selectedStudentIds.length === activeStudents.length ? '清空' : '全選'}
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto bg-white border border-slate-300 rounded-lg p-1.5 shadow-inner custom-scrollbar flex flex-col gap-1">
                        {sortedActiveStudents.map(s => {
                            const isChecked = selectedStudentIds.includes(s.id);
                            return (
                                <label key={s.id} className={`flex items-center gap-2 p-1.5 rounded cursor-pointer transition ${isChecked ? 'bg-purple-50' : 'hover:bg-slate-50'}`}>
                                    <input type="checkbox" checked={isChecked} onChange={() => toggleStudentSelection(s.id)} className="w-3.5 h-3.5 text-purple-600 rounded focus:ring-purple-500 cursor-pointer" />
                                    <div className="flex-1 flex justify-between items-center text-sm">
                                        <span className={`font-semibold text-xs ${isChecked ? 'text-purple-800' : 'text-slate-700'}`}>{s.class}({s.num}) {s.name}</span>
                                        <span className={`text-[10px] font-mono px-1 rounded ${sortMode === 'score' ? 'bg-amber-100 text-amber-800' : 'bg-slate-100 text-slate-500'}`}>
                                            {getStudentTotalScore(s.id)}分
                                        </span>
                                    </div>
                                </label>
                            );
                        })}
                    </div>
                </div>
            </div>

            {selectedStudentIds.length === 0 ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed">
                    <Icon name="Users" size={48} className="mx-auto mb-3 opacity-40 text-purple-300" />
                    <p className="text-sm font-medium text-slate-500">請從右上方勾選學生，展開他們的專屬補底清單</p>
                </div>
            ) : (
                <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
                    {/* 左側：學生列表與橫向課題 (佔 3 列) */}
                    <div className="lg:col-span-3 flex flex-col gap-3 h-[700px] overflow-y-auto custom-scrollbar pr-2">
                        {studentRemedialData.map(student => {
                            const isGeneratingForThisStudent = activePromptStudent === student.id;
                            
                            return (
                                <div key={student.id} className={`card p-4 border transition-all ${isGeneratingForThisStudent ? 'border-purple-400 shadow-md ring-1 ring-purple-400' : 'border-slate-200 shadow-sm hover:border-slate-300'}`}>
                                    {/* 學生標頭與進度條 */}
                                    <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-3 mb-3 border-b border-slate-100 pb-3">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 font-bold text-sm">
                                                {student.class}
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 text-base">{student.name} <span className="text-xs text-slate-400 font-normal ml-1">({student.num})</span></h3>
                                                <div className="text-[10px] text-slate-500">試卷得分: <span className="font-mono text-slate-700">{student.examScore}/{student.examMax}</span></div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex-1 max-w-[200px] w-full">
                                            <div className="flex justify-between text-[10px] font-bold mb-1">
                                                <span className="text-slate-500">補底進度</span>
                                                <span className={student.progressPct === 100 ? 'text-emerald-600' : 'text-purple-600'}>
                                                    {student.completedCount} / {student.totalWeakCount} ({student.progressPct}%)
                                                </span>
                                            </div>
                                            <div className="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
                                                <div 
                                                    className={`h-2 rounded-full transition-all duration-500 ${student.progressPct === 100 ? 'bg-emerald-500' : 'bg-purple-500'}`}
                                                    style={{ width: `${student.progressPct}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 橫向課題列表 */}
                                    {student.weakTopics.length === 0 ? (
                                        <div className="text-xs text-emerald-600 bg-emerald-50 p-2 rounded text-center font-bold">
                                            ✅ 該學生已掌握所有課題，無需補底！
                                        </div>
                                    ) : (
                                        <div className="flex flex-wrap gap-2">
                                            {student.weakTopics.map(t => {
                                                const isSelected = isGeneratingForThisStudent && selectedTopicsForPrompt.includes(t.topicId);
                                                return (
                                                    <div 
                                                        key={t.topicId}
                                                        onClick={() => handleTopicToggle(student.id, t.topicId)}
                                                        title={`盲點: ${t.descArray.join('; ')}`}
                                                        className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg border cursor-pointer transition text-xs select-none
                                                            ${isSelected ? 'bg-purple-600 border-purple-700 text-white shadow-sm' 
                                                            : t.isRecorded ? 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100' 
                                                            : 'bg-white border-slate-300 text-slate-700 hover:border-purple-300 hover:bg-purple-50'}`}
                                                    >
                                                        {isSelected ? <Icon name="CheckSquare" size={14} /> 
                                                         : t.isRecorded ? <Icon name="CheckCircle" size={14} /> 
                                                         : <Icon name="Square" size={14} className="opacity-50" />}
                                                        
                                                        <span className="font-bold font-mono">{t.topicId}</span>
                                                        <span className={`max-w-[120px] truncate ${isSelected ? 'text-purple-100' : 'text-slate-500'}`}>
                                                            {SYLLABUS_TOPICS[t.topicId] || '未定義'}
                                                        </span>
                                                        {!t.isRecorded && !isSelected && (
                                                            <span className="text-[9px] bg-red-100 text-red-600 px-1 rounded ml-1 font-mono">
                                                                {(t.pct * 100).toFixed(0)}%
                                                            </span>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* 右側：專屬 AI 練習生成 */}
                    <div className="lg:col-span-2 card p-5 border-2 border-purple-100 bg-gradient-to-br from-purple-50/50 to-white shadow-sm flex flex-col h-[700px]">
                        <div className="flex items-center gap-2 text-purple-800 font-bold text-base mb-2">
                            <Icon name="Cpu" className="text-purple-600" />
                            <span>個人專屬 Prompt 出題</span>
                        </div>
                        <p className="text-[11px] text-slate-500 mb-4 leading-relaxed">
                            {activePromptStudent ? (
                                <>目前正在為 <strong className="text-purple-700">{studentRemedialData.find(s=>s.id===activePromptStudent)?.name}</strong> 準備專屬練習。</>
                            ) : (
                                "請在左側點選課題。一次僅限為一位學生出題以保持針對性。"
                            )}
                        </p>
                        
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">輸出語言</label>
                                <select className="text-xs p-1 outline-none font-bold text-slate-700 bg-transparent" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                                    <option>繁體中文</option>
                                    <option>English</option>
                                </select>
                            </div>
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">題數分配</label>
                                <div className="flex items-center gap-1 text-xs px-1">
                                    MC:<input type="number" className="w-10 outline-none font-bold text-purple-700 border-b text-center mx-1 bg-transparent" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} min="0" max="20" />
                                    LQ:<input type="number" className="w-10 outline-none font-bold text-blue-700 border-b text-center mx-1 bg-transparent" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} min="0" max="20" />
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col mb-4">
                            <label className="text-xs font-bold text-slate-700 mb-1 flex justify-between">
                                <span>📝 專屬 Prompt 預覽</span>
                            </label>
                            <textarea 
                                className="flex-1 w-full p-3 text-[11px] font-mono bg-white border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none shadow-inner resize-none leading-relaxed"
                                value={generatedPrompt}
                                readOnly
                            />
                        </div>

                        <button 
                            onClick={handleCopyAndRecord}
                            className={`w-full font-bold py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition text-sm ${selectedTopicsForPrompt.length > 0 ? 'bg-purple-600 hover:bg-purple-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                        >
                            <Icon name="Copy" size={16} /> 複製 Prompt 並記錄該生進度
                        </button>
                    </div>

                </div>
            )}
        </div>
    );
};
        
// ==================== 升級版：考試成績匯出 (Excel) - 支援成績過濾與狀態記憶 ====================
const ExamExportView = ({ activeStudents, examScores }) => {
    // ★ 新增：從 localStorage 讀取上次選擇，若無則預設為空陣列
    const [selectedExams, setSelectedExams] = React.useState(() => {
        try {
            const saved = localStorage.getItem('dse_physics_export_selected');
            return saved ? JSON.parse(saved) : [];
        } catch (e) { 
            return []; 
        }
    });

    // ★ 新增：監聽選擇變化並存入 localStorage
    React.useEffect(() => {
        localStorage.setItem('dse_physics_export_selected', JSON.stringify(selectedExams));
    }, [selectedExams]);

    // ★ 新增：只篩選出「有入分」的試卷
    const availableExams = React.useMemo(() => {
        const examsWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = examScores[student.id] || {};
            Object.keys(studentScores).forEach(examId => {
                // 只要該學生該卷有任何一題有分，即視為有入分
                if (Object.keys(studentScores[examId]).length > 0) examsWithScores.add(examId);
            });
        });
        return Array.from(examsWithScores).sort(); // 加上 sort 讓顯示排序固定
    }, [activeStudents, examScores]);

    const toggleExam = (examId) => {
        setSelectedExams(prev => 
            prev.includes(examId) ? prev.filter(id => id !== examId) : [...prev, examId]
        );
    };

    // ★ 核心成績計算邏輯 (回傳分數、滿分及學段標記)
    const getCalculatedScores = (studentId, examId) => {
        const map = EXAM_MAPS[examId];
        if (!map) return { mc: 0, lq: 0, total: 0, mcMax: 0, lqMax: 0, totalMax: 0, isSenior: false };

        let mcScore = 0, lqScore = 0, mcMax = 0, lqMax = 0;
        const record = examScores[studentId]?.[examId] || {};

        map.questions.forEach(q => {
            if (q.type === 'MC') {
                mcMax += 1; // MC 每題 1 分
                const val = record[q.id];
                if (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) {
                    mcScore += 1;
                }
            } else {
                lqMax += q.max;
                const val = record[q.id];
                if (val !== undefined && val !== '') {
                    lqScore += parseFloat(val);
                }
            }
        });

        const titleStr = (examId + ' ' + map.title).toUpperCase();
        const isSenior = titleStr.includes('S4') || titleStr.includes('S5') || titleStr.includes('S6');
        
        let totalScore = 0;
        let totalMax = 100;
        if (isSenior) {
            // 高中卷：MC 佔 35%, LQ 佔 65%
            const mcPart = mcMax > 0 ? (mcScore / mcMax) * 35 : 0;
            const lqPart = lqMax > 0 ? (lqScore / lqMax) * 65 : 0;
            totalScore = parseFloat((mcPart + lqPart).toFixed(1));
            totalMax = 100;
        } else {
            // 初中卷 (S3)：直接加總
            totalScore = mcScore + lqScore;
            totalMax = mcMax + lqMax;
        }

        return { mc: mcScore, lq: lqScore, total: totalScore, mcMax, lqMax, totalMax, isSenior };
    };

    // ★ 智慧型樣式判斷：低於標準回傳紅色樣式
    const getCellStyles = (score, max, isSenior, isTotalColumn = false) => {
        if (max === 0) return "p-2 text-center text-slate-400 font-mono";
        
        // 根據學段決定及格百分比線 (高中 40%, 初中 50%)
        const passThreshold = isSenior ? 0.4 : 0.5;
        const isFail = (score / max) < passThreshold;

        if (isTotalColumn) {
            // 總分欄位：不及格直接亮紅底紅字，極度顯眼
            return `p-2 border-r border-slate-200 text-center font-bold font-mono transition ${
                isFail ? 'bg-red-50 text-red-600 font-black' : 'bg-slate-50/50 text-slate-800'
            }`;
        }
        // MC / LQ 分項欄位：不及格僅變紅字
        return `p-2 text-center font-mono ${isFail ? 'text-red-500 font-semibold' : 'text-slate-600'}`;
    };

    // ★ 計算某一卷目的班級平均分
    const getExamAverages = (examId) => {
        if (activeStudents.length === 0) return { mc: '0.0', lq: '0.0', total: '0.0' };
        
        let sumMc = 0, sumLq = 0, sumTotal = 0;
        activeStudents.forEach(s => {
            const res = getCalculatedScores(s.id, examId);
            sumMc += res.mc;
            sumLq += res.lq;
            sumTotal += res.total;
        });

        const count = activeStudents.length;
        return {
            mc: (sumMc / count).toFixed(1),
            lq: (sumLq / count).toFixed(1),
            total: (sumTotal / count).toFixed(1)
        };
    };

    // ★ 匯出 CSV 檔案給 Excel (包含最後一行的平均分)
    const exportToCSV = () => {
        if (selectedExams.length === 0) {
            alert('⚠️ 請至少選擇一份試卷進行匯出！');
            return;
        }

        let csvContent = '\uFEFF'; // 加入 BOM 預防 Excel 開啟時中文亂碼
        
        // 1. 建立標題列
        let headers = ['班別', '學號', '姓名'];
        selectedExams.forEach(examId => {
            const title = EXAM_MAPS[examId]?.title || examId;
            headers.push(`${title} MC`);
            headers.push(`${title} LQ`);
            headers.push(`${title} 總分`);
        });
        csvContent += headers.join(',') + '\n';

        // 2. 建立學生資料列
        activeStudents.forEach(s => {
            let row = [s.class, s.num, s.name];
            selectedExams.forEach(examId => {
                const scores = getCalculatedScores(s.id, examId);
                row.push(scores.mc, scores.lq, scores.total);
            });
            csvContent += row.join(',') + '\n';
        });

        // 3. ★ 新增：在 CSV 最後一行自動注入「全班平均分」
        let averageRow = ['全班平均分', '', ''];
        selectedExams.forEach(examId => {
            const avgs = getExamAverages(examId);
            averageRow.push(avgs.mc, avgs.lq, avgs.total);
        });
        csvContent += averageRow.join(',') + '\n';

        // 4. 觸發下載
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        const today = new Date().toISOString().slice(0, 10);
        link.download = `物理科考試成績報表(含平均分)_${today}.csv`;
        link.click();
    };

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            {/* 標頭與下載按鈕 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Download" className="text-green-600" /> 考試成績匯出 (Excel)
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">
                        系統僅顯示有成績記錄的試卷。自動標記不及格分數（<span className="text-red-600 font-bold">中三 &lt; 50%</span> / <span className="text-red-600 font-bold">高中 &lt; 40%</span>）。
                    </p>
                </div>
                <button 
                    onClick={exportToCSV}
                    className={`font-bold py-2.5 px-6 rounded-xl shadow-sm flex items-center justify-center gap-2 transition ${selectedExams.length > 0 ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                >
                    <Icon name="FileSpreadsheet" size={18} /> 下載報表 (含平均分)
                </button>
            </div>

            {/* 試卷勾選器 */}
            <div className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <label className="text-xs font-bold text-slate-700 mb-3 block">1. 選擇要匯出的試卷（自動過濾無成績試卷）：</label>
                <div className="flex flex-wrap gap-2">
                    {availableExams.length === 0 ? (
                        <span className="text-sm text-slate-400">目前沒有任何試卷有成績紀錄。</span>
                    ) : (
                        availableExams.map(examId => {
                            const isSelected = selectedExams.includes(examId);
                            const isSenior = (examId + ' ' + (EXAM_MAPS[examId]?.title || '')).toUpperCase().match(/S[456]/);
                            return (
                                <button 
                                    key={examId}
                                    onClick={() => toggleExam(examId)}
                                    className={`px-4 py-2 rounded-lg text-xs font-bold border transition flex items-center gap-2 ${
                                        isSelected ? 'bg-green-50 border-green-400 text-green-700 shadow-inner' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'
                                    }`}
                                >
                                    <Icon name={isSelected ? "CheckSquare" : "Square"} size={14} />
                                    {EXAM_MAPS[examId]?.title || examId}
                                    <span className="bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded text-[10px] ml-1">
                                        {isSenior ? '高中40%及格' : '初中50%及格'}
                                    </span>
                                </button>
                            );
                        })
                    )}
                </div>
            </div>

            {/* 報表即時預覽 (完整保留) */}
            {selectedExams.length > 0 && (
                <div className="card p-0 border border-slate-200 shadow-sm overflow-hidden flex flex-col max-h-[650px]">
                    <div className="p-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                        <h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm">
                            <Icon name="Eye" size={16} className="text-slate-500"/> 數據動態預覽
                        </h3>
                    </div>
                    
                    <div className="overflow-x-auto flex-1">
                        <table className="w-full text-left border-collapse whitespace-nowrap min-w-max">
                            <thead className="bg-slate-100/80 text-xs text-slate-600 shadow-sm sticky top-0 z-20">
                                <tr>
                                    <th className="p-3 border-b border-r border-slate-200 text-center w-12 bg-slate-100">班別</th>
                                    <th className="p-3 border-b border-r border-slate-200 text-center w-16 bg-slate-100">學號</th>
                                    <th className="p-3 border-b border-r border-slate-200 w-24 bg-slate-100">姓名</th>
                                    {selectedExams.map(examId => (
                                        <th key={examId} colSpan="3" className="p-3 border-b border-r border-slate-200 text-center bg-green-50 text-green-900 font-bold">
                                            {EXAM_MAPS[examId]?.title || examId}
                                        </th>
                                    ))}
                                </tr>
                                <tr>
                                    <th className="p-2 border-b border-r border-slate-200 bg-slate-50"></th>
                                    <th className="p-2 border-b border-r border-slate-200 bg-slate-50"></th>
                                    <th className="p-2 border-b border-r border-slate-200 bg-slate-50"></th>
                                    {selectedExams.map(examId => (
                                        <React.Fragment key={examId + '_sub'}>
                                            <th className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium w-16 bg-slate-50">MC</th>
                                            <th className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium w-16 bg-slate-50">LQ</th>
                                            <th className="p-2 border-b border-r border-slate-200 text-center text-slate-700 font-bold bg-slate-100 w-20">總分</th>
                                        </React.Fragment>
                                    ))}
                                </tr>
                            </thead>
                            
                            <tbody className="text-sm divide-y divide-slate-100">
                                {/* 學生分數列表 */}
                                {activeStudents.map(s => (
                                    <tr key={s.id} className="hover:bg-slate-50 transition">
                                        <td className="p-2 border-r border-slate-100 text-center text-slate-600 font-mono">{s.class}</td>
                                        <td className="p-2 border-r border-slate-100 text-center text-slate-600 font-mono">{s.num}</td>
                                        <td className="p-2 border-r border-slate-200 font-bold text-slate-700">{s.name}</td>
                                        {selectedExams.map(examId => {
                                            const res = getCalculatedScores(s.id, examId);
                                            return (
                                                <React.Fragment key={examId + '_scores'}>
                                                    <td className={getCellStyles(res.mc, res.mcMax, res.isSenior, false)}>{res.mc}</td>
                                                    <td className={getCellStyles(res.lq, res.lqMax, res.isSenior, false)}>{res.lq}</td>
                                                    <td className={getCellStyles(res.total, res.totalMax, res.isSenior, true)}>{res.total}</td>
                                                </React.Fragment>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>

                            {/* ★ 底部固定顯示：班級平均分 ★ */}
                            <tfoot className="sticky bottom-0 z-10 font-bold border-t-2 border-slate-300 bg-slate-100 text-slate-800 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                                <tr>
                                    <td className="p-3 border-r border-slate-200 text-center bg-slate-200" colSpan="3">班級平均分</td>
                                    {selectedExams.map(examId => {
                                        const avgs = getExamAverages(examId);
                                        return (
                                            <React.Fragment key={examId + '_avg_row'}>
                                                <td className="p-3 text-center text-purple-700 font-mono font-bold bg-slate-100">{avgs.mc}</td>
                                                <td className="p-3 text-center text-blue-700 font-mono font-bold bg-slate-100">{avgs.lq}</td>
                                                <td className="p-3 border-r border-slate-200 text-center text-emerald-700 font-mono font-black bg-emerald-50">{avgs.total}</td>
                                            </React.Fragment>
                                        );
                                    })}
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            )}
        </div>
    );
};

// ==================== 全新轉型版：學生動態管理與智慧升班組件 (名單識別升級 + 改名/改群組 + 篩選器) ====================
const StudentPromotionView = ({ students, setStudents, scores, setScores, syncToCloud }) => {
    // 取得所有現有群組，並排序
    const cohorts = Array.from(new Set(students.map(s => s.cohort || '未分組'))).filter(Boolean).sort();
    
    // 狀態設定
    const [selectedCohort, setSelectedCohort] = React.useState(cohorts[0] || '2025-2028');
    const [newCohort, setNewCohort] = React.useState(selectedCohort);
    const [pasteData, setPasteData] = React.useState('');
    const [previewList, setPreviewList] = React.useState(null);
    
    // 👇 新增：用於控制下方表格的學群篩選器狀態 👇
    const [filterCohort, setFilterCohort] = React.useState('全部');

    // 1. 當選擇的來源群組變更時，自動更新預設的目標群組
    React.useEffect(() => { 
        setNewCohort(selectedCohort); 
    }, [selectedCohort]);

    // 預覽與校對功能
    const handlePreview = () => {
        if (!pasteData.trim()) {
            alert('⚠️ 請先貼上新學期的 Excel 學生資料！');
            return;
        }

        const lines = pasteData.trim().split('\n');
        const incoming = [];
        
        lines.forEach(line => {
            const parts = line.split('\t');
            if (parts.length >= 3) {
                incoming.push({
                    cls: parts[0].trim(),
                    num: parts[1].trim(),
                    name: parts[2].trim()
                });
            }
        });

        if (incoming.length === 0) {
            alert('⚠️ 無法解析資料，請確認格式為：班別 (Tab) 座號 (Tab) 姓名');
            return;
        }

        const currentStudents = students.filter(s => s.cohort === selectedCohort);
        
        const preview = incoming.map(inc => {
            const match = currentStudents.find(s => s.name === inc.name);
            return { 
                ...inc, 
                exists: !!match, 
                oldId: match?.id, 
                oldClass: match?.class,
                oldNum: match?.num
            };
        });

        const notFound = currentStudents.filter(s => !incoming.find(i => i.name === s.name));
        
        setPreviewList({ preview, notFound });
    };

    // 執行正式升班/留班寫入
    const handleCommitPromotion = () => {
        let updatedStudents = [...students];
        let updatedScores = { ...scores };
        let promoteCount = 0;
        let newCount = 0;

        previewList.preview.forEach(item => {
            const newId = `${item.cls}-${item.num}`;
            const idx = updatedStudents.findIndex(s => s.name === item.name);
            
            if (idx !== -1) {
                const oldId = updatedStudents[idx].id;
                updatedStudents[idx] = { 
                    ...updatedStudents[idx], 
                    id: newId, 
                    class: item.cls, 
                    num: item.num, 
                    cohort: newCohort 
                };
                
                if (oldId !== newId && updatedScores[oldId]) {
                    updatedScores[newId] = updatedScores[oldId];
                    delete updatedScores[oldId];
                }
                promoteCount++;
            } else {
                updatedStudents.push({ 
                    id: newId, 
                    class: item.cls, 
                    num: item.num, 
                    name: item.name, 
                    cohort: newCohort 
                });
                newCount++;
            }
        });

        setStudents(updatedStudents);
        setScores(updatedScores);

        if (typeof syncToCloud === 'function') {
            syncToCloud({ students: updatedStudents, scores: updatedScores });
        }

        setPreviewList(null);
        setPasteData('');
        alert(`🎉 升班/更新程序已完成！\n\n更新舊生資料：${promoteCount} 人\n新增學生：${newCount} 人\n\n(所有變更已安全寫入 PHYSICS DB 雲端)`);
    };

    const handleCancelPreview = () => setPreviewList(null);

    // 快速修改學生姓名
    const handleEditName = (id, currentName) => {
        const newName = window.prompt(`📝 修改學生姓名\n\n請輸入學生 [${currentName}] 的正確新姓名：`, currentName);
        if (newName === null) return; 
        
        const trimmedName = newName.trim();
        if (!trimmedName) {
            alert('⚠️ 姓名不能為空白！');
            return;
        }

        if (trimmedName !== currentName) {
            const updatedStudents = students.map(s => s.id === id ? { ...s, name: trimmedName } : s);
            setStudents(updatedStudents);
            if (typeof syncToCloud === 'function') syncToCloud({ students: updatedStudents });
            alert(`✅ 姓名已更新並同步至雲端！`);
        }
    };

    // 👇 新增：單獨修改個別學生的學群 (Cohort) 👇
    const handleEditCohort = (id, currentName, currentCohort) => {
        const newCohortVal = window.prompt(`📝 修改學生學群\n\n請輸入學生 [${currentName}] 的新學群 (Cohort)：`, currentCohort || '');
        if (newCohortVal === null) return; 
        
        const trimmedCohort = newCohortVal.trim();
        if (trimmedCohort !== currentCohort) {
            const updatedStudents = students.map(s => s.id === id ? { ...s, cohort: trimmedCohort } : s);
            setStudents(updatedStudents);
            if (typeof syncToCloud === 'function') syncToCloud({ students: updatedStudents });
            alert(`✅ 學群已更新並同步至雲端！`);
        }
    };

    // 刪除學生
    const handleDeleteStudent = (id, name) => {
        if (!window.confirm(`❌ 確定要徹底移除學生「${name}」嗎？\n警告：這將會同時刪除該學生的所有小測與功課分數！`)) return;

        const updatedStudents = students.filter(s => s.id !== id);
        let updatedScores = { ...scores };
        delete updatedScores[id];

        setStudents(updatedStudents);
        setScores(updatedScores);

        if (typeof syncToCloud === 'function') syncToCloud({ students: updatedStudents, scores: updatedScores });
    };

    // 👇 新增：計算過濾後的學生名單 👇
    const filteredStudents = filterCohort === '全部' 
        ? students 
        : students.filter(s => s.cohort === filterCohort);

    return (
        <div className="p-6 max-w-5xl mx-auto animate-fadeIn">
            {/* 標頭 */}
            <div className="mb-6 border-b pb-4">
                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <Icon name="UserCheck" className="text-purple-600" /> 學生動態管理與智慧升班 (新學年轉換)
                </h1>
                <p className="text-sm text-slate-500 mt-1">在新學年貼上新名單進行預覽，系統會自動根據「姓名」對應舊生進行班級座號升級，並完美遷移所有分數紀錄。</p>
            </div>

            {/* Excel 智慧升班輸入區塊 */}
            <div className="card p-5 mb-6 bg-purple-50/40 border border-purple-100 shadow-sm rounded-xl">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div className="bg-white p-3 rounded-lg border border-purple-100 shadow-sm">
                        <label className="block text-sm font-bold text-purple-900 mb-1">1. 選擇要處理的來源群組 (Cohort)：</label>
                        <select 
                            className="w-full p-2 border border-purple-200 rounded text-sm text-slate-700 outline-none focus:border-purple-500"
                            value={selectedCohort} 
                            onChange={e => setSelectedCohort(e.target.value)}
                        >
                            {cohorts.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>
                    
                    <div className="bg-white p-3 rounded-lg border border-purple-100 shadow-sm">
                        <label className="block text-sm font-bold text-purple-900 mb-1">2. 升級後的目標群組 (可手動修改/留班)：</label>
                        <input 
                            type="text" 
                            className="w-full p-2 border-b-2 border-purple-300 font-bold text-purple-700 outline-none focus:border-purple-600 bg-transparent font-mono text-sm" 
                            value={newCohort} 
                            onChange={e => setNewCohort(e.target.value)} 
                            placeholder="例: 2025-2028"
                        />
                    </div>
                </div>

                <p className="text-xs text-slate-600 mb-2 font-medium">3. 請從 Excel 複製新學期的名單（3 欄：<b>班別 (Tab) 座號 (Tab) 姓名</b>）並貼在下方：</p>
                <textarea 
                    className="w-full h-36 p-3 border border-slate-200 rounded-lg text-sm mb-3 outline-none focus:ring-2 focus:ring-purple-400 shadow-inner bg-white font-mono" 
                    value={pasteData} 
                    onChange={e => setPasteData(e.target.value)} 
                    placeholder="例如新學期的資料：&#10;6A&#9;27&#9;謝宇邦&#10;6B&#9;05&#9;張小明"
                    disabled={previewList !== null} 
                />
                
                {!previewList ? (
                    <button onClick={handlePreview} className="bg-purple-600 text-white px-6 py-2.5 rounded-lg shadow-md hover:bg-purple-700 font-bold flex items-center gap-2 transition w-full md:w-auto justify-center">
                        <Icon name="Eye" size={18} /> 預覽升班結果
                    </button>
                ) : (
                    <div className="flex gap-3">

// ==================== 升級版：功課內容與藍圖設定組件 ====================
const HomeworkSettingsView = ({ students, currentCohort, homeworkMaps, setHomeworkMaps, syncToCloud }) => {
    const cohorts = Array.from(new Set(students.map(s => s.cohort))).filter(Boolean).sort();
    const [selectedCohort, setSelectedCohort] = React.useState(currentCohort !== '所有學生' ? currentCohort : (cohorts[0] || ''));
    
    const [hwId, setHwId] = React.useState('');
    const [hwTitle, setHwTitle] = React.useState('');
    const [pasteData, setPasteData] = React.useState('');

    const handleSave = () => {
        if (!hwId || !hwTitle || !pasteData || !selectedCohort) return alert('請填寫完整資訊並選擇群組！');

        const lines = pasteData.trim().split('\n');
        const questions = lines.map(line => {
            const cleanLine = line.trim();
            if (!cleanLine) return null;
            let cols = cleanLine.split('\t');
            if (cols.length < 3 && cleanLine.includes(',')) cols = cleanLine.split(',');
            if (cols.length < 3) cols = cleanLine.split(/\s{2,}/);
            if (cols.length < 3) {
                const parts = cleanLine.split(/\s+/);
                if (parts.length >= 6) cols = [ parts[0], parts[1], parts[2], parts[3], parts[4], parts.slice(5).join(' ') ];
            }
            let maxScore = parseFloat(cols[2]);
            if (isNaN(maxScore) || maxScore <= 0) maxScore = 1;
            return {
                id: cols[0]?.trim() || '', type: cols[1]?.trim().toUpperCase() || 'LQ', max: maxScore, 
                level: cols[3]?.trim() || '中', topicId: cols[4]?.trim() || '', topicDesc: cols[5]?.trim() || '', ans: cols[6]?.trim() || ''
            };
        }).filter(q => q && q.id && !q.id.includes('題目ID')); 

        if (questions.length === 0) return alert('無法解析題目，請檢查格式是否正確。');

        // ★ 核心修復：強制更新狀態並同步
        const newMaps = { ...homeworkMaps, [hwId]: { title: hwTitle, cohort: selectedCohort, questions: questions } };
        setHomeworkMaps(newMaps);
        syncToCloud({ homeworkMaps: newMaps }); 
        
        alert(`✅ 群組 [${selectedCohort}] 的功課 [${hwId}] 設定已儲存！`);
        setHwId(''); setHwTitle(''); setPasteData('');
    };

    const handleDelete = (id) => {
        if (confirm(`確定要刪除功課 [${id}] 的設定嗎？`)) {
            const newMaps = { ...homeworkMaps };
            delete newMaps[id];
            setHomeworkMaps(newMaps);
            syncToCloud({ homeworkMaps: newMaps });
        }
    };

    const filteredHomeworks = Object.keys(homeworkMaps || {}).filter(id => 
        !homeworkMaps[id].cohort || homeworkMaps[id].cohort === selectedCohort
    );

    return (
        <div className="p-6 max-w-5xl mx-auto animate-fadeIn">
            <div className="border-b pb-4 mb-6">
                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <Icon name="BookType" className="text-amber-500" /> 功課內容與藍圖設定
                </h1>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-1 space-y-4">
                    <div className="card p-5 border border-slate-200 shadow-sm bg-slate-50">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-slate-700 text-sm">現有功課清單</h3>
                            <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold">{selectedCohort}</span>
                        </div>
                        <div className="space-y-2 max-h-[500px] overflow-y-auto pr-1">
                            {filteredHomeworks.length === 0 && <p className="text-xs text-slate-400">此群組目前沒有設定任何功課。</p>}
                            {filteredHomeworks.map(id => (
                                <div key={id} className="p-3 bg-white border border-slate-200 rounded-lg shadow-sm flex justify-between items-start">
                                    <div>
                                        <div className="font-bold text-amber-700 text-sm font-mono">{id}</div>
                                        <div className="text-xs text-slate-600 font-bold mt-0.5">{homeworkMaps[id].title}</div>
                                        <div className="text-[10px] text-slate-400 mt-1">共 {homeworkMaps[id].questions.length} 題</div>
                                    </div>
                                    <button onClick={() => handleDelete(id)} className="text-red-400 hover:text-red-600 p-1"><Icon name="Trash2" size={14} /></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
                <div className="lg:col-span-2 card p-5 border border-slate-200 shadow-sm">
                    <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center gap-2">
                        <Icon name="PlusCircle" size={16} className="text-amber-500" /> 新增 / 覆寫功課
                    </h3>
                    <div className="grid grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">所屬群組</label>
                            <select value={selectedCohort} onChange={e=>setSelectedCohort(e.target.value)} className="w-full p-2 border rounded font-bold text-sm bg-slate-50 outline-none">
                                {cohorts.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">功課編號</label>
                            <input type="text" className="w-full p-2 border rounded font-mono font-bold text-sm outline-none" value={hwId} onChange={e=>setHwId(e.target.value.toUpperCase())} placeholder="HW-01" />
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1 block">功課標題</label>
                            <input type="text" className="w-full p-2 border rounded font-bold text-sm outline-none" value={hwTitle} onChange={e=>setHwTitle(e.target.value)} placeholder="第一章 磁場" />
                        </div>
                    </div>
                    <div>
                        <textarea className="w-full h-64 p-3 text-xs font-mono bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400" value={pasteData} onChange={e=>setPasteData(e.target.value)} placeholder="可直接包含首行標題列貼上..." />
                    </div>
                    <button onClick={handleSave} className="w-full mt-4 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg shadow transition flex items-center justify-center gap-2">
                        <Icon name="Save" size={16} /> 儲存功課設定並同步至雲端
                    </button>
                </div>
            </div>
        </div>
    );
};

// ==================== 升級版：功課批改與狀態追蹤組件 ====================
const HomeworkScoresInputView = ({ activeStudents, currentCohort, homeworkMaps, homeworkScores, setHomeworkScores, syncToCloud }) => {
    const availableHws = Object.keys(homeworkMaps || {}).filter(id => !homeworkMaps[id].cohort || homeworkMaps[id].cohort === currentCohort);
    const [selectedHw, setSelectedHw] = React.useState(availableHws[0] || '');
    const [selectedStudentId, setSelectedStudentId] = React.useState('');
    const [currentEdit, setCurrentEdit] = React.useState(null);
    const [saveStatus, setSaveStatus] = React.useState('idle'); 
    const [filterStatus, setFilterStatus] = React.useState('ALL'); 

    React.useEffect(() => {
        if (availableHws.length > 0 && !availableHws.includes(selectedHw)) setSelectedHw(availableHws[0]);
        else if (availableHws.length === 0) setSelectedHw('');
    }, [currentCohort, homeworkMaps]);

    const map = homeworkMaps[selectedHw];
    if (!map) return (
        <div className="p-12 text-center text-slate-500 mt-10">
            <Icon name="AlertCircle" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">目前群組尚未設定功課</h2>
        </div>
    );

    const handleSelectStudent = (sId) => {
        setSelectedStudentId(sId);
        const record = homeworkScores[sId]?.[selectedHw] || { scores: {}, remakeStatus: 'MISSING', remarks: '', gradingDate: '', remakeDate: '' };
        setCurrentEdit(JSON.parse(JSON.stringify(record)));
        setSaveStatus('idle'); 
    };

    const handleScoreChange = (qId, val) => setCurrentEdit(prev => ({ ...prev, scores: { ...prev.scores, [qId]: val } }));

    const getLevelBadge = (level) => {
        if (level === '淺') return 'bg-emerald-50 text-emerald-700 border-emerald-200';
        if (level === '中') return 'bg-blue-50 text-blue-700 border-blue-200';
        if (level === '深') return 'bg-rose-50 text-rose-700 border-rose-200';
        return 'bg-slate-50 text-slate-600 border-slate-200';
    };

    let liveTotal = 0; let liveMax = 0;
    if (currentEdit) {
        map.questions.forEach(q => {
            liveMax += q.max;
            const val = currentEdit.scores[q.id];
            if (q.type === 'MC') {
                if (val && q.ans && val.toString().toUpperCase() === q.ans.toUpperCase()) liveTotal += q.max;
            } else { liveTotal += (val === '' || val === undefined ? 0 : parseFloat(val)); }
        });
    }
    const pct = liveMax > 0 ? liveTotal / liveMax : 0;
    let grade = 'E'; let gradeColor = 'text-red-500 bg-red-50 border-red-200';
    if (pct >= 0.8) { grade = 'A'; gradeColor = 'text-emerald-600 bg-emerald-50 border-emerald-200'; }
    else if (pct >= 0.6) { grade = 'B'; gradeColor = 'text-blue-600 bg-blue-50 border-blue-200'; }
    else if (pct >= 0.4) { grade = 'C'; gradeColor = 'text-amber-600 bg-amber-50 border-amber-200'; }
    else if (pct >= 0.2) { grade = 'D'; gradeColor = 'text-orange-500 bg-orange-50 border-orange-200'; }

    const handleSaveRecord = () => {
        if (!selectedStudentId || !currentEdit) return;
        setSaveStatus('saving');
        const today = new Date().toISOString().slice(0, 10);
        let newStatus = currentEdit.remakeStatus;
        if (liveTotal === liveMax) newStatus = 'PERFECT';
        else if (newStatus === 'MISSING' || !newStatus) newStatus = 'PENDING';

        const finalRecord = { ...currentEdit, remakeStatus: newStatus, gradingDate: currentEdit.gradingDate || today };
        
        // ★ 核心修復：強制更新狀態並同步
        const newScores = { ...homeworkScores, [selectedStudentId]: { ...(homeworkScores[selectedStudentId] || {}), [selectedHw]: finalRecord } };
        setHomeworkScores(newScores);

        setTimeout(() => {
            syncToCloud({ homeworkScores: newScores });
            setSaveStatus('saved');
            setTimeout(() => setSaveStatus('idle'), 1500);
        }, 300);
    };

    const handleMarkAsRemade = () => setCurrentEdit(prev => ({ ...prev, remakeStatus: 'DONE', remakeDate: new Date().toISOString().slice(0, 10) }));

    const filteredStudents = activeStudents.filter(s => {
        const status = homeworkScores[s.id]?.[selectedHw]?.remakeStatus || 'MISSING';
        if (filterStatus === 'PENDING') return status === 'PENDING';
        if (filterStatus === 'MISSING') return status === 'MISSING';
        return true;
    });

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icon name="BookOpenCheck" className="text-amber-500" /> 功課批改與狀態追蹤</h1>
                </div>
                <select className="p-2.5 border border-slate-300 rounded-lg font-bold bg-white focus:ring-2 focus:ring-amber-400 outline-none shadow-sm min-w-[200px]" value={selectedHw} onChange={(e) => { setSelectedHw(e.target.value); setSelectedStudentId(''); setCurrentEdit(null); }}>
                    {availableHws.map(k => <option key={k} value={k}>{k} - {homeworkMaps[k].title}</option>)}
                </select>
            </div>
            <div className="flex flex-col md:flex-row gap-6">
                <div className="w-full md:w-1/3 card p-0 border border-slate-200 shadow-sm overflow-hidden flex flex-col max-h-[650px]">
                    <div className="p-3 bg-slate-50 border-b font-bold text-sm text-slate-700 flex flex-col gap-2">
                        <div className="flex justify-between items-center"><span>選擇學生</span><span className="text-[10px] font-normal text-slate-500 bg-white px-2 py-0.5 rounded border">共 {filteredStudents.length} 人</span></div>
                        <div className="flex gap-1 bg-slate-200/50 p-1 rounded-md">
                            <button onClick={()=>setFilterStatus('ALL')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='ALL' ? 'bg-white shadow-sm text-slate-700' : 'text-slate-500 hover:bg-slate-200'}`}>全部</button>
                            <button onClick={()=>setFilterStatus('PENDING')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='PENDING' ? 'bg-white shadow-sm text-red-600' : 'text-slate-500 hover:bg-slate-200'}`}>欠改正</button>
                            <button onClick={()=>setFilterStatus('MISSING')} className={`flex-1 text-[10px] py-1 rounded font-bold transition-colors ${filterStatus==='MISSING' ? 'bg-white shadow-sm text-slate-600' : 'text-slate-500 hover:bg-slate-200'}`}>未交/未改</button>
                        </div>

const App = () => {

            // ★ 將這裡換成你剛剛複製的 Google Apps Script 網址 ★
            const API_URL = 'https://script.google.com/macros/s/AKfycbz1DKuoBED9iaxYRzctOqfpZhLEtJJScjPyqujHWAPoZjHHpX_3z2T0iqtqob3am9WeuQ/exec';

            const [view, setView] = React.useState('students');

    // 在 App 內的 useState 區塊加入以下狀態：
            const [remediationProgress, setRemediationProgress] = React.useState({});

           // 自動從現有學生名單中抓取所有不重複的群組名稱 (加入防護罩)
            const allCohorts = ['所有學生', ...new Set((students || []).map(s => s.cohort || '2024-2027'))];
            
            // 從老師的瀏覽器記憶中讀取上次選的群組，預設為 '所有學生'
            const [currentCohort, setCurrentCohort] = React.useState(localStorage.getItem('saved_cohort') || '所有學生');
            
            // 當老師切換群組時，自動記在瀏覽器裡 (下次打開不用重選)

            const activeStudents = currentCohort === '所有學生'

 // 1. 初次載入時，從 Google 雲端讀取資料
            React.useEffect(() => {
                fetch(API_URL)
                    .then(res => res.json())
                    .then(data => {
                        // ★ 安全賦值：確保大綱與測驗藍圖就算空白，也一定會建立變數，防範系統崩潰
                        window.SYLLABUS_TOPICS = data.syllabus || {};

                        if (typeof SYLLABUS_TOPICS !== 'undefined') SYLLABUS_TOPICS = window.SYLLABUS_TOPICS;
                        if (typeof QUIZ_MAPS !== 'undefined') QUIZ_MAPS = window.QUIZ_MAPS;
                        if (typeof EXAM_MAPS !== 'undefined') EXAM_MAPS = window.EXAM_MAPS;
                        
                        setStudents(Array.isArray(data.students) ? data.students : []);
                        setScores((typeof data.scores === 'object' && data.scores !== null) ? data.scores : {});
                        setExamScores((typeof data.examScores === 'object' && data.examScores !== null) ? data.examScores : {});
                        setRemediationProgress((typeof data.remediationProgress === 'object' && data.remediationProgress !== null) ? data.remediationProgress : {});
                        
                        // ★ 核心修復：正確載入功課狀態，重整網頁不再洗白
                        setHomeworkMaps((typeof data.homeworkMaps === 'object' && data.homeworkMaps !== null) ? data.homeworkMaps : {});

            // ★ 終極修復：加入 Try-Catch 與絕對安全的打包機制
            const syncToCloud = (overrideData = {}) => {

                try {
                    // 絕對安全的讀取方式，保證不會因為變數遺失而觸發當機
                    const safeSyllabus = typeof SYLLABUS_TOPICS !== 'undefined' ? SYLLABUS_TOPICS : (window.SYLLABUS_TOPICS || {});
                    const safeQuizMaps = typeof QUIZ_MAPS !== 'undefined' ? QUIZ_MAPS : (window.QUIZ_MAPS || {});

                    fetch(API_URL, {

                            const scoresObj = studentExams[examId] || {};
                            // 檢查這張試卷內是否最少有一題有打分數
                            const hasScore = Object.values(scoresObj).some(score => score !== '' && score !== null && score !== undefined);
                            if (hasScore) {
                                validExamIds.add(examId);
                            }
                        });
                    }
                });

                // 只回傳有被記錄到 (至少一人有分) 的試卷藍圖
                const filteredMaps = {};
                Object.keys(currentExamMaps).forEach(key => {
                    if (validExamIds.has(key)) {
                        filteredMaps[key] = currentExamMaps[key];
                    }
                });
                return filteredMaps;
            };




                  
                if (isLoading) return <div className="flex h-screen items-center justify-center text-xl font-bold text-slate-500 animate-pulse">載入雲端資料中...</div>;
        
                // ★ 核心分流邏輯：如果有 sid，就只渲染學生畫面，完全隱藏老師 Sidebar
                if (studentSid) {
                    return (
                        <StudentPortalView 
                            studentId={studentSid} 
                            students={students} 
                            examScores={examScores} 
                            homeworkScores={homeworkScores} 
                        />
                    );
                }

            return (
                     <div className="flex h-screen w-full overflow-hidden">
                        {/* Sidebar 不需要固定，直接由 flex 控制寬度 */}
                        <div className="w-64 flex-shrink-0">
                            {/* 1. Sidebar 獨立佔據左邊，擁有自己的捲軸 */}
                            <Sidebar 
                                view={view} 
                                setView={setView} 
                                currentCohort={currentCohort} 
                                setCurrentCohort={setCurrentCohort}
                                allCohorts={allCohorts}
                                isSaving={isSaving}
                            />
                        </div>
                            
                  
                        <div className="flex-1 h-screen overflow-y-auto bg-slate-100">
                                <div className="p-8">
                    {/* 更新：傳入 scores 和 syncToCloud，實現自動存檔 */}
                    {view === 'students' && <StudentView students={students} setStudents={setStudents} scores={scores} setScores={setScores} syncToCloud={syncToCloud} />}
                    {view === 'scores' && <ScoreInputView activeStudents={activeStudents} scores={scores} setScores={setScores} />}
                    {view === 'analysis' && <AnalysisView activeStudents={activeStudents} scores={scores} />}
      
                    {view === 'chart' && <StudentChartView activeStudents={activeStudents} scores={scores} />}
                    {view === 'topicAnalysis' && <TopicAnalysisView activeStudents={activeStudents} scores={scores} />}
                    {view === 'classSummary' && <ClassSummaryView activeStudents={activeStudents} scores={scores} />}
                    {view === 'backup' && <BackupView students={students} setStudents={setStudents} scores={scores} setScores={setScores} />}
                    {view === 'settings' && <SettingsView />}

                    {view === 'syllabusSettings' && <SyllabusSettingsView syncToCloud={syncToCloud} />}
                    {view === 'quizSettings' && <QuizSettingsView syncToCloud={syncToCloud} />}
                    {view === 'examSettings' && <ExamSettingsView syncToCloud={syncToCloud} />}
                    {view === 'examScoresInput' && <ExamScoresInputView activeStudents={activeStudents} examScores={examScores} setExamScores={setExamScores} syncToCloud={syncToCloud} />}
                    {view === 'examAnalysis' && <ExamAnalysisView activeStudents={activeStudents} examScores={examScores} currentCohort={currentCohort} getRelevantExamMaps={getRelevantExamMaps} />}

                    {view === 'studentExamAnalysis' && <StudentExamAnalysisView activeStudents={activeStudents} examScores={examScores} />} 
                    {view === 'remedialPractice' && <RemedialPracticeView activeStudents={activeStudents} examScores={examScores} remediationProgress={remediationProgress} setRemediationProgress={setRemediationProgress} syncToCloud={syncToCloud} />}
                    {view === 'examExport' && <ExamExportView activeStudents={activeStudents} examScores={examScores} />}
                    {/* 新增智慧升班頁面的切換邏輯 */}
                    {view === 'studentPromotion' && (
                        <StudentPromotionView 
                            students={students} 
                            setStudents={setStudents} 
                            scores={scores} 
                            setScores={setScores} 
                            syncToCloud={syncToCloud} 
                        />
                    )}

                    
                    {/* 更新：功課管理頁面傳入完整的狀態與更新函數 */}
                    {view === 'homeworkSettings' && <HomeworkSettingsView students={students} currentCohort={currentCohort} homeworkMaps={homeworkMaps} setHomeworkMaps={setHomeworkMaps} syncToCloud={syncToCloud} />}
                    {view === 'homeworkScoresInput' && <HomeworkScoresInputView activeStudents={activeStudents} currentCohort={currentCohort} homeworkMaps={homeworkMaps} homeworkScores={homeworkScores} setHomeworkScores={setHomeworkScores} syncToCloud={syncToCloud} />}
                            </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
