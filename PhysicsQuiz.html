                                        ></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

            </div>

            {/* 3. 全班試後檢討 AI 教案生成控制台 */}
            <div className="card p-5 border-2 border-purple-100 bg-gradient-to-r from-purple-50/40 to-white shadow-sm">
                <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2 text-purple-800 font-bold text-base">
                        <Icon name="Sparkles" className="text-purple-600 animate-pulse" />
                        <span>大考過卷檢討 AI 教案生成控制台</span>
                    </div>
                </div>
                
                <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-4">
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">輸出語言</label>
                        <select className="text-xs p-1 outline-none font-medium text-slate-700 bg-transparent" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                            <option>繁體中文</option>
                            <option>English</option>
                            <option>雙語 (Bilingual)</option>
                        </select>
                    </div>
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">教案題型</label>
                        <select className="text-xs p-1 outline-none font-medium text-slate-700 bg-transparent" value={aiType} onChange={e=>setAiType(e.target.value)}>
                            <option>MC+LQ</option>
                            <option>只限 多項選擇題 (MC)</option>
                            <option>只限 長題目 (LQ)</option>
                        </select>
                    </div>
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">衍生新 MC 數量</label>
                        <input type="number" className="text-xs p-1 outline-none font-bold text-purple-700 bg-transparent" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} min="0" max="20" />
                    </div>
                    <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                        <label className="text-[11px] font-bold text-slate-500">衍生新 LQ 數量</label>
                        <input type="number" className="text-xs p-1 outline-none font-bold text-blue-700 bg-transparent" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} min="0" max="20" />
                    </div>
                </div>

                <div className="mb-4">
                    <label className="text-xs font-bold text-slate-700 mb-1 block flex justify-between">
                        <span>📝 AI Prompt 預覽與編輯框</span>
                        <span className="text-slate-400 font-normal">您可在此直接手動增減文字後再複製</span>
                    </label>
                    <textarea 
                        className="w-full h-80 p-3 text-xs font-mono bg-white border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none shadow-inner"
                        value={generatedPrompt}
                        onChange={(e) => setGeneratedPrompt(e.target.value)}
                    />
                </div>

                <button 
                    onClick={copyPrompt}
                    className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2.5 px-4 rounded-lg shadow flex items-center justify-center gap-2 transition text-sm"
                >
                    <Icon name="Copy" size={16} /> 複製以上 AI 提示詞
                </button>
            </div>
        </div>
    );
};

        
// ==================== 更新版：個人大考分析、跨卷進度（支援 MC 雙重答案 A,C、修復 React 31 錯誤） ====================
const StudentExamAnalysisView = ({ activeStudents = [], examScores = {} }) => {
    // 狀態設定
    const [selectedExams, setSelectedExams] = React.useState([]);
    const [selectedStudentId, setSelectedStudentId] = React.useState('');

    // 左側課題追蹤的趨勢版塊切換狀態 ('down': 退步, 'up': 進步, 'stable': 平穩)
    const [trendTab, setTrendTab] = React.useState('down');

    // AI 參數設定狀態
    const [aiLang, setAiLang] = React.useState('雙語 (Bilingual)');
    const [aiMcCount, setAiMcCount] = React.useState('5'); 
    const [aiLqCount, setAiLqCount] = React.useState('3'); 
    const [generatedPrompt, setGeneratedPrompt] = React.useState('');

    // 🔥 智慧過濾 A：找出目前 Sidebar 傳進來的學生中，到底「哪些考卷」真正有成績
    const availableExams = React.useMemo(() => {
        const examsWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = examScores[student.id];
            if (studentScores) {
                // 檢查該學生的每一份試卷，確認裡面真的有分數記錄
                Object.keys(studentScores).forEach(examId => {
                    if (Object.keys(studentScores[examId]).length > 0) {
                        examsWithScores.add(examId);
                    }
                });
            }
        });
        
        // 確保考卷依照 EXAM_MAPS 定義的順序（時間先後）排列
        const allExamKeys = Object.keys(window.EXAM_MAPS || {});
        return Array.from(examsWithScores).sort((a, b) => allExamKeys.indexOf(a) - allExamKeys.indexOf(b));
    }, [activeStudents, examScores]);

    // 當可用考卷變更時（例如從 Sidebar 切換了群組），預設全選所有「有分數的考卷」
    const availableExamsStr = availableExams.join(',');
    React.useEffect(() => {
        setSelectedExams(availableExamsStr ? availableExamsStr.split(',') : []);
    }, [availableExamsStr]);

    const toggleExam = (examId) => {
        setSelectedExams(prev => 
            prev.includes(examId) ? prev.filter(id => id !== examId) : [...prev, examId]
        );
    };

    // 🔥 智慧過濾 B：根據已選的「試卷」，過濾出確實有這些試卷分數的「學生」
    const availableStudents = React.useMemo(() => {
        if (selectedExams.length === 0) return [];
        return (activeStudents || []).filter(s => {
            return selectedExams.some(examId => {
                return (examScores || {})[s.id] && (examScores || {})[s.id][examId] !== undefined;
            });
        });
    }, [selectedExams, activeStudents, examScores]);

    // 當學生名單改變時，自動鎖定名單內第一位同學
    React.useEffect(() => {
        if (availableStudents.length > 0) {
            if (!availableStudents.some(s => s.id === selectedStudentId)) {
                setSelectedStudentId(availableStudents[0].id);
            }
        } else {
            setSelectedStudentId('');
        }
    }, [availableStudents, selectedStudentId]);

    // ★ 升級核心：支援 MC 雙重答案 (例如 "A,C") 的計分邏輯
    const getStudentQScore = (studentId, examId, q) => {
        const record = examScores[studentId]?.[examId];
        if (!record) return 0;
        const val = record[q.id];
        
        if (q.type === 'MC') {
            if (val && q.ans) {
                // 將正確答案用逗號切開，支援 "A,C" 這種格式
                const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
                const studentAnswer = val.toString().toUpperCase().trim();
                // 如果學生的答案在正確答案陣列中，就給分
                return correctAnswers.includes(studentAnswer) ? q.max : 0;
            }
            return 0;
        }
        // LQ 直接回傳數字
        return val === '' || val === undefined ? 0 : parseFloat(val);
    };

    // 核心數據運算
    const topicStats = {};
    if (selectedStudentId && selectedExams.length > 0) {
        selectedExams.forEach(examId => {
            const map = window.EXAM_MAPS?.[examId];
            if (!map) return;
            
            map.questions.forEach(q => {
                if (!topicStats[q.topicId]) {
                    // ★ 修復核心：判斷並提取升級後的 SYLLABUS_TOPICS 物件屬性
                    const syllabusInfo = typeof window !== 'undefined' && window.SYLLABUS_TOPICS ? window.SYLLABUS_TOPICS[q.topicId] : null;
                    const safeTopicName = typeof syllabusInfo === 'object' && syllabusInfo !== null ? syllabusInfo.topic : (syllabusInfo || '未定義課題');
                    const safeSyllabusDesc = typeof syllabusInfo === 'object' && syllabusInfo !== null ? syllabusInfo.desc : '';

                    topicStats[q.topicId] = { 
                        topicId: q.topicId, 
                        topicName: safeTopicName, 
                        syllabusDesc: safeSyllabusDesc, // 存起來供 AI 使用
                        totalMax: 0, 
                        totalEarned: 0,
                        examDetails: {},
                        descList: new Set()
                    };
                }
                
                if (!topicStats[q.topicId].examDetails[examId]) {
                    topicStats[q.topicId].examDetails[examId] = { max: 0, earned: 0 };
                }

                // 呼叫上方升級後的 getStudentQScore
                const score = getStudentQScore(selectedStudentId, examId, q);
                topicStats[q.topicId].totalMax += q.max;
                topicStats[q.topicId].totalEarned += score;
                topicStats[q.topicId].examDetails[examId].max += q.max;
                topicStats[q.topicId].examDetails[examId].earned += score;
                
                // 確保加入 descList 的是字串
                if (q.topicDesc) {
                    const descStr = typeof q.topicDesc === 'object' ? (q.topicDesc.topic || q.topicDesc.desc) : q.topicDesc;
                    topicStats[q.topicId].descList.add(descStr);
                }
            });
        });
    }

    // 將資料預先計算並分類趨勢
    const processedTopics = Object.values(topicStats).sort((a, b) => 
        a.topicId.localeCompare(b.topicId, undefined, { numeric: true, sensitivity: 'base' })
    ).map(t => {
        const descArray = Array.from(t.descList);
        const overallPct = t.totalMax > 0 ? (t.totalEarned / t.totalMax) : 0;
        
        // ★ 自動將使用者選擇的考卷，按時間順序 (EXAM_MAPS 的定義順序) 排序，確保進退步計算準確！
        const allExamKeys = Object.keys(window.EXAM_MAPS || {});
        const sortedSelectedExams = [...selectedExams].sort((a, b) => allExamKeys.indexOf(a) - allExamKeys.indexOf(b));

        // 取出該課題在各份卷的表現
        const examPcts = sortedSelectedExams.map(examId => {
            const details = t.examDetails[examId];
            if (!details || details.max === 0) return null;
            return { examId, pct: details.earned / details.max };
        }).filter(Boolean);

        // ★ 計算趨勢：永遠只取「有考該課題的最後兩次」做對比
        let trend = 'stable'; 
        if (examPcts.length >= 2) {
            const last = examPcts[examPcts.length - 1].pct;
            const prev = examPcts[examPcts.length - 2].pct;
            if (last - prev > 0.1) trend = 'up';
            else if (prev - last > 0.1) trend = 'down';
        }

        return { ...t, descArray, overallPct, examPcts, trend };
    });

    // 分流三個版塊的陣列
    const downTopics = processedTopics.filter(t => t.trend === 'down');
    const upTopics = processedTopics.filter(t => t.trend === 'up');
    const stableTopics = processedTopics.filter(t => t.trend === 'stable');

    // 依據目前點選的版塊決定要顯示的陣列
    const currentDisplayedTopics = 
        trendTab === 'down' ? downTopics : 
        trendTab === 'up' ? upTopics : stableTopics;

    // AI Prompt 生成邏輯
    React.useEffect(() => {
        if (!selectedStudentId) return;
        const studentName = (activeStudents || []).find(s => s.id === selectedStudentId)?.name || '該學生';
        
        // 修正：這裡應該使用上面計算好的 processedTopics 來過濾出弱項
        const weakTopics = processedTopics.filter(t => t.overallPct < 0.5);
        
        // ★ AI 提示詞升級：結合官方 Syllabus 學習要求與歷史錯題細節
        // 修正：將變數名稱改為上面定義好的 weakTopics
        const weakTopicsText = weakTopics.map(t => {
            const topicInfo = typeof window !== 'undefined' && window.SYLLABUS_TOPICS ? window.SYLLABUS_TOPICS[t.topicId] : null;
            const topicName = typeof topicInfo === 'object' ? topicInfo.topic : (topicInfo || '');
            return `- 課題 [${t.topicId} ${topicName}]: 曾做錯的題型盲點: ${t.descArray.join('; ')}`;
        }).join('\n');

        const newPrompt = `你是一位香港 DSE 物理科專屬導師。我的學生【${studentName}】在近期的物理考試中表現需要提升。以下是他在所選考試範圍內【掌握度低於 50%】的物理課題及對應的題型盲點，請為他度身訂造一份專屬補底練習。\n\n[基本設定]\n- 語言: ${aiLang}\n- 預期題型與數量:\n  * 多項選擇題 (MC)：${aiMcCount} 題\n  * 長題目 (LQ)：${aiLqCount} 題\n\n[學生薄弱課題與盲點描述]\n${weakTopicsText || '- 該學生目前無明顯弱項課題，請生成進階挑戰題。'}\n\n[生成要求]\n1. 針對上述薄弱課題，設計難度由淺入深、著重釐清核心觀念的練習題。\n2. MC 必須包含 4 個選項，並為錯誤選項附帶【陷阱分析】（指出為何學生容易選錯）；LQ 必須附帶詳細的【分步評分標準 (Marking Scheme)】。\n3. 請在開頭給予【${studentName}】一段鼓勵性的評語，並指出他在這些課題中最需要優先克服的思維盲區。`;
        
        setGeneratedPrompt(newPrompt);
    }, [aiLang, aiMcCount, aiLqCount, selectedStudentId, selectedExams, activeStudents, examScores, processedTopics]); 
    // 注意：依賴項加上了 processedTopics，確保資料更新時 Prompt 會重算

    
    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            {/* 標頭與過濾器 */}
            <div className="flex flex-col gap-4 mb-6 border-b border-slate-200 pb-5">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="UserCheck" className="text-purple-600" /> 個人大考進度追蹤與專屬補底
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">追蹤學生在多份試卷中的進退步情況，並一鍵產出弱點補強練習。</p>
                </div>
                
                {/* 重新整理的頂部篩選器（移除群組，保留試卷與學生，自動橫排對齊） */}
                <div className="flex flex-col lg:flex-row gap-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div className="flex-[2]">
                        <label className="text-xs font-bold text-slate-700 mb-1.5 block flex justify-between">
                            <span>1. 選擇要納入分析的試卷 (僅顯示有成績記錄)</span>
                            <span className="text-purple-600 font-bold">{selectedExams.length} 份已選</span>
                        </label>
                        {availableExams.length === 0 ? (
                            <div className="text-xs text-red-500 font-medium py-2 px-1">目前所選群組尚無任何考試成績記錄。</div>
                        ) : (
                            <div className="flex flex-wrap gap-2">
                                {availableExams.map(examId => {
                                    const isSelected = selectedExams.includes(examId);
                                    return (
                                        <button 
                                            key={examId}
                                            onClick={() => toggleExam(examId)}
                                            className={`px-3 py-1.5 rounded-full text-xs font-bold border transition ${
                                                isSelected ? 'bg-purple-100 border-purple-400 text-purple-700 shadow-inner' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'
                                            }`}
                                        >
                                            {isSelected && <Icon name="Check" size={12} className="inline mr-1" />}
                                            {examId}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    
                    <div className="flex-1">
                        <label className="text-xs font-bold text-slate-700 mb-1.5 block">2. 選擇學生</label>
                        <select 
                            value={selectedStudentId}
                            onChange={(e) => { setSelectedStudentId(e.target.value); }}
                            disabled={availableStudents.length === 0}
                            className="w-full p-2.5 border border-slate-300 rounded-lg bg-white font-semibold outline-none focus:ring-2 focus:ring-purple-400 disabled:opacity-50"
                        >
                            {availableStudents.length === 0 ? (
                                <option value="">無符合條件的學生</option>
                            ) : (
                                availableStudents.map(s => (
                                    <option key={s.id} value={s.id}>{s.class} ({s.num}) {s.name}</option>
                                ))
                            )}
                        </select>
                    </div>
                </div>
            </div>

            {/* 下方內容 */}
            {!selectedStudentId ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed rounded-xl">
                    <Icon name="User" size={48} className="mx-auto mb-3 opacity-40 text-purple-300" />
                    <p className="text-sm font-medium text-slate-500">請先從上方選擇一位學生以檢視其個人分析報告</p>
                </div>
            ) : selectedExams.length === 0 ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed rounded-xl">
                    <Icon name="Layers" size={48} className="mx-auto mb-3 opacity-40 text-amber-300" />
                    <p className="text-sm font-medium text-slate-500">請至少勾選一份試卷來進行分析</p>
                </div>
            ) : (
                <div className="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-6">
                    
                    {/* 左側：綜合課題掌握度（分為 3 個切換版塊） */}
                    <div className="lg:col-span-3 card p-5 border border-slate-200 shadow-sm flex flex-col h-[700px] rounded-xl bg-white">
                        <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2 border-b border-slate-100 pb-2 text-sm">
                            <span className="p-1 bg-blue-100 text-blue-700 rounded"><Icon name="TrendingUp" size={15} /></span>
                            課題表現與跨卷趨勢分類
                        </h3>

                        {/* 內部 3 大趨勢切換版塊按鈕 */}
                        <div className="grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-lg mb-4 text-xs font-bold">
                            <button 
                                onClick={() => setTrendTab('down')}
                                className={`py-2 rounded-md transition flex items-center justify-center gap-1.5 ${trendTab === 'down' ? 'bg-red-500 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                <span>🚨 退步關注</span>
                                <span className={`px-1.5 py-0.2 text-[10px] rounded-full ${trendTab === 'down' ? 'bg-white text-red-600' : 'bg-red-100 text-red-700'}`}>{downTopics.length}</span>
                            </button>
                            <button 
                                onClick={() => setTrendTab('up')}
                                className={`py-2 rounded-md transition flex items-center justify-center gap-1.5 ${trendTab === 'up' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                <span>🎉 看到進步</span>
                                <span className={`px-1.5 py-0.2 text-[10px] rounded-full ${trendTab === 'up' ? 'bg-white text-emerald-600' : 'bg-emerald-100 text-emerald-700'}`}>{upTopics.length}</span>
                            </button>
                            <button 
                                onClick={() => setTrendTab('stable')}
                                className={`py-2 rounded-md transition flex items-center justify-center gap-1.5 ${trendTab === 'stable' ? 'bg-slate-600 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                <span>➖ 表現平穩</span>
                                <span className={`px-1.5 py-0.2 text-[10px] rounded-full ${trendTab === 'stable' ? 'bg-white text-slate-700' : 'bg-slate-200 text-slate-700'}`}>{stableTopics.length}</span>
                            </button>
                        </div>
                        
                        {/* 課題動態列表 */}
                        <div className="flex-1 overflow-y-auto space-y-3.5 pr-2">
                            {currentDisplayedTopics.length === 0 ? (
                                <div className="text-center py-20 text-slate-400 text-xs border border-dashed rounded-xl bg-slate-50/50">
                                    <Icon name="Inbox" size={32} className="mx-auto mb-2 opacity-30" />
                                    目前版塊下無對應課題
                                </div>
                            ) : (
                                currentDisplayedTopics.map(t => {
                                    const isWeak = t.overallPct < 0.50; 
                                    let trendBadge = null;
                                    if (t.trend === 'up') trendBadge = <span className="text-emerald-600 font-bold text-[10px] bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">⬆️ 進步</span>;
                                    if (t.trend === 'down') trendBadge = <span className="text-red-600 font-bold text-[10px] bg-red-50 border border-red-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">🚨 退步</span>;
                                    if (t.trend === 'stable') trendBadge = <span className="text-slate-500 font-bold text-[10px] bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded flex items-center gap-0.5">➖ 平穩</span>;

                                    return (
                                        <div key={t.topicId} className={`p-3 border rounded-xl transition ${isWeak ? 'bg-red-50/20 border-red-100' : 'bg-white border-slate-200 shadow-sm'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <span className="text-slate-800 font-mono font-bold text-xs bg-slate-100 px-1.5 py-0.5 rounded mr-1.5">課題 {t.topicId}</span>
                                                    <span className="text-slate-700 text-xs font-semibold">{t.topicName}</span>
                                                </div>
                                                <div className="flex items-center gap-2 shrink-0">
                                                    {trendBadge}
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${isWeak ? 'bg-red-100 border-red-200 text-red-700' : 'bg-emerald-100 border-emerald-200 text-emerald-700'}`}>
                                                        綜合: {(t.overallPct*100).toFixed(0)}%
                                                    </span>
                                                </div>
                                            </div>
                                            
                                            {/* 跨卷歷程 */}
                                            <div className="flex flex-wrap gap-1.5 mt-2">
                                                {t.examPcts.map((ep) => (
                                                    <div key={ep.examId} className="flex items-center text-[10px] bg-white border border-slate-200 rounded overflow-hidden shadow-inner">
                                                        <span className="bg-slate-50 text-slate-500 px-1.5 py-0.5 border-r border-slate-100 font-mono text-[9px]">{ep.examId}</span>
                                                        <span className={`px-1.5 py-0.5 font-bold ${ep.pct < 0.5 ? 'text-red-500' : 'text-emerald-600'}`}>{(ep.pct*100).toFixed(0)}%</span>
                                                    </div>
                                                ))}
                                            </div>
                                            
                                            <p className="text-[10px] text-slate-400 mt-2 line-clamp-1 border-t border-slate-100 pt-1.5">
                                                🔍 歷史考點盲區：{t.descArray.join(' ; ')}
                                            </p>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

                    {/* 右側：專屬 AI 補底練習工廠 */}
                    <div className="lg:col-span-2 card p-5 border-2 border-purple-100 bg-gradient-to-br from-purple-50/50 to-white shadow-sm flex flex-col h-[700px] rounded-xl">
                        <div className="flex items-center gap-2 text-purple-800 font-bold text-base mb-2">
                            <Icon name="Cpu" className="text-purple-600" />
                            <span>針對性弱點補強 Prompt 生成</span>
                        </div>
                        <p className="text-xs text-slate-500 mb-4 leading-relaxed">
                            系統已自動整合該學生在所選試卷中，所有<strong className="text-red-500">掌握度低於 50%</strong>的課題與歷史盲點（不受左側版塊切換影響）。
                        </p>
                        
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">輸出語言</label>
                                <select className="text-xs p-1 outline-none font-bold text-slate-700 bg-transparent" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                                    <option>繁體中文</option>
                                    <option>English</option>
                                </select>
                            </div>
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">MC / LQ 題數</label>
                                <div className="flex items-center gap-1 text-xs px-1">
                                    MC:<input type="number" className="w-10 outline-none font-bold text-purple-700 border-b text-center mx-1 bg-transparent" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} min="0" max="20" />
                                    LQ:<input type="number" className="w-10 outline-none font-bold text-blue-700 border-b text-center mx-1 bg-transparent" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} min="0" max="20" />
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col mb-4">
                            <label className="text-xs font-bold text-slate-700 mb-1 flex justify-between">
                                <span>📝 專屬 Prompt 預覽</span>
                            </label>
                            <textarea 
                                className="flex-1 w-full p-3 text-[11px] font-mono bg-white border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none shadow-inner resize-none leading-relaxed"
                                value={generatedPrompt}
                                onChange={(e) => setGeneratedPrompt(e.target.value)}
                            />
                        </div>

                        <button 
                            onClick={() => { navigator.clipboard.writeText(generatedPrompt); alert('📋 學生專屬 AI 提示詞已複製！'); }}
                            className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition text-sm"
                        >
                            <Icon name="Copy" size={16} /> 複製專屬補底 Prompt
                        </button>
                    </div>

                </div>
            )}
        </div>
    );
};
        
// ==================== 更新版：以「學生為主體」的專專屬補底練習 (修復變數衝突、SYLLABUS 物件錯誤與群組隔離、MC雙重答案) ====================
const RemedialPracticeView = ({ currentCohort, activeStudents, examScores, remediationProgress, setRemediationProgress, syncToCloud }) => {
    // 狀態管理
    const [selectedExam, setSelectedExam] = React.useState('');
    const [aiLang, setAiLang] = React.useState('雙語 (Bilingual)');
    const [aiMcCount, setAiMcCount] = React.useState('10'); 
    const [aiLqCount, setAiLqCount] = React.useState('0'); 
    const [generatedPrompt, setGeneratedPrompt] = React.useState('');

    // ★ 學生記憶功能（已升級：依據 currentCohort 進行群組數據隔離）
    const [selectedStudentIds, setSelectedStudentIds] = React.useState([]);

    // 當切換群組時，讀取該群組專屬的已選學生名單
    React.useEffect(() => {
        try {
            const key = `dse_physics_remedial_students_${currentCohort || 'default'}`;
            const saved = localStorage.getItem(key);
            setSelectedStudentIds(saved ? JSON.parse(saved) : []);
        } catch (e) {
            setSelectedStudentIds([]);
        }
        // 切換群組時同時重設目前正在出題的狀態，避免跨群組資料錯亂
        setActivePromptStudent(null);
        setSelectedTopicsForPrompt([]);
    }, [currentCohort]);

    // 當已選學生清單改變時，寫入該群組專屬的 localStorage
    React.useEffect(() => {
        if (currentCohort) {
            const key = `dse_physics_remedial_students_${currentCohort}`;
            localStorage.setItem(key, JSON.stringify(selectedStudentIds));
        }
    }, [selectedStudentIds, currentCohort]);

    // ★ 新增：學生排序模式 ('score' 依分數由低至高 | 'class' 依班級學號)
    const [sortMode, setSortMode] = React.useState('score');

    // ★ 新增：目前正在為哪一位學生出題 (保證一次只能為一位學生勾選課題)
    const [activePromptStudent, setActivePromptStudent] = React.useState(null);
    const [selectedTopicsForPrompt, setSelectedTopicsForPrompt] = React.useState([]);

    // 過濾可用試卷
    const availableExams = React.useMemo(() => {
        const examsWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = examScores[student.id];
            if (studentScores) {
                Object.keys(studentScores).forEach(examId => {
                    if (Object.keys(studentScores[examId]).length > 0) examsWithScores.add(examId);
                });
            }
        });
        const allExamKeys = Object.keys(window.EXAM_MAPS || {});
        return Array.from(examsWithScores).sort((a, b) => allExamKeys.indexOf(a) - allExamKeys.indexOf(b));
    }, [activeStudents, examScores]);

    React.useEffect(() => {
        if (availableExams.length > 0 && !availableExams.includes(selectedExam)) {
            setSelectedExam(availableExams[0]);
        }
    }, [availableExams, selectedExam]);

    // 切換試卷時清空出題狀態
    React.useEffect(() => {
        setActivePromptStudent(null);
        setSelectedTopicsForPrompt([]);
    }, [selectedExam]);

    const map = window.EXAM_MAPS?.[selectedExam];

    // ★ 已修復：優化 MC 雙重答案計分邏輯
    const getStudentQScore = React.useCallback((studentId, q) => {
        const record = examScores[studentId]?.[selectedExam];
        if (!record) return 0;
        const val = record[q.id];
        
        if (q.type === 'MC') {
            if (!val || !q.ans) return 0;
            const studentAns = val.toString().toUpperCase().trim();
            const officialAns = q.ans.toString().toUpperCase().trim();
            
            // 情況 1：答案完全一致
            if (studentAns === officialAns) return q.max;
            
            // 情況 2：處理雙重/多重正確答案情況（例如官方答案為 "AB"、"A/B" 或 "A或B"）
            const cleanOfficial = officialAns.replace(/[^A-D]/g, ''); // 只留下 A, B, C, D
            const cleanStudent = studentAns.replace(/[^A-D]/g, '');
            
            // 如果學生只填寫了一個乾淨的選項，且該選項包含在官方的多重正確答案中
            if (cleanStudent.length === 1 && cleanOfficial.includes(cleanStudent)) {
                return q.max;
            }
            return 0;
        }
        
        return val === '' || val === undefined ? 0 : parseFloat(val);
    }, [examScores, selectedExam]);

    // 取得該生總分
    const getStudentTotalScore = React.useCallback((studentId) => {
        if (!map) return 0;
        let total = 0;
        map.questions.forEach(q => total += getStudentQScore(studentId, q));
        return total;
    }, [map, getStudentQScore]);

    // ★ 排序全體學生 (用於選擇器)
    const sortedActiveStudents = React.useMemo(() => {
        return [...activeStudents].sort((a, b) => {
            if (sortMode === 'score') {
                return getStudentTotalScore(a.id) - getStudentTotalScore(b.id); // 分數由低到高
            } else {
                const classCompare = a.class.localeCompare(b.class);
                if (classCompare !== 0) return classCompare;
                return parseInt(a.num) - parseInt(b.num);
            }
        });
    }, [activeStudents, sortMode, getStudentTotalScore]);

    // 切換學生點名
    const toggleStudentSelection = (studentId) => {
        setSelectedStudentIds(prev => {
            const newSel = prev.includes(studentId) ? prev.filter(id => id !== studentId) : [...prev, studentId];
            if (activePromptStudent === studentId) {
                setActivePromptStudent(null);
                setSelectedTopicsForPrompt([]);
            }
            return newSel;
        });
    };

    // ★ 處理課題勾選：確保一次只能選一位學生的課題
    const handleTopicToggle = (studentId, topicId) => {
        if (activePromptStudent !== studentId) {
            // 如果點擊了另一位學生的課題，自動切換目標學生，並重新開始勾選
            setActivePromptStudent(studentId);
            setSelectedTopicsForPrompt([topicId]);
        } else {
            // 同一位學生，進行多選/取消
            setSelectedTopicsForPrompt(prev => 
                prev.includes(topicId) ? prev.filter(id => id !== topicId) : [...prev, topicId]
            );
        }
    };

    // 點擊複製並記錄
    const handleCopyAndRecord = () => {
        if (!activePromptStudent || selectedTopicsForPrompt.length === 0) {
            alert('⚠️ 請先點擊至少一位學生的課題！');
            return;
        }
        
        navigator.clipboard.writeText(generatedPrompt);
        
        setRemediationProgress(prev => {
            const updated = { ...prev };
            if (!updated[activePromptStudent]) updated[activePromptStudent] = {};
            if (!updated[activePromptStudent][selectedExam]) updated[activePromptStudent][selectedExam] = {};
            
            selectedTopicsForPrompt.forEach(tid => {
                updated[activePromptStudent][selectedExam][tid] = true;
            });
            return updated;
        });

        setTimeout(() => syncToCloud(), 300);
        setSelectedTopicsForPrompt([]); // 複製完清空勾選
        alert(`📋 Prompt 已複製！系統已將 ${selectedTopicsForPrompt.length} 個課題標記為「✅ 已記錄」並同步。`);
    };

    // ★ 預先計算被選學生的弱勢課題與進度
    const studentRemedialData = React.useMemo(() => {
        if (!map || selectedStudentIds.length === 0) return [];
        
        // 依照 sortedActiveStudents 的順序來排列已選學生
        const orderedSelectedStudents = sortedActiveStudents.filter(s => selectedStudentIds.includes(s.id));
        
        return orderedSelectedStudents.map(student => {
            const sTopicStats = {};
            let totalMax = 0;

            map.questions.forEach(q => {
                const score = getStudentQScore(student.id, q);
                totalMax += q.max;
                if (!sTopicStats[q.topicId]) {
                    sTopicStats[q.topicId] = { topicId: q.topicId, max: 0, earned: 0, descList: new Set() };
                }
                sTopicStats[q.topicId].max += q.max;
                sTopicStats[q.topicId].earned += score;
                
                // 安全提取題目描述，避免物件混入
                if (q.topicDesc) {
                    const safeDesc = typeof q.topicDesc === 'object' ? (q.topicDesc.topic || q.topicDesc.desc) : q.topicDesc;
                    sTopicStats[q.topicId].descList.add(safeDesc);
                }
            });

            // 篩選出該學生的弱項 (<= 50%)
            const weakTopics = Object.values(sTopicStats)
                .filter(t => t.max > 0 && (t.earned / t.max) <= 0.5)
                .sort((a, b) => a.topicId.localeCompare(b.topicId, undefined, { numeric: true, sensitivity: 'base' }))
                .map(t => ({
                    ...t,
                    pct: t.earned / t.max,
                    descArray: Array.from(t.descList),
                    isRecorded: remediationProgress && remediationProgress[student.id]?.[selectedExam]?.[t.topicId] || false
                }));

            const completedCount = weakTopics.filter(t => t.isRecorded).length;
            const totalWeakCount = weakTopics.length;
            const progressPct = totalWeakCount === 0 ? 100 : Math.round((completedCount / totalWeakCount) * 100);

            return {
                ...student,
                examScore: getStudentTotalScore(student.id),
                examMax: totalMax,
                weakTopics,
                completedCount,
                totalWeakCount,
                progressPct
            };
        });
    }, [map, selectedStudentIds, sortedActiveStudents, getStudentQScore, getStudentTotalScore, remediationProgress, selectedExam]);

    // 動態生成 Prompt
    React.useEffect(() => {
        if (!activePromptStudent || selectedTopicsForPrompt.length === 0) {
            setGeneratedPrompt('👈 請在左側清單點選【某一位學生】的課題，以生成專屬他的溫習 Prompt。');
            return;
        }
        
        const targetData = studentRemedialData.find(s => s.id === activePromptStudent);
        if (!targetData) return;

        const selectedWeakTopics = targetData.weakTopics.filter(t => selectedTopicsForPrompt.includes(t.topicId));
        
        // ★ 修復核心：安全讀取 SYLLABUS_TOPICS 並將官方要求加入 Prompt，徹底解決 [object Object] 錯誤
        const weakTopicsText = selectedWeakTopics.map(t => {
            const syllabusInfo = window.SYLLABUS_TOPICS?.[t.topicId];
            const safeTopicName = typeof syllabusInfo === 'object' && syllabusInfo !== null ? syllabusInfo.topic : (syllabusInfo || '');
            const safeSyllabusDesc = typeof syllabusInfo === 'object' && syllabusInfo !== null ? syllabusInfo.desc : '無';
            return `- 課題 [${t.topicId} ${safeTopicName}]:\n  官方學習要求: ${safeSyllabusDesc}\n  曾做錯的題型盲點: ${t.descArray.join('; ')}`;
        }).join('\n\n');

        const newPrompt = `你是一位極具耐心的香港 DSE 物理科導師。我的學生【${targetData.name}】正在進行大考後的補救教學。以下是他【本次需要進行補底】的物理課題及歷史錯誤盲點，請為他度身訂造一份分段式專屬補底練習。\n\n[基本設定]\n- 語言: ${aiLang}\n- 預期題型與數量:\n  * 多項選擇題 (MC)：${aiMcCount} 題\n  * 長題目 (LQ)：${aiLqCount} 題\n\n[本次目標補底課題與盲點描述]\n${weakTopicsText}\n\n[生成要求]\n1. 針對上述列出的目標課題，設計難度由淺入深、著重釐清核心物理觀念的練習題。\n2. MC 必須包含 4 個選項，並為錯誤選項附帶【陷阱分析】；LQ (如有) 必須附帶詳細的【分步思維導引 (Scaffolding Tips)】與【評分標準】。\n3. 請在開頭給予【${targetData.name}】一段鼓勵，讓他有信心克服這些難關。`;
        
        setGeneratedPrompt(newPrompt);
    }, [aiLang, aiMcCount, aiLqCount, activePromptStudent, selectedTopicsForPrompt, studentRemedialData]);

    if (!map && availableExams.length === 0) return (
        <div className="p-12 text-center text-slate-500 mt-10">
            <Icon name="AlertCircle" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">目前群組無任何考試成績記錄</h2>
        </div>
    );

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            {/* 標頭與過濾器 */}
            <div className="flex flex-col gap-4 mb-6 border-b border-slate-200 pb-5">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="UserCheck" className="text-purple-600" /> 個人化補底進度與出題
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">獨立管理每位學生的補底進度，並橫向勾選課題進行專屬出題。</p>
                </div>
                
                {/* 頂部篩選器 */}
                <div className="flex flex-col lg:flex-row gap-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div className="flex-1">
                        <label className="text-xs font-bold text-slate-700 mb-1.5 block">1. 選擇單一試卷 (僅顯示有成績記錄)</label>
                        <select 
                            value={selectedExam}
                            onChange={(e) => setSelectedExam(e.target.value)}
                            className="w-full p-2.5 border border-slate-300 rounded-lg bg-white font-semibold outline-none focus:ring-2 focus:ring-purple-400"
                        >
                            {availableExams.length === 0 ? <option value="">無符合條件的試卷</option> : availableExams.map(k => <option key={k} value={k}>{k} - {window.EXAM_MAPS[k]?.title}</option>)}
                        </select>
                    </div>
                    
                    <div className="flex-[2] flex flex-col h-56">
                        <div className="flex justify-between items-end pb-1 border-b border-slate-200">
                            <label className="text-xs font-bold text-slate-700 flex items-center gap-1">
                                2. 選擇出席學生
                                <span className="bg-purple-100 text-purple-700 text-[10px] px-1.5 py-0.5 rounded">已選 {selectedStudentIds.length} 人</span>
                            </label>
                            <div className="flex items-center gap-2">
                                <select 
                                    value={sortMode} 
                                    onChange={(e)=>setSortMode(e.target.value)}
                                    className="text-[10px] bg-white border border-slate-300 rounded outline-none p-0.5 text-slate-600 cursor-pointer"
                                >
                                    <option value="score">依最低分排序</option>
                                    <option value="class">依班級學號排序</option>
                                </select>
                                <button 
                                    onClick={() => setSelectedStudentIds(selectedStudentIds.length === activeStudents.length ? [] : activeStudents.map(s => s.id))}
                                    className="text-[10px] text-slate-500 hover:text-purple-600 underline font-semibold"
                                >
                                    {selectedStudentIds.length === activeStudents.length ? '清空' : '全選'}
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto bg-white border border-slate-300 rounded-lg p-1.5 mt-2 shadow-inner custom-scrollbar flex flex-col gap-1">
                            {sortedActiveStudents.map(s => {
                                const isChecked = selectedStudentIds.includes(s.id);
                                return (
                                    <label key={s.id} className={`flex items-center gap-2 p-1.5 rounded cursor-pointer transition ${isChecked ? 'bg-purple-50' : 'hover:bg-slate-50'}`}>
                                        <input type="checkbox" checked={isChecked} onChange={() => toggleStudentSelection(s.id)} className="w-3.5 h-3.5 text-purple-600 rounded focus:ring-purple-500 cursor-pointer" />
                                        <div className="flex-1 flex justify-between items-center text-sm">
                                            <span className={`font-semibold text-xs ${isChecked ? 'text-purple-800' : 'text-slate-700'}`}>{s.class}({s.num}) {s.name}</span>
                                            <span className={`text-[10px] font-mono px-1 rounded ${sortMode === 'score' ? 'bg-amber-100 text-amber-800' : 'bg-slate-100 text-slate-500'}`}>
                                                {getStudentTotalScore(s.id)}分
                                            </span>
                                        </div>
                                    </label>
                                );
                            })}
                        </div>
                    </div>
                </div>
            </div>

            {/* 下方內容 */}
            {selectedStudentIds.length === 0 ? (
                <div className="card p-16 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed">
                    <Icon name="Users" size={48} className="mx-auto mb-3 opacity-40 text-purple-300" />
                    <p className="text-sm font-medium text-slate-500">請從右上方勾選學生，展開他們的專屬補底清單</p>
                </div>
            ) : (
                <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
                    {/* 左側：學生列表與橫向課題 (佔 3 列) */}
                    <div className="lg:col-span-3 flex flex-col gap-3 h-[700px] overflow-y-auto custom-scrollbar pr-2">
                        {studentRemedialData.map(student => {
                            const isGeneratingForThisStudent = activePromptStudent === student.id;
                            
                            return (
                                <div key={student.id} className={`card p-4 border transition-all ${isGeneratingForThisStudent ? 'border-purple-400 shadow-md ring-1 ring-purple-400' : 'border-slate-200 shadow-sm hover:border-slate-300'}`}>
                                    {/* 學生標頭與進度條 */}
                                    <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-3 mb-3 border-b border-slate-100 pb-3">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 font-bold text-sm">
                                                {student.class}
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 text-base">{student.name} <span className="text-xs text-slate-400 font-normal ml-1">({student.num})</span></h3>
                                                <div className="text-[10px] text-slate-500">試卷得分: <span className="font-mono text-slate-700">{student.examScore}/{student.examMax}</span></div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex-1 max-w-[200px] w-full">
                                            <div className="flex justify-between text-[10px] font-bold mb-1">
                                                <span className="text-slate-500">補底進度</span>
                                                <span className={student.progressPct === 100 ? 'text-emerald-600' : 'text-purple-600'}>
                                                    {student.completedCount} / {student.totalWeakCount} ({student.progressPct}%)
                                                </span>
                                            </div>
                                            <div className="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
                                                <div 
                                                    className={`h-2 rounded-full transition-all duration-500 ${student.progressPct === 100 ? 'bg-emerald-500' : 'bg-purple-500'}`}
                                                    style={{ width: `${student.progressPct}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 橫向課題列表 */}
                                    {student.weakTopics.length === 0 ? (
                                        <div className="text-xs text-emerald-600 bg-emerald-50 p-2 rounded text-center font-bold">
                                            ✅ 該學生已掌握所有課題，無需補底！
                                        </div>
                                    ) : (
                                        <div className="flex flex-wrap gap-2">
                                            {student.weakTopics.map(t => {
                                                const isSelected = isGeneratingForThisStudent && selectedTopicsForPrompt.includes(t.topicId);
                                                
                                                // ★ 安全渲染課題名稱
                                                const syllabusInfo = window.SYLLABUS_TOPICS?.[t.topicId];
                                                const safeTopicName = typeof syllabusInfo === 'object' && syllabusInfo !== null ? syllabusInfo.topic : (syllabusInfo || '未定義');

                                                return (
                                                    <div 
                                                        key={t.topicId}
                                                        onClick={() => handleTopicToggle(student.id, t.topicId)}
                                                        title={`盲點: ${t.descArray.join('; ')}`}
                                                        className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg border cursor-pointer transition text-xs select-none
                                                            ${isSelected ? 'bg-purple-600 border-purple-700 text-white shadow-sm' 
                                                            : t.isRecorded ? 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100' 
                                                            : 'bg-white border-slate-300 text-slate-700 hover:border-purple-300 hover:bg-purple-50'}`}
                                                    >
                                                        {isSelected ? <Icon name="CheckSquare" size={14} /> 
                                                         : t.isRecorded ? <Icon name="CheckCircle" size={14} /> 
                                                         : <Icon name="Square" size={14} className="opacity-50" />}
                                                        
                                                        <span className="font-bold font-mono">{t.topicId}</span>
                                                        <span className={`max-w-[120px] truncate ${isSelected ? 'text-purple-100' : 'text-slate-500'}`}>
                                                            {safeTopicName}
                                                        </span>
                                                        {!t.isRecorded && !isSelected && (
                                                            <span className="text-[9px] bg-red-100 text-red-600 px-1 rounded ml-1 font-mono">
                                                                {(t.pct * 100).toFixed(0)}%
                                                            </span>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* 右側：專屬 AI 練習生成 */}
                    <div className="lg:col-span-2 card p-5 border-2 border-purple-100 bg-gradient-to-br from-purple-50/50 to-white shadow-sm flex flex-col h-[700px]">
                        <div className="flex items-center gap-2 text-purple-800 font-bold text-base mb-2">
                            <Icon name="Cpu" className="text-purple-600" />
                            <span>個人專屬 Prompt 出題</span>
                        </div>
                        <p className="text-[11px] text-slate-500 mb-4 leading-relaxed">
                            {activePromptStudent ? (
                                <>目前正在為 <strong className="text-purple-700">{studentRemedialData.find(s=>s.id===activePromptStudent)?.name}</strong> 準備專屬練習。</>
                            ) : (
                                "請在左側點選課題。一次僅限為一位學生出題以保持針對性。"
                            )}
                        </p>
                        
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">輸出語言</label>
                                <select className="text-xs p-1 outline-none font-bold text-slate-700 bg-transparent" value={aiLang} onChange={e=>setAiLang(e.target.value)}>
                                    <option>繁體中文</option>
                                    <option>English</option>
                                </select>
                            </div>
                            <div className="flex flex-col gap-1 bg-white p-2 border rounded-lg shadow-sm">
                                <label className="text-[10px] font-bold text-slate-500">題數分配</label>
                                <div className="flex items-center gap-1 text-xs px-1">
                                    MC:<input type="number" className="w-10 outline-none font-bold text-purple-700 border-b text-center mx-1 bg-transparent" value={aiMcCount} onChange={e=>setAiMcCount(e.target.value)} min="0" max="20" />
                                    LQ:<input type="number" className="w-10 outline-none font-bold text-blue-700 border-b text-center mx-1 bg-transparent" value={aiLqCount} onChange={e=>setAiLqCount(e.target.value)} min="0" max="20" />
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col mb-4">
                            <label className="text-xs font-bold text-slate-700 mb-1 flex justify-between">
                                <span>📝 專屬 Prompt 預覽</span>
                            </label>
                            <textarea 
                                className="flex-1 w-full p-3 text-[11px] font-mono bg-white border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none shadow-inner resize-none leading-relaxed"
                                value={generatedPrompt}
                                readOnly
                            />
                        </div>

                        <button 
                            onClick={handleCopyAndRecord}
                            className={`w-full font-bold py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition text-sm ${selectedTopicsForPrompt.length > 0 ? 'bg-purple-600 hover:bg-purple-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                        >
                            <Icon name="Copy" size={16} /> 複製 Prompt 並記錄該生進度
                        </button>
                    </div>

                </div>
            )}
        </div>
    );
};
        
// ==================== 升級版：考試成績匯出 (Excel) - 支援成績過濾、群組隔離與 MC 雙重答案 ====================
const ExamExportView = ({ currentCohort, activeStudents, examScores }) => {
    // ★ 新增：根據群組隔離讀取 localStorage，確保切換群組時狀態不會錯亂
    const [selectedExams, setSelectedExams] = React.useState([]);

    React.useEffect(() => {
        try {
            const key = `dse_physics_export_selected_${currentCohort || 'default'}`;
            const saved = localStorage.getItem(key);
            setSelectedExams(saved ? JSON.parse(saved) : []);
        } catch (e) { 
            setSelectedExams([]); 
        }
    }, [currentCohort]);

    // 監聽選擇變化並存入專屬的 localStorage
    React.useEffect(() => {
        if (currentCohort) {
            const key = `dse_physics_export_selected_${currentCohort}`;
            localStorage.setItem(key, JSON.stringify(selectedExams));
        }
    }, [selectedExams, currentCohort]);

    // ★ 篩選出當前群組「真正有入分」的試卷
    const availableExams = React.useMemo(() => {
        const examsWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = examScores[student.id] || {};
            Object.keys(studentScores).forEach(examId => {
                // 只要該學生該卷有任何一題有分，即視為有入分
                if (Object.keys(studentScores[examId]).length > 0) examsWithScores.add(examId);
            });
        });
        return Array.from(examsWithScores).sort(); // 加上 sort 讓顯示排序固定
    }, [activeStudents, examScores]);

    // ★ 核心修復：絕對安全過濾牆！確保畫面上及匯出時，只處理「當前群組真正有考」且「已被勾選」的試卷
    const validSelectedExams = React.useMemo(() => {
        return selectedExams.filter(examId => availableExams.includes(examId)).sort();
    }, [selectedExams, availableExams]);

    const toggleExam = (examId) => {
        setSelectedExams(prev => 
            prev.includes(examId) ? prev.filter(id => id !== examId) : [...prev, examId]
        );
    };

    // ★ 核心成績計算邏輯 (修復 MC 雙重答案 A,C 計分)
    const getCalculatedScores = (studentId, examId) => {
        const map = EXAM_MAPS[examId];
        if (!map) return { mc: 0, lq: 0, total: 0, mcMax: 0, lqMax: 0, totalMax: 0, isSenior: false };

        let mcScore = 0, lqScore = 0, mcMax = 0, lqMax = 0;
        const record = examScores[studentId]?.[examId] || {};

        map.questions.forEach(q => {
            if (q.type === 'MC') {
                mcMax += 1; // MC 每題 1 分
                const val = record[q.id];
                if (val && q.ans) {
                    // ★ 雙重答案判斷邏輯
                    const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
                    const studentAnswer = val.toString().toUpperCase().trim();
                    if (correctAnswers.includes(studentAnswer)) {
                        mcScore += 1;
                    }
                }
            } else {
                lqMax += q.max;
                const val = record[q.id];
                if (val !== undefined && val !== '') {
                    lqScore += parseFloat(val);
                }
            }
        });

        const titleStr = (examId + ' ' + map.title).toUpperCase();
        const isSenior = titleStr.includes('S4') || titleStr.includes('S5') || titleStr.includes('S6');
        
        let totalScore = 0;
        let totalMax = 100;
        if (isSenior) {
            // 高中卷：MC 佔 35%, LQ 佔 65%
            const mcPart = mcMax > 0 ? (mcScore / mcMax) * 35 : 0;
            const lqPart = lqMax > 0 ? (lqScore / lqMax) * 65 : 0;
            totalScore = parseFloat((mcPart + lqPart).toFixed(1));
            totalMax = 100;
        } else {
            // 初中卷 (S3)：直接加總
            totalScore = mcScore + lqScore;
            totalMax = mcMax + lqMax;
        }

        return { mc: mcScore, lq: lqScore, total: totalScore, mcMax, lqMax, totalMax, isSenior };
    };

    // 智慧型樣式判斷：低於標準回傳紅色樣式
    const getCellStyles = (score, max, isSenior, isTotalColumn = false) => {
        if (max === 0) return "p-2 text-center text-slate-400 font-mono";
        
        // 根據學段決定及格百分比線 (高中 40%, 初中 50%)
        const passThreshold = isSenior ? 0.4 : 0.5;
        const isFail = (score / max) < passThreshold;

        if (isTotalColumn) {
            // 總分欄位：不及格直接亮紅底紅字，極度顯眼
            return `p-2 border-r border-slate-200 text-center font-bold font-mono transition ${
                isFail ? 'bg-red-50 text-red-600 font-black' : 'bg-slate-50/50 text-slate-800'
            }`;
        }
        // MC / LQ 分項欄位：不及格僅變紅字
        return `p-2 text-center font-mono ${isFail ? 'text-red-500 font-semibold' : 'text-slate-600'}`;
    };

    // 計算某一卷目的班級平均分
    const getExamAverages = (examId) => {
        if (activeStudents.length === 0) return { mc: '0.0', lq: '0.0', total: '0.0' };
        
        let sumMc = 0, sumLq = 0, sumTotal = 0;
        activeStudents.forEach(s => {
            const res = getCalculatedScores(s.id, examId);
            sumMc += res.mc;
            sumLq += res.lq;
            sumTotal += res.total;
        });

        const count = activeStudents.length;
        return {
            mc: (sumMc / count).toFixed(1),
            lq: (sumLq / count).toFixed(1),
            total: (sumTotal / count).toFixed(1)
        };
    };

    // 匯出 CSV 檔案給 Excel (包含最後一行的平均分)
    const exportToCSV = () => {
        if (validSelectedExams.length === 0) {
            alert('⚠️ 請至少選擇一份試卷進行匯出！');
            return;
        }

        let csvContent = '\uFEFF'; // 加入 BOM 預防 Excel 開啟時中文亂碼
        
        // 1. 建立標題列
        let headers = ['班別', '學號', '姓名'];
        validSelectedExams.forEach(examId => {
            const title = EXAM_MAPS[examId]?.title || examId;
            headers.push(`${title} MC`);
            headers.push(`${title} LQ`);
            headers.push(`${title} 總分`);
        });
        csvContent += headers.join(',') + '\n';

        // 2. 建立學生資料列
        activeStudents.forEach(s => {
            let row = [s.class, s.num, s.name];
            validSelectedExams.forEach(examId => {
                const scores = getCalculatedScores(s.id, examId);
                row.push(scores.mc, scores.lq, scores.total);
            });
            csvContent += row.join(',') + '\n';
        });

        // 3. 在 CSV 最後一行自動注入「全班平均分」
        let averageRow = ['全班平均分', '', ''];
        validSelectedExams.forEach(examId => {
            const avgs = getExamAverages(examId);
            averageRow.push(avgs.mc, avgs.lq, avgs.total);
        });
        csvContent += averageRow.join(',') + '\n';

        // 4. 觸發下載
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        const today = new Date().toISOString().slice(0, 10);
        link.download = `物理科考試成績報表(含平均分)_${today}.csv`;
        link.click();
    };

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            {/* 標頭與下載按鈕 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Download" className="text-green-600" /> 考試成績匯出 (Excel)
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">
                        系統僅顯示有成績記錄的試卷。自動標記不及格分數（<span className="text-red-600 font-bold">中三 &lt; 50%</span> / <span className="text-red-600 font-bold">高中 &lt; 40%</span>）。
                    </p>
                </div>
                <button 
                    onClick={exportToCSV}
                    className={`font-bold py-2.5 px-6 rounded-xl shadow-sm flex items-center justify-center gap-2 transition ${validSelectedExams.length > 0 ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                >
                    <Icon name="FileSpreadsheet" size={18} /> 下載報表 (含平均分)
                </button>
            </div>

            {/* 試卷勾選器 */}
            <div className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <label className="text-xs font-bold text-slate-700 mb-3 block">1. 選擇要匯出的試卷（自動過濾無成績試卷）：</label>
                <div className="flex flex-wrap gap-2">
                    {availableExams.length === 0 ? (
                        <span className="text-sm text-slate-400">目前群組沒有任何試卷有成績紀錄。</span>
                    ) : (
                        availableExams.map(examId => {
                            const isSelected = selectedExams.includes(examId);
                            const isSenior = (examId + ' ' + (EXAM_MAPS[examId]?.title || '')).toUpperCase().match(/S[456]/);
                            return (
                                <button 
                                    key={examId}
                                    onClick={() => toggleExam(examId)}
                                    className={`px-4 py-2 rounded-lg text-xs font-bold border transition flex items-center gap-2 ${
                                        isSelected ? 'bg-green-50 border-green-400 text-green-700 shadow-inner' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100'
                                    }`}
                                >
                                    <Icon name={isSelected ? "CheckSquare" : "Square"} size={14} />
                                    {EXAM_MAPS[examId]?.title || examId}
                                    <span className="bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded text-[10px] ml-1">
                                        {isSenior ? '高中40%及格' : '初中50%及格'}
                                    </span>
                                </button>
                            );
                        })
                    )}
                </div>
            </div>

            {/* 報表即時預覽 (完整保留，改用 validSelectedExams 安全渲染) */}
            {validSelectedExams.length > 0 && (
                <div className="card p-0 border border-slate-200 shadow-sm overflow-hidden flex flex-col max-h-[650px]">
                    <div className="p-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                        <h3 className="font-bold text-slate-800 flex items-center gap-2 text-sm">
                            <Icon name="Eye" size={16} className="text-slate-500"/> 數據動態預覽
                        </h3>
                    </div>
                    
                    <div className="overflow-x-auto flex-1">
                        <table className="w-full text-left border-collapse whitespace-nowrap min-w-max">
                            <thead className="bg-slate-100/80 text-xs text-slate-600 shadow-sm sticky top-0 z-20">
                                <tr>
                                    <th className="p-3 border-b border-r border-slate-200 text-center w-12 bg-slate-100">班別</th>
                                    <th className="p-3 border-b border-r border-slate-200 text-center w-16 bg-slate-100">學號</th>
                                    <th className="p-3 border-b border-r border-slate-200 w-24 bg-slate-100">姓名</th>
                                    {validSelectedExams.map(examId => (
                                        <th key={examId} colSpan="3" className="p-3 border-b border-r border-slate-200 text-center bg-green-50 text-green-900 font-bold">
                                            {EXAM_MAPS[examId]?.title || examId}
                                        </th>
                                    ))}
                                </tr>
                                <tr>
                                    <th className="p-2 border-b border-r border-slate-200 bg-slate-50"></th>
                                    <th className="p-2 border-b border-r border-slate-200 bg-slate-50"></th>
                                    <th className="p-2 border-b border-r border-slate-200 bg-slate-50"></th>
                                    {validSelectedExams.map(examId => (
                                        <React.Fragment key={examId + '_sub'}>
                                            <th className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium w-16 bg-slate-50">MC</th>
                                            <th className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium w-16 bg-slate-50">LQ</th>
                                            <th className="p-2 border-b border-r border-slate-200 text-center text-slate-700 font-bold bg-slate-100 w-20">總分</th>
                                        </React.Fragment>
                                    ))}
                                </tr>
                            </thead>
                            
                            <tbody className="text-sm divide-y divide-slate-100">
                                {/* 學生分數列表 */}
                                {activeStudents.map(s => (
                                    <tr key={s.id} className="hover:bg-slate-50 transition">
                                        <td className="p-2 border-r border-slate-100 text-center text-slate-600 font-mono">{s.class}</td>
                                        <td className="p-2 border-r border-slate-100 text-center text-slate-600 font-mono">{s.num}</td>
                                        <td className="p-2 border-r border-slate-200 font-bold text-slate-700">{s.name}</td>
                                        {validSelectedExams.map(examId => {
                                            const res = getCalculatedScores(s.id, examId);
                                            return (
                                                <React.Fragment key={examId + '_scores'}>
                                                    <td className={getCellStyles(res.mc, res.mcMax, res.isSenior, false)}>{res.mc}</td>
                                                    <td className={getCellStyles(res.lq, res.lqMax, res.isSenior, false)}>{res.lq}</td>
                                                    <td className={getCellStyles(res.total, res.totalMax, res.isSenior, true)}>{res.total}</td>
                                                </React.Fragment>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>

                            {/* 底部固定顯示：班級平均分 */}
                            <tfoot className="sticky bottom-0 z-10 font-bold border-t-2 border-slate-300 bg-slate-100 text-slate-800 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                                <tr>
                                    <td className="p-3 border-r border-slate-200 text-center bg-slate-200" colSpan="3">班級平均分</td>
                                    {validSelectedExams.map(examId => {
                                        const avgs = getExamAverages(examId);
                                        return (
                                            <React.Fragment key={examId + '_avg_row'}>
                                                <td className="p-3 text-center text-purple-700 font-mono font-bold bg-slate-100">{avgs.mc}</td>
                                                <td className="p-3 text-center text-blue-700 font-mono font-bold bg-slate-100">{avgs.lq}</td>
                                                <td className="p-3 border-r border-slate-200 text-center text-emerald-700 font-mono font-black bg-emerald-50">{avgs.total}</td>
                                            </React.Fragment>
                                        );
                                    })}
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            )}
        </div>
    );
};

// ==================== 全新轉型版：學生動態管理與智慧升班組件 (名單識別升級 + 改名/改群組 + 篩選器) ====================
const StudentPromotionView = ({ students, setStudents, scores, setScores, syncToCloud }) => {
    // 取得所有現有群組，並排序
    const cohorts = Array.from(new Set(students.map(s => s.cohort || '未分組'))).filter(Boolean).sort();
    
    // 狀態設定
    const [selectedCohort, setSelectedCohort] = React.useState(cohorts[0] || '2025-2028');
    const [newCohort, setNewCohort] = React.useState(selectedCohort);
    const [pasteData, setPasteData] = React.useState('');
    const [previewList, setPreviewList] = React.useState(null);
    
    // 👇 新增：用於控制下方表格的學群篩選器狀態 👇
    const [filterCohort, setFilterCohort] = React.useState('全部');

    // 1. 當選擇的來源群組變更時，自動更新預設的目標群組
    React.useEffect(() => { 
        setNewCohort(selectedCohort); 
    }, [selectedCohort]);

    // 預覽與校對功能
    const handlePreview = () => {
        if (!pasteData.trim()) {
            alert('⚠️ 請先貼上新學期的 Excel 學生資料！');
            return;
        }

        const lines = pasteData.trim().split('\n');
        const incoming = [];
        
        lines.forEach(line => {
            const parts = line.split('\t');
            if (parts.length >= 3) {
                incoming.push({
                    cls: parts[0].trim(),
                    num: parts[1].trim(),
                    name: parts[2].trim()
                });
            }
        });

        if (incoming.length === 0) {
            alert('⚠️ 無法解析資料，請確認格式為：班別 (Tab) 座號 (Tab) 姓名');
            return;
        }

        const currentStudents = students.filter(s => s.cohort === selectedCohort);
        
        const preview = incoming.map(inc => {
            const match = currentStudents.find(s => s.name === inc.name);
            return { 
                ...inc, 
                exists: !!match, 
                oldId: match?.id, 
                oldClass: match?.class,
                oldNum: match?.num
            };
        });

        const notFound = currentStudents.filter(s => !incoming.find(i => i.name === s.name));
        
        setPreviewList({ preview, notFound });
    };

    // 執行正式升班/留班寫入
    const handleCommitPromotion = () => {
        let updatedStudents = [...students];
        let updatedScores = { ...scores };
        let promoteCount = 0;
        let newCount = 0;

        previewList.preview.forEach(item => {
            const newId = `${item.cls}-${item.num}`;
            const idx = updatedStudents.findIndex(s => s.name === item.name);
            
            if (idx !== -1) {
                const oldId = updatedStudents[idx].id;
                updatedStudents[idx] = { 
                    ...updatedStudents[idx], 
                    id: newId, 
                    class: item.cls, 
                    num: item.num, 
                    cohort: newCohort 
                };
                
                if (oldId !== newId && updatedScores[oldId]) {
                    updatedScores[newId] = updatedScores[oldId];
                    delete updatedScores[oldId];
                }
                promoteCount++;
            } else {
                updatedStudents.push({ 
                    id: newId, 
                    class: item.cls, 
                    num: item.num, 
                    name: item.name, 
                    cohort: newCohort 
                });
                newCount++;
            }
        });

        setStudents(updatedStudents);
        setScores(updatedScores);

        if (typeof syncToCloud === 'function') {
            syncToCloud({ students: updatedStudents, scores: updatedScores });
        }

        setPreviewList(null);
        setPasteData('');
        alert(`🎉 升班/更新程序已完成！\n\n更新舊生資料：${promoteCount} 人\n新增學生：${newCount} 人\n\n(所有變更已安全寫入 PHYSICS DB 雲端)`);
    };

    const handleCancelPreview = () => setPreviewList(null);

    // 快速修改學生姓名
    const handleEditName = (id, currentName) => {
        const newName = window.prompt(`📝 修改學生姓名\n\n請輸入學生 [${currentName}] 的正確新姓名：`, currentName);
        if (newName === null) return; 
        
        const trimmedName = newName.trim();
        if (!trimmedName) {
            alert('⚠️ 姓名不能為空白！');
            return;
        }

        if (trimmedName !== currentName) {
            const updatedStudents = students.map(s => s.id === id ? { ...s, name: trimmedName } : s);
            setStudents(updatedStudents);
            if (typeof syncToCloud === 'function') syncToCloud({ students: updatedStudents });
            alert(`✅ 姓名已更新並同步至雲端！`);
        }
    };

    // 👇 新增：單獨修改個別學生的學群 (Cohort) 👇

            if (typeof syncToCloud === 'function') syncToCloud({ students: updatedStudents });

                <p className="text-sm text-slate-500 mt-1">在新學年貼上新名單進行預覽，系統會自動根據「姓名」對應舊生進行班級座號升級，並完美遷移所有分數紀錄。</p>
            </div>

            {/* Excel 智慧升班輸入區塊 */}
            <div className="card p-5 mb-6 bg-purple-50/40 border border-purple-100 shadow-sm rounded-xl">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div className="bg-white p-3 rounded-lg border border-purple-100 shadow-sm">
                        <label className="block text-sm font-bold text-purple-900 mb-1">1. 選擇要處理的來源群組 (Cohort)：</label>
                        <select 
                            className="w-full p-2 border border-purple-200 rounded text-sm text-slate-700 outline-none focus:border-purple-500"
                            value={selectedCohort} 
                            onChange={e => setSelectedCohort(e.target.value)}
                        >
                            {cohorts.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>
                    
                    <div className="bg-white p-3 rounded-lg border border-purple-100 shadow-sm">
                        <label className="block text-sm font-bold text-purple-900 mb-1">2. 升級後的目標群組 (可手動修改/留班)：</label>
                        <input 
                            type="text" 
                            className="w-full p-2 border-b-2 border-purple-300 font-bold text-purple-700 outline-none focus:border-purple-600 bg-transparent font-mono text-sm" 
                            value={newCohort} 
                            onChange={e => setNewCohort(e.target.value)} 
                            placeholder="例: 2025-2028"
                        />
                    </div>
                </div>

                <p className="text-xs text-slate-600 mb-2 font-medium">3. 請從 Excel 複製新學期的名單（3 欄：<b>班別 (Tab) 座號 (Tab) 姓名</b>）並貼在下方：</p>
                <textarea 
                    className="w-full h-36 p-3 border border-slate-200 rounded-lg text-sm mb-3 outline-none focus:ring-2 focus:ring-purple-400 shadow-inner bg-white font-mono" 
                    value={pasteData} 
                    onChange={e => setPasteData(e.target.value)} 
                    placeholder="例如新學期的資料：&#10;6A&#9;27&#9;謝宇邦&#10;6B&#9;05&#9;張小明"
                    disabled={previewList !== null}
