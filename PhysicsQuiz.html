};
          
// ==================== 全班課題綜合分析版面 (修復物件渲染 Bug + 升級 AI 提示詞) ====================
const TopicAnalysisView = ({ activeStudents, scores }) => {
    // 1. 動態計算當前群組有輸入成績的測驗
    const activeQuizzes = React.useMemo(() => {
        return Object.keys(window.QUIZ_MAPS || {}).filter(quizId => {
            return activeStudents.some(s => scores[s.id]?.[quizId] && Object.keys(scores[s.id][quizId]).length > 0);
        });
    }, [activeStudents, scores]);

    // 2. 預設選擇 activeQuizzes 的第一個
    const [localQuiz, setLocalQuiz] = React.useState(activeQuizzes[0] || Object.keys(window.QUIZ_MAPS || {})[0]);

    // 3. 防呆機制
    React.useEffect(() => {
        if (activeQuizzes.length > 0 && !activeQuizzes.includes(localQuiz)) {
            setLocalQuiz(activeQuizzes[0]);
        }
    }, [activeQuizzes, localQuiz]);

    const map = window.QUIZ_MAPS?.[localQuiz];

    const getClassStats = () => {
        if (!map || activeStudents.length === 0) return null;

        let classTotalScore = 0;
        let classTotalMax = 0;
        let studentsAttempted = 0;

        const qStats = {}; 
        const conceptStats = {}; 

        map.questions.forEach(q => {
            qStats[q.id] = { id: q.id, type: q.type, max: q.max, total: 0, attempts: 0, desc: q.topicDesc || q.desc, topicId: q.topicId, originalLevel: q.level };
        });

        activeStudents.forEach(st => {
            const stScores = (scores[st.id] || {})[localQuiz];
            if (stScores && Object.keys(stScores).length > 0) {
                studentsAttempted++;
                map.questions.forEach(q => {
                    const val = parseFloat(stScores[q.id]);
                    if (!isNaN(val)) {
                        classTotalScore += val;
                        classTotalMax += q.max;
                        qStats[q.id].total += val;
                        qStats[q.id].attempts++;

                        if (!conceptStats[q.topicId]) {
                            // ★ 修復核心：安全提取 Syllabus 的 topic 與 desc
                            const syllabusInfo = window.SYLLABUS_TOPICS?.[q.topicId];
                            const topicStr = typeof syllabusInfo === 'object' ? syllabusInfo.topic : (syllabusInfo || '未知課題');
                            const descStr = typeof syllabusInfo === 'object' ? syllabusInfo.desc : '';

                            conceptStats[q.topicId] = { 
                                topicId: q.topicId, 
                                topicName: topicStr, // 確保這裡是字串
                                syllabusDesc: descStr, // 儲存官方描述給 AI 用
                                total: 0, 
                                max: 0, 
                                specificDesc: new Set() 
                            };
                        }
                        conceptStats[q.topicId].total += val;
                        conceptStats[q.topicId].max += q.max;
                        // 兼容新舊 map 的題目描述欄位名稱
                        conceptStats[q.topicId].specificDesc.add(q.topicDesc || q.desc || '無具體描述');
                    }
                });
            }
        });

        if (studentsAttempted === 0) return null;

        const processedQStats = Object.values(qStats).map(q => ({
            ...q,
            pct: q.attempts > 0 ? (q.total / (q.max * q.attempts)) * 100 : 0
        })).sort((a, b) => a.pct - b.pct);

        const processedConceptStats = Object.values(conceptStats).map(c => ({
            ...c,
            pct: c.max > 0 ? (c.total / c.max) * 100 : 0,
            specificDescArray: Array.from(c.specificDesc)
        })).sort((a, b) => a.pct - b.pct);

        return { classTotalScore, classTotalMax, studentsAttempted, processedQStats, processedConceptStats };
    };

    const stats = getClassStats();

    // 計算難度分佈 (P-Value)
    const difficultyStats = { easy: [], medium: [], hard: [] };
    if (stats) {
        stats.processedQStats.forEach(q => {
            if (q.pct >= 70) difficultyStats.easy.push(q);
            else if (q.pct >= 40) difficultyStats.medium.push(q);
            else difficultyStats.hard.push(q);
        });
    }

    const generateClassReviewPrompt = () => {
        if (!stats) return "目前沒有足夠數據生成教案。";
        
        // ★ AI 提示詞升級：加入官方 Syllabus Desc
        const weakestConcepts = stats.processedConceptStats.slice(0, 3).map(c => 
            `- ${c.topicId} ${c.topicName} (全班平均得分率: ${Math.round(c.pct)}%)\n  官方學習要求: ${c.syllabusDesc || '無'}\n  具體難點: ${c.specificDescArray.join(', ')}`
        ).join('\n\n');

        const weakestQuestions = stats.processedQStats.slice(0, 3).map(q => 
            `- 題號 ${q.id} (${q.type}): ${q.desc} (全班平均: ${Math.round(q.pct)}%)`
        ).join('\n');

        return `你是一位經驗豐富的香港 DSE 物理科老師。我的全班學生剛完成了「${map.title}」的小測。以下是系統綜合出來的全班共同盲點與難點：\n\n【全班最弱的基礎概念】\n${weakestConcepts}\n\n【全班失分最多的具體題目】\n${weakestQuestions}\n\n我準備為他們進行「試後檢討 (Post-exam Review)」。請為我設計一份大約 15 分鐘的教學重溫大綱，要求：\n1. 針對上述的「最弱概念」，提供易於理解的日常例子或比喻來重新解說。\n2. 針對「失分最多的題目」，點出學生常犯的迷思概念 (Misconceptions) 及思考陷阱。\n3. 提供 3 條簡單直接的「黑板提問 (Concept Checking Questions)」，讓我能在堂上即時考問全班，以確保他們已經明白。`;
    };

    return (
        <div className="p-6 h-full overflow-y-auto animate-fadeIn">
            <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold flex items-center gap-2"><Icon name="Target" /> 全班課題綜合分析</h2>
                <select className="p-2 border rounded-md shadow-sm outline-none font-bold text-blue-700 bg-blue-50" 
                    value={localQuiz} onChange={(e) => setLocalQuiz(e.target.value)}>
                    {activeQuizzes.length > 0 
                        ? activeQuizzes.map(k => <option key={k} value={k}>{window.QUIZ_MAPS[k].title}</option>)
                        : <option value={localQuiz}>-- 此群組尚未輸入任何測驗成績 --</option>
                    }
                </select>
            </div>

            {stats ? (
                <div className="space-y-6">
                    {/* 上半部：分析區塊 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="space-y-6">
                            <div className="card p-6 flex justify-around text-center items-center">
                                <div><div className="text-sm text-gray-500 mb-1">參與人數</div><div className="text-3xl font-bold text-blue-600">{stats.studentsAttempted}</div></div>
                                <div className="w-px h-12 bg-gray-200"></div>
                                <div><div className="text-sm text-gray-500 mb-1">全班平均得分</div><div className="text-3xl font-bold text-green-600">{((stats.classTotalScore / stats.studentsAttempted) || 0).toFixed(1)} <span className="text-lg text-gray-400">/ {stats.classTotalMax / stats.studentsAttempted}</span></div></div>
                                <div className="w-px h-12 bg-gray-200"></div>
                                <div><div className="text-sm text-gray-500 mb-1">整體得分率</div><div className="text-3xl font-bold text-purple-600">{((stats.classTotalScore / stats.classTotalMax) * 100).toFixed(1)}%</div></div>
                            </div>

                            <div className="card p-6">
                                <h3 className="font-bold text-lg mb-4 text-red-700 flex items-center gap-2"><Icon name="AlertTriangle" size={20}/> 難點題目 (全班失分最多 Top 10)</h3>
                                <div className="space-y-3">
                                    {stats.processedQStats.slice(0, 10).map((q, idx) => (
                                        <div key={q.id} className="flex items-center justify-between p-3 bg-red-50 rounded border border-red-100">
                                            <div className="flex items-center gap-3">
                                                <span className="bg-red-200 text-red-800 font-bold px-2 py-1 rounded text-xs">#{idx + 1}</span>
                                                <div>
                                                    <div className="font-bold">{q.id} <span className="text-xs text-gray-500 font-normal ml-1">({q.type})</span></div>
                                                    <div className="text-sm text-gray-600">{q.desc}</div>
                                                </div>
                                            </div>
                                            <div className="text-right whitespace-nowrap ml-4">
                                                <div className={`font-bold ${q.pct < 50 ? 'text-red-600' : 'text-yellow-600'}`}>{Math.round(q.pct)}%</div>
                                                <div className="text-xs text-gray-400">平均得分率</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="card p-6">
                                <h3 className="font-bold text-lg mb-4 text-gray-800">各知識點全班掌握度</h3>
                                <div className="space-y-4">
                                    {stats.processedConceptStats.map(c => {
                                        let colorClass = c.pct >= 70 ? 'bg-green-500' : c.pct >= 50 ? 'bg-yellow-500' : 'bg-red-500';
                                        let textClass = c.pct >= 70 ? 'text-green-600' : c.pct >= 50 ? 'text-yellow-600' : 'text-red-600';
                                        return (
                                            <div key={c.topicId} className="text-sm">
                                                <div className="flex justify-between mb-1">
                                                    <span className="font-semibold text-gray-700">{c.topicId} {c.topicName}</span>
                                                    <span className={`font-bold ${textClass}`}>{Math.round(c.pct)}%</span>
                                                </div>
                                                <div className="w-full bg-gray-200 rounded-full h-2">
                                                    <div className={`h-2 rounded-full ${colorClass}`} style={{width: `${c.pct}%`}}></div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>

                        <div className="card p-6 bg-orange-50 border-orange-200 h-fit sticky top-6">
                            <h3 className="font-bold text-xl mb-3 text-orange-800 flex items-center gap-2"><Icon name="Lightbulb" /> 全班試後檢討 AI 教案生成</h3>
                            <p className="text-sm text-gray-700 mb-4">系統已找出全班的共同盲點。複製以下指令給 AI，為下一堂課快速準備「試後檢討 (Post-exam Review)」的講解策略及黑板提問。</p>
                            <textarea readOnly className="w-full h-96 p-3 rounded border border-orange-300 text-sm bg-white outline-none resize-none" value={generateClassReviewPrompt()} />
                            <button onClick={() => navigator.clipboard.writeText(generateClassReviewPrompt())} className="mt-4 bg-orange-600 text-white w-full py-3 rounded-lg shadow hover:bg-orange-700 font-bold transition flex justify-center items-center gap-2">
                                <Icon name="Copy" size={18} /> 複製指令 (生成檢討教案)
                            </button>
                        </div>
                    </div>

                    {/* 下半部：P-Value 難度診斷區塊 */}
                    <div className="card p-6">
                        <h3 className="font-bold text-xl mb-4 text-indigo-800 flex items-center gap-2">
                            <Icon name="BarChart" size={24}/> 試卷難度診斷 (P-Value 難度指數)
                        </h3>
                        <p className="text-sm text-gray-600 mb-6">
                            根據考評局標準，P-Value (平均得分率) 反映了題目對學生的實際體感難度。系統會將得分率分為：<strong className="text-green-600">淺 (≥70%)</strong>、<strong className="text-yellow-600">中 (40%-69%)</strong>、<strong className="text-red-600">深 (&lt;40%)</strong>，助你診斷本次測驗的深淺度是否符合預期。
                        </p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 text-center">
                            <div className="bg-green-50 p-4 rounded-xl border border-green-200">
                                <div className="font-bold text-green-700 mb-2">🟢 淺 (P-Value ≥ 70%)</div>
                                <div className="text-3xl font-black text-green-600 mb-2">{difficultyStats.easy.length} <span className="text-sm font-normal text-green-700">題</span></div>
                                <div className="text-xs text-green-600">{difficultyStats.easy.map(q => q.id).join(', ') || '無'}</div>
                            </div>
                            <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200">
                                <div className="font-bold text-yellow-700 mb-2">🟡 中 (40% ≤ P-Value &lt; 70%)</div>
                                <div className="text-3xl font-black text-yellow-600 mb-2">{difficultyStats.medium.length} <span className="text-sm font-normal text-yellow-700">題</span></div>
                                <div className="text-xs text-yellow-600">{difficultyStats.medium.map(q => q.id).join(', ') || '無'}</div>
                            </div>
                            <div className="bg-red-50 p-4 rounded-xl border border-red-200">
                                <div className="font-bold text-red-700 mb-2">🔴 深 (P-Value &lt; 40%)</div>
                                <div className="text-3xl font-black text-red-600 mb-2">{difficultyStats.hard.length} <span className="text-sm font-normal text-red-700">題</span></div>
                                <div className="text-xs text-red-600">{difficultyStats.hard.map(q => q.id).join(', ') || '無'}</div>
                            </div>
                        </div>

                        {/* 實測 vs 預設難度對比列表 */}
                        <div className="overflow-x-auto rounded-lg border border-gray-200">
                            <table className="w-full text-sm text-left border-collapse">
                                <thead className="bg-indigo-50 text-indigo-800">
                                    <tr>
                                        <th className="p-3 border-b">題號</th>
                                        <th className="p-3 border-b w-1/3">考核概念</th>
                                        <th className="p-3 border-b">老師預設難度</th>
                                        <th className="p-3 border-b">學生實測得分率</th>
                                        <th className="p-3 border-b">學生實際體感</th>
                                        <th className="p-3 border-b">診斷結果</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {map.questions.map(qBase => {
                                        const q = stats.processedQStats.find(x => x.id === qBase.id);
                                        if (!q) return null;

                                        let actualLevel = q.pct >= 70 ? '淺' : q.pct >= 40 ? '中' : '深';
                                        let actualColor = q.pct >= 70 ? 'text-green-600' : q.pct >= 40 ? 'text-yellow-600' : 'text-red-600';
                                        let intendedLevel = q.originalLevel || '未設定';
                                        
                                        let diagnosis = '-';
                                        if (intendedLevel !== '未設定') {
                                            if (intendedLevel === actualLevel) diagnosis = '✅ 符合預期';
                                            else if (
                                                (intendedLevel === '淺' && (actualLevel === '中' || actualLevel === '深')) ||
                                                (intendedLevel === '中' && actualLevel === '深')
                                            ) {
                                                diagnosis = '⚠️ 比預期深 (殺手題)';
                                            } else {
                                                diagnosis = '⚠️ 比預期淺 (送分題)';
                                            }
                                        }

                                        return (
                                            <tr key={q.id} className="border-b hover:bg-indigo-50 transition">
                                                <td className="p-3 font-bold text-gray-700">{q.id}</td>
                                                <td className="p-3 text-gray-600 truncate">{q.desc}</td>
                                                <td className="p-3 text-gray-500 font-medium">{intendedLevel}</td>
                                                <td className="p-3 font-mono font-bold text-gray-700">{q.pct.toFixed(1)}%</td>
                                                <td className={`p-3 font-bold ${actualColor}`}>{actualLevel}</td>
                                                <td className={`p-3 font-bold ${diagnosis.includes('殺手題') ? 'text-red-600' : diagnosis.includes('符合預期') ? 'text-green-600' : 'text-blue-600'}`}>
                                                    {diagnosis}
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            ) : (
                <div className="card p-10 text-center text-gray-500 flex flex-col items-center">
                    <Icon name="Inbox" size={48} className="text-gray-300 mb-4" />
                    <p>目前 {window.QUIZ_MAPS?.[localQuiz]?.title || localQuiz} 尚未有任何學生成績紀錄。</p>
                </div>
            )}
        </div>
    );
};

            
             const BackupView = ({ students, setStudents, scores, setScores }) => {
                // 用來記錄準備合併進來的群組名稱
                const [mergeCohort, setMergeCohort] = React.useState('2025-2028');
                
                const fileInputRef = React.useRef(null);
                const mergeInputRef = React.useRef(null);

                // 1. 下載目前雲端資料
                const handleExport = () => {
                    const dataStr = JSON.stringify({ students, scores });
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    const exportFileDefaultName = `PhysicsQuiz_DB_Backup_${new Date().toISOString().split('T')[0]}.json`;
                    const linkElement = document.createElement('a');
                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', exportFileDefaultName);
                    linkElement.click();
                };

                // 2. 舊版還原 (覆蓋式)
                const handleRestore = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.students && data.scores) {
                                if(window.confirm('⚠️ 警告：這將會【完全覆蓋】目前系統內的所有資料！確定要還原嗎？')) {
                                    setStudents(data.students);
                                    setScores(data.scores);
                                    alert('✅ 已讀取備份資料！請記得點擊「儲存並同步至雲端」。');
                                }
                            }
                        } catch (error) {
                            alert('檔案格式錯誤！');
                        }
                        e.target.value = null; // 清空選擇
                    };
                    reader.readAsText(file);
                };

                // 3. 🌟全新功能：無痛合併其他老師資料🌟
                const handleMerge = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.students && data.scores) {
                                // A. 幫對方匯入的學生全部打上你設定的 Cohort (2025-2028)
                                const importedStudents = data.students.map(s => ({
                                    ...s,
                                    cohort: mergeCohort
                                }));

                                // B. 找出不重複的學生 (過濾掉雲端已經有的人，防止重複匯入)
                                const existingIds = new Set(students.map(s => s.id));
                                const newStudentsOnly = importedStudents.filter(s => !existingIds.has(s.id));
                                
                                // C. 完美合併雙方的成績物件
                                const mergedScores = { ...scores, ...data.scores };

                                if(window.confirm(`準備將 ${newStudentsOnly.length} 位新學生加入至群組「${mergeCohort}」。\n這不會影響您現有 2024-2027 的資料！確定要合併嗎？`)) {
                                    // 將新學生附加到現有名單後面
                                    setStudents(prev => [...prev, ...newStudentsOnly]);
                                    setScores(mergedScores);
                                    alert('✅ 雙方資料合併成功！\n請務必點選左側「💾 儲存並同步至雲端」將最終結果上傳。');
                                }
                            }
                        } catch (error) {
                            alert('檔案格式錯誤！請確認這是否為系統匯出的 JSON 檔。');
                        }
                        e.target.value = null;
                    };
                    reader.readAsText(file);
                };

                return (
                    <div className="p-6">
                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icon name="Database" /> 數據備份與還原</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* 備份區塊 */}
                            <div className="card p-6 bg-white border border-slate-200">
                                <h3 className="font-bold text-lg mb-2 text-slate-800 flex items-center gap-2"><Icon name="Download" size={20}/> 備份目前資料</h3>
                                <p className="text-sm text-slate-500 mb-4">將雲端上最新的學生名單與所有成績下載到電腦中，作為您的離線保險。</p>
                                <button onClick={handleExport} className="w-full bg-slate-800 text-white py-2.5 rounded-lg hover:bg-slate-700 font-bold transition">
                                    下載備份檔 (.json)
                                </button>
                            </div>

                            {/* 覆蓋還原區塊 */}
                            <div className="card p-6 bg-white border border-red-100">
                                <h3 className="font-bold text-lg mb-2 text-red-600 flex items-center gap-2"><Icon name="AlertTriangle" size={20}/> 完全還原 (將覆蓋現有資料)</h3>
                                <p className="text-sm text-slate-500 mb-4">讀取先前的備份檔，<b className="text-red-500">這會完全洗掉並取代</b>系統內目前的所有資料。</p>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleRestore} className="hidden" />
                                <button onClick={() => fileInputRef.current.click()} className="w-full bg-red-50 text-red-600 border border-red-200 py-2.5 rounded-lg hover:bg-red-100 font-bold transition">
                                    選擇備份檔並覆蓋還原
                                </button>
                            </div>
                        </div>

                        {/* 👇 新增：合併其他老師的離線資料區塊 👇 */}
                        <div className="card p-6 mt-6 bg-green-50 border border-green-200 shadow-sm">
                            <h3 className="font-bold text-lg mb-2 text-green-700 flex items-center gap-2"><Icon name="FilePlus" size={20}/> 合併其他老師的離線資料</h3>
                            <p className="text-sm text-green-600 mb-4">若其他老師有離線版的備份檔，您可以使用此功能將他們的學生與成績<b>安全地附加</b>到系統中，且<b>不會覆蓋</b>您原本的資料！系統會自動為他們打上群組標籤。</p>
                            
                            <div className="flex flex-col md:flex-row items-center gap-4">
                                <div className="flex items-center gap-2 bg-white p-2 rounded border border-green-300 w-full md:w-auto">
                                    <label className="text-sm font-bold text-green-800 whitespace-nowrap">目標群組：</label>
                                    <input 
                                        type="text" 
                                        value={mergeCohort} 
                                        onChange={(e) => setMergeCohort(e.target.value)}
                                        className="outline-none text-green-700 font-bold w-32 bg-transparent"
                                        placeholder="例如: 2025-2028"
                                    />
                                </div>
                                
                                <input type="file" accept=".json" ref={mergeInputRef} onChange={handleMerge} className="hidden" />
                                <button onClick={() => mergeInputRef.current.click()} className="w-full md:w-auto flex-1 bg-green-600 text-white py-2.5 px-4 rounded-lg hover:bg-green-700 font-bold transition flex justify-center items-center gap-2 shadow-md">
                                    <Icon name="UploadCloud" size={18} /> 選擇對方的 JSON 檔進行合併
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };
        const getStudentAnalysis = (studentId, quizId, scores) => {
                // 加上這行防呆：如果 scores 不存在，就直接回傳 null，避免畫面崩潰
                if (!scores) return null;
                // 新增：檢查該學生是否真的有這份小測的成績紀錄，若無則直接跳過
                const studentScores = (scores[studentId] || {})[quizId];
                if (!studentScores || Object.keys(studentScores).length === 0) return null;

                const map = QUIZ_MAPS[quizId];
                if (!map) return null;

                const analysis = {};
                let totalScore = 0; let totalMax = 0;

                map.questions.forEach(q => {
                    const s = studentScores[q.id] || 0;
                    totalScore += s; totalMax += q.max;
                    
                    if (!analysis[q.topicId]) {
                        analysis[q.topicId] = { 
                            max: 0, 
                            score: 0, 
                            topicName: SYLLABUS_TOPICS[q.topicId] || '未知課題', 
                            weakPoints: [] 
                        };
                    }
                    analysis[q.topicId].max += q.max; 
                    analysis[q.topicId].score += s;
                    
                    // 如果這題得分低於一半，就把「具體的題目描述」加進弱點清單
                    if (s < q.max * 0.5) analysis[q.topicId].weakPoints.push(q.topicDesc);
                });

                const weakTopics = Object.keys(analysis).filter(k => (analysis[k].score / analysis[k].max) < 0.5);
                return { totalScore, totalMax, analysis, weakTopics };
            };

// ==================== 新增：班級成績總表組件 (加入顏色標示與滿分顯示 & 自動過濾無成績小測) ====================
const ClassSummaryView = ({ activeStudents, scores }) => {
    // 1. ★ 修改：只讀取「有入過分」的小測 Quiz ID
    const allQuizzes = React.useMemo(() => {
        const quizzesWithScores = new Set();
        (activeStudents || []).forEach(student => {
            const studentScores = scores[student.id] || {};
            Object.keys(studentScores).forEach(quizId => {
                // 只要該學生在該小測有任何一題有分，即視為有入分，並確保該 Quiz 存在於系統設定中
                if (QUIZ_MAPS[quizId] && Object.keys(studentScores[quizId]).length > 0) {
                    quizzesWithScores.add(quizId);
                }
            });
        });
        // 轉為陣列並排序，確保每次顯示的順序一致
        return Array.from(quizzesWithScores).sort();
    }, [activeStudents, scores]);

    // 2. 計算每個小測的「滿分」總和
    const quizMaxScores = React.useMemo(() => {
        const maxScores = {};
        allQuizzes.forEach(quiz => {
            let max = 0;
            const map = QUIZ_MAPS[quiz];
            if (map && map.questions) {
                map.questions.forEach(q => {
                    max += (q.max || 0);
                });
            }
            maxScores[quiz] = max;
        });
        return maxScores;
    }, [allQuizzes]);

    // 3. 狀態：記錄哪些 Quiz 要納入平均分計算（預設全部勾選）
    const [includedQuizzes, setIncludedQuizzes] = React.useState({});

    React.useEffect(() => {
        const initial = {};
        allQuizzes.forEach(q => {
            initial[q] = true;
        });
        setIncludedQuizzes(initial);
    }, [allQuizzes]);

    const toggleQuiz = (quizName) => {
        setIncludedQuizzes(prev => ({ ...prev, [quizName]: !prev[quizName] }));
    };

    // 4. 處理學生資料、動態加總各題分數與計算平均分 (按100滿分計算)
    const computedData = React.useMemo(() => {
        return activeStudents.map(student => {
            let totalForAvg = 0;  
            let countForAvg = 0;  
            const quizScores = {};

            allQuizzes.forEach(quiz => {
                const studentScores = scores[student.id]?.[quiz];
                let quizTotalScore = null;  
                let quizPercentage = null;  

                // 檢查該學生是否有這份小測的成績紀錄
                if (studentScores && Object.keys(studentScores).length > 0) {
                    const map = QUIZ_MAPS[quiz];
                    if (map) {
                        let sum = 0;
                        map.questions.forEach(q => {
                            sum += (studentScores[q.id] || 0);
                        });
                        
                        const maxScore = quizMaxScores[quiz];
                        quizTotalScore = sum; 
                        
                        // 計算該小測的百分制分數 (滿分100)
                        if (maxScore > 0) {
                            quizPercentage = (sum / maxScore) * 100;
                        }
                    }
                }

                quizScores[quiz] = quizTotalScore;

                // 納入平均分計算
                if (includedQuizzes[quiz] && quizPercentage !== null) {
                    totalForAvg += quizPercentage;
                    countForAvg++;
                }
            });

            const average = countForAvg > 0 ? (totalForAvg / countForAvg).toFixed(1) : '-';
            
            return {
                ...student,
                quizScores,
                average
            };
        });
    }, [activeStudents, scores, allQuizzes, includedQuizzes, quizMaxScores]);

    // 5. 一鍵複製到 Excel 格式
    const handleCopyToExcel = () => {
        if (computedData.length === 0) {
            alert("沒有學生資料可複製");
            return;
        }

        // 表頭
        let tsv = ["班別", "學號", "姓名", ...allQuizzes, "平均分"].join("\t") + "\n";
        // 滿分行 (方便 Excel 參考)
        tsv += ["", "", "滿分:", ...allQuizzes.map(quiz => quizMaxScores[quiz] || 0), "100"].join("\t") + "\n";

        // 內容行
        computedData.forEach(student => {
            const row = [
                student.class || student.className || '',
                student.number || student.classNumber || '',
                student.name || '',
                ...allQuizzes.map(quiz => student.quizScores[quiz] !== null ? student.quizScores[quiz] : ''),
                student.average
            ];
            tsv += row.join("\t") + "\n";
        });

        navigator.clipboard.writeText(tsv)
            .then(() => alert("📋 已成功複製表格資料！\n請直接到 Excel 按 Ctrl+V 貼上即可。"))
            .catch(err => alert("複製失敗，錯誤: " + err));
    };

    return (
        <div className="p-6 max-w-7xl mx-auto animate-fadeIn">
            <div className="flex justify-between items-center mb-6">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="Table" /> 班級成績總表 (Excel 匯出)
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">
                        系統僅顯示有成績記錄的小測。黃底表示得分 40%~60%；<span className="text-red-500 font-semibold">紅底表示低於 40%</span>。
                    </p>
                </div>
                <button 
                    onClick={handleCopyToExcel}
                    className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg shadow transition"
                >
                    <Icon name="Copy" size={18} /> 複製到 Excel 格式
                </button>
            </div>

            {/* Quiz 篩選控制面板 */}
            <div className="card p-4 mb-6 bg-white rounded-xl border border-slate-200 shadow-sm">
                <h3 className="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-1">
                    <Icon name="Settings" size={16} /> 選擇納入【平均分】計算的小測：
                </h3>
                <div className="flex flex-wrap gap-4">
                    {allQuizzes.length === 0 ? (
                         <span className="text-sm text-slate-400">目前沒有任何小測有成績紀錄。</span>
                    ) : (
                        allQuizzes.map(quiz => (
                            <label key={quiz} className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200 cursor-pointer hover:bg-slate-100 transition text-sm">
                                <input 
                                    type="checkbox" 
                                    className="w-4 h-4 text-blue-600 rounded"
                                    checked={!!includedQuizzes[quiz]} 
                                    onChange={() => toggleQuiz(quiz)} 
                                />
                                <span className="text-slate-700 font-medium">{quiz}</span>
                            </label>
                        ))
                    )}
                </div>
            </div>

            {/* 數據預覽表格 */}
            {allQuizzes.length > 0 && (
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto max-h-[600px] overflow-y-auto">
                    <table className="w-full text-left border-collapse min-w-[800px]">
                        <thead className="bg-slate-100 sticky top-0 z-10 shadow-[0_1px_0_0_rgba(226,232,240,1)]">
                            <tr>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">班別</th>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">學號</th>
                                <th className="p-3 text-sm font-semibold text-slate-600 border-b border-slate-200 align-bottom">姓名</th>
                                {allQuizzes.map(quiz => (
                                    <th key={quiz} className={`p-3 text-sm font-semibold border-b border-slate-200 ${includedQuizzes[quiz] ? 'text-slate-800 bg-blue-50/50' : 'text-slate-400 line-through'}`}>
                                        <div className="flex flex-col gap-1">
                                            <span>{quiz}</span>
                                            <span className={`text-xs ${includedQuizzes[quiz] ? 'text-blue-500' : 'text-slate-400'}`}>
                                                滿分: {quizMaxScores[quiz] || 0}
                                            </span>
                                        </div>
                                    </th>
                                ))}
                                <th className="p-3 text-sm font-bold text-blue-600 bg-blue-50 border-b border-slate-200">
                                    <div className="flex flex-col gap-1">
                                        <span>平均分</span>
                                        <span className="text-xs text-blue-400 font-normal">滿分: 100</span>
                                    </div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            {computedData.length === 0 ? (
                                <tr>
                                    <td colSpan={4 + allQuizzes.length} className="text-center p-8 text-slate-400">暫無學生數據</td>
                                </tr>
                            ) : (
                                computedData.map((student, idx) => (
                                    <tr key={student.id || idx} className="hover:bg-slate-50 transition border-b border-slate-100">
                                        <td className="p-3 text-sm text-slate-700 font-medium">{student.class || student.className || '-'}</td>
                                        <td className="p-3 text-sm text-slate-600">{student.number || student.classNumber || '-'}</td>
                                        <td className="p-3 text-sm text-slate-800 font-medium">{student.name || '-'}</td>
                                        
                                        {/* 每個 Quiz 的成績顯示與顏色判定 */}
                                        {allQuizzes.map(quiz => {
                                            const score = student.quizScores[quiz];
                                            const max = quizMaxScores[quiz];
                                            
                                            // 預設樣式
                                            let bgColor = '';
                                            let textColor = includedQuizzes[quiz] ? 'text-slate-700' : 'text-slate-300';
                                            let fontWeight = '';

                                            // 判斷是否需要加上警示顏色
                                            if (includedQuizzes[quiz] && score !== null && max > 0) {
                                                const percentage = (score / max) * 100;
                                                if (percentage < 40) {
                                                    bgColor = 'bg-red-100';
                                                    textColor = 'text-red-700';
                                                    fontWeight = 'font-bold';
                                                } else if (percentage <= 60) {
                                                    bgColor = 'bg-yellow-100';
                                                    textColor = 'text-yellow-800';
                                                    fontWeight = 'font-bold';
                                                }
                                            }

                                            return (
                                                <td key={quiz} className={`p-3 text-sm ${bgColor} ${textColor} ${fontWeight}`}>
                                                    {score !== null ? score : <span className="text-slate-300">-</span>}
                                                </td>
                                            );
                                        })}

                                        {/* 平均分的成績顯示與顏色判定 */}
                                        {(() => {
                                            let avgBgColor = 'bg-blue-50/30';
                                            let avgTextColor = 'text-blue-600';
                                            let avgFontWeight = 'font-bold';

                                            if (student.average !== '-') {
                                                const avgNum = parseFloat(student.average);
                                                if (avgNum < 40) {
                                                    avgBgColor = 'bg-red-100';
                                                    avgTextColor = 'text-red-700';
                                                } else if (avgNum <= 60) {
                                                    avgBgColor = 'bg-yellow-100';
                                                    avgTextColor = 'text-yellow-800';
                                                }
                                            }

                                            return (
                                                <td className={`p-3 text-sm ${avgBgColor} ${avgTextColor} ${avgFontWeight}`}>
                                                    {student.average}
                                                </td>
                                            );
                                        })()}
                                    </tr>
                                ))
                            )}
                        </tbody>
                    </table>
                </div>
            )}
        </div>
    );
};

// ==================== 1. 小測內容設定組件 (升級 9 欄版 + AI Prompt) ====================
const QuizSettingsView = ({ syncToCloud }) => {
    const [quizText, setQuizText] = React.useState('');

    React.useEffect(() => {
        let qText = "小測編號\t小測標題\t題目ID\t題型\t滿分\t難度\t課題編號\t題目描述\t正確答案\n";
        Object.entries(QUIZ_MAPS).forEach(([quizId, map]) => {
            if (map.questions) {
                map.questions.forEach(q => {
                    qText += `${quizId}\t${map.title}\t${q.id}\t${q.type}\t${q.max}\t${q.level}\t${q.topicId}\t${q.topicDesc}\t${q.ans || ''}\n`;
                });
            }
        });
        setQuizText(qText);
    }, []);

    const handleSave = () => {
        try {
            const newQuizMaps = {};
            const qLines = quizText.trim().split('\n');
            for (let i = 1; i < qLines.length; i++) {
                if (!qLines[i].trim()) continue;
                const cols = qLines[i].split('\t');
                if (cols.length < 8) continue; 
                
                // 讀取包含第 9 欄的資料
                const [quizId, title, qId, type, max, level, topicId, desc, ans] = cols.map(c => c ? c.trim() : '');
                
                if (!newQuizMaps[quizId]) {
                    newQuizMaps[quizId] = { title: title, questions: [] };
                }
                newQuizMaps[quizId].questions.push({
                    id: qId, type: type, max: Number(max), level: level, topicId: topicId, topicDesc: desc, ans: ans || ''
                });
            }
            QUIZ_MAPS = newQuizMaps;
            syncToCloud();
            alert('✅ 小測內容（含正確答案）已同步到 Google Sheet！');
        } catch (err) { alert('❌ 儲存失敗！' + err); }
    };

    // ---------- AI 快速 Prompt 內容 ----------
    const quickPromptText = `【身份】你是一位專門為香港高中物理（HKDSE）出題與分析的老師，學生程度為 Band 3。

【任務】我會上傳一份小測卷（可能是 MC、LQ 或混合題型的 PDF / Word / 圖片）以及一個「課題 ID 對照表 Word 檔」。請你分析這份小測卷，為「每一小題」產生一筆記錄，輸出成「Tab 分隔」的純文字格式，方便我直接貼到學校系統。

【輸出欄位（共 9 欄，順序固定）】
小測編號 [Tab] 小測標題 [Tab] 題目ID [Tab] 題型 [Tab] 滿分 [Tab] 難度 [Tab] 課題編號 [Tab] 題目描述 [Tab] 正確答案

【提取規則】

一、小測編號與小測標題
- 如果我在對話中明確告知小測編號（例如 CH09）和標題（例如「09 功、能量和功率」），請直接使用。
- 若未提供，請嘗試從上傳的檔案名稱或內容中推斷（例如檔名包含「CH09」或標題文字），並填寫推斷結果。
- 若完全無法推斷，則小測編號與標題可暫時留空，後續我會手動補上。

二、題目 ID（必須嚴格遵守）
- MC 題：題號用整數，例如第1題寫成 MC1，第2題 MC2。
- LQ 題：題號必須包含大題號和小題號：
  - 大題1的小題 a → LQ1a
  - 大題1的小題 b(i) → LQ1bi
  - 大題1的小題 b(ii) → LQ1bii
  - 大題2的小題 a → LQ2a
- 題號從 1 開始，依照小測原始順序排列。

三、題型
- MC 或 LQ（全大寫）。

四、滿分（max）
- 若小測卷上已標示分數，直接採用該分數。
- 若無標示，請根據題目複雜度合理估計：
  - MC 預設 1 分
  - LQ 簡短計算/解釋題 1-2 分
  - LQ 多步驟題 3 分（特殊情況可至 4 分）
- 輸出請寫數字。

五、難度（level）
- 對象為香港 Band 3 學生，程度偏弱。
- 判斷標準：
  - 淺：直接代入公式、單一步驟、基礎概念。
  - 中：需兩步推理或結合兩個概念。
  - 深：多步驟分析、繪圖、綜合應用或需分辨常見誤解（可標註「殺手題」特徵）。
- 請用中文輸出：「淺」「中」「深」。

六、課題編號（topicId）

// ==================== 升級版：考試成績輸入組件 (支援即時分數看板、下拉選單分數顯示 & 雙重答案) ====================
const ExamScoresInputView = ({ activeStudents, examScores, setExamScores, syncToCloud }) => {
    // 預設選擇第一個考試
    const [selectedExam, setSelectedExam] = React.useState(Object.keys(EXAM_MAPS || {})[0] || '');
    const [selectedStudentId, setSelectedStudentId] = React.useState('');
    const map = EXAM_MAPS[selectedExam];
    
    // ★ 關鍵：用來記錄所有輸入框的實體位置
    const inputRefs = React.useRef({});
    
// ★ 升級版輔助函式：計算分數，並加入 DSE 35% / 65% 加權邏輯
    const calculateStudentScore = (studentId, examId) => {
        const currentMap = EXAM_MAPS[examId];
        if (!currentMap || !currentMap.questions) return { mcScore: 0, mcMax: 0, lqScore: 0, lqMax: 0, totalScore: 0, totalMax: 0, weightedScore: 0, hasRecord: false };

        const studentExamScores = examScores[studentId]?.[examId] || {};
        let mcScore = 0;
        let mcMax = 0;
        let lqScore = 0;
        let lqMax = 0;
        let hasRecord = false;

        currentMap.questions.forEach(q => {
            const maxScore = q.max || 1;
            // 分別統計 MC 和 LQ 的滿分
            if (q.type === 'MC') mcMax += maxScore;
            else lqMax += maxScore;

            const savedVal = studentExamScores[q.id];
            if (savedVal !== undefined && savedVal !== null && savedVal !== '') {
                hasRecord = true;
                if (q.type === 'MC') {
                    if (q.ans) {
                        const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
                        const studentAnswer = savedVal.toString().toUpperCase().trim();
                        if (correctAnswers.includes(studentAnswer)) {
                            mcScore += maxScore;
                        }
                    }
                } else {
                    lqScore += parseFloat(savedVal) || 0;
                }
            }
        });

        // ★ 計算 DSE 加權總分 (滿分 100)
        let weightedScore = 0;
        if (mcMax > 0 && lqMax > 0) {
            // 同時有 MC 和 LQ，套用 35% / 65% 規則
            const mcPercentage = (mcScore / mcMax) * 35;
            const lqPercentage = (lqScore / lqMax) * 65;
            weightedScore = (mcPercentage + lqPercentage).toFixed(1);
        } else if (mcMax > 0) {
            // 只有 MC (例如 Paper 1A)
            weightedScore = ((mcScore / mcMax) * 100).toFixed(1);
        } else if (lqMax > 0) {
            // 只有 LQ (例如 Paper 1B)
            weightedScore = ((lqScore / lqMax) * 100).toFixed(1);
        }

        return {
            mcScore, mcMax,
            lqScore, lqMax,
            totalScore: mcScore + lqScore,
            totalMax: mcMax + lqMax,
            weightedScore, // 新增的加權分數
            hasRecord
        };
    };

    const currentStudentStats = calculateStudentScore(selectedStudentId, selectedExam);


    // 處理分數/答案變更
    const handleScoreChange = (studentId, examId, qId, qType, val) => {
        let processedVal = val;
        
        if (qType === 'MC') {
            // MC 題型：轉大寫，並限制只能輸入 A, B, C, D (或清空)
            processedVal = val.toUpperCase().trim();
            if (processedVal !== '' && !['A', 'B', 'C', 'D'].includes(processedVal)) {
                return; // 如果輸入其他亂碼，直接忽略
            }
        } else {
            // LQ 題型：處理數字
            processedVal = val === '' ? '' : parseFloat(val);
        }

        setExamScores(prev => ({
            ...prev, 
            [studentId]: { 
                ...(prev[studentId] || {}), 
                [examId]: { 
                    ...((prev[studentId] && prev[studentId][examId]) || {}), 
                    [qId]: processedVal 
                } 
            }
        }));
    };

    // 清除單一學生成績
    const deleteRecord = () => {
        if (!selectedStudentId || !selectedExam) return;
        const studentScores = examScores[selectedStudentId];
        if (!studentScores || !studentScores[selectedExam] || Object.keys(studentScores[selectedExam]).length === 0) {
            alert('此同學尚未有這份考試的成績紀錄。');
            return;
        }
        if (window.confirm(`確定要清除該學生【${selectedExam}】的所有成績嗎？`)) {
            setExamScores(prev => {
                const newScores = { ...prev };
                delete newScores[selectedStudentId][selectedExam];
                return newScores;
            });
        }
    };

    // ★ 升級版自動跳轉邏輯
    const handleAutoAdvance = (qId, newVal, qType, qMax) => {
        // 如果是清空內容（例如按 Backspace），則不跳轉
        if (newVal === '' || newVal === null) return;

        let shouldAdvance = false;
        
        if (qType === 'MC') {
            // MC 題只要輸入了 A/B/C/D 任何一個字就跳轉
            const valid = newVal.toString().toUpperCase().trim();
            if (['A', 'B', 'C', 'D'].includes(valid)) {
                shouldAdvance = true;
            }
        } else {
            // LQ 題如果是單位數，輸入第一個數字就跳轉
            const maxScore = qMax || 1;
            if (newVal.toString().length >= 1 && maxScore < 10) {
                shouldAdvance = true;
            }
        }

        if (shouldAdvance) {
            const currentIndex = map.questions.findIndex(item => item.id === qId);
            // 確保不是最後一題
            if (currentIndex >= 0 && currentIndex < map.questions.length - 1) {
                const nextQ = map.questions[currentIndex + 1];
                // 加入 setTimeout 防渲染衝突
                setTimeout(() => {
                    if (inputRefs.current[nextQ.id]) {
                        inputRefs.current[nextQ.id].focus();
                        inputRefs.current[nextQ.id].select(); // 自動全選方便覆蓋
                    }
                }, 10);
            }
        }
    };

    if (!map) return (
        <div className="p-6 max-w-4xl mx-auto text-center mt-20">
            <Icon name="AlertCircle" className="mx-auto mb-4 text-slate-400" size={48} />
            <h2 className="text-xl font-bold text-slate-600 mb-2">尚未設定任何考試內容</h2>
            <p className="text-slate-500">請先至左側「考試內容設定」貼上您的考試大綱後，再來輸入成績。</p>
        </div>
    );

    return (
        <div className="p-6 max-w-5xl mx-auto animate-fadeIn">
            <div className="flex justify-between items-center mb-6">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="GraduationCap" /> 考試成績輸入 (MC & LQ)
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">遇到雙重答案的題目 (如 A,C)，學生輸入其中一個字母即會自動給分。</p>
                </div>
                <button 
                    onClick={() => syncToCloud()}
                    className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg shadow-sm transition"
                >
                    <Icon name="CloudUpload" size={18} /> 儲存至雲端
                </button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div className="card p-4 flex flex-col gap-2 border border-slate-200">
                    <label className="text-sm font-semibold text-slate-700">1. 選擇考試</label>
                    <select 
                        className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none"
                        value={selectedExam} 
                        onChange={(e) => {
                            setSelectedExam(e.target.value);
                            // 切換考試時，選取狀態保持，但分數會自動重新計算
                        }}
                    >
                        {Object.keys(EXAM_MAPS).map(k => (
                            <option key={k} value={k}>{k} - {EXAM_MAPS[k].title}</option>
                        ))}
                    </select>
                </div>
                
               <div className="card p-4 flex flex-col gap-2 border border-slate-200">
                    <div className="flex justify-between items-center">
                        <label className="text-sm font-semibold text-slate-700">2. 選擇學生</label>
                        <span className="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded-full">
                            共 {activeStudents.length} 人
                        </span>
                    </div>
                    <select 
                        className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50"
                        value={selectedStudentId} 
                        onChange={(e) => setSelectedStudentId(e.target.value)}
                    >
                        <option value="">-- 請選擇學生 --</option>
                        {activeStudents.map(s => {
                            const stats = calculateStudentScore(s.id, selectedExam);
                            // ★ 下拉選單顯示修改：加入加權分數
                            const scoreString = stats.hasRecord 
                                ? `[得分: ${stats.totalScore}/${stats.totalMax} | 加權: ${stats.weightedScore}%]` 
                                : `[未入分]`;
                            
                            return (
                                <option key={s.id} value={s.id}>
                                    {s.class} ({s.num}) {s.name} {scoreString}
                                </option>
                            );
                        })}
                    </select>
                </div>
            </div>

            {/* ★ 即時分數統計看板面 (加入加權分數顯示) */}
            {selectedStudentId && (
                <div className="grid grid-cols-3 gap-4 mb-6 animate-fadeIn">
                    <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 text-center shadow-sm">
                        <div className="text-xs font-semibold text-purple-600 uppercase tracking-wider mb-1">MC 得分</div>
                        <div className="text-2xl font-bold text-purple-800">
                            {currentStudentStats.mcScore} <span className="text-sm font-normal text-purple-500">/ {currentStudentStats.mcMax}</span>
                        </div>
                    </div>
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center shadow-sm">
                        <div className="text-xs font-semibold text-blue-600 uppercase tracking-wider mb-1">LQ 得分</div>
                        <div className="text-2xl font-bold text-blue-800">
                            {currentStudentStats.lqScore} <span className="text-sm font-normal text-blue-500">/ {currentStudentStats.lqMax}</span>
                        </div>
                    </div>
                    <div className="bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 rounded-xl p-4 text-center shadow-sm">
                        {/* ★ 第三個看板改為顯示 DSE 標準加權分 */}
                        <div className="text-xs font-semibold text-amber-700 uppercase tracking-wider mb-1">DSE 加權總分 (100%)</div>
                        <div className="text-2xl font-bold text-amber-700">
                            {currentStudentStats.weightedScore} <span className="text-sm font-normal text-amber-600">分</span>
                        </div>
                        <div className="text-[10px] text-amber-500 mt-1">MC 35% + LQ 65%</div>
                    </div>
                </div>
            )}

            {selectedStudentId ? (
                <div className="card p-6 bg-white border border-slate-200 shadow-sm relative">
                    <div className="absolute top-4 right-4">
                        <button onClick={deleteRecord} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition text-sm flex items-center gap-1">
                            <Icon name="Trash2" size={16} /> 清除該生成績
                        </button>
                    </div>

                    <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">
                        輸入成績：{activeStudents.find(s => s.id === selectedStudentId)?.name}
                    </h3>
                    
                    <div className="space-y-6">
                        {/* 渲染 MC 題目 */}
                        {map.questions.filter(q => q.type === 'MC').length > 0 && (
                            <div>
                                <h4 className="font-semibold text-purple-700 mb-3 bg-purple-50 p-2 rounded">Part A: 多項選擇題 (MC)</h4>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                    {map.questions.filter(q => q.type === 'MC').map(q => {
                                        const currentVal = (examScores[selectedStudentId]?.[selectedExam] || {})[q.id] || '';
                                        return (
                                            <div key={q.id} className="flex flex-col gap-1 p-2 border border-slate-100 rounded-lg bg-slate-50 hover:bg-slate-100 transition">
                                                <div className="flex justify-between items-center text-sm">
                                                    <span className="font-bold text-slate-700">{q.id}</span>
                                                    {/* ★ UI 顯示雙重答案 */}
                                                    {q.ans && <span className="text-xs text-green-600 font-medium">正確: {q.ans.toString().split(',').map(a=>a.trim()).join(' 或 ')}</span>}
                                                </div>
                                                <input 
                                                    ref={el => inputRefs.current[q.id] = el} // ★ 綁定 DOM 位置
                                                    type="text" 
                                                    maxLength="1"
                                                    className="w-full p-2 border border-slate-300 rounded text-center font-bold text-lg focus:ring-2 focus:ring-purple-400 outline-none uppercase"
                                                    value={currentVal}
                                                    placeholder="A/B/C/D"
                                                    onChange={e => {
                                                        const val = e.target.value;
                                                        handleScoreChange(selectedStudentId, selectedExam, q.id, q.type, val);
                                                        handleAutoAdvance(q.id, val, q.type, q.max); // ★ 呼叫跳轉邏輯
                                                    }}
                                                />
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* 渲染 LQ 題目 */}
                        {map.questions.filter(q => q.type !== 'MC').length > 0 && (
                            <div>
                                <h4 className="font-semibold text-blue-700 mb-3 bg-blue-50 p-2 rounded mt-6">Part B: 長題目 (LQ)</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {map.questions.filter(q => q.type !== 'MC').map(q => {
                                        const currentVal = (examScores[selectedStudentId]?.[selectedExam] || {})[q.id] || '';
                                        return (
                                            <div key={q.id} className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg bg-white shadow-sm hover:shadow transition">
                                                <div className="w-16 font-bold text-slate-700 text-sm">{q.id}</div>
                                                <input 
                                                    ref={el => inputRefs.current[q.id] = el} // ★ 綁定 DOM 位置
                                                    type="number" 
                                                    min="0" 
                                                    max={q.max}
                                                    step="0.5"
                                                    className="flex-1 p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-400 outline-none"
                                                    value={currentVal}
                                                    placeholder={`滿分: ${q.max}`}
                                                    onChange={e => {
                                                        const val = e.target.value;
                                                        handleScoreChange(selectedStudentId, selectedExam, q.id, q.type, val);
                                                        handleAutoAdvance(q.id, val, q.type, q.max); // ★ 呼叫跳轉邏輯
                                                    }}
                                                />
                                                <div className="text-xs text-slate-400 w-10">/ {q.max}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            ) : (
                <div className="card p-12 text-center text-slate-400 border border-slate-200 shadow-sm border-dashed">
                    <Icon name="UserCheck" size={48} className="mx-auto mb-4 opacity-50" />
                    <p className="text-lg font-medium">請先從上方選擇學生以輸入成績</p>
                </div>
            )}
        </div>
    );
};

// ==================== 升級版：大考全班數據診斷與 AI 教案生成組件 (支援雙重答案 A,C 解析) ====================
const ExamAnalysisView = ({ activeStudents, examScores, currentCohort, getRelevantExamMaps }) => {
    
    // 1. 取得過濾後的試卷藍圖
    const relevantMaps = getRelevantExamMaps(currentCohort, examScores, window.EXAM_MAPS || {});
    
    // 2. 所有的 useState 必須放在最上面
    const [selectedExam, setSelectedExam] = React.useState(Object.keys(relevantMaps)[0] || '');
    const [analysisTab, setAnalysisTab] = React.useState('MC'); 
    const [aiLang, setAiLang] = React.useState('雙語 (Bilingual)');
    const [aiType, setAiType] = React.useState('MC+LQ');
    const [aiMcCount, setAiMcCount] = React.useState('5'); 
    const [aiLqCount, setAiLqCount] = React.useState('5'); 
    const [generatedPrompt, setGeneratedPrompt] = React.useState('');

    // 3. 第一個 useEffect：自動跳轉可用試卷
    React.useEffect(() => {
        if (Object.keys(relevantMaps).length > 0 && !relevantMaps[selectedExam]) {
            setSelectedExam(Object.keys(relevantMaps)[0]);
        } else if (Object.keys(relevantMaps).length === 0) {
            setSelectedExam('');
        }
    }, [currentCohort, relevantMaps, selectedExam]);

    // 4. 準備安全運算的變數 (防呆機制)
    const map = relevantMaps[selectedExam];
    const questions = map ? map.questions : [];

    // 5. 試卷難度診斷與選項統計 (安全地使用 questions 陣列，並加入雙重答案邏輯)
    const qStats = questions.map(q => {
        let totalScore = 0;
        let counts = { A: 0, B: 0, C: 0, D: 0, Other: 0 }; 

        activeStudents.forEach(s => {
            const record = examScores[s.id]?.[selectedExam];
            if (!record) return;
            const val = record[q.id];
            
            if (q.type === 'MC') {
                const ans = val ? val.toString().trim().toUpperCase() : '';
                // 統計選項分佈
                if (['A', 'B', 'C', 'D'].includes(ans)) {
                    counts[ans]++;
                } else if (ans) {
                    counts.Other++;
                }
                
                // ★ 升級核心 1：計算得分時支援雙重答案陣列比對
                if (q.ans) {
                    const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
                    if (correctAnswers.includes(ans)) {
                        totalScore += q.max;
                    }
                }
            } else {
                totalScore += (val === '' || val === undefined ? 0 : parseFloat(val));
            }
        });
        
        const count = activeStudents.length || 1;
        const mean = totalScore / count;
        const pValue = q.max > 0 ? mean / q.max : 0; 
        
        let diag = '中等';
        let badgeColor = 'text-amber-600 bg-amber-50 border-amber-200';
        if (pValue < 0.40) { diag = '艱深'; badgeColor = 'text-red-600 bg-red-50 border-red-200'; }
        else if (pValue > 0.75) { diag = '容易'; badgeColor = 'text-green-600 bg-green-50 border-green-200'; }

        // 修復核心 1：確保 topicDesc 絕對是字串
        const rawDesc = q.topicDesc || q.desc;
        const safeTopicDesc = typeof rawDesc === 'object' ? (rawDesc.topic || rawDesc.desc) : (rawDesc || '無具體描述');

        return { ...q, topicDesc: safeTopicDesc, mean: mean.toFixed(2), pValue, diag, badgeColor, counts, studentCount: count };
    });

    // 6. 各知識點全班掌握度 (加入雙重答案邏輯)
    const topicSummary = {};
    questions.forEach(q => {
        if (!topicSummary[q.topicId]) {
            const syllabusInfo = window.SYLLABUS_TOPICS?.[q.topicId];
            const topicStr = typeof syllabusInfo === 'object' ? syllabusInfo.topic : (syllabusInfo || '未定義課題');
            const descStr = typeof syllabusInfo === 'object' ? syllabusInfo.desc : '';

            topicSummary[q.topicId] = { 
                topicId: q.topicId, 
                topicName: topicStr, 
                syllabusDesc: descStr,
                maxPossible: 0, 
                actualEarned: 0 
            };
        }
        topicSummary[q.topicId].maxPossible += q.max * activeStudents.length;
        activeStudents.forEach(s => {
            const record = examScores[s.id]?.[selectedExam];
            if (!record) return;
            const val = record[q.id];
            
            if (q.type === 'MC') {
                const ans = val ? val.toString().trim().toUpperCase() : '';
                // ★ 升級核心 2：掌握度計算支援雙重答案
                if (q.ans) {
                    const correctAnswers = q.ans.toString().split(',').map(a => a.trim().toUpperCase());
                    if (correctAnswers.includes(ans)) {
                        topicSummary[q.topicId].actualEarned += q.max;
                    }
                }
            } else {
                topicSummary[q.topicId].actualEarned += (val === '' || val === undefined ? 0 : parseFloat(val));
            }
        });
    });

    const sortedTopics = Object.values(topicSummary).sort((a, b) => 
        a.topicId.localeCompare(b.topicId, undefined, { numeric: true, sensitivity: 'base' })
    );

    // 7. 第二個 useEffect：AI Prompt 生成邏輯
    React.useEffect(() => {
        if (!map) return; 
        
        const hardMC = qStats.filter(q => q.type === 'MC' && q.pValue < 0.5).map(q => `- 題號 ${q.id}: 正確答案 [${q.ans}], P-Value: ${q.pValue.toFixed(2)}。題目敘述: ${q.topicDesc}`).join('\n');
        const hardLQ = qStats.filter(q => q.type !== 'MC' && q.pValue < 0.5).map(q => `- 題號 ${q.id} (滿分 ${q.max}分): P-Value: ${q.pValue.toFixed(2)}。題目敘述: ${q.topicDesc}`).join('\n');
        
        const weakTopics = sortedTopics.filter(t => t.maxPossible > 0 && (t.actualEarned/t.maxPossible) < 0.55).map(t => 
            `- 課題 [${t.topicId} ${t.topicName}]: 全班得分率僅 ${(t.actualEarned/t.maxPossible*100).toFixed(1)}%\n  官方學習要求: ${t.syllabusDesc || '無'}`
        ).join('\n\n');

        const newPrompt = `你是一位香港 DSE 物理科中學名師。請根據以下這份大考的【全班真實應考數據】，為我編寫一份高質素的【試後檢討與重難點澄清教案】。\n\n[基本設定]\n- 語言: ${aiLang}\n- 預期針對我指定的題型與題數，各編寫全新的衍生鞏固練習題：\n  * 衍生多項選擇題 (MC)：${aiMcCount} 題\n  * 衍生長題目 (LQ)：${aiLqCount} 題\n\n[數據診斷：全班答錯率極高的 MC 難點題目]\n${hardMC || '- 無明顯 MC 難點'}\n\n[數據診斷：全班失分嚴重的 LQ 難點題目]\n${hardLQ || '- 無明顯 LQ 難點'}\n\n[數據診斷：全班掌握度最差的知識點課題]\n${weakTopics || '- 全班各課題發揮均衡'}\n\n[教案與題目編寫要求]:\n1. 錯因深度剖析：針對上述答對率低的 MC 及 LQ 題目，從物理概念角度切入，指出學生最容易混淆的觀念陷阱。\n2. 變式題目擴充：根據我設定的 MC 題數 (${aiMcCount} 題) 和 LQ 題數 (${aiLqCount} 題)，分別編寫全新的【同類概念變式衍生題】。題目必須嚴格符合 DSE 考核風格，並為 MC 提供 4 個具備強干擾項的選項，為 LQ 提供詳細的【分步評分標準 (Marking Scheme)】。\n3. 提供下階段課堂複習的補救教學具體策略。`;
        
        setGeneratedPrompt(newPrompt);
    }, [aiLang, aiType, aiMcCount, aiLqCount, selectedExam, map, activeStudents, qStats, sortedTopics]); 

    // 8. ★ 所有的 Hooks 都宣告完畢後，才可以進行 Early Return！
    if (!map) return (
        <div className="p-12 text-center text-slate-500 mt-10 animate-fadeIn">
            <Icon name="AlertCircle" size={48} className="mx-auto mb-4 text-slate-300" />
            <h2 className="text-xl font-bold">此群組尚未有任何考試成績紀錄</h2>
            <p className="mt-2 text-sm">請先前往「考試成績輸入」為此群組的學生登錄成績。</p>
        </div>
    );

    const copyPrompt = () => {
        navigator.clipboard.writeText(generatedPrompt);
        alert('📋 AI 提示詞已複製！請直接貼到 ChatGPT 或 Claude 獲取完整教案。');
    };

    return (
        <div className="p-6 max-w-6xl mx-auto animate-fadeIn">
            {/* 標頭 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 border-b pb-4">
                <div>
                    <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <Icon name="PieChart" className="text-purple-600" /> 大考班級數據診斷報告
                    </h1>
                    <p className="text-sm text-slate-500 mt-1">獨立分析 MC 誘答選項分佈與 LQ 長題目難點。</p>
                </div>
                <select 
                    className="p-2 border border-slate-300 rounded-lg font-bold bg-white focus:ring-2 focus:ring-purple-500 outline-none shadow-sm cursor-pointer"
                    value={selectedExam} 
                    onChange={(e) => setSelectedExam(e.target.value)}
                >
                    {Object.keys(relevantMaps).map(k => (
                        <option key={k} value={k}>{k} - {relevantMaps[k].title}</option>
                    ))}
                </select>
            </div>

            {/* 分頁籤切換器 */}
            <div className="flex gap-2 mb-6 bg-slate-100 p-1 rounded-lg w-fit">
                <button 
                    onClick={() => setAnalysisTab('MC')}
                    className={`px-6 py-2 rounded-md font-bold text-sm transition flex items-center gap-2 ${analysisTab === 'MC' ? 'bg-white text-purple-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                >
                    <Icon name="List" size={16} /> 多項選擇題 (MC) 深入分析
                </button>
                <button 
                    onClick={() => setAnalysisTab('LQ')}
                    className={`px-6 py-2 rounded-md font-bold text-sm transition flex items-center gap-2 ${analysisTab === 'LQ' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                >
                    <Icon name="Edit3" size={16} /> 長題目 (LQ) 難度排序
                </button>
            </div>

            {/* 數據看板核心區 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                
                {/* 1. 左側：題目難度與細部診斷 */}
                <div className="card p-5 border border-slate-200 shadow-sm flex flex-col h-[650px] bg-slate-50/50">
                    <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 border-b border-slate-200 pb-2 text-sm">
                        {analysisTab === 'MC' ? (
                            <><span className="p-1 bg-purple-100 text-purple-700 rounded"><Icon name="Target" size={15} /></span> 🎯 MC 所有題目難度與「選項分佈圖」</>
                        ) : (
                            <><span className="p-1 bg-blue-100 text-blue-700 rounded"><Icon name="AlertTriangle" size={15} /></span> 🚨 LQ 長題目失分難度排序</>
                        )}
                    </h3>
                    
                    <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                        {/* 顯示 MC 視圖 */}
                        {analysisTab === 'MC' && qStats.filter(q => q.type === 'MC').sort((a,b) => a.pValue - b.pValue).map(q => {
                            // ★ 升級核心 3：渲染 UI 時處理雙重答案的顯示
                            const correctAnswers = q.ans ? q.ans.toString().split(',').map(a => a.trim().toUpperCase()) : [];
                            
                            return (
                                <div key={q.id} className="p-3 border border-slate-200 bg-white rounded-xl shadow-sm flex flex-col gap-2">
                                    <div className="flex justify-between items-start">
                                        <div className="space-y-0.5">
                                            <div className="font-bold text-slate-800 text-sm">
                                                題號 {q.id} 
                                                <span className="text-slate-400 font-normal text-xs ml-2">正確答案: {correctAnswers.join(' 或 ')}</span>
                                            </div>
                                            <p className="text-slate-500 text-xs line-clamp-2">知識點: {q.topicDesc}</p>
                                        </div>
                                        <span className={`px-2 py-0.5 font-bold rounded-full border shrink-0 text-[10px] ${q.badgeColor}`}>P: {q.pValue.toFixed(2)}</span>
                                    </div>
                                    
                                    {/* MC 選項分佈橫條圖 */}
                                    <div className="mt-1 pt-2 border-t border-slate-100 space-y-1.5">
                                        {['A', 'B', 'C', 'D'].map(opt => {
                                            const c = q.counts[opt] || 0;
                                            const total = q.studentCount;
                                            const pct = total > 0 ? Math.round((c / total) * 100) : 0;
                                            // 判斷當前長條圖是否為正確答案之一
                                            const isCorrect = correctAnswers.includes(opt);
                                            const barColor = isCorrect ? 'bg-emerald-400' : 'bg-rose-300';
                                            const textColor = isCorrect ? 'text-emerald-700 font-bold' : 'text-slate-500';
                                            
                                            return (
                                                <div key={opt} className="flex items-center text-xs">
                                                    <span className={`w-5 font-bold ${isCorrect ? 'text-emerald-600' : 'text-slate-400'}`}>{opt}</span>
                                                    <div className="flex-1 h-3.5 bg-slate-100 rounded overflow-hidden flex shadow-inner">
                                                        <div className={`h-full ${barColor} transition-all duration-700`} style={{ width: `${pct}%` }}></div>
                                                    </div>
                                                    <span className={`w-14 text-right ${textColor}`}>{pct}% <span className="text-[10px] text-slate-400 opacity-60">({c})</span></span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            );
                        })}

                        {/* 顯示 LQ 視圖 */}
                        {analysisTab === 'LQ' && qStats.filter(q => q.type !== 'MC').sort((a,b) => a.pValue - b.pValue).map(q => (
                            <div key={q.id} className="p-3 border border-slate-200 bg-white rounded-xl shadow-sm flex justify-between items-start gap-4">
                                <div className="space-y-1">
                                    <div className="font-bold text-slate-800 text-sm">題號 {q.id} <span className="text-slate-400 font-normal text-xs ml-2">滿分: {q.max}分</span></div>
                                    <p className="text-slate-600 text-xs">知識點: {q.topicDesc}</p>
                                    <div className="text-[11px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded w-fit mt-1 font-medium">
                                        全班平均得分: {q.mean} / {q.max}
                                    </div>
                                </div>
                                <span className={`px-2 py-0.5 font-bold rounded-full border shrink-0 text-[10px] mt-1 ${q.badgeColor}`}>P: {q.pValue.toFixed(2)}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* 2. 右側：各知識點全班掌握度 (固定顯示，方便對照) */}
                <div className="card p-5 border border-slate-200 shadow-sm flex flex-col h-[650px]">
                    <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 border-b border-slate-200 pb-2 text-sm">
                        <span className="p-1 bg-emerald-100 text-emerald-700 rounded"><Icon name="BarChart3" size={15} /></span>
                        📚 各知識點物理課題掌握度 (全卷綜合)
                    </h3>
                    <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                        {sortedTopics.map(t => {
                            const pct = t.maxPossible > 0 ? (t.actualEarned / t.maxPossible) : 0;
                            const isWeak = pct < 0.50; 
                            return (
                                <div key={t.topicId} className="space-y-1.5">
                                    <div className="flex justify-between text-xs font-medium">
                                        <span className="text-slate-700 font-mono font-semibold">課題 {t.topicId} <span className="text-slate-400 font-sans font-normal ml-1">({t.topicName})</span></span>
                                        <span className={isWeak ? 'text-red-600 font-bold bg-red-50 px-1.5 rounded' : 'text-emerald-700 font-bold bg-emerald-50 px-1.5 rounded'}>{(pct*100).toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden shadow-inner">
                                        <div 
                                            className={`h-full transition-all duration-700 ${isWeak ? 'bg-gradient-to-r from-red-400 to-rose-500' : 'bg-gradient-to-r from-emerald-400 to-teal-500'}`}
                                            style={{ width: `${pct * 100}%` }}
